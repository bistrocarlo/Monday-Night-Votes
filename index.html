<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Monday Night Soccer | Admin Manual Attendance + History</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #eef2f5; font-family: 'Inter', -apple-system, sans-serif; }
        .app { max-width: 500px; margin: 0 auto; background: #eef2f5; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: white; padding: 14px 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .logo-icon { width: 56px; height: 56px; background: #1a73e8; border-radius: 24px; display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 6px; }
        .logo-icon i { font-size: 28px; color: white; }
        .header h1 { font-size: 18px; font-weight: 800; color: #1e293b; }
        .user-row { background: #f1f5f9; padding: 5px 12px; border-radius: 60px; display: inline-flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 12px; font-weight: 500; }
        .user-row button { background: #dc3545; border: none; padding: 4px 12px; border-radius: 40px; color: white; font-weight: 600; font-size: 11px; cursor: pointer; }
        .top-nav { background: white; padding: 10px 12px; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 10; }
        .nav-module { background: #f8fafc; border: none; padding: 8px 14px; border-radius: 60px; font-size: 12px; font-weight: 600; color: #475569; cursor: pointer; transition: all 0.2s; }
        .nav-module.active { background: #1a73e8; color: white; }
        .module-container { flex: 1; overflow-y: auto; padding: 16px; display: none; }
        .module-container.active-module { display: block; }
        .card { background: white; border-radius: 24px; padding: 18px; margin-bottom: 14px; border: 1px solid #e2e8f0; }
        .card h2 { font-size: 17px; font-weight: 700; margin-bottom: 14px; border-left: 4px solid #1a73e8; padding-left: 12px; }
        .attendance-card { background: linear-gradient(135deg, #1a73e8, #0d5bbf); color: white; border-radius: 28px; padding: 24px 20px; text-align: center; margin-bottom: 16px; }
        .big-buttons { display: flex; gap: 14px; justify-content: center; margin: 16px 0 12px; }
        .btn-play-big { background: #28a745; flex: 1; padding: 14px; border-radius: 60px; font-weight: 800; font-size: 17px; border: none; color: white; cursor: pointer; }
        .btn-sit-big { background: #dc3545; flex: 1; padding: 14px; border-radius: 60px; font-weight: 800; font-size: 17px; border: none; color: white; cursor: pointer; }
        .match-card { background: white; border-radius: 24px; margin-bottom: 14px; border: 1px solid #e2e8f0; overflow: hidden; }
        .match-header { background: #f8fafc; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .match-date { font-weight: 800; font-size: 14px; }
        .match-result { background: #1a73e8; color: white; padding: 4px 14px; border-radius: 40px; font-weight: 700; font-size: 14px; }
        .teams-section { padding: 16px; background: linear-gradient(145deg, #2e7d32, #1b5e20); }
        .team-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .team-box { flex: 1; background: rgba(0,0,0,0.65); border-radius: 18px; padding: 12px; }
        .team-yellow { background: #ffc107; color: #2c2c2c; font-weight: 800; text-align: center; padding: 6px; border-radius: 60px; font-size: 14px; margin-bottom: 8px; }
        .team-orange { background: #fd7e14; color: white; font-weight: 800; text-align: center; padding: 6px; border-radius: 60px; font-size: 14px; margin-bottom: 8px; }
        .player-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .player-tag { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); border-radius: 40px; padding: 4px 10px; font-size: 11px; color: white; margin: 2px; }
        .score-big { text-align: center; margin-top: 12px; font-size: 22px; font-weight: 800; background: rgba(0,0,0,0.6); border-radius: 60px; padding: 8px; color: white; }
        .goals-section, .comments-section { padding: 12px 16px; background: #fefce8; }
        .goals-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .goal-badge { background: white; border-radius: 40px; padding: 5px 12px; font-size: 12px; font-weight: 600; border-left: 3px solid #eab308; }
        .add-comment { display: flex; gap: 8px; margin-top: 10px; }
        .add-comment input { flex: 1; padding: 12px; border-radius: 60px; border: 1.5px solid #e2e8f0; font-size: 14px; }
        .comment-item { background: #f8fafc; border-radius: 16px; padding: 10px; margin-bottom: 8px; font-size: 13px; }
        .profile-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 20px; flex-shrink: 0; }
        .player-avatar-small { width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; margin-right: 4px; }
        .admin-team-item { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; background: #f1f5f9; border-radius: 60px; padding: 8px 16px; flex-wrap: wrap; gap: 8px; }
        .admin-action-btn { background: white; border: 2px solid #1a73e8; color: #1a73e8; padding: 12px; border-radius: 60px; font-weight: 700; font-size: 14px; text-align: center; cursor: pointer; margin-bottom: 8px; display: inline-block; width: 100%; }
        .guest-tag { background: #d4edda; color: #155724; border-radius: 40px; padding: 6px 12px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
        .badge-manual { background: #ffc107; color: #2c2c2c; font-size: 9px; padding: 2px 6px; border-radius: 20px; margin-left: 6px; }
        .playing-list { background: #e8f0fe; border-radius: 20px; padding: 16px; margin-bottom: 14px; }
        .setup-guide { background: #fff8e7; border-left: 4px solid #ffc107; padding: 12px; border-radius: 16px; margin-bottom: 16px; font-size: 12px; }
        .login-box { background: white; border-radius: 48px; padding: 40px 28px; margin: 40px 20px; text-align: center; }
        .login-logo { width: 90px; height: 90px; background: linear-gradient(135deg, #1a73e8, #0d5bbf); border-radius: 32px; display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        select, input { width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 60px; margin: 8px 0; font-size: 16px; background: white; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 20px; border-radius: 60px; font-weight: 700; cursor: pointer; }
        .flex-btns { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
        .btn-outline { background: white; color: #1a73e8; border: 2px solid #1a73e8; }
        .btn-danger { background: #dc3545; }
        hr { margin: 16px 0; }
        @media (max-width: 450px) { .nav-module { padding: 6px 10px; font-size: 10px; } }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
    // ==================== FIREBASE CONFIG ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCWlFqDJyENgrUOhiLXCjSEi4Mk_54SA1w",
        authDomain: "monday-night-soccer-hub.firebaseapp.com",
        projectId: "monday-night-soccer-hub",
        storageBucket: "monday-night-soccer-hub.firebasestorage.app",
        messagingSenderId: "634335208908",
        appId: "1:634335208908:web:dca705b65fc52de0606969"
    };
    
    let db = null;
    let firebaseReady = false;
    try { 
        firebase.initializeApp(firebaseConfig); 
        db = firebase.firestore(); 
        firebaseReady = true;
        console.log("✅ Firebase ready");
    } catch(e) { console.warn("⚠️ Firebase demo mode", e); }
    
    // ==================== GLOBAL STATE ====================
    let players = ["Alex Rowe","Ali Mekawy","Carlo","Charlie","Chris Del Monaco","Chris M","Chris S","Danny","Dante","David","Dimitri","Enzo","Farid","Faros","Frank","George B","George T","Ivan","James Zoumis","James","Joe T","Joey","Kia","Leo","Manoli","Marco","Mario","Maurice","Nector","Paul","Perri","Peter","Ralph","Rocco","Stav","Stevan","Theo","Tony EH","Vasilis"].sort();
    let playerProfiles = {};
    let teamAssignments = {};
    let matchResults = {};
    let attendance = [];
    let guests = [];
    let matchComments = {};
    let isAdminLoggedIn = false, currentUser = null;
    let weeklyCaptain = "Carlo";
    let rulesText = "• ⏰ 8:00pm SHARP kickoff at Clifton Park\n• 💰 $5 weekly fee\n• 👑 Captain rotates\n• ✅ RSVP via app OR tell admin\n• 🎭 Guests welcome - admin can assign teams";
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function getInitials(name) { return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0,2); }
    function getAvatarColor(name) {
        const colors = ['#1a73e8', '#28a745', '#dc3545', '#fd7e14', '#6f42c1', '#20c997', '#e83e8c'];
        let hash = 0;
        for(let i=0;i<name.length;i++) hash = ((hash<<5)-hash)+name.charCodeAt(i);
        return colors[Math.abs(hash)%colors.length];
    }
    function renderMiniAvatar(name, size=28) {
        return `<div class="player-avatar-small" style="background:${getAvatarColor(name)}; width:${size}px; height:${size}px; font-size:${size/2}px;">${getInitials(name)}</div>`;
    }
    
    // Date helpers
    function getCurrentAESTDate() { const now=new Date(); const utc=now.getTime()+(now.getTimezoneOffset()*60000); return new Date(utc+(10*3600000)).toISOString().split('T')[0]; }
    function getCurrentGameWeek() {
        const now=new Date(); const utc=now.getTime()+(now.getTimezoneOffset()*60000);
        const aestNow=new Date(utc+(10*3600000)); const day=aestNow.getDay();
        const currentMonday=new Date(aestNow);
        if(day===1 && aestNow.getHours()>=20) currentMonday.setDate(aestNow.getDate()+7);
        else if(day!==1) currentMonday.setDate(aestNow.getDate()+((8-day)%7));
        currentMonday.setHours(20,0,0,0);
        return currentMonday.toISOString().split('T')[0];
    }
    function generateAllGameWeeks() {
        const year=new Date().getFullYear();
        let start=new Date(year,0,1);
        while(start.getDay()!==1) start.setDate(start.getDate()+1);
        let weeks=[], cur=new Date(start);
        let dec31=new Date(year,11,31);
        let lastMonday=new Date(dec31);
        while(lastMonday.getDay()!==1) lastMonday.setDate(lastMonday.getDate()-1);
        let secondLast=new Date(lastMonday);
        secondLast.setDate(secondLast.getDate()-7);
        while(cur<=secondLast) {
            weeks.push({ dateStr: cur.toISOString().split('T')[0], label: `Mon ${cur.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}` });
            cur.setDate(cur.getDate()+7);
        }
        return weeks;
    }
    const ALL_WEEKS = generateAllGameWeeks();
    const getFutureWeeks = () => ALL_WEEKS.filter(w => w.dateStr >= getCurrentAESTDate());
    const getPastWeeks = () => ALL_WEEKS.filter(w => w.dateStr < getCurrentAESTDate()).reverse();
    
    function getAllParticipants(gameDate) {
        const playersIn = attendance.filter(a => a.gameDate === gameDate && a.status === 'in').map(a => a.player);
        const guestsIn = guests.filter(g => g.gameDate === gameDate).map(g => ({ name: g.guestName, isGuest: true, addedBy: g.addedBy }));
        return { players: playersIn, guests: guestsIn };
    }
    
    // ==================== FIREBASE CRUD ====================
    async function loadData() {
        if(!firebaseReady || !db) return;
        try {
            const [pDoc, profileDoc, tDoc, rDoc, attSnap, guestSnap, commentsSnap, rulesDoc] = await Promise.all([
                db.collection("config").doc("players").get().catch(()=>null),
                db.collection("config").doc("playerProfiles").get().catch(()=>null),
                db.collection("config").doc("teamAssignments").get().catch(()=>null),
                db.collection("config").doc("matchResults").get().catch(()=>null),
                db.collection("attendance").get().catch(()=>({docs:[]})),
                db.collection("guests").get().catch(()=>({docs:[]})),
                db.collection("matchComments").get().catch(()=>({docs:[]})),
                db.collection("config").doc("rules").get().catch(()=>null)
            ]);
            if(pDoc?.exists) players = pDoc.data().list.sort();
            if(profileDoc?.exists) playerProfiles = profileDoc.data();
            if(tDoc?.exists) teamAssignments = tDoc.data();
            if(rDoc?.exists) matchResults = rDoc.data();
            attendance = attSnap.docs.map(d => d.data());
            guests = guestSnap.docs.map(d => d.data());
            matchComments = {};
            commentsSnap.docs.forEach(doc => { const data=doc.data(); if(!matchComments[data.gameDate]) matchComments[data.gameDate]=[]; matchComments[data.gameDate].push(data); });
            if(rulesDoc?.exists && rulesDoc.data().text) rulesText = rulesDoc.data().text;
            for(let p of players) if(!playerProfiles[p]) playerProfiles[p] = { age:'—', position:'—', yearJoined:'—', gamesPlayed:0 };
        } catch(e) { console.warn(e); }
    }
    
    async function saveAttendance(a) {
        if(firebaseReady && db) await db.collection("attendance").doc(`${a.player}_${a.gameDate}`).set(a);
        const idx = attendance.findIndex(x => x.player === a.player && x.gameDate === a.gameDate);
        if(idx !== -1) attendance[idx] = a; else attendance.push(a);
        renderHomePage(); renderThisWeeksTeamsPage(); renderHistoryPage(); if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function saveGuest(g) {
        if(firebaseReady && db) await db.collection("guests").doc(`${g.guestName}_${g.gameDate}`).set(g);
        guests.push(g);
        renderHomePage(); renderThisWeeksTeamsPage(); renderHistoryPage(); if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function removeGuest(guestName, gameDate) {
        if(!confirm(`Remove guest "${guestName}"?`)) return;
        if(firebaseReady && db) await db.collection("guests").doc(`${guestName}_${gameDate}`).delete();
        guests = guests.filter(g => !(g.guestName === guestName && g.gameDate === gameDate));
        if(teamAssignments[gameDate]) { delete teamAssignments[gameDate][guestName]; delete teamAssignments[gameDate][`guest_${guestName}`]; if(firebaseReady && db) await db.collection("config").doc("teamAssignments").set(teamAssignments); }
        renderHomePage(); renderThisWeeksTeamsPage(); renderHistoryPage(); if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function saveTeamAssignments(gameDate, assignments) {
        teamAssignments[gameDate] = assignments;
        if(firebaseReady && db) await db.collection("config").doc("teamAssignments").set(teamAssignments);
        renderThisWeeksTeamsPage(); renderHistoryPage(); if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function saveComment(gameDate, author, text) {
        const comment = { gameDate, author, text, timestamp: Date.now() };
        if(firebaseReady && db) await db.collection("matchComments").add(comment);
        if(!matchComments[gameDate]) matchComments[gameDate]=[];
        matchComments[gameDate].push(comment);
        renderHistoryPage();
    }
    
    async function saveMatchResult(gameDate, yellowScore, orangeScore, goals) {
        matchResults[gameDate] = { yellowScore, orangeScore, goals };
        if(firebaseReady && db) await db.collection("config").doc("matchResults").set(matchResults);
        renderHistoryPage();
        if(isAdminLoggedIn) renderAdminPage();
    }
    
    // Admin manual attendance - add player without login
    async function adminAddManualAttendance(playerName) {
        const nextWeek = getFutureWeeks()[0];
        if(!nextWeek) { alert("No upcoming game week"); return; }
        if(!players.includes(playerName)) { alert(`Player "${playerName}" not in roster. Add them first via Manage Players.`); return; }
        const existing = attendance.find(a => a.player === playerName && a.gameDate === nextWeek.dateStr);
        if(existing && existing.status === 'in') { alert(`${playerName} is already marked as PLAYING`); return; }
        await saveAttendance({ player: playerName, gameDate: nextWeek.dateStr, status: 'in', manuallyAdded: true });
        alert(`${playerName} added to playing list for ${nextWeek.label}`);
    }
    
    async function setAttendance(status) {
        if(!currentUser) { alert("Login required"); return; }
        const nextWeek = getFutureWeeks()[0];
        if(!nextWeek) return;
        await saveAttendance({ player: currentUser.name, gameDate: nextWeek.dateStr, status: status });
    }
    
    async function addGuest(guestName) {
        if(!currentUser && !isAdminLoggedIn) { alert("Login required"); return; }
        const nextWeek = getFutureWeeks()[0];
        if(!nextWeek) return;
        if(guests.some(g => g.gameDate === nextWeek.dateStr && g.guestName === guestName.trim())) { alert("Guest already exists this week"); return; }
        await saveGuest({ guestName: guestName.trim(), gameDate: nextWeek.dateStr, addedBy: currentUser?.name || "Admin" });
        const input = document.getElementById("guestNameInput");
        if(input) input.value = "";
    }
    
    // ==================== RENDER FUNCTIONS ====================
    function renderHomePage() {
        const container = document.getElementById("homeContainer");
        if(!container) return;
        const nextWeek = getFutureWeeks()[0];
        const currentStatus = nextWeek ? attendance.find(a => a.gameDate === nextWeek.dateStr && a.player === currentUser?.name)?.status : null;
        const participants = nextWeek ? getAllParticipants(nextWeek.dateStr) : { players: [], guests: [] };
        container.innerHTML = `
            <div class="attendance-card"><h2><i class="fas fa-futbol"></i> ${nextWeek?.label || "This Monday"} • 8pm</h2><div>Clifton Park, Brunswick</div>
            <div class="big-buttons"><button id="homePlayBtn" class="btn-play-big">✅ I'M PLAYING</button><button id="homeSitBtn" class="btn-sit-big">❌ CAN'T PLAY</button></div>
            <div class="status-text">${currentStatus === 'in' ? '✓ You are PLAYING' : (currentStatus === 'out' ? '✗ You are NOT PLAYING' : 'Tap above to set your attendance')}</div></div>
            <div class="playing-list"><div class="playing-title"><i class="fas fa-users"></i> 🟢 Playing (${participants.players.length})</div><div class="attendee-tags" style="display:flex; flex-wrap:wrap; gap:8px;">${participants.players.map(p => `<span class="attendee-tag" style="background:#e2e8f0; padding:6px 12px; border-radius:40px;">${renderMiniAvatar(p,28)} ${escapeHtml(p)}</span>`).join('') || '<span>No players yet</span>'}</div></div>
            <div class="guest-section" style="background:#f0fdf4; border-radius:20px; padding:16px;"><div class="guest-title">🎭 Guests (${participants.guests.length})</div>
            <div class="attendee-tags">${participants.guests.map(g => `<span class="guest-tag"><i class="fas fa-user-plus"></i> ${escapeHtml(g.name)} <small>(by ${escapeHtml(g.addedBy)})</small></span>`).join('') || '<span>No guests</span>'}</div>
            <div style="margin-top:12px;"><input type="text" id="guestNameInput" placeholder="Guest name"><button id="addGuestBtnPlayer" style="width:100%; margin-top:8px;">➕ Bring a Guest</button></div></div>
        `;
        document.getElementById("homePlayBtn")?.addEventListener("click", () => setAttendance("in"));
        document.getElementById("homeSitBtn")?.addEventListener("click", () => setAttendance("out"));
        document.getElementById("addGuestBtnPlayer")?.addEventListener("click", () => { const gn = document.getElementById("guestNameInput")?.value.trim(); if(gn) addGuest(gn); else alert("Enter guest name"); });
    }
    
    function renderThisWeeksTeamsPage() {
        const container = document.getElementById("page-teamswk");
        if(!container) return;
        const nextWeek = getFutureWeeks()[0];
        if(!nextWeek) { container.innerHTML = `<div class="card"><h2>⚽ Teams</h2><p>No upcoming games.</p></div>`; return; }
        const participants = getAllParticipants(nextWeek.dateStr);
        const allList = [...participants.players.map(p=>({name:p,isGuest:false})), ...participants.guests.map(g=>({name:g.name,isGuest:true}))];
        const assignments = teamAssignments[nextWeek.dateStr] || {};
        const yellow=[], orange=[];
        for(let p of allList) {
            const team = assignments[p.name] || assignments[`guest_${p.name}`];
            if(team==="yellow") yellow.push(p); else if(team==="orange") orange.push(p);
        }
        container.innerHTML = `<div class="card" style="background:linear-gradient(135deg,#1a73e8,#0d5bbf); color:white; text-align:center;"><h2>${nextWeek.label}</h2><p>👑 Captain: ${weeklyCaptain}</p></div>
            <div class="card"><div class="team-row"><div class="team-box"><div class="team-yellow">🟡 YELLOW (${yellow.length})</div><div class="player-list">${yellow.map(p=>`<div class="player-tag">${renderMiniAvatar(p.name,24)} ${escapeHtml(p.name)}${p.isGuest?'<span class="guest-indicator" style="background:#28a745; font-size:9px; padding:2px 6px; border-radius:20px; margin-left:4px;">Guest</span>':''}</div>`).join('')||'<span class="player-tag">—</span>'}</div></div>
            <div class="team-box"><div class="team-orange">🟠 ORANGE (${orange.length})</div><div class="player-list">${orange.map(p=>`<div class="player-tag">${renderMiniAvatar(p.name,24)} ${escapeHtml(p.name)}${p.isGuest?'<span class="guest-indicator">Guest</span>':''}</div>`).join('')||'<span class="player-tag">—</span>'}</div></div></div></div>
            <div class="playing-list"><div class="playing-title">📋 All Participants (${allList.length})</div><div class="attendee-tags">${allList.map(p=>`<span class="attendee-tag">${renderMiniAvatar(p.name,24)} ${escapeHtml(p.name)}${p.isGuest?' 🎭':''}</span>`).join('')}</div></div>`;
    }
    
    function renderHistoryPage() {
        const container = document.getElementById("page-history");
        if(!container) return;
        const pastWeeks = getPastWeeks();
        if(pastWeeks.length===0) { container.innerHTML = `<div class="card"><h2>📖 Match History</h2><p>No past games yet. Check back after Monday!</p></div>`; return; }
        let html = `<div class="card"><h2>📖 Match History</h2></div>`;
        for(let week of pastWeeks) {
            const assignments = teamAssignments[week.dateStr] || {};
            const yellow = Object.keys(assignments).filter(k=>assignments[k]==="yellow" && !k.startsWith("guest_"));
            const orange = Object.keys(assignments).filter(k=>assignments[k]==="orange" && !k.startsWith("guest_"));
            const match = matchResults[week.dateStr] || { yellowScore:0, orangeScore:0, goals:{} };
            const goals = match.goals || {};
            const yellowGoals=[], orangeGoals=[];
            for(let [player,count] of Object.entries(goals)) { if(yellow.includes(player)) yellowGoals.push({player,count}); else if(orange.includes(player)) orangeGoals.push({player,count}); }
            const weeklyGuests = guests.filter(g=>g.gameDate===week.dateStr);
            const comments = matchComments[week.dateStr] || [];
            const safeId = week.dateStr.replace(/-/g,'');
            html += `<div class="match-card"><div class="match-header"><div class="match-date">${week.label}</div><div class="match-result">🟡 ${match.yellowScore} - ${match.orangeScore} 🟠</div></div>
                <div class="teams-section"><div class="team-row"><div class="team-box"><div class="team-yellow">🟡 YELLOW</div><div class="player-list">${yellow.map(p=>`<div class="player-tag">${renderMiniAvatar(p,24)} ${escapeHtml(p)}</div>`).join('')||'<span class="player-tag">—</span>'}</div></div>
                <div class="team-box"><div class="team-orange">🟠 ORANGE</div><div class="player-list">${orange.map(p=>`<div class="player-tag">${renderMiniAvatar(p,24)} ${escapeHtml(p)}</div>`).join('')||'<span class="player-tag">—</span>'}</div></div></div><div class="score-big">${match.yellowScore} - ${match.orangeScore}</div></div>
                <div class="goals-section"><div class="goals-title">⚽ Goal Scorers</div><div class="goals-list">${yellowGoals.map(g=>`<div class="goal-badge">🟡 ${g.player} ×${g.count}</div>`).join('')}${orangeGoals.map(g=>`<div class="goal-badge">🟠 ${g.player} ×${g.count}</div>`).join('')}${yellowGoals.length===0 && orangeGoals.length===0 ? '<div class="goal-badge">No goals recorded</div>' : ''}</div></div>
                ${weeklyGuests.length ? `<div class="goals-section" style="background:#f0fdf4;"><div class="goals-title">🎭 Guests</div><div class="goals-list">${weeklyGuests.map(g=>`<div class="goal-badge" style="border-left-color:#28a745;">${escapeHtml(g.guestName)} <small>(${escapeHtml(g.addedBy)})</small></div>`).join('')}</div></div>` : ''}
                <div class="comments-section"><div>💬 Comments (${comments.length})</div><div id="comments-${safeId}">${comments.map(c=>`<div class="comment-item"><strong>${escapeHtml(c.author)}</strong><br>${escapeHtml(c.text)}</div>`).join('')||'<div style="color:#94a3b8;">No comments yet.</div>'}</div>
                <div class="add-comment"><input id="commentInput-${safeId}" placeholder="Share your thoughts..."><button onclick="window.addCommentToHistory('${week.dateStr}')">Comment</button></div></div></div>`;
        }
        container.innerHTML = html;
    }
    window.addCommentToHistory = async function(gameDate) {
        if(!currentUser) { alert("Please login first"); return; }
        const input = document.getElementById(`commentInput-${gameDate.replace(/-/g,'')}`);
        if(input?.value.trim()) { await saveComment(gameDate, currentUser.name, input.value.trim()); input.value=""; renderHistoryPage(); }
    };
    
    function renderAdminPage() {
        if(!isAdminLoggedIn) { document.getElementById("page-admin").innerHTML = `<div class="card"><h2>🔒 Admin</h2><p>Admin login required</p></div>`; return; }
        const nextWeek = getFutureWeeks()[0];
        if(!nextWeek) { document.getElementById("page-admin").innerHTML = `<div class="card"><h2>No upcoming games</h2></div>`; return; }
        const participants = getAllParticipants(nextWeek.dateStr);
        const allList = [...participants.players.map(p=>({name:p,isGuest:false})), ...participants.guests.map(g=>({name:g.name,isGuest:true,addedBy:g.addedBy}))];
        const currentAssignments = teamAssignments[nextWeek.dateStr] || {};
        let manualHtml = `<div class="card"><h2>✍️ Manual Attendance (Verbal Confirmation)</h2><p>Add a player who told you they're playing</p>
            <select id="manualPlayerSelect"><option value="">-- Select Player --</option>${players.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}</select>
            <button id="manualAddBtn" class="admin-action-btn" style="background:#28a745; color:white;">➕ Add to Playing List</button>
            <div class="setup-guide" style="margin-top:12px;"><i class="fas fa-info-circle"></i> Players added manually will appear in the "Playing" list for this week.</div></div>`;
        
        let guestManageHtml = `<div class="card"><h2>🎭 Manage Guests</h2>`;
        for(let g of participants.guests) {
            guestManageHtml += `<div class="admin-team-item"><span><i class="fas fa-user-friends"></i> <strong>${escapeHtml(g.name)}</strong> (by ${escapeHtml(g.addedBy)})</span><button class="remove-guest-btn" data-guest="${escapeHtml(g.name)}" data-date="${nextWeek.dateStr}" style="background:#dc3545; padding:6px 14px;">Remove</button></div>`;
        }
        guestManageHtml += `<div style="margin-top:12px;"><input type="text" id="adminGuestName" placeholder="New guest name"><button id="adminAddGuestBtn" style="margin-top:8px;">+ Add Guest</button></div></div>`;
        
        let teamHtml = `<div class="card"><h2>⚽ Assign Teams (Players + Guests)</h2>`;
        for(let p of allList) {
            const currentTeam = currentAssignments[p.name] || currentAssignments[`guest_${p.name}`] || "";
            teamHtml += `<div class="admin-team-item"><div><strong>${renderMiniAvatar(p.name,28)} ${escapeHtml(p.name)}</strong> ${p.isGuest ? '<span style="background:#28a745; color:white; padding:2px 8px; border-radius:20px;">GUEST</span>' : ''}</div>
                <select class="team-select" data-name="${escapeHtml(p.name)}" data-isguest="${p.isGuest}"><option value="">— Team —</option><option value="yellow" ${currentTeam==="yellow"?"selected":""}>🟡 Yellow</option><option value="orange" ${currentTeam==="orange"?"selected":""}>🟠 Orange</option></select></div>`;
        }
        teamHtml += `<div class="flex-btns"><button id="autoBalanceBtn" class="btn-outline">🎲 Auto-Balance</button><button id="saveTeamsBtn">💾 Save Teams</button></div></div>`;
        
        let resultHtml = `<div class="card"><h2>🏆 Record Match Result (Past Weeks)</h2><select id="pastWeekSelect"><option value="">-- Select Past Week --</option>${getPastWeeks().map(w=>`<option value="${w.dateStr}">${w.label}</option>`).join('')}</select>
            <div id="resultForm" style="display:none; margin-top:12px;"><input type="number" id="yellowScore" placeholder="Yellow Score" style="width:48%; display:inline-block; margin-right:4%;"><input type="number" id="orangeScore" placeholder="Orange Score" style="width:48%; display:inline-block;"><button id="saveResultBtn" style="margin-top:12px;">Save Result</button></div></div>`;
        
        document.getElementById("page-admin").innerHTML = manualHtml + guestManageHtml + teamHtml + resultHtml;
        
        document.getElementById("manualAddBtn")?.addEventListener("click", () => {
            const player = document.getElementById("manualPlayerSelect")?.value;
            if(player && player !== "") adminAddManualAttendance(player);
            else alert("Select a player");
        });
        document.getElementById("adminAddGuestBtn")?.addEventListener("click", async () => {
            const gn = document.getElementById("adminGuestName")?.value.trim();
            if(gn && nextWeek) { await addGuest(gn); document.getElementById("adminGuestName").value=""; renderAdminPage(); renderHomePage(); renderThisWeeksTeamsPage(); }
            else alert("Enter guest name");
        });
        document.querySelectorAll(".remove-guest-btn").forEach(btn => btn.addEventListener("click", () => removeGuest(btn.dataset.guest, btn.dataset.date)));
        document.getElementById("autoBalanceBtn")?.addEventListener("click", () => {
            if(allList.length===0) return;
            const shuffled = [...allList];
            for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
            const mid=Math.ceil(shuffled.length/2);
            const newAssign={};
            shuffled.slice(0,mid).forEach(p=>{newAssign[p.isGuest?`guest_${p.name}`:p.name]="yellow";});
            shuffled.slice(mid).forEach(p=>{newAssign[p.isGuest?`guest_${p.name}`:p.name]="orange";});
            teamAssignments[nextWeek.dateStr]=newAssign;
            saveTeamAssignments(nextWeek.dateStr, teamAssignments[nextWeek.dateStr]);
            renderAdminPage(); renderThisWeeksTeamsPage();
        });
        document.getElementById("saveTeamsBtn")?.addEventListener("click", async () => {
            const selects = document.querySelectorAll(".team-select");
            const newAssign={};
            selects.forEach(sel=>{const name=sel.dataset.name, isGuest=sel.dataset.isguest==="true", team=sel.value; if(team) newAssign[isGuest?`guest_${name}`:name]=team;});
            teamAssignments[nextWeek.dateStr]=newAssign;
            await saveTeamAssignments(nextWeek.dateStr, teamAssignments[nextWeek.dateStr]);
            alert("Teams saved!");
        });
        document.getElementById("pastWeekSelect")?.addEventListener("change", (e) => {
            const form = document.getElementById("resultForm");
            if(e.target.value) form.style.display="block";
            else form.style.display="none";
        });
        document.getElementById("saveResultBtn")?.addEventListener("click", async () => {
            const weekDate = document.getElementById("pastWeekSelect").value;
            const yellow = parseInt(document.getElementById("yellowScore")?.value) || 0;
            const orange = parseInt(document.getElementById("orangeScore")?.value) || 0;
            if(weekDate) { await saveMatchResult(weekDate, yellow, orange, {}); alert("Result saved!"); renderHistoryPage(); }
        });
    }
    
    function renderProfilesPage() { document.getElementById("page-profiles").innerHTML = `<div class="card"><h2>👤 Profiles</h2><p>Player profiles coming soon</p></div>`; }
    function renderScoreboardPage() { document.getElementById("page-scoreboard").innerHTML = `<div class="card"><h2>🏆 Stats</h2><p>Leaderboard loading...</p></div>`; }
    function renderWeatherPage() { document.getElementById("page-weather").innerHTML = `<div class="card"><h2>🌤️ Weather</h2><p>Check back closer to game day</p></div>`; }
    function renderChatPage() { document.getElementById("page-chat").innerHTML = `<div class="card"><h2>💬 Chat</h2><p>Team chat coming soon</p></div>`; }
    function renderRulesPage() { document.getElementById("page-rules").innerHTML = `<div class="card"><h2>📜 Rules</h2><div style="white-space:pre-line">${escapeHtml(rulesText)}</div></div>`; }
    
    function renderAllModules() { renderProfilesPage(); renderScoreboardPage(); renderThisWeeksTeamsPage(); renderHistoryPage(); renderWeatherPage(); renderChatPage(); renderRulesPage(); renderAdminPage(); }
    
    function initNavigation() {
        const modules = [{id:"home",name:"🏠 HOME"},{id:"profiles",name:"👤 PROFILES"},{id:"scoreboard",name:"🏆 STATS"},{id:"teamswk",name:"⚽ THIS WEEK"},{id:"history",name:"📖 HISTORY"},{id:"weather",name:"🌤️ WEATHER"},{id:"chat",name:"💬 CHAT"},{id:"rules",name:"📜 RULES"}];
        if(isAdminLoggedIn) modules.push({id:"admin",name:"⚙️ ADMIN"});
        const navBar = document.getElementById("topNavBar");
        navBar.innerHTML = modules.map(m => `<button class="nav-module" data-module="${m.id}">${m.name}</button>`).join('');
        document.querySelectorAll(".nav-module").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = btn.dataset.module;
                document.querySelectorAll(".module-container").forEach(c => c.classList.remove("active-module"));
                const target = document.getElementById(`module-${id}`);
                if(target) target.classList.add("active-module");
                document.querySelectorAll(".nav-module").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
        });
        document.querySelector('.nav-module[data-module="home"]')?.click();
    }
    
    async function renderApp() {
        await loadData();
        document.getElementById("app").innerHTML = `
            <div class="header"><div class="logo-icon"><i class="fas fa-futbol"></i></div><h1>MONDAY NIGHT SOCCER</h1><div class="user-row"><i class="fas fa-user-circle"></i> <strong>${currentUser.role==="admin"?"ADMIN":currentUser.name}</strong> <button id="logoutBtnMain">Exit</button></div></div>
            <div class="top-nav" id="topNavBar"></div>
            <div id="module-home" class="module-container"><div id="homeContainer"></div></div><div id="module-profiles" class="module-container"><div id="page-profiles"></div></div>
            <div id="module-scoreboard" class="module-container"><div id="page-scoreboard"></div></div><div id="module-teamswk" class="module-container"><div id="page-teamswk"></div></div>
            <div id="module-history" class="module-container"><div id="page-history"></div></div><div id="module-weather" class="module-container"><div id="page-weather"></div></div>
            <div id="module-chat" class="module-container"><div id="page-chat"></div></div><div id="module-rules" class="module-container"><div id="page-rules"></div></div>
            ${isAdminLoggedIn ? `<div id="module-admin" class="module-container"><div id="page-admin"></div></div>` : ''}
        `;
        document.getElementById("logoutBtnMain").onclick = () => { currentUser=null; localStorage.removeItem("soccer_user"); renderLogin(); };
        renderHomePage(); renderAllModules(); initNavigation();
    }
    
    async function renderLogin() {
        await loadData();
        document.getElementById("app").innerHTML = `<div class="login-box"><div class="login-logo"><i class="fas fa-futbol"></i></div><h2>Monday Night Soccer</h2><p>8pm Kickoff • Clifton Park</p><select id="playerSelectLogin"><option>-- Select Player --</option>${players.map(p=>`<option>${escapeHtml(p)}</option>`).join('')}</select><button id="playerLoginBtn">Enter as Player</button><hr><input type="password" id="adminPwLogin" placeholder="Admin Password"><button id="adminLoginBtn">Admin Login</button><div class="setup-guide" style="margin-top:16px;"><i class="fas fa-database"></i> <strong>Admin can manually add players</strong><br>Password: admin123</div></div>`;
        document.getElementById("playerLoginBtn").onclick = () => { const n=document.getElementById("playerSelectLogin").value; if(n && n!=="-- Select Player --"){ currentUser={name:n,role:"player"}; isAdminLoggedIn=false; localStorage.setItem("soccer_user",JSON.stringify(currentUser)); renderApp(); } };
        document.getElementById("adminLoginBtn").onclick = () => { const pw=document.getElementById("adminPwLogin").value; if(pw==="admin123"){ currentUser={name:"Admin",role:"admin"}; isAdminLoggedIn=true; localStorage.setItem("soccer_user",JSON.stringify(currentUser)); renderApp(); } else alert("Wrong password (admin123)"); };
    }
    
    const stored = localStorage.getItem("soccer_user");
    if(stored) { try { const u=JSON.parse(stored); if(u.role==="admin"){ isAdminLoggedIn=true; currentUser={name:"Admin",role:"admin"}; } else { currentUser={name:u.name,role:"player"}; } renderApp(); } catch(e){ renderLogin(); } }
    else { renderLogin(); }
</script>
</body>
