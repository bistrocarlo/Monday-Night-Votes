    // ==================== HELPER FUNCTIONS ====================
    function getMondayDate(date) {
        const d = new Date(date);
        const day = d.getDay();
        const diff = (day === 0 ? -6 : 1) - day;
        d.setDate(d.getDate() + diff);
        d.setHours(20, 0, 0, 0);
        return d;
    }
    
    function getNextMondayGame() {
        const today = new Date();
        let nextMonday = getMondayDate(today);
        if (nextMonday < today) {
            nextMonday.setDate(nextMonday.getDate() + 7);
        }
        return nextMonday;
    }
    
    function getCurrentGameWeekStr() {
        return getNextMondayGame().toISOString().split('T')[0];
    }

        const m = getNextMondayGame();

        const startDate = new Date(today);
        startDate.setFullYear(today.getFullYear() - 1);
        const startMonday = getMondayDate(startDate);
        const currentMonday = getMondayDate(today);
        let current = new Date(startMonday);
        while (current <= currentMonday) {
            weeks.push({
                dateStr: current.toISOString().split('T')[0],
                label: `Mon ${current.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' })}`
            });
            current.setDate(current.getDate() + 7);
        }
        weeks.sort((a, b) => b.dateStr.localeCompare(a.dateStr));
        return weeks;
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m]);

    function getInitials(name) {
        return name.split(' ').map(x => x[0]).join('').toUpperCase().substring(0, 2);

    function getAvatarColor(name) {
        const colors = ['#1a73e8', '#28a745', '#dc3545', '#fd7e14', '#6f42c1', '#20c997', '#e94560'];
        let hash = 0;
        for (let i = 0; i < name.length; i++) {
            hash = ((hash << 5) - hash) + name.charCodeAt(i);
        }
        return colors[Math.abs(hash) % colors.length];
    }

    function formatTime(seconds) {

    function playAlarm() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = ctx.createOscillator();
            const gain = ctx.createGain();
            oscillator.connect(gain);
            gain.connect(ctx.destination);
            oscillator.frequency.value = 880;
            gain.gain.value = 0.3;
            oscillator.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 1.5);
            oscillator.stop(ctx.currentTime + 1.5);
        } catch (e) { }
    }
    
    function timerTick() {
        if (timeLeft <= 0) {
            if (timerInterval) clearInterval(timerInterval);
            playAlarm();
            if (currentHalf === 1) {
                alert("🔔 HALF TIME! Click OK to start second half.");
                currentHalf = 2;
                timeLeft = 45 * 60;
                updateTimerDisplay();
                startTimer();
            } else {
                alert("🔔 FULL TIME! Match finished.");
                timerInterval = null;
            }
            return;
        }
        timeLeft--;
        updateTimerDisplay();
    }
    
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(timerTick, 1000);
    }
    
    function pauseTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }
    
    function resetTimer() {
        pauseTimer();
        currentHalf = 1;
        timeLeft = 45 * 60;
        updateTimerDisplay();
    }
    
    // ==================== STATISTICS ENGINE ====================
    function calculatePlayerStats() {
        const stats = new Map();
        for (let p of players) {
            stats.set(p, {
                goals: 0,
                assists: 0,
                gamesPlayed: 0,
                mvps: 0,
                yellowCards: 0,
                motmWins: 0,
                streak: 0,
                bestStreak: 0
            });
        }
        
        // Count games played from attendance
        attendance.forEach(a => {
            if (a.status === 'in' && stats.has(a.player)) {
                stats.get(a.player).gamesPlayed++;
            }
        });
        
        // Add opening balance games from profiles
        for (let p of players) {
            const opening = playerProfiles[p]?.openingBalanceGames || 0;
            if (stats.has(p)) stats.get(p).gamesPlayed += opening;
        }
        
        // Count goals, assists, MVPs from match results
        for (let match of Object.values(matchResults)) {
            if (match.goals) {
                for (let [scorer, count] of Object.entries(match.goals)) {
                    if (stats.has(scorer)) stats.get(scorer).goals += count;
                }
            }
            if (match.assists) {
                for (let [assister, count] of Object.entries(match.assists)) {
                    if (stats.has(assister)) stats.get(assister).assists += count;
                }
            }
            if (match.mvp && stats.has(match.mvp)) {
                stats.get(match.mvp).mvps++;
                stats.get(match.mvp).motmWins++;
            }
        }
        
        // Calculate streaks
        for (let p of players) {
            const playerGames = attendance.filter(a => a.player === p && a.status === 'in')
                .sort((a, b) => a.gameDate.localeCompare(b.gameDate));
            let currentStreak = 0;
            let bestStreak = 0;
            for (let i = 0; i < playerGames.length; i++) {
                if (i > 0) {
                    const diff = new Date(playerGames[i].gameDate) - new Date(playerGames[i - 1].gameDate);
                    if (diff <= 8 * 24 * 60 * 60 * 1000) {
                        currentStreak++;
                    } else {
                        currentStreak = 1;
                    }
                } else {
                    currentStreak = 1;
                }
                bestStreak = Math.max(bestStreak, currentStreak);
            }
            if (stats.has(p)) {
                stats.get(p).streak = currentStreak;
                stats.get(p).bestStreak = bestStreak;
            }
        }
        
        return stats;
    }
    
    function getPowerRankings() {
        const stats = calculatePlayerStats();
        const rankings = [];
        for (let [name, s] of stats) {
            // Power score formula: goals*3 + assists*2 + games*1 + mvps*5
            const score = (s.goals * 3) + (s.assists * 2) + (s.gamesPlayed * 1) + (s.mvps * 5);
            rankings.push({
                name,
                score,
                goals: s.goals,
                assists: s.assists,
                games: s.gamesPlayed,
                mvps: s.mvps,
                streak: s.streak
            });
        }
        return rankings.sort((a, b) => b.score - a.score);
    }
    
    function getPlayerAchievements(playerName) {
        const stats = calculatePlayerStats();
        const playerStats = stats.get(playerName);
        if (!playerStats) return [];
        
        const earned = [];
        
        // Check each achievement
        for (let match of Object.values(matchResults)) {
            if (match.goals && match.goals[playerName] >= 3 && !earned.find(a => a.id === "hattrick")) {
                earned.push({ ...ACHIEVEMENTS.find(a => a.id === "hattrick"), earned: true });
            }
            if (match.assists && match.assists[playerName] >= 3 && !earned.find(a => a.id === "playmaker")) {
                earned.push({ ...ACHIEVEMENTS.find(a => a.id === "playmaker"), earned: true });
            }
        }
        
        if (playerStats.gamesPlayed >= 1 && !earned.find(a => a.id === "debut")) {
            earned.push({ ...ACHIEVEMENTS.find(a => a.id === "debut"), earned: true });
        }
        if (playerStats.gamesPlayed >= 20 && !earned.find(a => a.id === "loyalty")) {
            earned.push({ ...ACHIEVEMENTS.find(a => a.id === "loyalty"), earned: true });
        }
        if (playerStats.streak >= 10 && !earned.find(a => a.id === "ironman")) {
            earned.push({ ...ACHIEVEMENTS.find(a => a.id === "ironman"), earned: true });
        }
        if (playerStats.mvps >= 1 && !earned.find(a => a.id === "mvp")) {
            earned.push({ ...ACHIEVEMENTS.find(a => a.id === "mvp"), earned: true });
        }
        if (playerStats.goals >= 100 && !earned.find(a => a.id === "century")) {
            earned.push({ ...ACHIEVEMENTS.find(a => a.id === "century"), earned: true });
        }
        
        return earned;
    }

    async function saveAttendance(attendanceRecord) {
        if (firebaseReady && db) {
            await db.collection("attendance").doc(`${attendanceRecord.player}_${attendanceRecord.gameDate}`).set(attendanceRecord);
        }
        const idx = attendance.findIndex(x => x.player === attendanceRecord.player && x.gameDate === attendanceRecord.gameDate);
        if (idx !== -1) {
            attendance[idx] = attendanceRecord;
        } else {
            attendance.push(attendanceRecord);
        }
        
        // Update player profile games count
        const gamesCount = attendance.filter(a => a.player === attendanceRecord.player && a.status === 'in').length;
        const opening = playerProfiles[attendanceRecord.player]?.openingBalanceGames || 0;
        if (playerProfiles[attendanceRecord.player]) {
            playerProfiles[attendanceRecord.player].gamesPlayed = gamesCount + opening;
        } else {
            playerProfiles[attendanceRecord.player] = {
                age: '—',
                position: 'Midfielder',
                yearJoined: '2024',
                gamesPlayed: gamesCount + opening,
                openingBalanceGames: 0
            };
        }
        
        if (firebaseReady && db) {
            await db.collection("config").doc("playerProfiles").set(playerProfiles);
        }
        refreshAll();
    }

    async function fetchWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-37.77&longitude=144.97&hourly=temperature_2m,precipitation_probability,weathercode,windspeed_10m&timezone=Australia/Melbourne&forecast_days=7');
            const data = await response.json();
            const targetDate = CURRENT_GAME_STR;
            
            for (let i = 0; i < data.hourly.time.length; i++) {
                const hourDate = data.hourly.time[i].split('T')[0];
                const hour = parseInt(data.hourly.time[i].split('T')[1].substring(0, 2));
                if (hourDate === targetDate && hour === 20) {
                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    let condition = "Clear";
                    let icon = "fa-sun";
                    const code = data.hourly.weathercode[i];
                    if (code === 0) { condition = "Clear"; icon = "fa-sun"; }
                    else if (code === 1 || code === 2) { condition = "Partly cloudy"; icon = "fa-cloud-sun"; }
                    else if (code === 3) { condition = "Overcast"; icon = "fa-cloud"; }
                    else if (code >= 51 && code <= 67) { condition = "Light rain"; icon = "fa-cloud-rain"; }
                    else if (code >= 80 && code <= 99) { condition = "Rain/storm"; icon = "fa-cloud-bolt"; }
                    
                    weatherData = {
                        temp: `${temp}°C`,
                        condition: condition,
                        icon: icon,
                        rainChance: data.hourly.precipitation_probability[i] || 0,
                        wind: `${Math.round(data.hourly.windspeed_10m?.[i] || 12)} km/h`
                    };
                    break;
                }
            }
        } catch (e) {
            console.warn("Weather fetch failed:", e);
        }
        renderWeatherPage();
    }

    window.shareMatchReport = function(date) {
        const match = matchResults[date] || { yellowScore: 0, orangeScore: 0, goals: {}, assists: {}, mvp: '', injuries: [] };
        const weekLabel = ALL_WEEKS.find(w => w.dateStr === date)?.label || date;
        const report = generateAIMatchReport(weekLabel, match.yellowScore, match.orangeScore, match.goals, match.assists, match.mvp, match.injuries);
        window.open(`https://wa.me/?text=${encodeURIComponent(report)}`, '_blank');
    };
    
    function generateAIMatchReport(weekLabel, yellowScore, orangeScore, goals, assists, mvp, injuries) {
        const winner = yellowScore > orangeScore ? "Yellow" : (orangeScore > yellowScore ? "Orange" : "Draw");
        const goalText = Object.entries(goals).map(([p, c]) => `• ${p}: ${c} goal${c > 1 ? 's' : ''}`).join('\n') || "• No goals scored";
        const assistText = Object.entries(assists || {}).map(([a, c]) => `• ${a}: ${c} assist${c > 1 ? 's' : ''}`).join('\n') || "• No assists recorded";
        
        return `📰 *MONDAY NIGHT SOCCER - MATCH REPORT* 📰\n*${weekLabel.toUpperCase()} | Clifton Park, Brunswick*\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n*FINAL SCORE*\n🟡 YELLOW ${yellowScore} - ${orangeScore} 🟠\n\n*GOAL SCORERS*\n${goalText}\n\n*ASSISTS*\n${assistText}\n\n*MAN OF THE MATCH*\n🏆 ${mvp || "Not awarded"}\n\n*INJURY REPORT*\n${injuries?.length ? injuries.map(i => `• ${i}`).join('\n') : "• None reported"}\n\n#MondayNightSoccer #MatchReport`;
    }

        `;

            const newPos = document.getElementById("editPosition").value;
            const newYear = document.getElementById("editYear").value.trim() || '—';
            const newOpening = parseInt(document.getElementById("editOpening").value) || 0;

            playerProfiles[playerName] = {
                age: newAge,
                position: newPos,
                yearJoined: newYear,
                gamesPlayed: gamesFromAttend + newOpening,
                openingBalanceGames: newOpening
            };
            
            if (firebaseReady && db) {
                await db.collection("config").doc("playerProfiles").set(playerProfiles);

            modal.remove();
            refreshAll();
            alert(`✅ Profile updated for ${playerName}`);
        };

    function renderAdminPage() {
        const container = document.getElementById("page-admin");
        if (!container) return;
        
        if (!isAdminLoggedIn) {
            container.innerHTML = `
                <div class="card">
                    <h2><i class="fas fa-lock"></i> Admin Access</h2>
                    <button id="adminLoginBtn" style="width: 100%;"><i class="fas fa-key"></i> Login as Admin</button>
                </div>
            `;
            document.getElementById("adminLoginBtn")?.addEventListener("click", () => {
                const pw = prompt("Enter admin password:");
                if (pw === "admin123") {
                    isAdminLoggedIn = true;
                    refreshAll();
                } else {
                    alert("Wrong password");
                }
            });
            return;
        }
        
        const pastWeeks = getPastWeeks();
        const allWeeks = [{ dateStr: CURRENT_GAME_STR, label: `${getCurrentGameLabel()} (CURRENT)` }, ...pastWeeks];
        
        container.innerHTML = `
            <div class="card">
                <h2><i class="fas fa-sliders-h"></i> Admin Control Panel</h2>
                
                <div class="info-bar">
                    <i class="fas fa-info-circle"></i> Select a week to assign teams or add results
                </div>
                
                <label><strong>📅 Select Week:</strong></label>
                <select id="adminWeekSelect">
                    <option value="">-- Select Week --</option>
                    ${allWeeks.map(w => `<option value="${w.dateStr}">${w.label}</option>`).join('')}
                </select>
                <button id="loadWeekAdminBtn" style="width: 100%; margin-top: 8px;"><i class="fas fa-download"></i> Load Week Data</button>
                <div id="adminWeekPanel" style="margin-top: 16px;"></div>
            </div>
            
            <div class="card">
                <h2><i class="fas fa-plus-circle"></i> Add Player to Week</h2>
                <select id="adminPlayerSelect">
                    <option value="">-- Select Player --</option>
                    ${MASTER_PLAYERS.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}
                </select>
                <select id="adminWeekAddSelect">
                    <option value="">-- Select Week --</option>
                    ${allWeeks.map(w => `<option value="${w.dateStr}">${w.label}</option>`).join('')}
                </select>
                <button id="adminAddPlayerBtn" style="width: 100%; margin-top: 8px;"><i class="fas fa-user-plus"></i> Add Player to Week</button>
            </div>
            
            <div class="card">
                <h2><i class="fas fa-chart-simple"></i> Add Match Result</h2>
                <select id="resultWeekSelect">
                    <option value="">-- Select Week --</option>
                    ${allWeeks.map(w => `<option value="${w.dateStr}">${w.label}</option>`).join('')}
                </select>
                <div id="resultFormPanel" style="margin-top: 12px;"></div>
            </div>
        `;
        
        // Load week data for team assignment
        document.getElementById("loadWeekAdminBtn")?.addEventListener("click", async () => {
            const week = document.getElementById("adminWeekSelect").value;
            if (!week) {
                alert("Please select a week");
                return;
            }
            await loadWeekForEditing(week);
        });
        
        // Add player to week
        document.getElementById("adminAddPlayerBtn")?.addEventListener("click", async () => {
            const player = document.getElementById("adminPlayerSelect").value;
            const week = document.getElementById("adminWeekAddSelect").value;
            if (!player || !week) {
                alert("Please select both player and week");
                return;
            }
            await addPlayerToWeek(player, week);
            alert(`✅ ${player} added to ${week}`);
        });
        
        // Match result form
        document.getElementById("resultWeekSelect")?.addEventListener("change", async (e) => {
            const week = e.target.value;
            const formPanel = document.getElementById("resultFormPanel");
            if (!week) {
                formPanel.innerHTML = "";
                return;
            }
            
            const participants = getAllParticipants(week);
            const allPlayers = [...participants.players, ...participants.guests.map(g => g.name)];
            const playerOptions = allPlayers.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
            const existing = matchResults[week] || {};
            
            formPanel.innerHTML = `
                <div style="display: flex; gap: 12px;">
                    <input type="number" id="resultYellow" placeholder="Yellow Score" value="${existing.yellowScore || 0}" style="flex: 1;">
                    <input type="number" id="resultOrange" placeholder="Orange Score" value="${existing.orangeScore || 0}" style="flex: 1;">
                </div>
                <div style="margin-top: 12px;">
                    <label><strong>⚽ Goal Scorers</strong></label>
                    <div id="goalsList"></div>
                    <button id="addGoalBtn" type="button" class="btn-outline" style="margin-top: 6px;"><i class="fas fa-plus"></i> Add Goal Scorer</button>
                </div>
                <div style="margin-top: 12px;">
                    <label><strong>🎯 Assists</strong></label>
                    <div id="assistsList"></div>
                    <button id="addAssistBtn" type="button" class="btn-outline" style="margin-top: 6px;"><i class="fas fa-plus"></i> Add Assist</button>
                </div>
                <div style="margin-top: 12px;">
                    <label><strong>🏆 MVP</strong></label>
                    <select id="resultMvp"><option value="">-- Select MVP --</option>${playerOptions}</select>
                </div>
                <button id="saveResultBtn" style="width: 100%; margin-top: 16px;"><i class="fas fa-save"></i> Save Match Result</button>
            `;
            
            let goals = existing.goals ? Object.entries(existing.goals).map(([p, c]) => ({ player: p, count: c })) : [];
            let assists = existing.assists ? Object.entries(existing.assists).map(([p, c]) => ({ player: p, count: c })) : [];
            
            if (existing.mvp) document.getElementById("resultMvp").value = existing.mvp;
            
            function rebuildGoalUI() {
                const goalsDiv = document.getElementById("goalsList");
                goalsDiv.innerHTML = goals.map((g, idx) => `
                    <div class="stats-row">
                        <select class="goalPlayerSelect" data-idx="${idx}" style="flex: 2;">${playerOptions}</select>
                        <input type="number" class="goalCountInput" data-idx="${idx}" value="${g.count}" style="width: 70px;">
                        <button class="removeGoalBtn" data-idx="${idx}" style="background: #dc3545;"><i class="fas fa-trash"></i></button>
                    </div>
                `).join('') || '<div class="text-muted">No goals added</div>';
                
                document.querySelectorAll(".goalPlayerSelect").forEach(sel => {
                    const idx = parseInt(sel.dataset.idx);
                    if (goals[idx]) sel.value = goals[idx].player;
                    sel.addEventListener("change", (e) => { goals[idx].player = e.target.value; });
                });
                document.querySelectorAll(".goalCountInput").forEach(inp => {
                    const idx = parseInt(inp.dataset.idx);
                    inp.addEventListener("change", (e) => { goals[idx].count = parseInt(e.target.value) || 1; });
                });
                document.querySelectorAll(".removeGoalBtn").forEach(btn => {
                    btn.addEventListener("click", () => { goals.splice(parseInt(btn.dataset.idx), 1); rebuildGoalUI(); });
                });
            }
            
            function rebuildAssistUI() {
                const assistsDiv = document.getElementById("assistsList");
                assistsDiv.innerHTML = assists.map((a, idx) => `
                    <div class="stats-row">
                        <select class="assistPlayerSelect" data-idx="${idx}" style="flex: 2;">${playerOptions}</select>
                        <input type="number" class="assistCountInput" data-idx="${idx}" value="${a.count}" style="width: 70px;">
                        <button class="removeAssistBtn" data-idx="${idx}" style="background: #dc3545;"><i class="fas fa-trash"></i></button>
                    </div>
                `).join('') || '<div class="text-muted">No assists added</div>';
                
                document.querySelectorAll(".assistPlayerSelect").forEach(sel => {
                    const idx = parseInt(sel.dataset.idx);
                    if (assists[idx]) sel.value = assists[idx].player;
                    sel.addEventListener("change", (e) => { assists[idx].player = e.target.value; });
                });
                document.querySelectorAll(".assistCountInput").forEach(inp => {
                    const idx = parseInt(inp.dataset.idx);
                    inp.addEventListener("change", (e) => { assists[idx].count = parseInt(e.target.value) || 1; });
                });
                document.querySelectorAll(".removeAssistBtn").forEach(btn => {
                    btn.addEventListener("click", () => { assists.splice(parseInt(btn.dataset.idx), 1); rebuildAssistUI(); });
                });
            }
            
            document.getElementById("addGoalBtn")?.addEventListener("click", () => {
                goals.push({ player: "", count: 1 });
                rebuildGoalUI();
            });
            document.getElementById("addAssistBtn")?.addEventListener("click", () => {
                assists.push({ player: "", count: 1 });
                rebuildAssistUI();
            });
            
            rebuildGoalUI();
            rebuildAssistUI();
            
            document.getElementById("saveResultBtn")?.addEventListener("click", async () => {
                const yellow = parseInt(document.getElementById("resultYellow").value) || 0;
                const orange = parseInt(document.getElementById("resultOrange").value) || 0;
                const goalsObj = {};
                goals.forEach(g => { if (g.player && g.count > 0) goalsObj[g.player] = (goalsObj[g.player] || 0) + g.count; });
                const assistsObj = {};
                assists.forEach(a => { if (a.player && a.count > 0) assistsObj[a.player] = (assistsObj[a.player] || 0) + a.count; });
                const mvp = document.getElementById("resultMvp").value;
                await saveMatchResult(week, yellow, orange, goalsObj, assistsObj, mvp, []);
                alert("✅ Match result saved!");
            });
        });
    }
    
    async function loadWeekForEditing(week) {
        const participants = getAllParticipants(week);
        const allPeople = [...participants.players, ...participants.guests.map(g => g.name)];
        const currentAssign = teamAssignments[week] || {};
        const panel = document.getElementById("adminWeekPanel");
        
        if (!panel) return;
        
        panel.innerHTML = `
            <div style="background: #f8f9fa; border-radius: 20px; padding: 16px;">
                <h3>📋 ${week === CURRENT_GAME_STR ? 'CURRENT WEEK' : week}</h3>
                <div style="display: flex; gap: 12px; flex-wrap: wrap; margin: 12px 0;">
                    <div style="flex: 1; background: #fff3cd; border-radius: 16px; padding: 12px;">
                        <div class="team-yellow">🟡 YELLOW TEAM</div>
                        <div id="yellowTeamList"></div>
                    </div>
                    <div style="flex: 1; background: #ffe8e0; border-radius: 16px; padding: 12px;">
                        <div class="team-orange">🟠 ORANGE TEAM</div>
                        <div id="orangeTeamList"></div>
                    </div>
                </div>
                <div style="background: #e9ecef; border-radius: 16px; padding: 12px; margin-bottom: 12px;">
                    <strong>⚡ Unassigned Players</strong>
                    <div id="unassignedList" style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;"></div>
                </div>
                <div class="flex-btns">
                    <button id="autoBalanceWeekBtn" style="background: #6c757d;"><i class="fas fa-balance-scale"></i> Auto-Balance</button>
                    <button id="saveWeekTeamsBtn" style="background: #28a745;"><i class="fas fa-save"></i> Save Teams</button>
                </div>
            </div>
        `;
        
        function refreshTeamUI() {
            const yellow = [];
            const orange = [];
            const unassigned = [];
            
            for (let person of allPeople) {
                const assigned = currentAssign[person];
                if (assigned === "yellow") yellow.push(person);
                else if (assigned === "orange") orange.push(person);
                else unassigned.push(person);
            }
            
            document.getElementById("yellowTeamList").innerHTML = yellow.map(p => `
                <div class="team-assign-pill">
                    ${renderMiniAvatar(p)} ${escapeHtml(p)}
                    <button class="removeFromTeamBtn" data-player="${escapeHtml(p)}" style="background: #dc3545; margin-left: 6px;">✖</button>
                </div>
            `).join('') || '<span class="text-muted">— empty —</span>';
            
            document.getElementById("orangeTeamList").innerHTML = orange.map(p => `
                <div class="team-assign-pill">
                    ${renderMiniAvatar(p)} ${escapeHtml(p)}
                    <button class="removeFromTeamBtn" data-player="${escapeHtml(p)}" style="background: #dc3545; margin-left: 6px;">✖</button>
                </div>
            `).join('') || '<span class="text-muted">— empty —</span>';
            
            document.getElementById("unassignedList").innerHTML = unassigned.map(p => `
                <div class="team-assign-pill">
                    ${renderMiniAvatar(p)} ${escapeHtml(p)}
                    <button class="assignYellowBtn" data-player="${escapeHtml(p)}" style="background: #ffc107; color: #000;">🟡 Yellow</button>
                    <button class="assignOrangeBtn" data-player="${escapeHtml(p)}" style="background: #fd7e14;">🟠 Orange</button>
                </div>
            `).join('') || '<span style="color: #28a745;">✅ All players assigned!</span>';
            
            document.querySelectorAll(".assignYellowBtn").forEach(btn => {
                btn.addEventListener("click", () => {
                    currentAssign[btn.dataset.player] = "yellow";
                    refreshTeamUI();
                });
            });
            
            document.querySelectorAll(".assignOrangeBtn").forEach(btn => {
                btn.addEventListener("click", () => {
                    currentAssign[btn.dataset.player] = "orange";
                    refreshTeamUI();
                });
            });
            
            document.querySelectorAll(".removeFromTeamBtn").forEach(btn => {
                btn.addEventListener("click", () => {
                    delete currentAssign[btn.dataset.player];
                    refreshTeamUI();
                });
            });
        }
        
        document.getElementById("autoBalanceWeekBtn")?.addEventListener("click", () => {
            const shuffled = [...allPeople];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            const half = Math.ceil(shuffled.length / 2);
            const newAssign = {};
            shuffled.forEach((p, idx) => {
                newAssign[p] = idx < half ? "yellow" : "orange";
            });
            Object.assign(currentAssign, newAssign);
            refreshTeamUI();
        });
        
        document.getElementById("saveWeekTeamsBtn")?.addEventListener("click", async () => {
            await saveTeamAssignments(week, currentAssign);
            alert(`✅ Teams saved for ${week}!`);
            renderTeamsPage();
        });
        
        refreshTeamUI();
    }
    
    // ==================== LOGIN MODAL ====================

        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <div style="text-align: center;">
                    <div class="logo-icon" style="margin: 0 auto 16px;"><i class="fas fa-futbol"></i></div>
                    <h2>Monday Night Soccer</h2>
                    <p class="text-muted">Clifton Park • 8:00pm</p>
                </div>
                <select id="loginNameSelect">
                    <option value="">-- Select Your Name --</option>
                    ${MASTER_PLAYERS.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}
                </select>
                <button id="loginBtn" style="width: 100%;"><i class="fas fa-sign-in-alt"></i> Login</button>
                <button id="adminLoginModalBtn" class="btn-outline" style="width: 100%; margin-top: 8px;"><i class="fas fa-lock"></i> Admin Access</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById("loginBtn").onclick = () => {
            const name = document.getElementById("loginNameSelect").value;
            if (name && MASTER_PLAYERS.includes(name)) {
                currentUser = { name };
                isAdminLoggedIn = false;
                modal.remove();
                document.getElementById("userNameDisplay").innerText = name;
                document.getElementById("logoutBtn").style.display = "inline-block";
                refreshAll();
            } else {
                alert("Please select your name");
            }
        };
        
        document.getElementById("adminLoginModalBtn").onclick = () => {
            const pw = prompt("Enter admin password:");
            if (pw === "admin123") {
                isAdminLoggedIn = true;
                currentUser = { name: "Admin" };
                modal.remove();
                document.getElementById("userNameDisplay").innerText = "Admin";
                document.getElementById("logoutBtn").style.display = "inline-block";
                refreshAll();
            } else {
                alert("Wrong password");
            }
        };
    }
    
    function logout() {
        currentUser = null;
        isAdminLoggedIn = false;
        document.getElementById("userNameDisplay").innerText = "Not logged in";
        document.getElementById("logoutBtn").style.display = "none";
        showLoginModal();
        refreshAll();
    }

            <div id="page-timer" class="module-container"></div>
            <div id="page-chat" class="module-container"></div>
            <div id="page-weather" class="module-container"></div>
            <div id="page-rules" class="module-container"></div>
            <div id="page-admin" class="module-container"></div>
        `;
        
        document.querySelectorAll(".nav-module").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".nav-module").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                const module = btn.dataset.module;
                document.querySelectorAll(".module-container").forEach(c => c.classList.remove("active-module"));
                if (module === "home") {
                    document.getElementById("homeContainer").classList.add("active-module");
                } else {
                    document.getElementById(`page-${module}`).classList.add("active-module");
                }
                if (module === "chat") renderChatPage();
                if (module === "timer") renderTimerPage();
                if (module === "weather") renderWeatherPage();
                if (module === "rules") renderRulesPage();
            });
        });
        
        document.getElementById("logoutBtn").onclick = logout;
        
        if (firebaseReady) {
            loadData().then(() => showLoginModal());
        } else {
            showLoginModal();
            refreshAll();
            fetchWeather();
        }
    }
    
    // Start the app
    initApp();
</script>
