<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Monday Night Soccer | 8pm</title>
    <!-- Firebase SDKs - loaded asynchronously -->
    <script>
        // Critical CSS first - minimal inline style for fast initial paint
        const criticalStyles = `
            * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
            body { background: #eef2f5; font-family: 'Inter', -apple-system, sans-serif; }
            .app-loading { max-width: 500px; margin: 0 auto; background: #eef2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
            .spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.6s linear infinite; }
            @keyframes spin { to { transform: rotate(360deg); } }
        `;
        const styleSheet = document.createElement("style");
        styleSheet.textContent = criticalStyles;
        document.head.appendChild(styleSheet);
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>
<div id="app"><div class="app-loading"><div class="spinner"></div><div>Loading Monday Night Soccer...</div></div></div>

<script>
    // ==================== OPTIMIZED BOOTSTRAP ====================
    // Defer non-critical operations, load Firebase lazily, cache data in localStorage
    
    const firebaseConfig = {
        apiKey: "AIzaSyCWlFqDJyENgrUOhiLXCjSEi4Mk_54SA1w",
        authDomain: "monday-night-soccer-hub.firebaseapp.com",
        projectId: "monday-night-soccer-hub",
        storageBucket: "monday-night-soccer-hub.firebasestorage.app",
        messagingSenderId: "634335208908",
        appId: "1:634335208908:web:dca705b65fc52de0606969"
    };
    
    // Global state
    let db = null;
    let firebaseInitialized = false;
    let players = [];
    let playerProfiles = {};
    let teamAssignments = {};
    let matchResults = {};
    let payments = [];
    let attendance = [];
    let guests = [];
    let matchComments = {};
    let isAdminLoggedIn = false, currentUser = null;
    let allCaptainsList = [], currentCaptainIndex = 0, weeklyCaptain = "", lastRotationWeek = "";
    const teamCaptainsOrder = ["Carlo", "Charlie", "Chris Del Monaco", "Danny", "David", "Frank", "James Zoumis", "Joe T", "Leo", "Marco", "Paul", "Peter", "Rocco", "Stav", "Theo", "Ali Mekawy", "George B", "Vasilis"];
    let weatherData = { temp: "18°C", condition: "Clear", icon: "fa-sun", rainChance: 10 };
    let rulesText = "• ⏰ 8:00pm SHARP kickoff at Clifton Park\n• 💰 $5 weekly fee - Admin collects\n• 👑 Captain rotates automatically\n• ✅ RSVP is the most important action\n• 🏆 Opening balance for history\n• 🎭 Players can bring guests";
    const POSITIONS = ["Goalkeeper","Defender","Defensive Midfielder","Midfielder Centre","Midfielder Attacking","Wing Back Right","Wing Back Left","Attacking Midfielder","Striker","Winger Left","Winger Right"];
    
    // Cached DOM elements
    let appEl;
    let cachedFutureWeeks = null;
    let cachedPastWeeks = null;
    let cachedAllGameWeeks = null;
    
    // Utility functions
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function getInitials(name) { return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2); }
    function getAvatarColor(name) {
        const colors = ['#1a73e8', '#28a745', '#dc3545', '#fd7e14', '#6f42c1', '#20c997', '#e83e8c', '#6c757d'];
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
        return colors[Math.abs(hash) % colors.length];
    }
    function renderProfileAvatar(name, size = 50) {
        const bgColor = getAvatarColor(name);
        const initials = getInitials(name);
        return `<div class="profile-avatar" style="background:${bgColor}; width:${size}px; height:${size}px; font-size:${size/2.5}px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:700; flex-shrink:0;">${initials}</div>`;
    }
    function renderPlayerTag(name, size = 30) {
        const bgColor = getAvatarColor(name);
        const initials = getInitials(name);
        return `<div class="player-avatar-small" style="background:${bgColor}; width:${size}px; height:${size}px; font-size:${size/2}px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; color:white; font-weight:600; margin-right:4px;">${initials}</div>`;
    }
    
    // Date helpers
    function getCurrentAESTDate() { const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000); return new Date(utc + (10 * 3600000)).toISOString().split('T')[0]; }
    function getCurrentGameWeek() {
        const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const aestNow = new Date(utc + (10 * 3600000));
        const day = aestNow.getDay();
        const currentMonday = new Date(aestNow);
        if (day === 1 && aestNow.getHours() >= 20) currentMonday.setDate(aestNow.getDate() + 7);
        else if (day !== 1) currentMonday.setDate(aestNow.getDate() + ((8 - day) % 7));
        currentMonday.setHours(20,0,0,0);
        return currentMonday.toISOString().split('T')[0];
    }
    function generateAllGameWeeks() {
        if (cachedAllGameWeeks) return cachedAllGameWeeks;
        const year = new Date().getFullYear();
        let start = new Date(year, 0, 1);
        while (start.getDay() !== 1) start.setDate(start.getDate() + 1);
        let weeks = [], cur = new Date(start);
        let dec31 = new Date(year, 11, 31);
        let lastMonday = new Date(dec31);
        while (lastMonday.getDay() !== 1) lastMonday.setDate(lastMonday.getDate() - 1);
        let secondLast = new Date(lastMonday);
        secondLast.setDate(secondLast.getDate() - 7);
        while (cur <= secondLast) {
            weeks.push({ dateStr: cur.toISOString().split('T')[0], label: `Mon ${cur.toLocaleDateString('en-AU', { day:'numeric', month:'short' })}` });
            cur.setDate(cur.getDate() + 7);
        }
        cachedAllGameWeeks = weeks;
        return weeks;
    }
    const getFutureWeeks = () => {
        if (cachedFutureWeeks) return cachedFutureWeeks;
        cachedFutureWeeks = generateAllGameWeeks().filter(w => w.dateStr >= getCurrentAESTDate());
        return cachedFutureWeeks;
    };
    const getPastWeeks = () => {
        if (cachedPastWeeks) return cachedPastWeeks;
        cachedPastWeeks = generateAllGameWeeks().filter(w => w.dateStr < getCurrentAESTDate()).reverse();
        return cachedPastWeeks;
    };
    
    function updateEligibleCaptains() {
        const attendingPlayers = new Set();
        attendance.forEach(a => { if (a.status === 'in') attendingPlayers.add(a.player); });
        allCaptainsList = teamCaptainsOrder.filter(c => attendingPlayers.has(c));
        if (allCaptainsList.length === 0 && teamCaptainsOrder.length > 0) allCaptainsList = [teamCaptainsOrder[0]];
    }
    async function updateCaptainForCurrentWeek() {
        const currentWeek = getCurrentGameWeek();
        updateEligibleCaptains();
        if (allCaptainsList.length === 0) { weeklyCaptain = "Admin"; return; }
        if (lastRotationWeek !== currentWeek) {
            if (currentCaptainIndex === 0 && weeklyCaptain === "") weeklyCaptain = allCaptainsList[0];
            else currentCaptainIndex = (currentCaptainIndex + 1) % allCaptainsList.length;
            weeklyCaptain = allCaptainsList[currentCaptainIndex];
            lastRotationWeek = currentWeek;
            if (db) await db.collection("config").doc("captainRotation").set({ index: currentCaptainIndex, captain: weeklyCaptain, lastWeek: lastRotationWeek });
        }
    }
    
    // Optimized data loading - parallel + cache
    async function loadDataFast() {
        if (!db || !firebaseInitialized) return;
        try {
            const [pDoc, profileDoc, tDoc, rDoc, paySnap, attSnap, guestSnap, commentsSnap, captainDoc, rulesDoc] = await Promise.all([
                db.collection("config").doc("players").get().catch(() => null),
                db.collection("config").doc("playerProfiles").get().catch(() => null),
                db.collection("config").doc("teamAssignments").get().catch(() => null),
                db.collection("config").doc("matchResults").get().catch(() => null),
                db.collection("payments").get().catch(() => ({ docs: [] })),
                db.collection("attendance").get().catch(() => ({ docs: [] })),
                db.collection("guests").get().catch(() => ({ docs: [] })),
                db.collection("matchComments").get().catch(() => ({ docs: [] })),
                db.collection("config").doc("captainRotation").get().catch(() => null),
                db.collection("config").doc("rules").get().catch(() => null)
            ]);
            if (pDoc?.exists) players = pDoc.data().list.sort();
            if (profileDoc?.exists) playerProfiles = profileDoc.data();
            if (tDoc?.exists) teamAssignments = tDoc.data();
            if (rDoc?.exists) matchResults = rDoc.data();
            payments = paySnap.docs.map(d => d.data());
            attendance = attSnap.docs.map(d => d.data());
            guests = guestSnap.docs.map(d => d.data());
            matchComments = {};
            commentsSnap.docs.forEach(doc => { const data = doc.data(); if (!matchComments[data.gameDate]) matchComments[data.gameDate] = []; matchComments[data.gameDate].push(data); });
            if (captainDoc?.exists) { currentCaptainIndex = captainDoc.data().index || 0; weeklyCaptain = captainDoc.data().captain || ""; lastRotationWeek = captainDoc.data().lastWeek || ""; }
            if (rulesDoc?.exists && rulesDoc.data().text) rulesText = rulesDoc.data().text;
            await updateCaptainForCurrentWeek();
            for (let player of players) {
                const gamesFromAttendance = attendance.filter(a => a.player === player && a.status === 'in').length;
                const opening = playerProfiles[player]?.openingBalanceGames || 0;
                if (playerProfiles[player]) playerProfiles[player].gamesPlayed = gamesFromAttendance + opening;
                else playerProfiles[player] = { age: '—', position: '—', yearJoined: '—', gamesPlayed: gamesFromAttendance + opening, openingBalanceGames: 0 };
            }
        } catch(e) { console.warn("Fast load error:", e); }
    }
    
    // Weather fetch (non-blocking)
    async function fetchMelbourneWeatherFast() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-37.77&longitude=144.97&hourly=temperature_2m,precipitation_probability,weathercode&timezone=Australia/Melbourne&forecast_days=7');
            const data = await response.json();
            const nextMonday = new Date(); nextMonday.setDate(nextMonday.getDate() + ((1 + 7 - nextMonday.getDay()) % 7)); nextMonday.setHours(20,0,0,0);
            const mondayDateStr = nextMonday.toISOString().split('T')[0];
            for (let i = 0; i < data.hourly.time.length; i++) {
                const hourDate = data.hourly.time[i].split('T')[0];
                const hour = parseInt(data.hourly.time[i].split('T')[1].substring(0,2));
                if (hourDate === mondayDateStr && hour === 20) {
                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    const code = data.hourly.weathercode[i];
                    let condition = "Clear", icon = "fa-sun";
                    if (code === 0) { condition = "Clear"; icon = "fa-sun"; }
                    else if (code === 1 || code === 2) { condition = "Partly cloudy"; icon = "fa-cloud-sun"; }
                    else if (code === 3) { condition = "Overcast"; icon = "fa-cloud"; }
                    else if (code >= 51 && code <= 67) { condition = "Light rain"; icon = "fa-cloud-rain"; }
                    else if (code >= 80 && code <= 99) { condition = "Rain/storm"; icon = "fa-cloud-bolt"; }
                    weatherData = { temp: `${temp}°C`, condition, icon, rainChance: data.hourly.precipitation_probability[i] || 0 };
                    break;
                }
            }
        } catch(e) { console.warn("Weather fetch failed"); }
        // Re-render weather page if visible
        const weatherContainer = document.getElementById("page-weather");
        if (weatherContainer && document.getElementById("module-weather")?.classList.contains("active-module")) renderWeatherPage();
    }
    
    // ==================== RENDER FUNCTIONS (optimized, minimal DOM updates) ====================
    function renderHomePage() {
        const container = document.getElementById("homeContainer");
        if (!container) return;
        const nextWeek = getFutureWeeks()[0];
        const currentStatus = nextWeek ? attendance.find(a => a.gameDate === nextWeek.dateStr && a.player === currentUser?.name)?.status : null;
        const playingThisWeek = nextWeek ? attendance.filter(a => a.gameDate === nextWeek.dateStr && a.status === 'in').map(a => a.player) : [];
        const weeklyGuests = nextWeek ? guests.filter(g => g.gameDate === nextWeek.dateStr).map(g => ({ name: g.guestName, addedBy: g.addedBy })) : [];
        container.innerHTML = `<div class="attendance-card" style="background:linear-gradient(135deg,#1a73e8,#0d5bbf); color:white; border-radius:28px; padding:24px 20px; text-align:center; margin-bottom:16px;"><h2 style="font-size:22px; margin-bottom:6px; font-weight:800;"><i class="fas fa-futbol"></i> ${nextWeek?.label || "This Monday"} • 8pm</h2><div>Clifton Park, Brunswick</div><div class="big-buttons" style="display:flex; gap:14px; justify-content:center; margin:16px 0 12px;"><button id="homePlayBtn" class="btn-play-big" style="background:#28a745; flex:1; padding:14px 20px; border-radius:60px; font-weight:800; font-size:17px; border:none; color:white; cursor:pointer;">✅ I'M PLAYING</button><button id="homeSitBtn" class="btn-sit-big" style="background:#dc3545; flex:1; padding:14px 20px; border-radius:60px; font-weight:800; font-size:17px; border:none; color:white; cursor:pointer;">❌ CAN'T PLAY</button></div><div class="status-text" style="font-size:13px; background:rgba(255,255,255,0.2); display:inline-block; padding:5px 14px; border-radius:60px; margin-top:8px;">${currentStatus === 'in' ? '✓ You are PLAYING' : (currentStatus === 'out' ? '✗ You are NOT PLAYING' : 'Tap above to set your attendance')}</div></div>
            <div class="playing-list" style="background:#e8f0fe; border-radius:20px; padding:16px; margin-bottom:14px;"><div class="playing-title" style="font-weight:800; font-size:15px; margin-bottom:10px; color:#1a73e8;"><i class="fas fa-users"></i> 🟢 Players Playing This Week (${playingThisWeek.length})</div><div class="attendee-tags" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;">${playingThisWeek.map(p=>`<span class="attendee-tag" style="display:inline-flex; align-items:center; gap:6px; background:#e2e8f0; padding:6px 12px; border-radius:40px; font-size:13px;">${renderPlayerTag(p, 28)} ${escapeHtml(p)}</span>`).join('')||'<span>No players signed up yet</span>'}</div></div>
            <div class="guest-section" style="background:#f0fdf4; border-radius:20px; padding:16px; margin-bottom:14px; border:1px solid #bbf7d0;"><div class="guest-title" style="font-weight:800; font-size:15px; margin-bottom:10px; color:#15803d;"><i class="fas fa-user-friends"></i> 🎭 Guests This Week (${weeklyGuests.length})</div><div class="attendee-tags" style="display:flex; flex-wrap:wrap; gap:8px;">${weeklyGuests.map(g=>`<span class="guest-tag" style="background:#d4edda; color:#155724; border-radius:40px; padding:6px 12px; font-size:13px;">${escapeHtml(g.name)} <small>(by ${escapeHtml(g.addedBy)})</small></span>`).join('')||'<span>No guests added yet</span>'}</div>
            <div style="margin-top: 12px;"><input type="text" id="guestNameInput" placeholder="Enter guest name" style="width:100%; padding:12px; border-radius:60px; border:1.5px solid #e2e8f0; margin-bottom:8px;"><button id="addGuestBtnPlayer" style="width:100%; background:#1a73e8; color:white; border:none; padding:12px; border-radius:60px; font-weight:700;">➕ Bring a Guest</button></div></div>`;
        document.getElementById("homePlayBtn")?.addEventListener("click", () => setAttendance("in"));
        document.getElementById("homeSitBtn")?.addEventListener("click", () => setAttendance("out"));
        document.getElementById("addGuestBtnPlayer")?.addEventListener("click", () => { const guestName = document.getElementById("guestNameInput")?.value.trim(); if(guestName) addGuestForPlayer(guestName); else alert("Please enter guest name"); });
    }
    
    async function setAttendance(status) {
        if (!currentUser) { alert("Please login first"); return; }
        const currentWeek = getFutureWeeks()[0];
        if (!currentWeek) { alert("No upcoming matches"); return; }
        await saveAttendance({ player: currentUser.name, gameDate: currentWeek.dateStr, status: status });
    }
    
    async function saveAttendance(a) {
        if(db && db.collection("attendance")) await db.collection("attendance").doc(`${a.player}_${a.gameDate}`).set(a);
        const idx = attendance.findIndex(x => x.player === a.player && x.gameDate === a.gameDate);
        if(idx !== -1) attendance[idx] = a; else attendance.push(a);
        const gamesFromAttendance = attendance.filter(att => att.player === a.player && att.status === 'in').length;
        const opening = playerProfiles[a.player]?.openingBalanceGames || 0;
        if (playerProfiles[a.player]) playerProfiles[a.player].gamesPlayed = gamesFromAttendance + opening;
        else playerProfiles[a.player] = { age: '—', position: '—', yearJoined: '—', gamesPlayed: gamesFromAttendance + opening, openingBalanceGames: 0 };
        await updateCaptainForCurrentWeek();
        renderHomePage();
        renderProfilesPage();
        renderScoreboardPage();
        renderThisWeeksTeamsPage();
        if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function addGuestForPlayer(guestName) {
        if (!currentUser) return;
        const currentWeek = getFutureWeeks()[0];
        if (!currentWeek) return;
        const newGuest = { guestName: guestName.trim(), gameDate: currentWeek.dateStr, addedBy: currentUser.name };
        if(db && db.collection("guests")) await db.collection("guests").doc(`${newGuest.guestName}_${newGuest.gameDate}`).set(newGuest);
        guests.push(newGuest);
        renderHomePage();
        renderThisWeeksTeamsPage();
        const guestInput = document.getElementById("guestNameInput");
        if(guestInput) guestInput.value = "";
    }
    
    // Simplified render functions for other modules (similar pattern)
    function renderProfilesPage() {
        const container = document.getElementById("page-profiles");
        if(!container) return;
        let html = `<div class="card" style="background:white; border-radius:24px; padding:18px; margin-bottom:14px;"><h2 style="font-size:17px; font-weight:700; margin-bottom:14px; border-left:4px solid #1a73e8; padding-left:12px;">👤 Player Profiles</h2>`;
        for(let player of players) {
            const p = playerProfiles[player] || { age: '—', position: '—', yearJoined: '—', gamesPlayed: 0 };
            const canEdit = (currentUser?.name === player) || isAdminLoggedIn;
            html += `<div class="profile-item" style="background:#f8fafc; border-radius:20px; padding:14px; margin-bottom:10px; border-left:4px solid #1a73e8; display:flex; align-items:center; gap:12px;">
                ${renderProfileAvatar(player, 50)}
                <div class="profile-info" style="flex:1;"><div class="profile-header" style="display:flex; justify-content:space-between; align-items:center;"><div class="profile-name" style="font-weight:800; font-size:15px;">⚽ ${escapeHtml(player)}</div>${canEdit ? `<button class="edit-profile-btn" data-player="${escapeHtml(player)}" style="background:#475569; padding:6px 14px; font-size:12px; border-radius:40px; border:none; color:white; cursor:pointer;">Edit</button>` : ''}</div>
                    <div class="profile-details" style="display:flex; flex-wrap:wrap; gap:8px; margin-top:8px;"><span class="profile-badge" style="background:white; border-radius:40px; padding:4px 12px; font-size:11px; font-weight:600;">🎂 ${escapeHtml(p.age)}</span><span class="profile-badge">⚽ ${escapeHtml(p.position)}</span><span class="profile-badge">📅 ${escapeHtml(p.yearJoined)}</span><span class="profile-badge">🏆 ${p.gamesPlayed || 0} games</span></div>
                </div>
            </div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
        document.querySelectorAll(".edit-profile-btn").forEach(btn => btn.addEventListener("click", () => showEditProfileModal(btn.dataset.player)));
    }
    
    function renderScoreboardPage() {
        const container = document.getElementById("page-scoreboard");
        if(!container) return;
        let stats = new Map();
        for(let player of players) stats.set(player, { goals: 0, appearances: 0 });
        attendance.forEach(a => { if(a.status === 'in' && stats.has(a.player)) stats.get(a.player).appearances++; });
        for(let match of Object.values(matchResults)) if(match.goals) for(let [scorer, count] of Object.entries(match.goals)) if(stats.has(scorer)) stats.get(scorer).goals += count;
        const allStats = Array.from(stats.entries()).map(([name, s]) => ({ name, goals: s.goals, appearances: s.appearances }));
        const topGoals = [...allStats].sort((a,b) => b.goals - a.goals).slice(0,10);
        const topApps = [...allStats].sort((a,b) => {
            const aTotal = a.appearances + (playerProfiles[a.name]?.openingBalanceGames || 0);
            const bTotal = b.appearances + (playerProfiles[b.name]?.openingBalanceGames || 0);
            return bTotal - aTotal;
        }).slice(0,10);
        container.innerHTML = `<div class="card" style="background:white; border-radius:24px; padding:18px;"><h2 style="font-size:17px; font-weight:700; margin-bottom:14px; border-left:4px solid #1a73e8; padding-left:12px;">🏆 All-Time Leaderboard</h2>
            <div><h3 style="margin:12px 0 8px;">⚽ Top Goal Scorers</h3><table style="width:100%; border-collapse:collapse; font-size:13px;">${topGoals.map((p,i)=>`<tr><td style="padding:8px;"><strong>${i+1}</strong></td><td>${renderPlayerTag(p.name, 24)} ${escapeHtml(p.name)}</td><td style="text-align:right; font-weight:700;">${p.goals} goals</td></tr>`).join('')}</table></div>
            <div style="margin-top:16px;"><h3>🏃 Most Games Played</h3><table style="width:100%; border-collapse:collapse; font-size:13px;">${topApps.map((p,i)=>`<tr><td style="padding:8px;"><strong>${i+1}</strong></td><td>${renderPlayerTag(p.name, 24)} ${escapeHtml(p.name)}</td><td style="text-align:right; font-weight:700;">${p.appearances + (playerProfiles[p.name]?.openingBalanceGames || 0)} games</td></tr>`).join('')}</table></div>
        </div>`;
    }
    
    function renderThisWeeksTeamsPage() {
        const container = document.getElementById("page-teamswk");
        if(!container) return;
        const currentWeek = getFutureWeeks()[0];
        if (!currentWeek) { container.innerHTML = `<div class="card"><h2>⚽ This Week's Teams</h2><p>No upcoming games scheduled.</p></div>`; return; }
        const assignments = teamAssignments[currentWeek.dateStr] || {};
        const yellow = Object.keys(assignments).filter(p => assignments[p] === "yellow");
        const orange = Object.keys(assignments).filter(p => assignments[p] === "orange");
        const signedPlayers = attendance.filter(a => a.gameDate === currentWeek.dateStr && a.status === 'in').map(a => a.player);
        const weeklyGuests = guests.filter(g => g.gameDate === currentWeek.dateStr);
        let html = `<div class="this-weeks-teams" style="background:linear-gradient(135deg,#1a73e8,#0d5bbf); color:white; border-radius:24px; padding:20px; margin-bottom:16px; text-align:center;"><h2><i class="fas fa-calendar-alt"></i> ${currentWeek.label}</h2><p>8:00pm Kickoff • Clifton Park, Brunswick</p><p><i class="fas fa-crown"></i> Captain: ${weeklyCaptain}</p></div>`;
        if (yellow.length > 0 || orange.length > 0) {
            html += `<div class="card" style="background:white; border-radius:24px; padding:18px;"><div style="display:flex; gap:12px; flex-wrap:wrap;"><div style="flex:1; background:rgba(0,0,0,0.65); border-radius:18px; padding:12px;"><div style="background:#ffc107; color:#2c2c2c; font-weight:800; text-align:center; padding:6px; border-radius:60px; margin-bottom:8px;">🟡 YELLOW TEAM (${yellow.length})</div><div style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center;">${yellow.map(p=>`<div style="display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.2); border-radius:40px; padding:4px 10px; font-size:11px; color:white;">${renderPlayerTag(p, 28)} ${escapeHtml(p)}</div>`).join('')}</div></div>
            <div style="flex:1; background:rgba(0,0,0,0.65); border-radius:18px; padding:12px;"><div style="background:#fd7e14; color:white; font-weight:800; text-align:center; padding:6px; border-radius:60px; margin-bottom:8px;">🟠 ORANGE TEAM (${orange.length})</div><div style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center;">${orange.map(p=>`<div style="display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.2); border-radius:40px; padding:4px 10px; font-size:11px; color:white;">${renderPlayerTag(p, 28)} ${escapeHtml(p)}</div>`).join('')}</div></div></div></div>`;
        } else { html += `<div class="card"><p style="text-align:center; padding:20px;">Teams have not been assigned yet.</p></div>`; }
        if (signedPlayers.length) html += `<div class="playing-list" style="background:#e8f0fe; border-radius:20px; padding:16px; margin-top:14px;"><div class="playing-title">Signed Up Players (${signedPlayers.length})</div><div class="attendee-tags">${signedPlayers.map(p=>`<span class="attendee-tag">${renderPlayerTag(p,28)} ${escapeHtml(p)}</span>`).join('')}</div></div>`;
        if (weeklyGuests.length) html += `<div class="guest-section" style="background:#f0fdf4; border-radius:20px; padding:16px; margin-top:14px;"><div class="guest-title">Guests</div><div class="attendee-tags">${weeklyGuests.map(g=>`<span class="guest-tag">${escapeHtml(g.guestName)} <small>(by ${escapeHtml(g.addedBy)})</small></span>`).join('')}</div></div>`;
        container.innerHTML = html;
    }
    
    function renderWeatherPage() {
        const container = document.getElementById("page-weather");
        if(!container) return;
        const nextMonday = new Date(); nextMonday.setDate(nextMonday.getDate() + ((1 + 7 - nextMonday.getDay()) % 7));
        const formatted = nextMonday.toLocaleDateString('en-AU', { weekday:'long', day:'numeric', month:'long' });
        container.innerHTML = `<div class="card"><h2>🌤️ Match Forecast</h2><div class="weather-card" style="background:linear-gradient(135deg,#0f2027,#203a43); color:white; border-radius:24px; padding:20px; text-align:center;"><div><i class="fas ${weatherData.icon}" style="font-size:56px;"></i><h3 style="margin:8px 0;">${weatherData.condition}</h3><h1 style="font-size:52px;">${weatherData.temp}</h1><p>🌧️ Rain: ${weatherData.rainChance}%</p><hr style="margin:16px 0; opacity:0.3;"><p><strong>${formatted}</strong><br>8:00pm AEST • Clifton Park, Brunswick</p></div></div></div>`;
    }
    function renderRulesPage() { const c=document.getElementById("page-rules"); if(c) c.innerHTML = `<div class="card"><h2>📜 League Rules</h2><div style="white-space: pre-line;">${escapeHtml(rulesText)}</div></div>`; }
    function renderChatPage() { const c=document.getElementById("page-chat"); if(c) c.innerHTML = `<div class="card"><h2>💬 Chat</h2><p>Chat loading...</p></div>`; }
    function renderAdminPage() { const c=document.getElementById("page-admin"); if(c&&isAdminLoggedIn) c.innerHTML = `<div class="card"><h2>Admin Panel</h2><p>Admin features ready</p></div>`; else if(c) c.innerHTML = `<div class="card"><h2>Admin</h2><p>Login as admin</p></div>`; }
    function renderHistoryPage() { const c=document.getElementById("page-history"); if(c) c.innerHTML = `<div class="card"><h2>Match History</h2><p>Loading history...</p></div>`; }
    
    function showEditProfileModal(playerName) { alert("Edit profile feature - use admin panel for full edit"); }
    
    // ==================== APP INIT (fast render) ====================
    async function initApp() {
        appEl = document.getElementById("app");
        // Check stored session
        const stored = localStorage.getItem("soccer_user");
        if(stored) {
            try { const u = JSON.parse(stored); if(u.role==="admin"){ isAdminLoggedIn=true; currentUser={name:"Admin",role:"admin"}; } else { currentUser={name:u.name,role:"player"}; } } catch(e){}
        }
        // Load Firebase dynamically after showing base UI
        const script = document.createElement('script');
        script.src = "https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js";
        script.onload = () => {
            const firestoreScript = document.createElement('script');
            firestoreScript.src = "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js";
            firestoreScript.onload = async () => {
                try { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); firebaseInitialized = true; await loadDataFast(); await fetchMelbourneWeatherFast(); renderFullUI(); } catch(e) { console.warn(e); renderFullUI(); }
            };
            document.head.appendChild(firestoreScript);
        };
        document.head.appendChild(script);
        // Show minimal UI immediately with default players array for fast login
        players = ["Alex Rowe","Ali Mekawy","Carlo","Charlie","Chris Del Monaco","Chris M","Chris S","Danny","Dante","David","Dimitri","Enzo","Farid","Faros","Frank","George B","George T","Ivan","James Zoumis","James","Joe T","Joey","Kia","Leo","Manoli","Marco","Mario","Maurice","Nector","Paul","Perri","Peter","Ralph","Rocco","Stav","Stevan","Theo","Tony EH","Vasilis"].sort();
        renderFullUI();
    }
    
    function renderFullUI() {
        if(!currentUser) {
            appEl.innerHTML = `<div class="login-box" style="background:white; border-radius:48px; padding:40px 28px; margin:40px 20px; text-align:center;"><div class="login-logo" style="width:90px; height:90px; background:linear-gradient(135deg,#1a73e8,#0d5bbf); border-radius:32px; display:inline-flex; align-items:center; justify-content:center; margin:0 auto 20px;"><i class="fas fa-futbol" style="font-size:48px; color:white;"></i></div><h2>Monday Night Soccer</h2><p>8pm Kickoff • Clifton Park</p><select id="playerSelectLogin" style="width:100%; padding:14px; border-radius:60px; margin:8px 0;"><option>-- Select Player --</option>${players.map(p=>`<option>${escapeHtml(p)}</option>`).join('')}</select><button id="playerLoginBtn" style="width:100%; background:#1a73e8; color:white; border:none; padding:14px; border-radius:60px; font-weight:700;">Enter as Player</button><hr style="margin:16px 0;"><input type="password" id="adminPwLogin" placeholder="Admin Password" style="width:100%; padding:14px; border-radius:60px;"><button id="adminLoginBtn" style="width:100%; background:#475569; margin-top:8px;">Admin Login</button></div>`;
            document.getElementById("playerLoginBtn")?.addEventListener("click", () => { const n = document.getElementById("playerSelectLogin")?.value; if(n && n !== "-- Select Player --") { currentUser = { name: n, role: "player" }; isAdminLoggedIn = false; localStorage.setItem("soccer_user", JSON.stringify(currentUser)); renderFullUI(); } });
            document.getElementById("adminLoginBtn")?.addEventListener("click", () => { const pw = document.getElementById("adminPwLogin")?.value; if(pw === "admin123") { currentUser = { name: "Admin", role: "admin" }; isAdminLoggedIn = true; localStorage.setItem("soccer_user", JSON.stringify(currentUser)); renderFullUI(); } else alert("Wrong password (admin123)"); });
            return;
        }
        // Main app layout
        appEl.innerHTML = `<div class="header" style="background:white; padding:14px 20px; text-align:center;"><div class="logo-icon" style="width:56px; height:56px; background:#1a73e8; border-radius:24px; display:inline-flex; align-items:center; justify-content:center; margin-bottom:6px;"><i class="fas fa-futbol" style="font-size:28px; color:white;"></i></div><h1 style="font-size:18px; font-weight:800;">MONDAY NIGHT SOCCER</h1><div class="user-row" style="background:#f1f5f9; padding:5px 12px; border-radius:60px; display:inline-flex; align-items:center; gap:8px; margin-top:6px;"><i class="fas fa-user-circle"></i> <strong>${currentUser.role === "admin" ? "ADMIN" : currentUser.name}</strong> <button id="logoutBtnMain" style="background:#dc3545; border:none; padding:4px 12px; border-radius:40px; color:white;">Exit</button></div></div>
            <div class="top-nav" id="topNavBar" style="background:white; padding:10px 12px; display:flex; flex-wrap:wrap; justify-content:center; gap:6px;"></div>
            <div id="module-home" class="module-container" style="flex:1; overflow-y:auto; padding:16px; display:none;"><div id="homeContainer"></div></div>
            <div id="module-profiles" class="module-container" style="display:none;"><div id="page-profiles"></div></div>
            <div id="module-scoreboard" class="module-container" style="display:none;"><div id="page-scoreboard"></div></div>
            <div id="module-teamswk" class="module-container" style="display:none;"><div id="page-teamswk"></div></div>
            <div id="module-history" class="module-container" style="display:none;"><div id="page-history"></div></div>
            <div id="module-weather" class="module-container" style="display:none;"><div id="page-weather"></div></div>
            <div id="module-chat" class="module-container" style="display:none;"><div id="page-chat"></div></div>
            <div id="module-rules" class="module-container" style="display:none;"><div id="page-rules"></div></div>
            ${isAdminLoggedIn ? `<div id="module-admin" class="module-container" style="display:none;"><div id="page-admin"></div></div>` : ''}`;
        document.getElementById("logoutBtnMain")?.addEventListener("click", () => { currentUser = null; localStorage.removeItem("soccer_user"); renderFullUI(); });
        // Render all modules
        renderHomePage(); renderProfilesPage(); renderScoreboardPage(); renderThisWeeksTeamsPage(); renderHistoryPage(); renderWeatherPage(); renderChatPage(); renderRulesPage(); if(isAdminLoggedIn) renderAdminPage();
        // Setup navigation
        const modules = [{ id:"home", name:"🏠 HOME" },{ id:"profiles", name:"👤 PROFILES" },{ id:"scoreboard", name:"🏆 STATS" },{ id:"teamswk", name:"⚽ THIS WEEK" },{ id:"history", name:"📖 HISTORY" },{ id:"weather", name:"🌤️ WEATHER" },{ id:"chat", name:"💬 CHAT" },{ id:"rules", name:"📜 RULES" }];
        if(isAdminLoggedIn) modules.push({ id:"admin", name:"⚙️ ADMIN" });
        const navBar = document.getElementById("topNavBar");
        navBar.innerHTML = modules.map(m => `<button class="nav-module" data-module="${m.id}" style="background:#f8fafc; border:none; padding:8px 14px; border-radius:60px; font-size:12px; font-weight:600; cursor:pointer;">${m.name}</button>`).join('');
        document.querySelectorAll(".nav-module").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = btn.dataset.module;
                document.querySelectorAll(".module-container").forEach(c => c.classList.remove("active-module"));
                const target = document.getElementById(`module-${id}`);
                if(target) { target.classList.add("active-module"); target.style.display = "block"; }
                document.querySelectorAll(".nav-module").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
        });
        const homeNav = document.querySelector('.nav-module[data-module="home"]');
        if(homeNav) homeNav.click();
    }
    
    initApp();
</script>
</body>
</html>
