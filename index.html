<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Monday Night Soccer – Full Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f8f9fa;
            font-family: 'Inter', sans-serif;
            padding: 20px;
            color: #1e1e1e;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 { font-size: 2.2rem; font-weight: 800; color: #cc0000; }
        .header p { color: #4a4a4a; margin-top: 6px; }
        .tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: white;
            border: 2px solid #cc0000;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            color: #cc0000;
        }
        .tab-btn.active {
            background: #cc0000;
            color: white;
        }
        .panel { display: none; animation: fade 0.2s; }
        .panel.active-panel { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
        }
        .card h2, .card h3 {
            font-weight: 700;
            margin-bottom: 20px;
            color: #cc0000;
            border-left: 6px solid #cc0000;
            padding-left: 18px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-top: 16px;
            margin-bottom: 8px;
        }
        select, input, button, textarea {
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
            background: white;
            width: 100%;
            margin: 6px 0;
        }
        button {
            background: #cc0000;
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
            width: auto;
        }
        button:hover { background: #990000; }
        .pitch {
            background: linear-gradient(145deg, #2e7d32, #1b5e20);
            border-radius: 40px;
            border: 4px solid white;
            padding: 16px;
            position: relative;
            box-shadow: 0 0 0 3px #cc0000;
            margin-bottom: 16px;
        }
        .pitch::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 3px;
            height: 100%;
            background: white;
            transform: translateX(-50%);
            opacity: 0.8;
        }
        .pitch::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.8;
        }
        .teams-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
            z-index: 2;
        }
        .team-box {
            flex: 1;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 16px;
            color: white;
        }
        .team-title {
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 12px;
        }
        .yellow-title { color: #ffea00; text-shadow: 0 0 4px #ffcc00; }
        .orange-title { color: #ff9800; text-shadow: 0 0 4px #ff6600; }
        .player-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 350px;
            overflow-y: auto;
        }
        .player-badge {
            background: rgba(0,0,0,0.7);
            border-radius: 60px;
            padding: 8px 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            font-size: 0.85rem;
        }
        .match-result {
            margin-top: 20px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            border-radius: 60px;
            padding: 10px;
            color: white;
            font-weight: 600;
        }
        .alert {
            background: #ffe6e6;
            border-left: 5px solid #cc0000;
            padding: 10px 16px;
            border-radius: 60px;
            margin: 12px 0;
            color: #990000;
        }
        .goal-row, .payment-row, .attendance-row {
            background: #f9f9f9;
            border-radius: 60px;
            padding: 8px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        footer { text-align: center; margin-top: 40px; font-size: 0.7rem; color: #6c757d; }
        .leaderboard-table, .payment-table, .attendance-table, .topscorer-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 24px;
            overflow: hidden;
        }
        .leaderboard-table th, .leaderboard-table td, .payment-table th, .payment-table td, .attendance-table th, .attendance-table td, .topscorer-table th, .topscorer-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        .leaderboard-table th, .payment-table th, .attendance-table th, .topscorer-table th { background: #fafafa; color: #cc0000; }
        .flex-btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
        .attending-in { background: #2e7d5e; color: white; border: none; }
        .attending-out { background: #cc0000; color: white; border: none; }
        @media (max-width: 700px) { .teams-row { flex-direction: column; } .pitch::before { display: none; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚽ MONDAY NIGHT SOCCER ⚽</h1>
        <p>Attendance • Orange vs Yellow • Match results • Goal scorers • $5 payments • Top scorer</p>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="attendance">📋 ATTENDANCE</button>
        <button class="tab-btn" data-tab="payment">💰 PAYMENTS</button>
        <button class="tab-btn" data-tab="topscorer">⚽ TOP SCORER</button>
        <button class="tab-btn" data-tab="admin">👑 ADMIN</button>
    </div>

    <!-- ATTENDANCE PANEL -->
    <div id="attendancePanel" class="panel active-panel">
        <div class="card">
            <h2>📅 MARK YOUR ATTENDANCE</h2>
            <label>👤 YOUR NAME</label>
            <select id="attendancePlayerSelect"></select>
            <label>📅 GAME WEEK</label>
            <select id="attendanceWeekSelect"></select>
            <div class="flex-btns">
                <button id="attendingBtn" class="attending-in">✅ I AM ATTENDING</button>
                <button id="notAttendingBtn" class="attending-out">❌ I AM NOT ATTENDING</button>
            </div>
            <div id="attendanceMessage" class="alert" style="display:none;"></div>
        </div>
        <div class="card">
            <h2>📊 ATTENDANCE SUMMARY (PER WEEK)</h2>
            <div id="attendanceSummary"></div>
        </div>
        <div class="card">
            <h2>🏟️ TODAY'S PITCH & TEAMS</h2>
            <select id="pitchWeekSelect"></select>
            <div class="pitch">
                <div class="teams-row">
                    <div class="team-box"><div class="team-title yellow-title">🟡 YELLOW TEAM</div><div class="player-list" id="yellowList"></div></div>
                    <div class="team-box"><div class="team-title orange-title">🟠 ORANGE TEAM</div><div class="player-list" id="orangeList"></div></div>
                </div>
                <div class="match-result" id="matchResultDisplay"></div>
            </div>
        </div>
    </div>

    <!-- PAYMENTS PANEL -->
    <div id="paymentPanel
