<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Monday Night Soccer | Guests Allotment</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef2f5; font-family: 'Inter', -apple-system, sans-serif; }
        .app { max-width: 500px; margin: 0 auto; background: #eef2f5; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: white; padding: 14px 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .logo-icon { width: 56px; height: 56px; background: #1a73e8; border-radius: 24px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 6px; }
        .logo-icon i { font-size: 28px; color: white; }
        .header h1 { font-size: 18px; font-weight: 800; color: #1e293b; }
        .user-row { background: #f1f5f9; padding: 5px 12px; border-radius: 60px; display: inline-flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 12px; font-weight: 500; }
        .user-row button { background: #dc3545; border: none; padding: 4px 12px; border-radius: 40px; color: white; font-weight: 600; font-size: 11px; cursor: pointer; }
        .top-nav { background: white; padding: 10px 12px; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; border-bottom: 1px solid #e2e8f0; }
        .nav-module { background: #f8fafc; border: none; padding: 8px 14px; border-radius: 60px; font-size: 12px; font-weight: 600; color: #475569; cursor: pointer; transition: all 0.2s; }
        .nav-module.active { background: #1a73e8; color: white; }
        .module-container { flex: 1; overflow-y: auto; padding: 16px; display: none; }
        .module-container.active-module { display: block; }
        .card { background: white; border-radius: 24px; padding: 18px; margin-bottom: 14px; border: 1px solid #e2e8f0; }
        .card h2 { font-size: 17px; font-weight: 700; margin-bottom: 14px; border-left: 4px solid #1a73e8; padding-left: 12px; }
        .attendance-card { background: linear-gradient(135deg, #1a73e8, #0d5bbf); color: white; border-radius: 28px; padding: 24px 20px; text-align: center; margin-bottom: 16px; }
        .big-buttons { display: flex; gap: 14px; justify-content: center; margin: 16px 0 12px; }
        .btn-play-big { background: #28a745; flex: 1; padding: 14px 20px; border-radius: 60px; font-weight: 800; font-size: 17px; border: none; color: white; cursor: pointer; }
        .btn-sit-big { background: #dc3545; flex: 1; padding: 14px 20px; border-radius: 60px; font-weight: 800; font-size: 17px; border: none; color: white; cursor: pointer; }
        .profile-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 20px; flex-shrink: 0; }
        .player-avatar-small { width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; margin-right: 4px; }
        .profile-item { background: #f8fafc; border-radius: 20px; padding: 14px; margin-bottom: 10px; border-left: 4px solid #1a73e8; display: flex; align-items: center; gap: 12px; }
        .profile-info { flex: 1; }
        .profile-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .profile-name { font-weight: 800; font-size: 15px; }
        .profile-badge { background: white; border-radius: 40px; padding: 4px 12px; font-size: 11px; font-weight: 600; display: inline-block; }
        .edit-profile-btn { background: #475569; padding: 6px 14px; font-size: 12px; border-radius: 40px; border: none; color: white; cursor: pointer; }
        .admin-team-item { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; background: #f1f5f9; border-radius: 60px; padding: 8px 16px; }
        .admin-buttons { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .admin-action-btn { background: white; border: 2px solid #1a73e8; color: #1a73e8; padding: 16px; border-radius: 60px; font-weight: 700; font-size: 16px; text-align: center; cursor: pointer; }
        .playing-list { background: #e8f0fe; border-radius: 20px; padding: 16px; margin-bottom: 14px; }
        .guest-section { background: #f0fdf4; border-radius: 20px; padding: 16px; margin-bottom: 14px; border: 1px solid #bbf7d0; }
        .guest-tag { background: #d4edda; color: #155724; border-radius: 40px; padding: 6px 12px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
        .attendee-tag { display: inline-flex; align-items: center; gap: 6px; background: #e2e8f0; padding: 6px 12px; border-radius: 40px; font-size: 13px; }
        .team-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .team-box { flex: 1; background: rgba(0,0,0,0.65); border-radius: 18px; padding: 12px; }
        .team-yellow { background: #ffc107; color: #2c2c2c; font-weight: 800; text-align: center; padding: 6px; border-radius: 60px; font-size: 14px; margin-bottom: 8px; }
        .team-orange { background: #fd7e14; color: white; font-weight: 800; text-align: center; padding: 6px; border-radius: 60px; font-size: 14px; margin-bottom: 8px; }
        .player-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .player-tag { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); border-radius: 40px; padding: 4px 10px; font-size: 11px; color: white; margin: 2px; }
        .guest-indicator { background: #28a745; font-size: 9px; padding: 2px 6px; border-radius: 20px; margin-left: 4px; }
        .login-box { background: white; border-radius: 48px; padding: 40px 28px; margin: 40px 20px; text-align: center; }
        .login-logo { width: 90px; height: 90px; background: linear-gradient(135deg, #1a73e8, #0d5bbf); border-radius: 32px; display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        select, input { width: 100%; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 60px; margin: 8px 0; font-size: 16px; }
        button { background: #1a73e8; color: white; border: none; padding: 14px 22px; border-radius: 60px; font-weight: 700; font-size: 16px; cursor: pointer; }
        .flex-btns { display: flex; gap: 12px; margin-top: 12px; }
        @media (max-width: 450px) { .nav-module { padding: 6px 12px; font-size: 11px; } }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCWlFqDJyENgrUOhiLXCjSEi4Mk_54SA1w",
        authDomain: "monday-night-soccer-hub.firebaseapp.com",
        projectId: "monday-night-soccer-hub",
        storageBucket: "monday-night-soccer-hub.firebasestorage.app",
        messagingSenderId: "634335208908",
        appId: "1:634335208908:web:dca705b65fc52de0606969"
    };
    let db = null;
    try { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); } catch(e) { console.warn("Demo mode"); }
    
    // ==================== DATA STRUCTURES ====================
    let players = ["Alex Rowe","Ali Mekawy","Carlo","Charlie","Chris Del Monaco","Chris M","Chris S","Danny","Dante","David","Dimitri","Enzo","Farid","Faros","Frank","George B","George T","Ivan","James Zoumis","James","Joe T","Joey","Kia","Leo","Manoli","Marco","Mario","Maurice","Nector","Paul","Perri","Peter","Ralph","Rocco","Stav","Stevan","Theo","Tony EH","Vasilis"].sort();
    let playerProfiles = {};
    let teamAssignments = {};      // { gameDate: { playerName: "yellow"/"orange", guestName: { team, addedBy } } }
    let matchResults = {};
    let attendance = [];
    let guests = [];               // { guestName, gameDate, addedBy }
    let isAdminLoggedIn = false, currentUser = null;
    let weeklyCaptain = "Carlo";
    let rulesText = "• ⏰ 8:00pm SHARP kickoff at Clifton Park\n• 💰 $5 weekly fee\n• 👑 Captain rotates\n• ✅ RSVP is required\n• 🎭 Guests can play and be assigned to teams!";
    const POSITIONS = ["Goalkeeper","Defender","Midfielder","Striker","Winger"];
    
    // ==================== HELPERS ====================
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function getInitials(name) { return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2); }
    function getAvatarColor(name) {
        const colors = ['#1a73e8', '#28a745', '#dc3545', '#fd7e14', '#6f42c1', '#20c997', '#e83e8c'];
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
        return colors[Math.abs(hash) % colors.length];
    }
    function renderAvatar(name, size = 40) {
        return `<div class="profile-avatar" style="background:${getAvatarColor(name)}; width:${size}px; height:${size}px; font-size:${size/2.5}px;">${getInitials(name)}</div>`;
    }
    function renderMiniAvatar(name, size = 30) {
        return `<div class="player-avatar-small" style="background:${getAvatarColor(name)}; width:${size}px; height:${size}px; font-size:${size/2}px;">${getInitials(name)}</div>`;
    }
    
    function getCurrentAESTDate() { const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000); return new Date(utc + (10 * 3600000)).toISOString().split('T')[0]; }
    function getCurrentGameWeek() {
        const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const aestNow = new Date(utc + (10 * 3600000));
        const day = aestNow.getDay();
        const currentMonday = new Date(aestNow);
        if (day === 1 && aestNow.getHours() >= 20) currentMonday.setDate(aestNow.getDate() + 7);
        else if (day !== 1) currentMonday.setDate(aestNow.getDate() + ((8 - day) % 7));
        currentMonday.setHours(20,0,0,0);
        return currentMonday.toISOString().split('T')[0];
    }
    function generateAllGameWeeks() {
        const year = new Date().getFullYear();
        let start = new Date(year, 0, 1);
        while (start.getDay() !== 1) start.setDate(start.getDate() + 1);
        let weeks = [], cur = new Date(start);
        let dec31 = new Date(year, 11, 31);
        let lastMonday = new Date(dec31);
        while (lastMonday.getDay() !== 1) lastMonday.setDate(lastMonday.getDate() - 1);
        let secondLast = new Date(lastMonday);
        secondLast.setDate(secondLast.getDate() - 7);
        while (cur <= secondLast) {
            weeks.push({ dateStr: cur.toISOString().split('T')[0], label: `Mon ${cur.toLocaleDateString('en-AU', { day:'numeric', month:'short' })}` });
            cur.setDate(cur.getDate() + 7);
        }
        return weeks;
    }
    const ALL_WEEKS = generateAllGameWeeks();
    const getFutureWeeks = () => ALL_WEEKS.filter(w => w.dateStr >= getCurrentAESTDate());
    const getPastWeeks = () => ALL_WEEKS.filter(w => w.dateStr < getCurrentAESTDate()).reverse();
    
    // Get all participants for a game (players + guests)
    function getAllParticipants(gameDate) {
        const playersIn = attendance.filter(a => a.gameDate === gameDate && a.status === 'in').map(a => a.player);
        const guestsIn = guests.filter(g => g.gameDate === gameDate).map(g => ({ name: g.guestName, isGuest: true, addedBy: g.addedBy }));
        return { players: playersIn, guests: guestsIn };
    }
    
    // Get team assignment for any participant (player or guest)
    function getTeamForParticipant(gameDate, name) {
        const assignments = teamAssignments[gameDate] || {};
        if (assignments[name]) return assignments[name];
        // Check if it's a guest stored under guest key pattern
        if (assignments[`guest_${name}`]) return assignments[`guest_${name}`];
        return null;
    }
    
    async function loadData() {
        if(!db) return;
        try {
            const pDoc = await db.collection("config").doc("players").get();
            if(pDoc.exists) players = pDoc.data().list.sort();
            const profileDoc = await db.collection("config").doc("playerProfiles").get();
            if(profileDoc.exists) playerProfiles = profileDoc.data();
            const tDoc = await db.collection("config").doc("teamAssignments").get();
            if(tDoc.exists) teamAssignments = tDoc.data();
            const attSnap = await db.collection("attendance").get();
            attendance = attSnap.docs.map(d => d.data());
            const guestSnap = await db.collection("guests").get();
            guests = guestSnap.docs.map(d => d.data());
            const rulesDoc = await db.collection("config").doc("rules").get();
            if(rulesDoc.exists && rulesDoc.data().text) rulesText = rulesDoc.data().text;
            for (let player of players) {
                if (!playerProfiles[player]) playerProfiles[player] = { age: '—', position: '—', yearJoined: '—', gamesPlayed: 0 };
            }
        } catch(e) { console.warn(e); }
    }
    
    async function saveAttendance(a) {
        if(db) await db.collection("attendance").doc(`${a.player}_${a.gameDate}`).set(a);
        const idx = attendance.findIndex(x => x.player === a.player && x.gameDate === a.gameDate);
        if(idx !== -1) attendance[idx] = a; else attendance.push(a);
        renderHomePage();
        renderThisWeeksTeamsPage();
        if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function saveGuest(g) {
        if(db) await db.collection("guests").doc(`${g.guestName}_${g.gameDate}`).set(g);
        guests.push(g);
        renderHomePage();
        renderThisWeeksTeamsPage();
        if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function saveTeamAssignments(gameDate, assignments) {
        teamAssignments[gameDate] = assignments;
        if(db) await db.collection("config").doc("teamAssignments").set(teamAssignments);
        renderThisWeeksTeamsPage();
        if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function setAttendance(status) {
        if (!currentUser) { alert("Please login first"); return; }
        const nextWeek = getFutureWeeks()[0];
        if (!nextWeek) { alert("No upcoming matches"); return; }
        await saveAttendance({ player: currentUser.name, gameDate: nextWeek.dateStr, status: status });
    }
    
    async function addGuest(guestName) {
        if (!currentUser) { alert("Login required"); return; }
        if (!guestName.trim()) { alert("Enter guest name"); return; }
        const nextWeek = getFutureWeeks()[0];
        if (!nextWeek) return;
        // Check duplicate
        if (guests.some(g => g.gameDate === nextWeek.dateStr && g.guestName === guestName.trim())) {
            alert("Guest already added this week");
            return;
        }
        await saveGuest({ guestName: guestName.trim(), gameDate: nextWeek.dateStr, addedBy: currentUser.name });
        const input = document.getElementById("guestNameInput");
        if(input) input.value = "";
    }
    
    // ==================== RENDER FUNCTIONS ====================
    function renderHomePage() {
        const container = document.getElementById("homeContainer");
        if(!container) return;
        const nextWeek = getFutureWeeks()[0];
        const currentStatus = nextWeek ? attendance.find(a => a.gameDate === nextWeek.dateStr && a.player === currentUser?.name)?.status : null;
        const participants = nextWeek ? getAllParticipants(nextWeek.dateStr) : { players: [], guests: [] };
        const allPlayers = [...participants.players];
        const weeklyGuests = participants.guests;
        
        container.innerHTML = `
            <div class="attendance-card">
                <h2><i class="fas fa-futbol"></i> ${nextWeek?.label || "This Monday"} • 8pm</h2>
                <div>Clifton Park, Brunswick</div>
                <div class="big-buttons">
                    <button id="homePlayBtn" class="btn-play-big">✅ I'M PLAYING</button>
                    <button id="homeSitBtn" class="btn-sit-big">❌ CAN'T PLAY</button>
                </div>
                <div class="status-text">${currentStatus === 'in' ? '✓ You are PLAYING' : (currentStatus === 'out' ? '✗ You are NOT PLAYING' : 'Tap above to set your attendance')}</div>
            </div>
            <div class="playing-list">
                <div class="playing-title"><i class="fas fa-users"></i> 🟢 Signed Up (${allPlayers.length})</div>
                <div class="attendee-tags">${allPlayers.map(p => `<span class="attendee-tag">${renderMiniAvatar(p, 28)} ${escapeHtml(p)}</span>`).join('') || '<span>No players yet</span>'}</div>
            </div>
            <div class="guest-section">
                <div class="guest-title"><i class="fas fa-user-friends"></i> 🎭 Guests (${weeklyGuests.length})</div>
                <div class="attendee-tags">${weeklyGuests.map(g => `<span class="guest-tag"><i class="fas fa-user-plus"></i> ${escapeHtml(g.name)} <small>(by ${escapeHtml(g.addedBy)})</small></span>`).join('') || '<span>No guests added</span>'}</div>
                <div style="margin-top: 12px;"><input type="text" id="guestNameInput" placeholder="Enter guest name"><button id="addGuestBtnPlayer" style="width:100%; margin-top:8px;">➕ Bring a Guest</button></div>
            </div>
            <div class="card" style="background:#fff3e0;">
                <h2>✨ Guest Rule</h2>
                <p style="font-size:13px;">Guests can play! Admin will assign them to Yellow or Orange team on the Admin panel. They appear with a 🎭 badge.</p>
            </div>
        `;
        document.getElementById("homePlayBtn")?.addEventListener("click", () => setAttendance("in"));
        document.getElementById("homeSitBtn")?.addEventListener("click", () => setAttendance("out"));
        document.getElementById("addGuestBtnPlayer")?.addEventListener("click", () => {
            const guestName = document.getElementById("guestNameInput")?.value.trim();
            if(guestName) addGuest(guestName);
            else alert("Please enter a guest name");
        });
    }
    
    function renderThisWeeksTeamsPage() {
        const container = document.getElementById("page-teamswk");
        if(!container) return;
        const nextWeek = getFutureWeeks()[0];
        if (!nextWeek) { container.innerHTML = `<div class="card"><h2>⚽ This Week's Teams</h2><p>No upcoming games.</p></div>`; return; }
        
        const participants = getAllParticipants(nextWeek.dateStr);
        const allParticipantsList = [...participants.players.map(p => ({ name: p, isGuest: false })), ...participants.guests.map(g => ({ name: g.name, isGuest: true, addedBy: g.addedBy }))];
        const assignments = teamAssignments[nextWeek.dateStr] || {};
        
        // Get assigned teams for both players and guests
        const yellowTeam = [];
        const orangeTeam = [];
        for (let p of allParticipantsList) {
            const assigned = assignments[p.name] || assignments[`guest_${p.name}`];
            if (assigned === "yellow") yellowTeam.push(p);
            else if (assigned === "orange") orangeTeam.push(p);
        }
        
        // Also include any assignments that might exist for people not checked in (legacy)
        for (let [name, team] of Object.entries(assignments)) {
            const cleanName = name.replace(/^guest_/, '');
            const isGuest = name.startsWith('guest_');
            if (!allParticipantsList.some(p => p.name === cleanName) && (team === "yellow" || team === "orange")) {
                if (isGuest) yellowTeam.push({ name: cleanName, isGuest: true, addedBy: "Admin" });
                else yellowTeam.push({ name: cleanName, isGuest: false });
            }
        }
        
        container.innerHTML = `
            <div class="card" style="background:linear-gradient(135deg,#1a73e8,#0d5bbf); color:white; text-align:center;">
                <h2>${nextWeek.label}</h2>
                <p>🕗 8:00pm • Clifton Park</p>
                <p>👑 Captain: ${weeklyCaptain}</p>
            </div>
            <div class="card">
                <div class="team-row">
                    <div class="team-box">
                        <div class="team-yellow">🟡 YELLOW TEAM (${yellowTeam.length})</div>
                        <div class="player-list">${yellowTeam.map(p => `<div class="player-tag">${renderMiniAvatar(p.name, 24)} ${escapeHtml(p.name)}${p.isGuest ? '<span class="guest-indicator">🎭 Guest</span>' : ''}</div>`).join('') || '<span class="player-tag">—</span>'}</div>
                    </div>
                    <div class="team-box">
                        <div class="team-orange">🟠 ORANGE TEAM (${orangeTeam.length})</div>
                        <div class="player-list">${orangeTeam.map(p => `<div class="player-tag">${renderMiniAvatar(p.name, 24)} ${escapeHtml(p.name)}${p.isGuest ? '<span class="guest-indicator">🎭 Guest</span>' : ''}</div>`).join('') || '<span class="player-tag">—</span>'}</div>
                    </div>
                </div>
            </div>
            <div class="playing-list">
                <div class="playing-title">📋 All Participants (${allParticipantsList.length})</div>
                <div class="attendee-tags">${allParticipantsList.map(p => `<span class="attendee-tag">${renderMiniAvatar(p.name, 24)} ${escapeHtml(p.name)}${p.isGuest ? ' 🎭' : ''}</span>`).join('')}</div>
            </div>
        `;
    }
    
    function renderAdminPage() {
        if (!isAdminLoggedIn) { 
            document.getElementById("page-admin").innerHTML = `<div class="card"><h2>🔒 Admin Area</h2><p>Admin access only.</p></div>`; 
            return; 
        }
        const nextWeek = getFutureWeeks()[0];
        if (!nextWeek) { document.getElementById("page-admin").innerHTML = `<div class="card"><h2>No upcoming games</h2></div>`; return; }
        
        const participants = getAllParticipants(nextWeek.dateStr);
        const allParticipantsList = [...participants.players.map(p => ({ name: p, isGuest: false })), ...participants.guests.map(g => ({ name: g.name, isGuest: true, addedBy: g.addedBy }))];
        const currentAssignments = teamAssignments[nextWeek.dateStr] || {};
        
        let html = `<div class="card"><h2>⚙️ Admin - Guest Allotment</h2>
            <p><strong>Week:</strong> ${nextWeek.label}</p>
            <p><strong>Total participants:</strong> ${allParticipantsList.length} (${participants.players.length} players, ${participants.guests.length} guests)</p>
            <div class="admin-buttons"><button id="autoBalanceBtn" class="admin-action-btn">🎲 Auto-Balance Teams (Guests + Players)</button></div>
            <h3 style="margin:16px 0 8px;">Assign Each Person to a Team</h3>`;
        
        for (let p of allParticipantsList) {
            const currentTeam = currentAssignments[p.name] || currentAssignments[`guest_${p.name}`] || "";
            html += `<div class="admin-team-item">
                <div><strong>${renderMiniAvatar(p.name, 28)} ${escapeHtml(p.name)}</strong> ${p.isGuest ? '<span style="background:#28a745; color:white; padding:2px 8px; border-radius:20px; font-size:10px;">GUEST</span>' : ''}</div>
                <select class="team-select" data-name="${escapeHtml(p.name)}" data-isguest="${p.isGuest}">
                    <option value="">— Select Team —</option>
                    <option value="yellow" ${currentTeam === "yellow" ? "selected" : ""}>🟡 Yellow Team</option>
                    <option value="orange" ${currentTeam === "orange" ? "selected" : ""}>🟠 Orange Team</option>
                </select>
            </div>`;
        }
        
        html += `<div class="flex-btns"><button id="saveTeamsAdminBtn">💾 Save Team Assignments</button></div></div>
            <div class="card"><h2>➕ Add Guest (Admin)</h2><input type="text" id="adminGuestName" placeholder="Guest name"><button id="adminAddGuestBtn">Add Guest</button></div>`;
        document.getElementById("page-admin").innerHTML = html;
        
        // Auto-balance including guests
        document.getElementById("autoBalanceBtn")?.addEventListener("click", () => {
            if (allParticipantsList.length === 0) return;
            const shuffled = [...allParticipantsList];
            for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
            const mid = Math.ceil(shuffled.length / 2);
            const newAssignments = {};
            shuffled.slice(0, mid).forEach(p => { newAssignments[p.isGuest ? `guest_${p.name}` : p.name] = "yellow"; });
            shuffled.slice(mid).forEach(p => { newAssignments[p.isGuest ? `guest_${p.name}` : p.name] = "orange"; });
            // Preserve guest flag
            for (let p of allParticipantsList) {
                if (!newAssignments[p.isGuest ? `guest_${p.name}` : p.name]) {
                    newAssignments[p.isGuest ? `guest_${p.name}` : p.name] = "yellow";
                }
            }
            teamAssignments[nextWeek.dateStr] = newAssignments;
            saveTeamAssignments(nextWeek.dateStr, teamAssignments[nextWeek.dateStr]);
            renderAdminPage();
            renderThisWeeksTeamsPage();
        });
        
        document.getElementById("saveTeamsAdminBtn")?.addEventListener("click", async () => {
            const selects = document.querySelectorAll(".team-select");
            const newAssignments = {};
            selects.forEach(sel => {
                const name = sel.dataset.name;
                const isGuest = sel.dataset.isguest === "true";
                const team = sel.value;
                if (team) {
                    const key = isGuest ? `guest_${name}` : name;
                    newAssignments[key] = team;
                }
            });
            teamAssignments[nextWeek.dateStr] = newAssignments;
            await saveTeamAssignments(nextWeek.dateStr, teamAssignments[nextWeek.dateStr]);
            alert("Teams saved! Guests are now assigned to their teams.");
            renderThisWeeksTeamsPage();
            renderAdminPage();
        });
        
        document.getElementById("adminAddGuestBtn")?.addEventListener("click", async () => {
            const guestName = document.getElementById("adminGuestName")?.value.trim();
            if (guestName && nextWeek) {
                if (!guests.some(g => g.gameDate === nextWeek.dateStr && g.guestName === guestName)) {
                    await saveGuest({ guestName, gameDate: nextWeek.dateStr, addedBy: "Admin" });
                    document.getElementById("adminGuestName").value = "";
                    renderAdminPage();
                    renderHomePage();
                    renderThisWeeksTeamsPage();
                } else alert("Guest already exists this week");
            } else alert("Enter guest name");
        });
    }
    
    function renderProfilesPage() {
        const container = document.getElementById("page-profiles");
        if(!container) return;
        let html = `<div class="card"><h2>👤 Player Profiles</h2>`;
        for(let player of players) {
            const p = playerProfiles[player] || { age: '—', position: '—', yearJoined: '—', gamesPlayed: 0 };
            html += `<div class="profile-item">
                ${renderAvatar(player, 50)}
                <div class="profile-info">
                    <div class="profile-header"><div class="profile-name">⚽ ${escapeHtml(player)}</div></div>
                    <div class="profile-details"><span class="profile-badge">🎂 ${escapeHtml(p.age)}</span><span class="profile-badge">⚽ ${escapeHtml(p.position)}</span><span class="profile-badge">📅 ${escapeHtml(p.yearJoined)}</span></div>
                </div>
            </div>`;
        }
        html += `</div>`;
        container.innerHTML = html;
    }
    
    function renderScoreboardPage() { document.getElementById("page-scoreboard").innerHTML = `<div class="card"><h2>🏆 Leaderboard</h2><p>Coming soon - track goals & games!</p></div>`; }
    function renderHistoryPage() { document.getElementById("page-history").innerHTML = `<div class="card"><h2>📖 Match History</h2><p>Past matches will appear here.</p></div>`; }
    function renderWeatherPage() { document.getElementById("page-weather").innerHTML = `<div class="card"><h2>🌤️ Weather</h2><p>Melbourne: 18°C, Clear</p></div>`; }
    function renderChatPage() { document.getElementById("page-chat").innerHTML = `<div class="card"><h2>💬 Chat</h2><p>Team chat coming soon!</p></div>`; }
    function renderRulesPage() { document.getElementById("page-rules").innerHTML = `<div class="card"><h2>📜 Rules</h2><div style="white-space:pre-line">${escapeHtml(rulesText)}</div></div>`; }
    
    function renderAllModules() {
        renderProfilesPage(); renderScoreboardPage(); renderThisWeeksTeamsPage(); renderHistoryPage(); renderWeatherPage(); renderChatPage(); renderRulesPage(); renderAdminPage();
    }
    
    function initNavigation() {
        const modules = [
            { id: "home", name: "🏠 HOME" }, { id: "profiles", name: "👤 PROFILES" }, { id: "scoreboard", name: "🏆 STATS" },
            { id: "teamswk", name: "⚽ THIS WEEK" }, { id: "history", name: "📖 HISTORY" }, { id: "weather", name: "🌤️ WEATHER" },
            { id: "chat", name: "💬 CHAT" }, { id: "rules", name: "📜 RULES" }
        ];
        if (isAdminLoggedIn) modules.push({ id: "admin", name: "⚙️ ADMIN" });
        const navBar = document.getElementById("topNavBar");
        navBar.innerHTML = modules.map(m => `<button class="nav-module" data-module="${m.id}">${m.name}</button>`).join('');
        document.querySelectorAll(".nav-module").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = btn.dataset.module;
                document.querySelectorAll(".module-container").forEach(c => c.classList.remove("active-module"));
                const target = document.getElementById(`module-${id}`);
                if(target) target.classList.add("active-module");
                document.querySelectorAll(".nav-module").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
        });
        document.querySelector('.nav-module[data-module="home"]')?.click();
    }
    
    async function renderApp() {
        await loadData();
        document.getElementById("app").innerHTML = `
            <div class="header"><div class="logo-icon"><i class="fas fa-futbol"></i></div><h1>MONDAY NIGHT SOCCER</h1><div class="user-row"><i class="fas fa-user-circle"></i> <strong>${currentUser.role === "admin" ? "ADMIN" : currentUser.name}</strong> <button id="logoutBtnMain">Exit</button></div></div>
            <div class="top-nav" id="topNavBar"></div>
            <div id="module-home" class="module-container"><div id="homeContainer"></div></div>
            <div id="module-profiles" class="module-container"><div id="page-profiles"></div></div>
            <div id="module-scoreboard" class="module-container"><div id="page-scoreboard"></div></div>
            <div id="module-teamswk" class="module-container"><div id="page-teamswk"></div></div>
            <div id="module-history" class="module-container"><div id="page-history"></div></div>
            <div id="module-weather" class="module-container"><div id="page-weather"></div></div>
            <div id="module-chat" class="module-container"><div id="page-chat"></div></div>
            <div id="module-rules" class="module-container"><div id="page-rules"></div></div>
            ${isAdminLoggedIn ? `<div id="module-admin" class="module-container"><div id="page-admin"></div></div>` : ''}
        `;
        document.getElementById("logoutBtnMain").onclick = () => { currentUser = null; localStorage.removeItem("soccer_user"); renderLogin(); };
        renderHomePage(); renderAllModules(); initNavigation();
    }
    
    async function renderLogin() {
        await loadData();
        document.getElementById("app").innerHTML = `<div class="login-box"><div class="login-logo"><i class="fas fa-futbol"></i></div><h2>Monday Night Soccer</h2><p>8pm Kickoff • Clifton Park</p><select id="playerSelectLogin"><option>-- Select Player --</option>${players.map(p=>`<option>${escapeHtml(p)}</option>`).join('')}</select><button id="playerLoginBtn">Enter as Player</button><hr><input type="password" id="adminPwLogin" placeholder="Admin Password"><button id="adminLoginBtn">Admin Login</button></div>`;
        document.getElementById("playerLoginBtn").onclick = () => { const n = document.getElementById("playerSelectLogin").value; if(n && n !== "-- Select Player --") { currentUser = { name: n, role: "player" }; isAdminLoggedIn = false; localStorage.setItem("soccer_user", JSON.stringify(currentUser)); renderApp(); } };
        document.getElementById("adminLoginBtn").onclick = () => { const pw = document.getElementById("adminPwLogin").value; if(pw === "admin123") { currentUser = { name: "Admin", role: "admin" }; isAdminLoggedIn = true; localStorage.setItem("soccer_user", JSON.stringify(currentUser)); renderApp(); } else alert("Wrong password (admin123)"); };
    }
    
    const stored = localStorage.getItem("soccer_user");
    if(stored) {
        try { const u = JSON.parse(stored); if(u.role==="admin"){ isAdminLoggedIn=true; currentUser={name:"Admin",role:"admin"}; } else { currentUser={name:u.name,role:"player"}; } renderApp(); } catch(e){ renderLogin(); }
    } else { renderLogin(); }
</script>
</body>
</html>
