    function playAlarm() { 
        try { 
            const ctx = new (window.AudioContext || window.webkitAudioContext)(); 
            const o = ctx.createOscillator(), g = ctx.createGain(); 
            o.connect(g); g.connect(ctx.destination); 
            o.frequency.value = 880; g.gain.value = 0.3; 
            o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 1.5); 
            o.stop(ctx.currentTime + 1.5); 
        } catch(e){} 
    }
    function formatTime(s){ return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
    function updateTimerDisplay(){ 
        let d = document.getElementById("timerDisplay"); 
        if(d) d.textContent = formatTime(timeLeft); 
        let hs = document.getElementById("currentHalf"); 
        if(hs) hs.textContent = currentHalf === 1 ? "FIRST HALF" : "SECOND HALF"; 
    }
    function timerTick(){ 
        if(timeLeft <= 0){ 
            if(timerInterval) clearInterval(timerInterval); 
            playAlarm(); 
            if(currentHalf === 1){ 
                alert("🔔 HALF TIME! Click OK to start second half."); 
                currentHalf = 2; 
                timeLeft = 45 * 60; 
                updateTimerDisplay(); 
                startTimer();
            } else { 
                alert("🔔 FULL TIME! Match ended."); 
                timerInterval = null;
            } 
            return; 
        } 
        timeLeft--; 
        updateTimerDisplay(); 
    }
    function startTimer(){ if(timerInterval) clearInterval(timerInterval); timerInterval = setInterval(timerTick, 1000); }
    function pauseTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval = null; } }
    function resetTimer(){ pauseTimer(); currentHalf = 1; timeLeft = 45 * 60; updateTimerDisplay(); }
    
    function getNextMondayGame() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const aestNow = new Date(utc + (10 * 3600000));
        const day = aestNow.getDay(), hour = aestNow.getHours();
        let daysUntilMonday;
        if (day === 1 && hour >= 20) daysUntilMonday = 7;
        else if (day === 1) daysUntilMonday = 0;
        else if (day === 0) daysUntilMonday = 1;
        else daysUntilMonday = (8 - day) % 7;
        const nextMonday = new Date(aestNow);
        nextMonday.setDate(aestNow.getDate() + daysUntilMonday);
        nextMonday.setHours(20, 0, 0, 0);
        return nextMonday;
    }
    function getCurrentGameWeekStr(){ return getNextMondayGame().toISOString().split('T')[0]; }
    function getCurrentGameLabel(){ const m = getNextMondayGame(); return `Mon ${m.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}`; }
    function getAllGameWeeks() {
        const year = new Date().getFullYear();
        let start = new Date(year, 0, 1);
        while(start.getDay() !== 1) start.setDate(start.getDate() + 1);
        let weeks = [], cur = new Date(start);
        let dec31 = new Date(year, 11, 31);
        let lastMon = new Date(dec31);
        while(lastMon.getDay() !== 1) lastMon.setDate(lastMon.getDate() - 1);
        let secondLast = new Date(lastMon);
        secondLast.setDate(secondLast.getDate() - 7);
        while(cur <= secondLast) {
            weeks.push({ dateStr: cur.toISOString().split('T')[0], label: `Mon ${cur.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}` });
            cur.setDate(cur.getDate() + 7);
        }
        return weeks;
    }
    const ALL_WEEKS = getAllGameWeeks();
    const CURRENT_GAME_STR = getCurrentGameWeekStr();
    function getPastWeeks(){ return ALL_WEEKS.filter(w => w.dateStr < CURRENT_GAME_STR).reverse(); }
    function getAllParticipants(gameDate){
        const playersIn = attendance.filter(a => a.gameDate === gameDate && a.status === 'in').map(a => a.player);
        const guestsIn = guests.filter(g => g.gameDate === gameDate).map(g => ({ name: g.guestName, isGuest: true, addedBy: g.addedBy }));
        return { players: playersIn, guests: guestsIn };
    }
    
    // CRITICAL FIX: Get ONLY the players who actually played on a specific week
    function getAttendeesForWeek(gameDate){
        const participants = getAllParticipants(gameDate);
        const teamAssign = teamAssignments[gameDate] || {};
        const attendeesSet = new Set();
        
        // Add players who marked attendance as 'in'
        participants.players.forEach(p => attendeesSet.add(p));
        
        // Add guests
        participants.guests.forEach(g => attendeesSet.add(g.name));
        
        // Add anyone assigned to a team (they definitely played)
        Object.keys(teamAssign).forEach(name => {
            let cleanName = name.replace(/^guest_/, '');
            attendeesSet.add(cleanName);
        });
        
        // ALSO check if there are any match results for this week - add goal scorers and assist providers
        const existingMatch = matchResults[gameDate];
        if(existingMatch){
            if(existingMatch.goals){
                Object.keys(existingMatch.goals).forEach(scorer => attendeesSet.add(scorer));
            }
            if(existingMatch.assists){
                Object.keys(existingMatch.assists).forEach(assister => attendeesSet.add(assister));
            }
            if(existingMatch.mvp){
                attendeesSet.add(existingMatch.mvp);
            }
        }
        
        const attendees = Array.from(attendeesSet).sort();
        console.log(`Found ${attendees.length} attendees for ${gameDate}:`, attendees);
        return attendees;
    }
    
    function escapeHtml(s){ return String(s).replace(/[&<>]/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function getInitials(n){ return n.split(' ').map(x=>x[0]).join('').toUpperCase().substring(0,2); }
    function getAvatarColor(n){ const c=['#1a73e8','#28a745','#dc3545','#fd7e14','#6f42c1','#20c997']; let h=0; for(let i=0;i<n.length;i++) h=((h<<5)-h)+n.charCodeAt(i); return c[Math.abs(h)%c.length]; }
    function renderAvatar(n,s=50){ return `<div class="profile-avatar" style="background:${getAvatarColor(n)};width:${s}px;height:${s}px;font-size:${s/2.5}px;">${getInitials(n)}</div>`; }
    function renderMiniAvatar(n,s=28){ return `<div class="player-avatar-small" style="background:${getAvatarColor(n)};width:${s}px;height:${s}px;font-size:${s/2}px;">${getInitials(n)}</div>`; }
    
    function generateTeamSheet(yellowTeam, orangeTeam, gameLabel){
        const yellowList = yellowTeam.map(p => `${p.name}${p.isGuest ? ' (Guest)' : ''}`).join('\n');
        const orangeList = orangeTeam.map(p => `${p.name}${p.isGuest ? ' (Guest)' : ''}`).join('\n');
        return `⚽ *MONDAY NIGHT SOCCER - TEAM SHEET* ⚽\n📅 ${gameLabel} | 8:00pm Clifton Park\n\n🟡 *YELLOW TEAM* (${yellowTeam.length} players)\n${yellowList || '—'}\n\n🟠 *ORANGE TEAM* (${orangeTeam.length} players)\n${orangeList || '—'}\n\n👑 Captain: ${weeklyCaptain}\n📍 Clifton Park, Brunswick\n#MondayNightSoccer`;
    }
    
    function generateAIMatchReport(weekLabel, yellowScore, orangeScore, goals, assists, mvp, injuries, ownGoals){
        const winner = yellowScore > orangeScore ? "Yellow" : (orangeScore > yellowScore ? "Orange" : "Draw");
        const margin = Math.abs(yellowScore - orangeScore);
        let matchDesc = "";
        if(yellowScore === orangeScore) matchDesc = "a tense stalemate that saw both sides share the spoils";
        else if(margin === 1) matchDesc = `a narrow ${winner} victory decided by a solitary goal`;
        else if(margin <= 3) matchDesc = `a hard-fought ${winner} triumph`;
        else matchDesc = `a commanding ${winner} masterclass`;
        
        let goalScorersText = "";
        const allGoals = {...goals};
        if(ownGoals && ownGoals.length){ ownGoals.forEach(og => { allGoals[`⚠️ OWN GOAL (${og.player})`] = (allGoals[`⚠️ OWN GOAL (${og.player})`] || 0) + 1; }); }
        const goalEntries = Object.entries(allGoals);
        if(goalEntries.length){
            goalScorersText = goalEntries.map(([p,c]) => `• ${p}: ${c} goal${c>1?'s':''}`).join('\n');
        } else {
            goalScorersText = "• No goals scored";
        }
        
        let assistText = "";
        if(assists && Object.keys(assists).length){
            assistText = Object.entries(assists).map(([a,c]) => `• ${a}: ${c} assist${c>1?'s':''}`).join('\n');
        } else {
            assistText = "• No assists recorded";
        }
        
        let mvpText = mvp || "The Referee (neutral decision)";
        let injuryText = (injuries && injuries.length) ? injuries.map(i => `• ${i}`).join('\n') : "• None reported";
        
        return `📰 *MONDAY NIGHT SOCCER - MATCH REPORT* 📰
*${weekLabel.toUpperCase()} | Clifton Park, Brunswick*

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
*MATCH SUMMARY*
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

In ${matchDesc}, Yellow and Orange delivered an entertaining contest under the lights.

*FINAL SCORE*
🟡 YELLOW ${yellowScore} - ${orangeScore} 🟠

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
*GOAL SCORERS*
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${goalScorersText}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
*ASSISTS*
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${assistText}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
*MAN OF THE MATCH*
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
🏆 ${mvpText}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
*INJURY REPORT*
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
${injuryText}

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
*NEXT FIXTURE*
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
📅 Next Monday | 8:00pm | Clifton Park

#MondayNightSoccer #CliftonPark #MatchReport`;
    }
    
    async function removeAttendee(playerName, gameDate){
        if(!isAdminLoggedIn && currentUser?.name !== playerName){
            alert("Only admin or the player can remove attendance.");
            return false;
        }
        if(!confirm(`Remove ${playerName} from playing list?`)) return false;
        
        if(firebaseReady && db){
            await db.collection("attendance").doc(`${playerName}_${gameDate}`).delete();
        }
        attendance = attendance.filter(a => !(a.player === playerName && a.gameDate === gameDate));
        
        if(teamAssignments[gameDate]){
            delete teamAssignments[gameDate][playerName];
            if(firebaseReady && db) await db.collection("config").doc("teamAssignments").set(teamAssignments);
        }
        
        const gamesCount = attendance.filter(a => a.player === playerName && a.status === 'in').length;
        const opening = playerProfiles[playerName]?.openingBalanceGames || 0;
        if(playerProfiles[playerName]) {
            playerProfiles[playerName].gamesPlayed = gamesCount + opening;
            if(firebaseReady && db) await db.collection("config").doc("playerProfiles").set(playerProfiles);
        }
        
        refreshAll();
        alert(`${playerName} removed.`);
        return true;
    }
    
    async function loadData(){
        if(!firebaseReady || !db) return;
        try{
            const [pDoc,profDoc,tDoc,rDoc,attSnap,guestSnap,commentsSnap] = await Promise.all([
                db.collection("config").doc("players").get(),
                db.collection("config").doc("playerProfiles").get(),
                db.collection("config").doc("teamAssignments").get(),
                db.collection("config").doc("matchResults").get(),
                db.collection("attendance").get(),
                db.collection("guests").get(),
                db.collection("matchComments").get()
            ]);
            if(pDoc.exists) players = pDoc.data().list.sort();
            if(profDoc.exists) playerProfiles = profDoc.data();
            if(tDoc.exists) teamAssignments = tDoc.data();
            if(rDoc.exists) matchResults = rDoc.data();
            attendance = attSnap.docs.map(d=>d.data());
            guests = guestSnap.docs.map(d=>d.data());
            matchComments = {};
            commentsSnap.docs.forEach(doc=>{ const d=doc.data(); if(!matchComments[d.gameDate]) matchComments[d.gameDate]=[]; matchComments[d.gameDate].push(d); });
            for(let p of players) if(!playerProfiles[p]) playerProfiles[p] = { age:'—', position:'—', yearJoined:'—', gamesPlayed:0, openingBalanceGames:0 };
        } catch(e){ console.warn(e); }
        refreshAll();
    }
    
    async function saveAttendance(a){
        if(firebaseReady&&db) await db.collection("attendance").doc(`${a.player}_${a.gameDate}`).set(a);
        const idx = attendance.findIndex(x=>x.player===a.player && x.gameDate===a.gameDate);
        if(idx!==-1) attendance[idx]=a; else attendance.push(a);
        const games = attendance.filter(att=>att.player===a.player && att.status==='in').length;
        const opening = playerProfiles[a.player]?.openingBalanceGames || 0;
        if(playerProfiles[a.player]) playerProfiles[a.player].gamesPlayed = games + opening;
        else playerProfiles[a.player] = { age:'—', position:'—', yearJoined:'—', gamesPlayed:games+opening, openingBalanceGames:0 };
        if(firebaseReady&&db) await db.collection("config").doc("playerProfiles").set(playerProfiles);
        refreshAll();
    }
    
    async function saveGuest(g){
        if(firebaseReady&&db) await db.collection("guests").doc(`${g.guestName}_${g.gameDate}`).set(g);
        guests.push(g);
        refreshAll();
    }
    
    async function removeGuest(n,d){
        if(!confirm(`Remove guest "${n}"?`)) return;
        if(firebaseReady&&db) await db.collection("guests").doc(`${n}_${d}`).delete();
        guests = guests.filter(g=>!(g.guestName===n && g.gameDate===d));
        if(teamAssignments[d]){ delete teamAssignments[d][n]; delete teamAssignments[d][`guest_${n}`]; if(firebaseReady&&db) await db.collection("config").doc("teamAssignments").set(teamAssignments); }
        refreshAll();
    }

        let html = `<div class="info-bar">🔐 Admin Mode - Managing: ${gameLabel}</div>
        <div class="card"><h2>✍️ Manual Attendance</h2><select id="manualPlayerSelect"><option value="">-- Select Player --</option>${players.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}</select><button id="manualAddBtn" style="background:#28a745;">➕ Add to Playing List</button></div>
        <div class="card"><h2>🎭 Manage Guests</h2>${parts.guests.map(g=>`<div class="admin-team-item"><span><strong>${escapeHtml(g.name)}</strong> (by ${escapeHtml(g.addedBy)})</span><button class="remove-guest-btn" data-guest="${escapeHtml(g.name)}" data-date="${gameDate}" style="background:#dc3545;">Remove</button></div>`).join('')}<div><input id="adminGuestName" placeholder="New guest"><button id="adminAddGuestBtn">+ Add Guest</button></div></div>
        <div class="card"><h2>⚽ Assign Teams</h2>${allList.map(p=>{ const ct=currAssign[p.name] || currAssign[`guest_${p.name}`] || ""; return `<div class="admin-team-item"><div>${renderMiniAvatar(p.name,28)} ${escapeHtml(p.name)} ${p.isGuest?'<span style="background:#28a745;color:white;padding:2px 8px;border-radius:20px;">GUEST</span>':''}</div><select class="team-select" data-name="${escapeHtml(p.name)}"><option value="">— Team —</option><option value="yellow" ${ct==="yellow"?"selected":""}>🟡 Yellow</option><option value="orange" ${ct==="orange"?"selected":""}>🟠 Orange</option></select></div>`; }).join('')}<div class="flex-btns"><button id="autoBalanceBtn">🎲 Auto-Balance</button><button id="saveTeamsBtn">💾 Save Teams</button></div></div>
        <div class="card"><h2>📝 Match Report & AI Generation</h2>
        <div class="info-bar" style="margin-bottom:12px;"><i class="fas fa-info-circle"></i> Select a week below, then add goal scorers from the dropdown (only players who played that night will appear)</div>
        <select id="reportWeekSelect"><option value="">-- Select Match Week --</option>${pastWeeks.map(w=>`<option value="${w.dateStr}">${w.label}</option>`).join('')}<option value="${CURRENT_GAME_STR}">${gameLabel} (Current Week)</option></select>
        <div id="matchReportForm" style="display:none;margin-top:12px;">
            <div style="display:flex;gap:12px;margin-bottom:12px;">
                <input type="number" id="reportYellowScore" placeholder="Yellow Score" style="flex:1;">
                <input type="number" id="reportOrangeScore" placeholder="Orange Score" style="flex:1;">
            </div>
            <div style="margin-bottom:12px;">
                <label><strong>⚽ Goal Scorers</strong> <span style="font-size:11px;color:#6c757d;">(only players who played this night appear)</span></label>
                <div id="goalsList" style="margin-top:8px;"></div>
                <button id="addGoalBtn" type="button" style="margin-top:8px;">+ Add Goal Scorer</button>
            </div>
            <div style="margin-bottom:12px;">
                <label><strong>🎯 Assists</strong></label>
                <div id="assistsList" style="margin-top:8px;"></div>
                <button id="addAssistBtn" type="button" style="margin-top:8px;">+ Add Assist Provider</button>
            </div>
            <div style="margin-bottom:12px;">
                <label><strong>🏆 MVP</strong></label>
                <select id="mvpSelect"></select>
            </div>
            <div style="margin-bottom:12px;">
                <label><strong>🩺 Injuries (comma separated)</strong></label>
                <input id="injuriesInput" placeholder="e.g., John Smith, Bob Wilson">
            </div>
            <button id="submitMatchReportBtn">💾 Save & Generate AI Report</button>
            <div id="generatedReport" style="margin-top:16px;background:#f8f9fa;border-radius:16px;padding:16px;display:none;">
                <div id="reportText" class="newspaper-report"></div>
                <button id="whatsappShareBtn" class="whatsapp-share" style="margin-top:12px;"><i class="fab fa-whatsapp"></i> Share AI Report on WhatsApp</button>
            </div>
        </div></div>`;
        
        const container=document.getElementById("page-admin"); if(container) container.innerHTML=html;
        
        let currentGoals = [], currentAssists = [];
        let currentWeekForForm = null;
        
        function rebuildPlayerDropdowns(week){
            // Get ONLY the attendees for this specific week
            const attendees = getAttendeesForWeek(week);
            
            console.log(`Building dropdowns for ${week} with ${attendees.length} attendees:`, attendees);
            
            if(attendees.length === 0){
                // If no attendees found, show a message
                const mvpSel = document.getElementById("mvpSelect");
                if(mvpSel){
                    mvpSel.innerHTML = `<option value="">-- No players found for this week --</option>`;
                }
                const goalsDiv = document.getElementById("goalsList");
                if(goalsDiv){
                    goalsDiv.innerHTML = '<div style="color:#dc3545; padding:10px; text-align:center;">⚠️ No players found for this week. Please add attendance or assign teams first.</div>';
                }
                const assistsDiv = document.getElementById("assistsList");
                if(assistsDiv){
                    assistsDiv.innerHTML = '<div style="color:#dc3545; padding:10px; text-align:center;">⚠️ No players found for this week. Please add attendance or assign teams first.</div>';
                }
                return;
            }
            
            const mvpSel = document.getElementById("mvpSelect");
            if(mvpSel){
                mvpSel.innerHTML = `<option value="">-- Select MVP --</option>${attendees.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}`;
                if(matchResults[week] && matchResults[week].mvp){
                    mvpSel.value = matchResults[week].mvp;
                }
            }
            
            const goalsDiv = document.getElementById("goalsList");
            if(goalsDiv){
                if(currentGoals.length === 0){
                    goalsDiv.innerHTML = '<div style="color:#6c757d; padding:10px; text-align:center;">No goal scorers added yet. Click "+ Add Goal Scorer" to add.</div>';
                } else {
                    goalsDiv.innerHTML = currentGoals.map((g,idx)=>`<div class="stats-row"><select class="goal-select" data-idx="${idx}" style="flex:2; margin:0;">${attendees.map(p=>`<option value="${escapeHtml(p)}" ${g.player===p ? 'selected' : ''}>${escapeHtml(p)}</option>`).join('')}</select><input type="number" class="goal-count" data-idx="${idx}" placeholder="Goals" value="${g.count}" style="width:80px; margin:0;"><button class="remove-goal" data-idx="${idx}" style="background:#dc3545; margin:0; padding:10px 16px;">✖</button></div>`).join('');
                }
            }
            
            const assistsDiv = document.getElementById("assistsList");
            if(assistsDiv){
                if(currentAssists.length === 0){
                    assistsDiv.innerHTML = '<div style="color:#6c757d; padding:10px; text-align:center;">No assists added yet. Click "+ Add Assist Provider" to add.</div>';
                } else {
                    assistsDiv.innerHTML = currentAssists.map((a,idx)=>`<div class="stats-row"><select class="assist-select" data-idx="${idx}" style="flex:2; margin:0;">${attendees.map(p=>`<option value="${escapeHtml(p)}" ${a.player===p ? 'selected' : ''}>${escapeHtml(p)}</option>`).join('')}</select><input type="number" class="assist-count" data-idx="${idx}" placeholder="Assists" value="${a.count}" style="width:80px; margin:0;"><button class="remove-assist" data-idx="${idx}" style="background:#dc3545; margin:0; padding:10px 16px;">✖</button></div>`).join('');
                }
            }
        }
        
        const weekSelect = document.getElementById("reportWeekSelect");
        weekSelect?.addEventListener("change", (e) => {
            currentWeekForForm = e.target.value;
            const form = document.getElementById("matchReportForm");
            if(currentWeekForForm){
                form.style.display = "block";
                const existing = matchResults[currentWeekForForm] || {};
                document.getElementById("reportYellowScore").value = existing.yellowScore || 0;
                document.getElementById("reportOrangeScore").value = existing.orangeScore || 0;
                document.getElementById("injuriesInput").value = (existing.injuries || []).join(', ');
                
                currentGoals = [];
                if(existing.goals){
                    currentGoals = Object.entries(existing.goals).map(([player, count]) => ({ player, count }));
                }
                currentAssists = [];
                if(existing.assists){
                    currentAssists = Object.entries(existing.assists).map(([player, count]) => ({ player, count }));
                }
                rebuildPlayerDropdowns(currentWeekForForm);
                document.getElementById("generatedReport").style.display = "none";
            } else {
                form.style.display = "none";
            }
        });
        
        document.getElementById("addGoalBtn")?.addEventListener("click", () => {
            if(currentWeekForForm){
                currentGoals.push({ player: "", count: 1 });
                rebuildPlayerDropdowns(currentWeekForForm);
            } else {
                alert("Please select a match week first");
            }
        });
        
        document.getElementById("addAssistBtn")?.addEventListener("click", () => {
            if(currentWeekForForm){
                currentAssists.push({ player: "", count: 1 });
                rebuildPlayerDropdowns(currentWeekForForm);
            } else {
                alert("Please select a match week first");
            }
        });
        
        document.addEventListener("click", (e) => {
            if(e.target.classList.contains("remove-goal")){
                const idx = parseInt(e.target.dataset.idx);
                if(!isNaN(idx)){
                    currentGoals.splice(idx, 1);
                    if(currentWeekForForm) rebuildPlayerDropdowns(currentWeekForForm);
                }
            }
            if(e.target.classList.contains("remove-assist")){
                const idx = parseInt(e.target.dataset.idx);
                if(!isNaN(idx)){
                    currentAssists.splice(idx, 1);
                    if(currentWeekForForm) rebuildPlayerDropdowns(currentWeekForForm);
                }
            }
        });
        
        document.addEventListener("change", (e) => {
            if(e.target.classList.contains("goal-select")){
                const idx = parseInt(e.target.dataset.idx);
                if(!isNaN(idx) && currentGoals[idx]) currentGoals[idx].player = e.target.value;
            }
            if(e.target.classList.contains("goal-count")){
                const idx = parseInt(e.target.dataset.idx);
                if(!isNaN(idx) && currentGoals[idx]) currentGoals[idx].count = parseInt(e.target.value) || 1;
            }
            if(e.target.classList.contains("assist-select")){
                const idx = parseInt(e.target.dataset.idx);
                if(!isNaN(idx) && currentAssists[idx]) currentAssists[idx].player = e.target.value;
            }
            if(e.target.classList.contains("assist-count")){
                const idx = parseInt(e.target.dataset.idx);
                if(!isNaN(idx) && currentAssists[idx]) currentAssists[idx].count = parseInt(e.target.value) || 1;
            }
        });
        
        document.getElementById("submitMatchReportBtn")?.addEventListener("click", async () => {
            if(!currentWeekForForm){ alert("Select a week first"); return; }
            const yellow = parseInt(document.getElementById("reportYellowScore")?.value) || 0;
            const orange = parseInt(document.getElementById("reportOrangeScore")?.value) || 0;
            const goalsObj = {};
            for(let g of currentGoals) if(g.player && g.count > 0) goalsObj[g.player] = (goalsObj[g.player] || 0) + g.count;
            const assistsObj = {};
            for(let a of currentAssists) if(a.player && a.count > 0) assistsObj[a.player] = (assistsObj[a.player] || 0) + a.count;
            const mvp = document.getElementById("mvpSelect")?.value || "";
            const injuries = document.getElementById("injuriesInput")?.value.split(',').map(i=>i.trim()).filter(i=>i) || [];
            await saveMatchResult(currentWeekForForm, yellow, orange, goalsObj, assistsObj, mvp, injuries, []);
            const weekLabel = ALL_WEEKS.find(w=>w.dateStr===currentWeekForForm)?.label || currentWeekForForm;
            const report = generateAIMatchReport(weekLabel, yellow, orange, goalsObj, assistsObj, mvp, injuries, []);
            const reportDiv = document.getElementById("generatedReport");
            const reportText = document.getElementById("reportText");
            if(reportDiv && reportText){
                reportText.innerText = report;
                reportDiv.style.display = "block";
                document.getElementById("whatsappShareBtn")?.addEventListener("click", () => {
                    window.open(`https://wa.me/?text=${encodeURIComponent(report)}`, '_blank');
                });
            }
        });
        
        document.getElementById("manualAddBtn")?.addEventListener("click", async () => {
            const sel = document.getElementById("manualPlayerSelect");
            const playerName = sel?.value;
            if(playerName && players.includes(playerName)){
                const exists = attendance.some(a => a.player === playerName && a.gameDate === gameDate);
                if(exists){ alert(`${playerName} already has attendance`); return; }
                await saveAttendance({ player: playerName, gameDate: gameDate, status: 'in' });
                alert(`${playerName} added`);
                renderAdminPage();
            } else alert("Select valid player");
        });
        
        document.getElementById("adminAddGuestBtn")?.addEventListener("click", async () => {
            const inp = document.getElementById("adminGuestName");
            const name = inp?.value.trim();
            if(name){
                await saveGuest({ guestName: name, gameDate: gameDate, addedBy: "Admin" });
                inp.value = "";
                renderAdminPage();
            } else alert("Enter guest name");
        });
        
        document.querySelectorAll(".remove-guest-btn").forEach(btn => {
            btn.addEventListener("click", async () => {
                await removeGuest(btn.dataset.guest, btn.dataset.date);
                renderAdminPage();
            });
        });
        
        document.getElementById("saveTeamsBtn")?.addEventListener("click", async () => {
            const newAssign = {};
            document.querySelectorAll(".team-select").forEach(sel => {
                const name = sel.dataset.name;
                const val = sel.value;
                if(val && name) newAssign[name] = val;
            });
            await saveTeamAssignments(gameDate, newAssign);
            renderAdminPage();
            renderTeamsPage();
        });
        
        document.getElementById("autoBalanceBtn")?.addEventListener("click", () => {
            const playerNames = allList.map(p => p.name);
            const shuffled = [...playerNames];
            for(let i = shuffled.length - 1; i > 0; i--){
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            const half = Math.ceil(shuffled.length / 2);
            const autoAssign = {};
            shuffled.forEach((p, idx) => { autoAssign[p] = idx < half ? "yellow" : "orange"; });
            saveTeamAssignments(gameDate, autoAssign).then(() => { renderAdminPage(); renderTeamsPage(); });
        });
    }
    
    function showLoginModal(){
        const modal=document.createElement('div'); modal.className='modal'; 
        let playerOptions=players.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
        modal.innerHTML=`<div class="modal-content"><div style="width:80px;height:80px;background:#1a73e8;border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;"><i class="fas fa-futbol fa-3x" style="color:white;"></i></div><h3 style="text-align:center;">Monday Night Soccer</h3><select id="loginNameSelect"><option value="">Select your name</option>${playerOptions}</select><button id="loginBtn" style="width:100%;">Login</button><div style="margin-top:12px;"><button id="adminSwitchBtn" class="btn-outline" style="width:100%;">🔐 Admin Access</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById("loginBtn").onclick=()=>{ const sel=document.getElementById("loginNameSelect"); const name=sel?.value; if(name && players.includes(name)){ currentUser={name}; isAdminLoggedIn=false; modal.remove(); document.getElementById("userNameDisplay").innerText=name; document.getElementById("logoutBtn").style.display="inline-block"; refreshAll(); renderChatPage(); } else alert("Please select your name"); };
        document.getElementById("adminSwitchBtn").onclick=()=>{ const pw=prompt("Admin password:"); if(pw==="admin123"){ isAdminLoggedIn=true; currentUser={name:"Admin"}; document.getElementById("userNameDisplay").innerText="Admin"; document.getElementById("logoutBtn").style.display="inline-block"; modal.remove(); refreshAll(); renderAdminPage(); } else alert("Wrong password"); };
    }
    
    function logout(){ currentUser=null; isAdminLoggedIn=false; document.getElementById("userNameDisplay").innerText="Not logged in"; document.getElementById("logoutBtn").style.display="none"; showLoginModal(); refreshAll(); }
    
    function initApp(){
        const appDiv=document.getElementById("app");
        appDiv.innerHTML=`<div class="header"><div class="logo-icon"><i class="fas fa-futbol"></i></div><h1>MONDAY NIGHT SOCCER</h1><div class="user-row"><span id="userNameDisplay">Not logged in</span><button id="logoutBtn" style="display:none;">Logout</button></div></div><div class="top-nav"><button class="nav-module active" data-module="home">🏠 Home</button><button class="nav-module" data-module="teamswk">⚽ Teams</button><button class="nav-module" data-module="history">📖 History</button><button class="nav-module" data-module="scoreboard">🏆 Stats</button><button class="nav-module" data-module="profiles">👤 Profiles</button><button class="nav-module" data-module="timer">⏱️ Timer</button><button class="nav-module" data-module="chat">💬 Chat</button><button class="nav-module" data-module="weather">🌤️ Weather</button><button class="nav-module" data-module="rules">📜 Rules</button><button class="nav-module" data-module="admin">🔧 Admin</button></div><div id="homeContainer" class="module-container active-module"></div><div id="page-teamswk" class="module-container"></div><div id="page-history" class="module-container"></div><div id="page-scoreboard" class="module-container"></div><div id="page-profiles" class="module-container"></div><div id="page-timer" class="module-container"></div><div id="page-chat" class="module-container"></div><div id="page-weather" class="module-container"></div><div id="page-rules" class="module-container"></div><div id="page-admin" class="module-container"></div>`;
        document.querySelectorAll(".nav-module").forEach(btn=>{ btn.addEventListener("click",()=>{ document.querySelectorAll(".nav-module").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); const mod=btn.dataset.module; document.querySelectorAll(".module-container").forEach(c=>c.classList.remove("active-module")); if(mod==="home") document.getElementById("homeContainer").classList.add("active-module"); else document.getElementById(`page-${mod}`).classList.add("active-module"); if(mod==="chat") renderChatPage(); if(mod==="timer") renderTimerPage(); if(mod==="weather") renderWeatherPage(); if(mod==="rules") renderRulesPage(); }); });
        document.getElementById("logoutBtn").onclick=logout;
        if(firebaseReady) loadData().then(()=>{ showLoginModal(); fetchWeather(); }); else { showLoginModal(); fetchWeather(); refreshAll(); }
    }
    
    async function fetchWeather(){
        try{
            const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=-37.77&longitude=144.97&hourly=temperature_2m,precipitation_probability,weathercode&timezone=Australia/Melbourne&forecast_days=7');
            const d=await r.json();
            const target=CURRENT_GAME_STR;
            for(let i=0;i<d.hourly.time.length;i++){
                const hd=d.hourly.time[i].split('T')[0];
                const hr=parseInt(d.hourly.time[i].split('T')[1].substring(0,2));
                if(hd===target && hr===20){
                    const t=Math.round(d.hourly.temperature_2m[i]);
                    const code=d.hourly.weathercode[i];
                    let cond="Clear", icon="fa-sun";
                    if(code===0){ cond="Clear"; icon="fa-sun"; }
                    else if(code===1||code===2){ cond="Partly cloudy"; icon="fa-cloud-sun"; }
                    else if(code===3){ cond="Overcast"; icon="fa-cloud"; }
                    else if(code>=51&&code<=67){ cond="Light rain"; icon="fa-cloud-rain"; }
                    else if(code>=80&&code<=99){ cond="Rain/storm"; icon="fa-cloud-bolt"; }
                    weatherData={ temp:`${t}°C`, condition:cond, icon, rainChance:d.hourly.precipitation_probability[i]||0 };
                    break;
                }
            }
        } catch(e){}
        renderWeatherPage();
    }
    
    initApp();
</script>
