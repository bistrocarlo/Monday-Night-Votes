<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Monday Night Soccer | Secure Admin Hub 🔒</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{background:#f0f2f5;font-family:'Inter',sans-serif;}
        .app{max-width:500px;margin:0 auto;background:#f0f2f5;min-height:100vh;padding-bottom:20px;}
        .header{background:white;padding:14px 20px;text-align:center;border-bottom:1px solid #e9ecef;position:sticky;top:0;z-index:20;}
        .logo-icon{width:52px;height:52px;background:#1a73e8;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;margin:0 auto 6px;}
        .logo-icon i{font-size:26px;color:white;}
        .header h1{font-size:18px;font-weight:700;color:#1a1a2e;}
        .user-row{background:#f1f5f9;padding:5px 14px;border-radius:40px;display:inline-flex;align-items:center;gap:10px;margin-top:6px;font-size:12px;}
        .user-row button{background:#dc3545;border:none;padding:4px 12px;border-radius:40px;color:white;font-weight:500;font-size:11px;cursor:pointer;}
        .top-nav{background:white;padding:10px 12px;display:flex;flex-wrap:wrap;justify-content:center;gap:6px;border-bottom:1px solid #e9ecef;position:sticky;top:75px;z-index:15;}
        .nav-module{background:#f0f2f5;border:none;padding:8px 14px;border-radius:40px;font-size:12px;font-weight:600;color:#5a626e;cursor:pointer;transition:all 0.2s;}
        .nav-module.active{background:#1a73e8;color:white;}
        .module-container{padding:16px;display:none;}
        .module-container.active-module{display:block;animation:fadeIn 0.25s ease;}
        @keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
        .card{background:white;border-radius:20px;padding:18px;margin-bottom:14px;border:1px solid #e9ecef;box-shadow:0 1px 2px rgba(0,0,0,0.03);}
        .card h2{font-size:17px;font-weight:700;margin-bottom:14px;border-left:4px solid #1a73e8;padding-left:12px;color:#1a1a2e;}
        .attendance-card{background:linear-gradient(135deg,#1a73e8,#0d5bbf);color:white;border-radius:24px;padding:24px 20px;text-align:center;margin-bottom:16px;}
        .big-buttons{display:flex;gap:14px;margin:16px 0 12px;}
        .btn-play-big{background:#28a745;flex:1;padding:14px;border-radius:60px;font-weight:700;font-size:16px;border:none;color:white;cursor:pointer;}
        .btn-sit-big{background:#dc3545;flex:1;padding:14px;border-radius:60px;font-weight:700;font-size:16px;border:none;color:white;cursor:pointer;}
        .profile-item{background:#f8f9fa;border-radius:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;padding:12px;}
        .profile-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:18px;flex-shrink:0;}
        .player-avatar-small{width:32px;height:32px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:12px;margin-right:5px;flex-shrink:0;}
        .profile-badge{background:white;border-radius:40px;padding:3px 10px;font-size:11px;font-weight:600;display:inline-block;margin-right:6px;margin-bottom:4px;color:#495057;border:1px solid #e9ecef;}
        .edit-profile-btn{background:#6c757d;padding:5px 12px;font-size:11px;border-radius:40px;border:none;color:white;cursor:pointer;}
        .match-card{background:white;border-radius:20px;margin-bottom:14px;border:1px solid #e9ecef;overflow:hidden;}
        .match-header{background:#f8f9fa;padding:12px 16px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid #e9ecef;}
        .match-result{background:#1a73e8;color:white;padding:4px 14px;border-radius:40px;font-weight:600;font-size:13px;}
        .teams-section{padding:16px;background:#1a2a3a;}
        .team-row{display:flex;gap:12px;flex-wrap:wrap;}
        .team-box{flex:1;background:rgba(0,0,0,0.6);border-radius:16px;padding:12px;min-width:140px;}
        .team-yellow{background:#ffc107;color:#2c2c2c;font-weight:800;text-align:center;padding:6px;border-radius:60px;margin-bottom:8px;}
        .team-orange{background:#fd7e14;color:white;font-weight:800;text-align:center;padding:6px;border-radius:60px;margin-bottom:8px;}
        .player-list{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
        .player-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border-radius:40px;padding:4px 10px;font-size:11px;color:white;}
        .score-big{text-align:center;margin-top:12px;font-size:22px;font-weight:800;background:rgba(0,0,0,0.6);border-radius:60px;padding:8px;color:#ffd700;}
        .goals-section{padding:12px 16px;background:#fff8e7;}
        .goal-badge{background:white;border-radius:40px;padding:5px 12px;font-size:12px;font-weight:600;border-left:3px solid #eab308;margin:4px;display:inline-block;}
        .attendee-tag{display:inline-flex;align-items:center;gap:8px;background:white;padding:6px 12px;border-radius:40px;font-size:13px;margin:4px;box-shadow:0 1px 2px rgba(0,0,0,0.05);}
        .remove-attendee-btn{background:#dc3545;border:none;color:white;border-radius:40px;padding:3px 8px;font-size:10px;font-weight:600;cursor:pointer;margin-left:6px;}
        .whatsapp-share{background:#25D366;color:white;border:none;margin-top:8px;width:100%;padding:10px;border-radius:60px;font-weight:600;cursor:pointer;}
        .data-table{width:100%;border-collapse:collapse;font-size:13px;}
        .data-table th,.data-table td{padding:10px;text-align:left;border-bottom:1px solid #e9ecef;}
        .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;}
        .modal-content{background:white;border-radius:28px;padding:24px;max-width:340px;width:90%;max-height:80vh;overflow-y:auto;}
        select,input,textarea{width:100%;padding:12px;border:1.5px solid #e9ecef;border-radius:60px;margin:8px 0;font-size:14px;font-family:'Inter',sans-serif;}
        button{background:#1a73e8;color:white;border:none;padding:10px 20px;border-radius:60px;font-weight:600;cursor:pointer;}
        .flex-btns{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;}
        .info-bar{background:#e8f0fe;border-radius:16px;padding:12px;font-size:12px;margin-bottom:16px;text-align:center;color:#1a73e8;font-weight:500;}
        .timer-display{font-size:54px;font-weight:800;font-family:monospace;color:#1a73e8;background:#f0f2f5;border-radius:20px;padding:12px;margin-bottom:16px;text-align:center;}
        .half-status{font-size:13px;color:#6c757d;margin-top:10px;text-align:center;}
        .guest-section{background:#e6f7e6;border-radius:20px;padding:16px;margin-bottom:14px;border:1px solid #b3e6b3;}
        .stats-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
        .team-assign-pill{display:inline-flex;align-items:center;gap:6px;background:#f8f9fa;border-radius:40px;padding:4px 12px;margin:4px;border:1px solid #dee2e6;}
        .playing-list{background:#e8f0fe;border-radius:20px;padding:16px;margin-bottom:14px;}
        .chat-message{margin-bottom:12px;}
        .timer-btn{padding:10px 20px;border-radius:60px;font-weight:600;border:none;cursor:pointer;}
        .timer-btn.start{background:#28a745;color:white;}
        .timer-btn.pause{background:#ffc107;color:#2c2c2c;}
        .timer-btn.reset{background:#dc3545;color:white;}
        @media (max-width:450px){.team-row{flex-direction:column;}}
        .guest-tag{display:inline-block;background:#d4edda;border-radius:40px;padding:4px 12px;margin:4px;font-size:12px;}
        .btn-outline{background:white;color:#1a73e8;border:2px solid #1a73e8;}
        .remove-guest-btn{background:#dc3545;border:none;color:white;border-radius:40px;padding:2px 8px;font-size:10px;margin-left:6px;cursor:pointer;}
        .guest-badge{background:#28a745;color:white;border-radius:40px;padding:2px 8px;font-size:9px;margin-left:6px;}
        .rule-item{background:#f8f9fa;border-radius:16px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
        .rule-text{flex:1;font-size:13px;}
        .edit-rule-btn{background:#ffc107;color:#2c2c2c;padding:4px 12px;border-radius:40px;font-size:11px;margin-left:8px;}
        .delete-rule-btn{background:#dc3545;padding:4px 12px;border-radius:40px;font-size:11px;margin-left:6px;}
        .add-rule-btn{background:#28a745;width:100%;margin-top:8px;}
        textarea{font-family:'Inter',sans-serif;resize:vertical;}
        .admin-badge{background:#dc3545;color:white;font-size:9px;padding:2px 8px;border-radius:40px;margin-left:8px;}
    </style>
</head>
<body>
<div class="app" id="app"><div style="text-align:center; padding:40px;"><i class="fas fa-spinner fa-spin"></i> Loading Secure Monday Night Soccer...</div></div>

<script>
    // ==================== SECURE ADMIN CREDENTIALS ====================
    // 🔒 CHANGE THESE TO YOUR PERSONAL DETAILS 🔒
    const ADMIN_EMAIL = "admin@mondaynight.com";  // Change this to your email
    const ADMIN_PASSWORD = "CliftonPark2024!";    // Change this to a strong password
    // ================================================================
    
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCWlFqDJyENgrUOhiLXCjSEi4Mk_54SA1w",
        authDomain: "monday-night-soccer-hub.firebaseapp.com",
        projectId: "monday-night-soccer-hub",
        storageBucket: "monday-night-soccer-hub.firebasestorage.app",
        messagingSenderId: "634335208908",
        appId: "1:634335208908:web:dca705b65fc52de0606969"
    };
    
    let db = null, firebaseReady = false;
    try { 
        firebase.initializeApp(firebaseConfig); 
        db = firebase.firestore(); 
        firebaseReady = true; 
        console.log("✅ Firebase connected");
    } catch(e) { console.warn("⚠️ Offline mode", e); }
    
    // Master Player List
    const FIXED_PLAYERS_LIST = [
        "Alex Rowe", "Ali Mekawy", "Carlo Pavia", "Charlie Pavia", "Chris Del Monaco", 
        "Chris Margelis", "Chris Sophocli", "Danny Sammartino", "Dante Sammartino", 
        "David", "Dimitri", "Enzo", "Farid", "Faros", "Frank Marcaccio", 
        "George Babatsikos", "George Theodoropoulos", "Ivan", "James Zoumis", 
        "James Martino", "Joe Trimboli", "Joseph", "Kiarash Piani", "Leo", "Manoli", 
        "Marco Mercuri", "Mario", "Morris Del Monte", "Nector Laskaris", "Paul Hardalas", 
        "Perri Theodorlis", "Peter Disensi", "Ralph Risoli", "Rocco Mammoliti", 
        "Paul Salustro", "Stevan Brankovic", "Theo", "Tony El Hajj", "Vasilis"
    ].sort();
    
    // Default Rules
    const DEFAULT_RULES = [
        "⏰ Kickoff: 8:00pm SHARP at Clifton Park",
        "👑 Captain rotates weekly - responsible for team selection",
        "✅ RSVP mandatory by Sunday 6pm",
        "🎭 Guests welcome! Must be added by a player",
        "👕 Bring white and dark shirts",
        "⚽ 7-a-side, 45 minute halves",
        "📝 Match reports generated automatically after each game",
        "📱 Share team sheets and reports via WhatsApp"
    ];
    
    let players = [...FIXED_PLAYERS_LIST];
    let playerProfiles = {};
    let teamAssignments = {};
    let matchResults = {};
    let attendance = [];
    let guests = [];
    let matchComments = [];
    let rules = [...DEFAULT_RULES];
    let isAdminLoggedIn = false;
    let currentUser = null;
    let weeklyCaptain = "Football Freedom";
    let timerInterval = null, currentHalf = 1, timeLeft = 45 * 60;
    let chatUnsubscribe = null;
    let weatherData = { temp: "18°C", condition: "Clear", icon: "fa-sun", rainChance: 10 };
    
    // Helper Functions
    function getMondayDate(date) { const d = new Date(date); const day = d.getDay(); const diff = (day === 0 ? -6 : 1) - day; d.setDate(d.getDate() + diff); d.setHours(20,0,0,0); return d; }
    function getNextMondayGame() { const today = new Date(); let next = getMondayDate(today); if(next < today) next.setDate(next.getDate() + 7); return next; }
    function getCurrentGameWeekStr(){ return getNextMondayGame().toISOString().split('T')[0]; }
    function getCurrentGameLabel(){ const m = getNextMondayGame(); return `Mon ${m.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}`; }
    function getAllGameWeeks() { const weeks=[]; const today=new Date(); let start=new Date(today); start.setFullYear(today.getFullYear()-1); let current=getMondayDate(start); const end=getMondayDate(today); while(current<=end){ weeks.push({dateStr:current.toISOString().split('T')[0], label:`Mon ${current.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}`}); current.setDate(current.getDate()+7); } weeks.sort((a,b)=>b.dateStr.localeCompare(a.dateStr)); return weeks; }
    const ALL_WEEKS = getAllGameWeeks();
    const CURRENT_GAME_STR = getCurrentGameWeekStr();
    function getPastWeeks(){ return ALL_WEEKS.filter(w => w.dateStr < CURRENT_GAME_STR); }
    function getAllParticipants(gameDate){ const playersIn = attendance.filter(a => a.gameDate === gameDate && a.status === 'in').map(a => a.player); const guestsIn = guests.filter(g => g.gameDate === gameDate).map(g => ({ name: g.guestName, addedBy: g.addedBy })); return { players: playersIn, guests: guestsIn }; }
    function escapeHtml(s){ return String(s).replace(/[&<>]/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function getInitials(n){ return n.split(' ').map(x=>x[0]).join('').toUpperCase().substring(0,2); }
    function getAvatarColor(n){ const c=['#1a73e8','#28a745','#dc3545','#fd7e14','#6f42c1','#20c997']; let h=0; for(let i=0;i<n.length;i++) h=((h<<5)-h)+n.charCodeAt(i); return c[Math.abs(h)%c.length]; }
    function renderAvatar(n,s=48){ return `<div class="profile-avatar" style="background:${getAvatarColor(n)};width:${s}px;height:${s}px;font-size:${s/2.5}px;">${getInitials(n)}</div>`; }
    function renderMiniAvatar(n,s=28){ return `<div class="player-avatar-small" style="background:${getAvatarColor(n)};width:${s}px;height:${s}px;font-size:${s/2}px;">${getInitials(n)}</div>`; }
    function formatTime(s){ return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
    function updateTimerDisplay(){ let d=document.getElementById("timerDisplay"); if(d) d.textContent=formatTime(timeLeft); let hs=document.getElementById("currentHalf"); if(hs) hs.textContent=currentHalf===1?"FIRST HALF":"SECOND HALF"; }
    function startTimer(){ if(timerInterval) clearInterval(timerInterval); timerInterval = setInterval(()=>{ if(timeLeft<=0){ clearInterval(timerInterval); if(currentHalf===1){ alert("🔔 HALF TIME!"); currentHalf=2; timeLeft=45*60; updateTimerDisplay(); startTimer(); } else alert("🔔 FULL TIME!"); } else { timeLeft--; updateTimerDisplay(); } },1000); }
    function pauseTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } }
    function resetTimer(){ pauseTimer(); currentHalf=1; timeLeft=45*60; updateTimerDisplay(); }
    
    // Firebase Operations
    async function saveAttendance(a){ if(firebaseReady&&db) await db.collection("attendance").doc(`${a.player}_${a.gameDate}`).set(a); const idx=attendance.findIndex(x=>x.player===a.player&&x.gameDate===a.gameDate); if(idx!==-1) attendance[idx]=a; else attendance.push(a); refreshAll(); }
    async function saveGuest(g){ if(firebaseReady&&db) await db.collection("guests").doc(`${g.guestName}_${g.gameDate}`).set(g); guests.push(g); refreshAll(); }
    async function saveTeamAssignments(date,assign){ teamAssignments[date]=assign; if(firebaseReady&&db) await db.collection("config").doc("teamAssignments").set(teamAssignments); refreshAll(); }
    async function saveMatchResult(date,yellow,orange,goals,assists,mvp,injuries){ matchResults[date]={ yellowScore:yellow, orangeScore:orange, goals, assists:assists||{}, mvp, injuries:injuries||[], timestamp:Date.now() }; if(firebaseReady&&db) await db.collection("config").doc("matchResults").set(matchResults); refreshAll(); alert("✅ Match saved!"); }
    async function saveRulesToFirebase(){ if(firebaseReady&&db) await db.collection("config").doc("rules").set({ rulesList: rules, lastUpdated: Date.now(), updatedBy: currentUser?.name }); }
    
    async function addGuestToWeek(guestName, gameDate){ 
        if(!currentUser) return alert("Login to add a guest");
        if(guests.some(g=>g.gameDate===gameDate && g.guestName===guestName.trim())){ alert("Guest already added"); return false; }
        await saveGuest({ guestName:guestName.trim(), gameDate, addedBy:currentUser.name, timestamp:Date.now() });
        alert(`✅ Guest "${guestName}" added!`);
        return true;
    }
    
    async function setAttendance(status){ if(!currentUser){ alert("Login required"); return; } await saveAttendance({ player:currentUser.name, gameDate:CURRENT_GAME_STR, status }); }
    
    async function addPlayerToWeek(playerName, gameDate){ 
        if(!isAdminLoggedIn) return false;
        if(attendance.some(a=>a.player===playerName && a.gameDate===gameDate)){ alert("Already added"); return false; }
        await saveAttendance({ player:playerName, gameDate, status:'in' });
        refreshAll();
        return true;
    }
    
    async function removePlayerFromWeek(playerName, gameDate){ 
        if(!isAdminLoggedIn && currentUser?.name !== playerName) return false;
        if(!confirm(`Remove ${playerName}?`)) return false;
        if(firebaseReady&&db) await db.collection("attendance").doc(`${playerName}_${gameDate}`).delete();
        attendance = attendance.filter(a=>!(a.player===playerName && a.gameDate===gameDate));
        refreshAll();
        return true;
    }
    
    async function loadData(){
        if(!firebaseReady||!db) return;
        try{
            const [profDoc,tDoc,rDoc,attSnap,guestSnap,rulesDoc] = await Promise.all([
                db.collection("config").doc("playerProfiles").get(),
                db.collection("config").doc("teamAssignments").get(),
                db.collection("config").doc("matchResults").get(),
                db.collection("attendance").get(),
                db.collection("guests").get(),
                db.collection("config").doc("rules").get()
            ]);
            if(profDoc.exists) playerProfiles = profDoc.data();
            if(tDoc.exists) teamAssignments = tDoc.data();
            if(rDoc.exists) matchResults = rDoc.data();
            attendance = attSnap.docs.map(d=>d.data());
            guests = guestSnap.docs.map(d=>d.data());
            if(rulesDoc.exists && rulesDoc.data().rulesList) rules = rulesDoc.data().rulesList;
            else { rules = [...DEFAULT_RULES]; await saveRulesToFirebase(); }
            for(let p of players) if(!playerProfiles[p]) playerProfiles[p] = { age:'—', position:'Midfielder', yearJoined:'2024', gamesPlayed:0, openingBalanceGames:0 };
            refreshAll();
            fetchWeather();
        } catch(e){ console.warn(e); }
    }
    
    async function fetchWeather(){
        try{
            const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=-37.77&longitude=144.97&hourly=temperature_2m,precipitation_probability,weathercode&timezone=Australia/Melbourne&forecast_days=7');
            const d=await r.json();
            for(let i=0;i<d.hourly.time.length;i++){
                if(d.hourly.time[i].split('T')[0]===CURRENT_GAME_STR && parseInt(d.hourly.time[i].split('T')[1].substring(0,2))===20){
                    const t=Math.round(d.hourly.temperature_2m[i]);
                    const code=d.hourly.weathercode[i];
                    let cond="Clear", icon="fa-sun";
                    if(code===0){ cond="Clear"; icon="fa-sun"; }
                    else if(code===1||code===2){ cond="Partly cloudy"; icon="fa-cloud-sun"; }
                    else if(code===3){ cond="Overcast"; icon="fa-cloud"; }
                    else if(code>=51&&code<=67){ cond="Light rain"; icon="fa-cloud-rain"; }
                    weatherData = { temp:`${t}°C`, condition:cond, icon, rainChance:d.hourly.precipitation_probability[i]||0 };
                    break;
                }
            }
        } catch(e){}
        renderWeatherPage();
    }
    
    function refreshAll(){ 
        renderHomePage(); renderTeamsPage(); renderHistoryPage(); renderProfilesPage(); 
        renderScoreboardPage(); renderTimerPage(); renderChatPage(); renderWeatherPage(); 
        renderRulesPage(); if(isAdminLoggedIn) renderAdminPage(); 
    }
    
    // ==================== RENDER FUNCTIONS ====================
    function renderHomePage(){
        const c=document.getElementById("homeContainer"); if(!c) return;
        const gl=getCurrentGameLabel();
        const status=attendance.find(a=>a.gameDate===CURRENT_GAME_STR && a.player===currentUser?.name)?.status;
        const parts=getAllParticipants(CURRENT_GAME_STR);
        c.innerHTML=`
            <div class="info-bar"><i class="fas fa-calendar-alt"></i> Next Match: ${gl} • 8:00pm Clifton Park</div>
            <div class="attendance-card"><h2>${gl}</h2><div>Clifton Park, Brunswick</div>
            <div class="big-buttons"><button id="homePlayBtn" class="btn-play-big">✅ I'M PLAYING</button><button id="homeSitBtn" class="btn-sit-big">❌ CAN'T PLAY</button></div>
            <div>${status==='in'?'✓ You are PLAYING':(status==='out'?'✗ You are NOT PLAYING':'Tap above to set attendance')}</div></div>
            <div class="playing-list"><div>🟢 Players (${parts.players.length})</div><div>${parts.players.map(p=>`<span class="attendee-tag">${renderMiniAvatar(p)} ${escapeHtml(p)} ${(isAdminLoggedIn||currentUser?.name===p)?`<button class="remove-attendee-btn" data-player="${escapeHtml(p)}" data-date="${CURRENT_GAME_STR}"><i class="fas fa-trash-alt"></i></button>`:''}</span>`).join('')||'None'}</div></div>
            <div class="guest-section"><div>🎭 Guests (${parts.guests.length})</div><div>${parts.guests.map(g=>`<span class="guest-tag">${renderMiniAvatar(g.name)} ${escapeHtml(g.name)} <small>(${escapeHtml(g.addedBy)})</small></span>`).join('')||'None'}</div>
            <div style="margin-top:12px;"><input id="guestNameHome" placeholder="Guest name"><button id="addGuestHomeBtn">➕ Bring a Guest</button></div></div>
        `;
        document.getElementById("homePlayBtn")?.addEventListener("click",()=>setAttendance("in"));
        document.getElementById("homeSitBtn")?.addEventListener("click",()=>setAttendance("out"));
        document.getElementById("addGuestHomeBtn")?.addEventListener("click",()=>{ const val=document.getElementById("guestNameHome")?.value.trim(); if(val) addGuestToWeek(val, CURRENT_GAME_STR); else alert("Enter guest name"); });

    function renderScoreboardPage(){
        const c=document.getElementById("page-scoreboard"); if(!c) return;
        let stats=new Map();
        for(let p of players) stats.set(p,{goals:0,assists:0,gamesPlayed:0});
        attendance.forEach(a=>{ if(a.status==='in' && stats.has(a.player)) stats.get(a.player).gamesPlayed++; });
        for(let p of players){ const opening=playerProfiles[p]?.openingBalanceGames||0; if(stats.has(p)) stats.get(p).gamesPlayed+=opening; }
        for(let match of Object.values(matchResults)){
            if(match.goals) for(let [scorer,cnt] of Object.entries(match.goals)) if(stats.has(scorer)) stats.get(scorer).goals+=cnt;
            if(match.assists) for(let [assister,cnt] of Object.entries(match.assists)) if(stats.has(assister)) stats.get(assister).assists+=cnt;
        }
        const arr=Array.from(stats.entries()).map(([n,s])=>({name:n,goals:s.goals,games:s.gamesPlayed,assists:s.assists})).sort((a,b)=>b.goals-a.goals);
        c.innerHTML=`<div class="card"><h2>🏆 ALL-TIME LEADERBOARD</h2><div><h3>⚽ TOP GOAL SCORERS</h3><table class="data-table"><thead><tr><th>#</th><th>Player</th><th>Goals</th></tr></thead><tbody>${arr.slice(0,10).map((p,i)=>`<tr><td>${i+1}</td><td>${renderMiniAvatar(p.name)} ${escapeHtml(p.name)}</td><td><strong>${p.goals}</strong></td></tr>`).join('')}</tbody></table></div></div>`;

                    <button id="autoBalanceBtn" style="background:#6c757d;">⚖️ Auto-Balance</button>
                    <button id="saveTeamsBtn" style="background:#28a745;">💾 Save Teams</button>
                </div>
            </div>
        `;
        
        function refreshTeamUI(){
            const yellow=[], orange=[], unassigned=[];
            for(let person of allPeople){
                if(currentAssign[person] === "yellow") yellow.push(person);
                else if(currentAssign[person] === "orange") orange.push(person);
                else unassigned.push(person);
            }
            document.getElementById("yellowTeamList").innerHTML = yellow.map(p => `<div class="team-assign-pill">${renderMiniAvatar(p)} ${escapeHtml(p)} <button class="removeFromTeamBtn" data-player="${escapeHtml(p)}" style="background:#dc3545; margin-left:6px;">✖</button></div>`).join('') || '—';
            document.getElementById("orangeTeamList").innerHTML = orange.map(p => `<div class="team-assign-pill">${renderMiniAvatar(p)} ${escapeHtml(p)} <button class="removeFromTeamBtn" data-player="${escapeHtml(p)}" style="background:#dc3545; margin-left:6px;">✖</button></div>`).join('') || '—';
            document.getElementById("unassignedList").innerHTML = unassigned.map(p => `<div class="team-assign-pill">${renderMiniAvatar(p)} ${escapeHtml(p)} <button class="assignYellowBtn" data-player="${escapeHtml(p)}" style="background:#ffc107;">🟡</button> <button class="assignOrangeBtn" data-player="${escapeHtml(p)}" style="background:#fd7e14;">🟠</button></div>`).join('') || '✅ All assigned!';
            
            document.querySelectorAll(".assignYellowBtn").forEach(btn => btn.onclick = () => { currentAssign[btn.dataset.player] = "yellow"; refreshTeamUI(); });
            document.querySelectorAll(".assignOrangeBtn").forEach(btn => btn.onclick = () => { currentAssign[btn.dataset.player] = "orange"; refreshTeamUI(); });
            document.querySelectorAll(".removeFromTeamBtn").forEach(btn => btn.onclick = () => { delete currentAssign[btn.dataset.player]; refreshTeamUI(); });
        }
        
        document.getElementById("autoBalanceBtn")?.addEventListener("click", () => {
            const shuffled = [...allPeople];
            for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }
            const half = Math.ceil(shuffled.length/2);
            const newAssign = {};
            shuffled.forEach((p,idx) => { newAssign[p] = idx < half ? "yellow" : "orange"; });
            Object.assign(currentAssign, newAssign);
            refreshTeamUI();
        });
        
        document.getElementById("saveTeamsBtn")?.addEventListener("click", async () => {
            await saveTeamAssignments(week, currentAssign);
            alert(`✅ Teams saved for ${week}!`);
            renderTeamsPage();
        });
        
        refreshTeamUI();
    }
    
    // ==================== LOGIN MODAL ====================
    function showLoginModal(){
        const modal = document.createElement('div'); modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <div style="text-align:center"><i class="fas fa-futbol fa-3x" style="color:#1a73e8;"></i></div>
                <h3 style="text-align:center;">Monday Night Soccer</h3>
                <select id="loginSelect"><option value="">Select your name</option>${FIXED_PLAYERS_LIST.map(p=>`<option>${escapeHtml(p)}</option>`).join('')}</select>
                <button id="doLoginBtn" style="width:100%;">Login</button>
                <div class="info-bar" style="margin-top:12px; font-size:10px;">
                    <i class="fas fa-shield-alt"></i> Admin access requires separate credentials
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById("doLoginBtn").onclick = () => {
            const val = document.getElementById("loginSelect").value;
            if(val && FIXED_PLAYERS_LIST.includes(val)){
                currentUser = { name: val };
                isAdminLoggedIn = false;
                modal.remove();
                document.getElementById("userNameDisplay").innerText = val;
                document.getElementById("logoutBtn").style.display = "inline-block";
                refreshAll();
            } else { alert("Select valid player"); }
        };
    }
    
    function logout(){
        currentUser = null;
        isAdminLoggedIn = false;
        document.getElementById("userNameDisplay").innerText = "Not logged in";
        document.getElementById("logoutBtn").style.display = "none";
        showLoginModal();
        refreshAll();
    }
    
    // ==================== INITIALIZE ====================
    function initApp(){
        const appDiv = document.getElementById("app");
        appDiv.innerHTML = `
            <div class="header"><div class="logo-icon"><i class="fas fa-futbol"></i></div><h1>MONDAY NIGHT SOCCER</h1><div class="user-row"><span id="userNameDisplay">Not logged in</span><button id="logoutBtn" style="display:none;">Logout</button></div></div>
            <div class="top-nav"><button class="nav-module active" data-module="home">🏠 Home</button><button class="nav-module" data-module="teamswk">⚽ Teams</button><button class="nav-module" data-module="history">📖 History</button><button class="nav-module" data-module="scoreboard">🏆 Stats</button><button class="nav-module" data-module="profiles">👤 Profiles</button><button class="nav-module" data-module="timer">⏱️ Timer</button><button class="nav-module" data-module="chat">💬 Chat</button><button class="nav-module" data-module="weather">🌤️ Weather</button><button class="nav-module" data-module="rules">📜 Rules</button><button class="nav-module" data-module="admin">🔧 Admin</button></div>
            <div id="homeContainer" class="module-container active-module"></div><div id="page-teamswk" class="module-container"></div><div id="page-history" class="module-container"></div><div id="page-scoreboard" class="module-container"></div><div id="page-profiles" class="module-container"></div><div id="page-timer" class="module-container"></div><div id="page-chat" class="module-container"></div><div id="page-weather" class="module-container"></div><div id="page-rules" class="module-container"></div><div id="page-admin" class="module-container"></div>
        `;
        
        document.querySelectorAll(".nav-module").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".nav-module").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                const mod = btn.dataset.module;
                document.querySelectorAll(".module-container").forEach(c => c.classList.remove("active-module"));
                document.getElementById(mod === "home" ? "homeContainer" : `page-${mod}`).classList.add("active-module");
                if(mod === "chat") renderChatPage();
                if(mod === "timer") renderTimerPage();
                if(mod === "weather") renderWeatherPage();
                if(mod === "rules") renderRulesPage();
            });
        });
        
        document.getElementById("logoutBtn").onclick = logout;
        if(firebaseReady) loadData().then(() => showLoginModal());
        else { showLoginModal(); refreshAll(); fetchWeather(); }
    }
    
    initApp();
</script>
</body>
</html>
