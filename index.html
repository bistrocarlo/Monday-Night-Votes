<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Monday Night Soccer – Complete Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: linear-gradient(135deg, #f0f2f5 0%, #e0e5ec 100%); font-family: 'Inter', sans-serif; padding: 20px; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { font-family: 'Poppins', sans-serif; font-size: 2.8rem; font-weight: 900; background: linear-gradient(135deg, #cc0000, #ff4444, #cc0000); background-size: 200% auto; background-clip: text; -webkit-background-clip: text; color: transparent; text-shadow: 2px 2px 0 rgba(0,0,0,0.05); }
        .tabs { display: flex; gap: 15px; justify-content: center; margin-bottom: 32px; flex-wrap: wrap; }
        .tab-btn { background: white; border: none; padding: 12px 28px; border-radius: 60px; font-weight: 700; cursor: pointer; color: #cc0000; font-size: 0.9rem; min-width: 130px; text-align: center; box-shadow: 0 5px 0 #999; transition: all 0.08s linear; font-family: 'Poppins', sans-serif; }
        .tab-btn.active { background: #cc0000; color: white; box-shadow: 0 5px 0 #8b0000; }
        .tab-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #666; }
        .panel { display: none; animation: fade 0.2s; }
        .panel.active-panel { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .card { background: white; border-radius: 28px; padding: 24px; margin-bottom: 28px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .card h2, .card h3 { font-family: 'Poppins', sans-serif; font-weight: 700; margin-bottom: 18px; color: #cc0000; border-left: 5px solid #cc0000; padding-left: 16px; }
        label { font-weight: 600; display: block; margin-top: 16px; margin-bottom: 8px; color: #333; }
        select, input, button, textarea { padding: 12px 18px; border-radius: 60px; border: 1px solid #ddd; font-size: 0.95rem; background: white; width: 100%; margin: 6px 0; font-family: 'Inter', sans-serif; }
        button { background: #cc0000; color: white; font-weight: 700; border: none; cursor: pointer; width: auto; min-width: 160px; padding: 12px 28px; box-shadow: 0 5px 0 #8b0000; transition: all 0.08s linear; font-family: 'Poppins', sans-serif; }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #8b0000; }
        button:hover { background: #dd2222; }
        .login-card { max-width: 420px; margin: 60px auto; background: white; border-radius: 48px; padding: 40px 32px; text-align: center; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2); }
        .pitch { background: linear-gradient(145deg, #2e7d32, #1b5e20); border-radius: 32px; border: 3px solid white; padding: 20px; position: relative; box-shadow: 0 0 0 3px #cc0000; }
        .pitch::before { content: ""; position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: white; transform: translateX(-50%); opacity: 0.7; }
        .pitch::after { content: ""; position: absolute; top: 50%; left: 50%; width: 70px; height: 70px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.7; }
        .teams-row { display: flex; flex-wrap: wrap; gap: 20px; position: relative; z-index: 2; }
        .team-box { flex: 1; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); border-radius: 24px; padding: 16px; color: white; }
        .team-title { font-size: 1.4rem; font-weight: 800; text-align: center; margin-bottom: 12px; font-family: 'Poppins', sans-serif; }
        .yellow-title { color: #ffea00; }
        .orange-title { color: #ff9800; }
        .player-list { display: flex; flex-direction: column; gap: 8px; max-height: 350px; overflow-y: auto; }
        .player-badge { background: rgba(0,0,0,0.7); border-radius: 40px; padding: 8px 12px; text-align: center; font-size: 0.85rem; }
        .match-result { margin-top: 16px; text-align: center; background: rgba(0,0,0,0.7); border-radius: 40px; padding: 10px; color: white; font-weight: 600; }
        .alert { background: #ffe6e6; border-left: 4px solid #cc0000; padding: 12px 18px; border-radius: 40px; margin: 12px 0; color: #990000; }
        .goal-row { background: #f9f9f9; border-radius: 60px; padding: 12px 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .count-box { background: #2c3e50; color: white; border-radius: 40px; padding: 12px 20px; display: inline-block; margin: 8px; min-width: 150px; text-align: center; box-shadow: 0 4px 0 #1a2a3a; }
        .count-number { font-size: 1.6rem; font-weight: 800; }
        footer { text-align: center; margin-top: 40px; font-size: 0.75rem; color: #777; }
        .flex-btns { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; justify-content: center; }
        .attending-in { background: #2e7d5e; color: white; box-shadow: 0 4px 0 #1a4a3a; }
        .attending-out { background: #cc0000; color: white; box-shadow: 0 4px 0 #8b0000; }
        .payment-table, .attendance-table, .topscorer-table, .pastgames-table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; margin-top: 12px; }
        .payment-table th, .payment-table td, .attendance-table th, .attendance-table td, .topscorer-table th, .topscorer-table td, .pastgames-table th, .pastgames-table td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .payment-table th, .attendance-table th, .topscorer-table th, .pastgames-table th { background: #fafafa; color: #cc0000; font-weight: 700; }
        .chat-container { background: #f5f5f5; border-radius: 24px; overflow: hidden; margin-top: 16px; display: flex; flex-direction: column; height: 500px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #e5ddd5; }
        .chat-message { display: flex; flex-direction: column; max-width: 70%; }
        .chat-message.sent { align-self: flex-end; }
        .chat-message.received { align-self: flex-start; }
        .chat-bubble { padding: 10px 14px; border-radius: 18px; word-wrap: break-word; }
        .chat-message.sent .chat-bubble { background: #dcf8c5; color: #1a1a1a; border-bottom-right-radius: 4px; }
        .chat-message.received .chat-bubble { background: white; color: #1a1a1a; border-bottom-left-radius: 4px; }
        .chat-name { font-weight: 700; font-size: 0.8rem; margin-bottom: 4px; color: #cc0000; }
        .chat-time { font-size: 0.65rem; color: #888; margin-top: 4px; text-align: right; }
        .chat-footer { padding: 12px 16px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 12px; align-items: center; }
        .chat-footer input { flex: 1; margin: 0; border-radius: 30px; background: #fafafa; }
        .chat-footer button { min-width: 80px; margin: 0; }
        .like-btn { background: none; border: none; cursor: pointer; font-size: 0.9rem; padding: 0 4px; margin-left: 8px; box-shadow: none; min-width: auto; color: #888; }
        .like-btn:hover { transform: scale(1.1); background: none; }
        .like-btn.active { color: #cc0000; }
        .like-count { font-size: 0.7rem; margin-left: 2px; color: #666; }
        @media (max-width: 700px) { .teams-row { flex-direction: column; } .chat-message { max-width: 85%; } .chat-container { height: 450px; } }
    </style>
</head>
<body>
<div class="container" id="appContainer"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCWlFqDJyENgrUOhiLXCjSEi4Mk_54SA1w",
        authDomain: "monday-night-soccer-hub.firebaseapp.com",
        projectId: "monday-night-soccer-hub",
        storageBucket: "monday-night-soccer-hub.firebasestorage.app",
        messagingSenderId: "634335208908",
        appId: "1:634335208908:web:dca705b65fc52de0606969"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const FULL_PLAYER_LIST = [
        "Alex Rowe", "Ali Mekawy", "Carlo", "Charlie", "Chris Del Monaco", "Chris M", "Chris S", "Danny", "Dante", "David", "Dimitri",
        "Enzo", "Farid", "Faros", "Frank", "George B", "George T", "Ivan", "James Zoumis", "James", "Joe T", "Joey",
        "Kia", "Leo", "Manoli", "Marco", "Mario", "Maurice", "Nector", "Paul", "Perri", "Peter", "Ralph", "Rocco",
        "Stav", "Stevan", "Theo", "Tony EH", "Vasilis"
    ].sort();

    function getCurrentAESTDate() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        return new Date(utc + (10 * 3600000)).toISOString().split('T')[0];
    }
    function generateAllGameWeeks() {
        const year = new Date().getFullYear();
        let start = new Date(year, 1, 1);
        while (start.getDay() !== 1) start.setDate(start.getDate() + 1);
        let dec31 = new Date(year, 11, 31);
        let lastMonday = new Date(dec31);
        while (lastMonday.getDay() !== 1) lastMonday.setDate(lastMonday.getDate() - 1);
        let secondLast = new Date(lastMonday);
        secondLast.setDate(secondLast.getDate() - 7);
        let weeks = [], cur = new Date(start);
        while (cur <= secondLast) {
            weeks.push({ dateStr: cur.toISOString().split('T')[0], label: `Monday ${cur.toLocaleDateString('en-AU', { day:'numeric', month:'short' })}` });
            cur.setDate(cur.getDate() + 7);
        }
        return weeks;
    }
    const ALL_GAME_WEEKS = generateAllGameWeeks();
    function getFutureWeeks() { return ALL_GAME_WEEKS.filter(w => w.dateStr >= getCurrentAESTDate()); }
    function getPastWeeks() { return ALL_GAME_WEEKS.filter(w => w.dateStr < getCurrentAESTDate()); }

    let teamAssignments = {}, matchResults = {}, payments = [], attendance = [];
    let isAdminLoggedIn = false, currentUser = null;

    const teamsRef = db.collection("config").doc("teamAssignments");
    const resultsRef = db.collection("config").doc("matchResults");
    const paymentsRef = db.collection("payments");
    const attendanceRef = db.collection("attendance");
    const messagesRef = db.collection("messages");

    async function loadData() {
        const teamsDoc = await teamsRef.get();
        teamAssignments = teamsDoc.exists ? teamsDoc.data() : {};
        const resultsDoc = await resultsRef.get();
        matchResults = resultsDoc.exists ? resultsDoc.data() : {};
        const paymentsSnap = await paymentsRef.get();
        payments = []; paymentsSnap.forEach(doc => payments.push(doc.data()));
        const attendanceSnap = await attendanceRef.get();
        attendance = []; attendanceSnap.forEach(doc => attendance.push(doc.data()));
    }
    async function saveTeams() { await teamsRef.set(teamAssignments); }
    async function saveResults() { await resultsRef.set(matchResults); }
    async function savePayment(p) { await paymentsRef.doc(`${p.player}_${p.gameDate}`).set(p); }
    async function saveAttendance(a) { await attendanceRef.doc(`${a.player}_${a.gameDate}`).set(a); }

    function loginAsPlayer(name) {
        currentUser = { name, role: "player" };
        isAdminLoggedIn = false;
        localStorage.setItem("soccer_user", JSON.stringify(currentUser));
        renderMainApp();
    }
    function adminLogin(password) {
        if (password === "admin123") {
            currentUser = { name: "admin", role: "admin" };
            isAdminLoggedIn = true;
            localStorage.setItem("soccer_user", JSON.stringify(currentUser));
            renderMainApp();
            return true;
        }
        return false;
    }
    function logout() {
        currentUser = null;
        isAdminLoggedIn = false;
        localStorage.removeItem("soccer_user");
        renderLoginScreen();
    }

    async function renderLoginScreen() {
        await loadData();
        document.getElementById("appContainer").innerHTML = `
            <div class="login-card">
                <h1 style="font-family:'Poppins'; font-size:2rem; color:#cc0000;">★ MONDAY NIGHT SOCCER ★</h1>
                <p style="margin-bottom:24px;">Select your name or login as admin</p>
                <label>👤 YOUR NAME</label>
                <select id="playerNameSelect">
                    <option value="">-- Select your name --</option>
                    ${FULL_PLAYER_LIST.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}
                </select>
                <button id="playerLoginBtn">Enter as Player</button>
                <hr style="margin: 24px 0;">
                <label>🔐 ADMIN LOGIN</label>
                <input type="password" id="adminPassword" placeholder="Admin password">
                <button id="adminLoginBtn">Admin Login</button>
                <div id="loginError" class="alert" style="display:none;"></div>
            </div>
        `;
        document.getElementById("playerLoginBtn").onclick = () => {
            const name = document.getElementById("playerNameSelect").value;
            if (!name) { document.getElementById("loginError").innerText = "Please select your name"; document.getElementById("loginError").style.display = "block"; return; }
            loginAsPlayer(name);
        };
        document.getElementById("adminLoginBtn").onclick = () => {
            const ok = adminLogin(document.getElementById("adminPassword").value);
            if (!ok) { document.getElementById("loginError").innerText = "Wrong admin password"; document.getElementById("loginError").style.display = "block"; }
        };
    }

    async function renderMainApp() {
        await loadData();
        const container = document.getElementById("appContainer");
        container.innerHTML = `
            <div class="header">
                <h1>⚽ MONDAY NIGHT SOCCER ⚽</h1>
                <p>${currentUser.role === "admin" ? "ADMIN MODE" : "Player: " + currentUser.name}</p>
                <button id="logoutBtn" style="margin-top:12px; background:#cc0000; padding:8px 20px;">Logout</button>
            </div>
            <div class="tabs" id="tabs"></div>
            <div id="panelContainer"></div>
            <footer>⚡ Live sync via Firebase</footer>
        `;
        document.getElementById("logoutBtn").onclick = logout;

        const tabs = [{ id: "attendance", label: "📋 ATTENDANCE" }, { id: "chat", label: "💬 LIVE CHAT" }, { id: "pastgames", label: "📆 PAST GAMES" }, { id: "topscorer", label: "⚽ TOP SCORER" }, { id: "rules", label: "📜 RULES" }];
        if (isAdminLoggedIn) tabs.push({ id: "admin", label: "👑 ADMIN" });
        document.getElementById("tabs").innerHTML = tabs.map(t => `<button class="tab-btn" data-tab="${t.id}">${t.label}</button>`).join('');
        document.getElementById("panelContainer").innerHTML = tabs.map(t => `<div id="${t.id}Panel" class="panel"></div>`).join('');
        document.getElementById("attendancePanel").classList.add("active-panel");
        document.querySelector(".tab-btn").classList.add("active");

        renderAttendancePanel();
        renderChatPanel();
        renderPastGamesPanel();
        renderTopScorerPanel();
        renderRulesPanel();
        if (isAdminLoggedIn) renderAdminPanel();

        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(".panel").forEach(p => p.classList.remove("active-panel"));
                document.getElementById(`${btn.dataset.tab}Panel`).classList.add("active-panel");
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                if (btn.dataset.tab === "attendance") renderAttendancePanel();
                if (btn.dataset.tab === "chat") renderChatPanel();
                if (btn.dataset.tab === "pastgames") renderPastGamesPanel();
                if (btn.dataset.tab === "topscorer") renderTopScorerPanel();
                if (btn.dataset.tab === "admin" && isAdminLoggedIn) renderAdminPanel();
            };
        });
    }

    // ========== ATTENDANCE PANEL ==========
    function renderAttendancePanel() {
        const weeks = getFutureWeeks();
        if (!weeks.length) { document.getElementById("attendancePanel").innerHTML = `<div class="card"><div class="alert">No upcoming weeks.</div></div>`; return; }
        document.getElementById("attendancePanel").innerHTML = `
            <div class="card">
                <h2>📅 MARK YOUR ATTENDANCE</h2>
                <label>📅 GAME WEEK</label>
                <select id="attWeekSelect">${weeks.map(w => `<option value="${w.dateStr}">${w.label}</option>`).join('')}</select>
                <label>👤 YOUR NAME</label>
                <select id="attPlayerSelect"></select>
                <div class="flex-btns"><button id="attendingBtn" class="attending-in">✅ I AM ATTENDING</button><button id="notAttendingBtn" class="attending-out">❌ I AM NOT ATTENDING</button><button id="addGuestBtn">➕ ADD GUEST</button></div>
                <div id="attMsg" class="alert" style="display:none;"></div>
            </div>
            <div class="card"><h2>📊 ATTENDANCE COUNTS</h2><div id="attCounts"></div></div>
            <div class="card"><h2>🏟️ THIS WEEK'S PITCH & TEAMS</h2><select id="pitchWeekSelect">${weeks.map(w => `<option value="${w.dateStr}">${w.label}</option>`).join('')}</select>
                <div class="pitch"><div class="teams-row"><div class="team-box"><div class="team-title yellow-title">🟡 YELLOW</div><div class="player-list" id="yellowList"></div></div><div class="team-box"><div class="team-title orange-title">🟠 ORANGE</div><div class="player-list" id="orangeList"></div></div></div><div class="match-result" id="matchResultDisplay"></div></div>
            </div>
        `;
        document.getElementById("attPlayerSelect").innerHTML = '<option value="">-- Select your name --</option>' + FULL_PLAYER_LIST.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
        document.getElementById("attWeekSelect").onchange = () => renderAttendanceCounts();
        document.getElementById("attendingBtn").onclick = () => setAttendance("in");
        document.getElementById("notAttendingBtn").onclick = () => setAttendance("out");
        document.getElementById("addGuestBtn").onclick = addGuest;
        document.getElementById("pitchWeekSelect").onchange = () => renderPitchAndMatch();
        renderAttendanceCounts();
        renderPitchAndMatch();
    }
    async function renderAttendanceCounts() {
        const week = document.getElementById("attWeekSelect")?.value;
        if (!week) return;
        const attending = attendance.filter(a => a.gameDate === week && a.status === 'in').map(a => a.player);
        const notAttending = attendance.filter(a => a.gameDate === week && a.status === 'out').map(a => a.player);
        document.getElementById("attCounts").innerHTML = `<div class="count-box"><div>Attending</div><div class="count-number">${attending.length}</div><div>${attending.join(', ') || 'none'}</div></div><div class="count-box" style="background:#cc0000;"><div>Not attending</div><div class="count-number">${notAttending.length}</div><div>${notAttending.join(', ') || 'none'}</div></div>`;
    }
    async function setAttendance(status) {
        const player = document.getElementById("attPlayerSelect").value;
        const gameDate = document.getElementById("attWeekSelect").value;
        const msgDiv = document.getElementById("attMsg");
        if (!player || !gameDate) { msgDiv.innerHTML = "Select name and week"; msgDiv.style.display = "block"; setTimeout(() => msgDiv.style.display = "none", 2000); return; }
        const existing = attendance.find(a => a.player === player && a.gameDate === gameDate);
        if (existing && existing.status === status) { msgDiv.innerHTML = `Already ${status === 'in' ? 'attending' : 'not attending'}`; msgDiv.style.display = "block"; setTimeout(() => msgDiv.style.display = "none", 2000); return; }
        await saveAttendance({ player, gameDate, status, timestamp: new Date().toISOString() });
        const idx = attendance.findIndex(a => a.player === player && a.gameDate === gameDate);
        if (idx !== -1) attendance[idx] = { player, gameDate, status };
        else attendance.push({ player, gameDate, status });
        msgDiv.innerHTML = `✅ ${player} is ${status === 'in' ? 'attending' : 'NOT attending'}`;
        msgDiv.style.display = "block";
        setTimeout(() => msgDiv.style.display = "none", 2000);
        renderAttendanceCounts();
        if (isAdminLoggedIn) renderAdminAttendanceOverview();
    }
    async function addGuest() {
        const gameDate = document.getElementById("attWeekSelect").value;
        if (!gameDate) { alert("Select a week first"); return; }
        const guestName = prompt("Enter guest name:");
        if (!guestName) return;
        const exists = attendance.find(a => a.player === guestName && a.gameDate === gameDate);
        if (exists) { alert("Guest already added"); return; }
        await saveAttendance({ player: guestName, gameDate, status: "in", timestamp: new Date().toISOString(), guest: true });
        attendance.push({ player: guestName, gameDate, status: "in" });
        renderAttendanceCounts();
        document.getElementById("attMsg").innerHTML = `Guest "${guestName}" added.`;
        setTimeout(() => document.getElementById("attMsg").innerHTML = "", 2000);
    }
    async function renderPitchAndMatch() {
        const gameDate = document.getElementById("pitchWeekSelect")?.value;
        if (!gameDate) return;
        const assignments = teamAssignments[gameDate] || {};
        const yellow = [], orange = [];
        for (let [p, team] of Object.entries(assignments)) { if (team === "yellow") yellow.push(p); else if (team === "orange") orange.push(p); }
        yellow.sort(); orange.sort();
        const match = matchResults[gameDate] || { yellowScore: 0, orangeScore: 0, goals: {} };
        const goalsText = Object.entries(match.goals || {}).filter(([_,g]) => g>0).map(([p,g]) => `${p} (${g})`).join(", ");
        document.getElementById("yellowList").innerHTML = yellow.map(p => `<div class="player-badge">${escapeHtml(p)}</div>`).join('') || "<div class='player-badge'>—</div>";
        document.getElementById("orangeList").innerHTML = orange.map(p => `<div class="player-badge">${escapeHtml(p)}</div>`).join('') || "<div class='player-badge'>—</div>";
        document.getElementById("matchResultDisplay").innerHTML = `<strong>SCORE:</strong> 🟡 ${match.yellowScore} - ${match.orangeScore} 🟠 &nbsp;|&nbsp; ⚽ Goals: ${goalsText || "none"}`;
    }

    // ========== CHAT WITH LIKES ==========
    function renderChatPanel() {
        document.getElementById("chatPanel").innerHTML = `
            <div class="card">
                <h2>💬 LIVE CHAT</h2>
                <div class="chat-container">
                    <div id="chatMessages" class="chat-messages">Loading...</div>
                    <div class="chat-footer">
                        <input type="text" id="chatInput" placeholder="Type a message...">
                        <button id="sendChatBtn">Send</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById("sendChatBtn").onclick = () => sendChatMessage();
        document.getElementById("chatInput").addEventListener("keypress", (e) => { if(e.key === "Enter") sendChatMessage(); });
        listenForMessages();
    }
    async function sendChatMessage() {
        const message = document.getElementById("chatInput").value.trim();
        if (!message) return;
        await messagesRef.add({ name: currentUser.name, message: message, isAdmin: currentUser.role === "admin", likes: [], timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        document.getElementById("chatInput").value = "";
    }
    async function toggleLike(msgId, userId, currentLikes) {
        const newLikes = currentLikes.includes(userId) ? currentLikes.filter(id => id !== userId) : [...currentLikes, userId];
        await messagesRef.doc(msgId).update({ likes: newLikes });
    }
    function listenForMessages() {
        messagesRef.orderBy("timestamp", "asc").onSnapshot(snapshot => {
            const container = document.getElementById("chatMessages");
            if (!container) return;
            let html = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                const time = data.timestamp ? data.timestamp.toDate().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : "";
                const isSent = data.name === currentUser.name;
                const displayName = data.isAdmin ? `${data.name} <span class="admin-tag">ADMIN</span>` : data.name;
                const likes = data.likes || [];
                const userLiked = likes.includes(currentUser.name);
                html += `
                    <div class="chat-message ${isSent ? 'sent' : 'received'}">
                        <div class="chat-bubble">
                            <div class="chat-name">${escapeHtml(displayName)}</div>
                            <div>${escapeHtml(data.message)}</div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
                                <div class="chat-time">${time}</div>
                                <div><button class="like-btn ${userLiked ? 'active' : ''}" data-id="${doc.id}">❤️</button><span class="like-count">${likes.length > 0 ? likes.length : ''}</span></div>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html || "<div class='alert'>No messages yet.</div>";
            document.querySelectorAll(".like-btn").forEach(btn => {
                btn.onclick = () => {
                    const msgId = btn.getAttribute("data-id");
                    const msgDoc = snapshot.docs.find(d => d.id === msgId);
                    if (msgDoc) toggleLike(msgId, currentUser.name, msgDoc.data().likes || []);
                };
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    async function renderPastGamesPanel() {
        const pastWeeks = getPastWeeks().reverse();
        if (!pastWeeks.length) { document.getElementById("pastgamesPanel").innerHTML = `<div class="card"><div class="alert">No past games yet.</div></div>`; return; }
        let html = `<div class="card"><h2>📆 PAST GAMES</h2><table class="pastgames-table"><thead><tr><th>Week</th><th>🟡 Yellow</th><th>🟠 Orange</th><th>Result</th><th>Goal Scorers</th></tr></thead><tbody>`;
        for (let week of pastWeeks) {
            const assignments = teamAssignments[week.dateStr] || {};
            const yellow = Object.keys(assignments).filter(p => assignments[p] === "yellow").sort();
            const orange = Object.keys(assignments).filter(p => assignments[p] === "orange").sort();
            const match = matchResults[week.dateStr] || { yellowScore: 0, orangeScore: 0, goals: {} };
            const goalsText = Object.entries(match.goals || {}).filter(([_,g]) => g>0).map(([p,g]) => `${p} (${g})`).join(", ");
            html += `<tr>}<strong>${week.label}</strong>${yellow.join(', ') || '—'}${orange.join(', ') || '—'}🟡 ${match.yellowScore} - ${match.orangeScore} 🟠${goalsText || '—'}</tr>`;
        }
        html += `</tbody></table></div>`;
        document.getElementById("pastgamesPanel").innerHTML = html;
    }

    async function renderTopScorerPanel() {
        const goals = new Map();
        for (let match of Object.values(matchResults)) {
            if (match.goals) for (let [p, g] of Object.entries(match.goals)) goals.set(p, (goals.get(p) || 0) + g);
        }
        let sorted = Array.from(goals.entries()).map(([n,t]) => ({ name: n, total: t }));
        sorted.sort((a,b) => b.total - a.total);
        if (!sorted.length) { document.getElementById("topscorerPanel").innerHTML = `<div class="card"><div class="alert">No goals recorded yet.</div></div>`; return; }
        document.getElementById("topscorerPanel").innerHTML = `<div class="card"><h2>⚽ TOP GOAL SCORERS</h2><table class="topscorer-table"><thead><tr><th>#</th><th>Player</th><th>Goals</th></tr></thead><tbody>${sorted.map((p,i)=>`<tr><td style="color:#cc0000;">${p.total}?</td></tr>`).join('')}</tbody></table></div>`;
        document.getElementById("topscorerPanel").innerHTML = `<div class="card"><h2>⚽ TOP GOAL SCORERS</h2><table class="topscorer-table"><thead><tr><th>#</th><th>Player</th><th>Goals</th></tr></thead><tbody>${sorted.map((p,i)=>`<tr><td style="color:#cc0000;">${p.total}?</td></tr>`).join('')}</tbody></table></div>`;
    }

    function renderRulesPanel() {
        document.getElementById("rulesPanel").innerHTML = `<div class="card"><h2>📜 RULES</h2><div class="rules-content"><ul><li>Hit crossbar → buy a round.</li><li>Own goals = double.</li><li>Last arrival is goalkeeper first 10 min.</li><li>No "mine!" shouting.</li><li>Goal celebrations must include a dance.</li></ul></div></div>`;
    }

    // ========== ADMIN PANEL ==========
    async function renderAdminPanel() {
        await loadData();
        const futureWeeks = getFutureWeeks();
        const allWeeks = ALL_GAME_WEEKS.map(w => `<option value="${w.dateStr}">${w.label}</option>`).join('');
        document.getElementById("adminPanel").innerHTML = `
            <div class="card"><h3>👥 PLAYERS</h3><div>✅ ${FULL_PLAYER_LIST.length} players</div></div>
            <div class="card"><h3>📅 TEAM ASSIGNMENT (ONLY ATTENDING - FUTURE WEEKS)</h3><select id="adminWeekSelect">${futureWeeks.map(w => `<option value="${w.dateStr}">${w.label}</option>`).join('')}</select><div id="teamAssignmentArea"></div><div class="flex-btns"><button id="saveTeamsBtn">💾 SAVE</button><button id="refreshAdminBtn">⟳ REFRESH</button></div><div id="adminDebug" class="alert" style="margin-top:8px;"></div></div>
            <div class="card"><h3>⚽ MATCH RESULT & GOALS</h3><select id="adminWeekSelectResult">${allWeeks}</select><div id="matchResultArea"></div><button id="saveResultBtn">💾 SAVE</button></div>
            <div class="card"><h3>💰 PAYMENTS LEDGER</h3><div id="paymentLedger"></div><div class="flex-btns"><select id="adminPaymentPlayer"><option value="">Player</option>${FULL_PLAYER_LIST.map(p=>`<option>${escapeHtml(p)}</option>`).join('')}</select><select id="adminPaymentWeek"><option value="">Week</option>${ALL_GAME_WEEKS.map(w=>`<option value="${w.dateStr}">${w.label}</option>`).join('')}</select><button id="adminMarkPaidBtn">Mark Paid</button></div></div>
            <div class="card"><h3>📋 FULL ATTENDANCE LOG</h3><div id="adminAttendanceOverview"></div></div>
            <div class="card"><h3>💾 BACKUP / RESTORE</h3><div class="flex-btns"><button id="exportAllBtn">📤 EXPORT</button><button id="importAllBtn">📥 IMPORT</button><input type="file" id="importFileInput" style="display:none;"></div></div>
        `;
        document.getElementById("adminWeekSelect").onchange = renderTeamAssignmentUI;
        document.getElementById("refreshAdminBtn").onclick = () => renderTeamAssignmentUI();
        document.getElementById("saveTeamsBtn").onclick = async () => { await saveTeams(); renderPitchAndMatch(); renderPastGamesPanel(); };
        document.getElementById("adminWeekSelectResult").onchange = renderMatchResultUI;
        document.getElementById("saveResultBtn").onclick = saveMatchResultAdmin;
        document.getElementById("adminMarkPaidBtn").onclick = adminMarkPayment;
        document.getElementById("exportAllBtn").onclick = exportAllData;
        document.getElementById("importAllBtn").onclick = () => document.getElementById("importFileInput").click();
        document.getElementById("importFileInput").onchange = e => { if(e.target.files.length) importAllData(e.target.files[0]); e.target.value=""; };
        renderTeamAssignmentUI();
        renderMatchResultUI();
        renderAdminAttendanceOverview();
        renderAdminPaymentUI();
    }

    async function renderTeamAssignmentUI() {
        const gameDate = document.getElementById("adminWeekSelect").value;
        if (!gameDate) return;
        const attendingPlayers = attendance.filter(a => a.gameDate === gameDate && a.status === 'in').map(a => a.player);
        document.getElementById("adminDebug").innerHTML = `📋 Week: ${gameDate} | Attending: ${attendingPlayers.length} → ${attendingPlayers.join(', ') || 'none'}`;
        if (!teamAssignments[gameDate]) teamAssignments[gameDate] = {};
        let html = "";
        for (let p of attendingPlayers) {
            const current = teamAssignments[gameDate][p] || "";
            html += `<div class="goal-row"><span style="flex:1">${escapeHtml(p)}</span><select class="team-select" data-player="${escapeHtml(p)}"><option value="">-- Not playing --</option><option value="yellow" ${current==="yellow"?"selected":""}>🟡 Yellow</option><option value="orange" ${current==="orange"?"selected":""}>🟠 Orange</option></select></div>`;
        }
        if (!attendingPlayers.length) html = "<div class='alert'>⚠️ No players have marked attending for this week yet.</div>";
        document.getElementById("teamAssignmentArea").innerHTML = html;
        document.querySelectorAll(".team-select").forEach(sel => sel.addEventListener("change", () => {
            const player = sel.dataset.player;
            const team = sel.value;
            if (team) teamAssignments[gameDate][player] = team;
            else delete teamAssignments[gameDate][player];
        }));
    }

    async function renderMatchResultUI() {
        const gameDate = document.getElementById("adminWeekSelectResult").value;
        const match = matchResults[gameDate] || { yellowScore: 0, orangeScore: 0, goals: {} };
        let html = `<div class="flex-btns"><div><label>🟡 Yellow</label><input type="number" id="yellowScore" value="${match.yellowScore}" min="0"></div><div><label>🟠 Orange</label><input type="number" id="orangeScore" value="${match.orangeScore}" min="0"></div></div><h4>⚽ Goals</h4>`;
        const playersInMatch = Object.keys(teamAssignments[gameDate] || {});
        if (!playersInMatch.length) html += "<div class='alert'>Assign teams first (only attending players appear).</div>";
        for (let player of playersInMatch) {
            const goals = (match.goals && match.goals[player]) || 0;
            html += `<div class="goal-row"><span>${escapeHtml(player)}</span><select class="goal-select" data-player="${escapeHtml(player)}">${[0,1,2,3,4,5].map(n => `<option value="${n}" ${goals===n?"selected":""}>${n} goal${n!==1?'s':''}</option>`).join('')}</select></div>`;
        }
        document.getElementById("matchResultArea").innerHTML = html;
        document.querySelectorAll(".goal-select").forEach(sel => sel.addEventListener("change", () => {
            const player = sel.dataset.player;
            const goals = parseInt(sel.value);
            if (!matchResults[gameDate]) matchResults[gameDate] = { goals: {} };
            matchResults[gameDate].goals[player] = goals;
        }));
    }

    async function saveMatchResultAdmin() {
        const gameDate = document.getElementById("adminWeekSelectResult").value;
        const yellow = parseInt(document.getElementById("yellowScore")?.value || 0);
        const orange = parseInt(document.getElementById("orangeScore")?.value || 0);
        if (!matchResults[gameDate]) matchResults[gameDate] = { goals: {} };
        matchResults[gameDate].yellowScore = yellow;
        matchResults[gameDate].orangeScore = orange;
        await saveResults(); renderPitchAndMatch(); renderPastGamesPanel(); renderTopScorerPanel();
        alert("Result saved");
    }

    async function renderAdminAttendanceOverview() {
        const weeks = [...new Set(attendance.map(a => a.gameDate))].sort();
        let html = `<table class="attendance-table"><thead><tr><th>Week</th><th>Player</th><th>Status</th></tr></thead><tbody>`;
        for (let week of weeks) {
            const label = ALL_GAME_WEEKS.find(w => w.dateStr === week)?.label || week;
            for (let a of attendance.filter(a => a.gameDate === week)) html += `<tr>}<td>${escapeHtml(label)}</td><td>${escapeHtml(a.player)}</td><td>${a.status === 'in' ? '✅ Attending' : '❌ Not'}</td></tr>`;
        }
        if (!weeks.length) html += `<tr><td colspan="3">No records</td></tr>`;
        html += `</tbody></table>`;
        document.getElementById("adminAttendanceOverview").innerHTML = html;
    }

    async function renderAdminPaymentUI() {
        const weeks = [...new Set(payments.map(p => p.gameDate))].sort();
        let html = `<table class="payment-table"><thead><tr><th>Week</th><th>Paid players</th><th>Total</th></tr></thead><tbody>`;
        for (let week of weeks) {
            const label = ALL_GAME_WEEKS.find(w => w.dateStr === week)?.label || week;
            const paid = payments.filter(p => p.gameDate === week).map(p => p.player);
            html += `<tr>}<td>${escapeHtml(label)}</td><td>${paid.join(', ') || 'none'}</td><td>$${paid.length * 5}</td></tr>`;
        }
        if (!weeks.length) html += `<tr><td colspan="3">No payments</td></tr>`;
        html += `</tbody></table><div class="alert">💰 Total collected: $${payments.length * 5}</div>`;
        document.getElementById("paymentLedger").innerHTML = html;
    }
    async function adminMarkPayment() {
        const player = document.getElementById("adminPaymentPlayer").value, week = document.getElementById("adminPaymentWeek").value;
        if (!player || !week) return alert("Select both");
        if (payments.find(p => p.player === player && p.gameDate === week)) return alert("Already paid");
        await savePayment({ player, gameDate: week, paid: true, timestamp: new Date().toISOString() });
        payments.push({ player, gameDate: week, paid: true });
        renderAdminPaymentUI();
    }
    function exportAllData() { const data = { teamAssignments, matchResults, payments, attendance }; const blob = new Blob([JSON.stringify(data,null,2)]); const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `backup_${new Date().toISOString().slice(0,19)}.json`; a.click(); }
    async function importAllData(file) { const reader = new FileReader(); reader.onload = async e => { try { const data = JSON.parse(e.target.result); if (data.teamAssignments) teamAssignments = data.teamAssignments; if (data.matchResults) matchResults = data.matchResults; if (data.payments) payments = data.payments; if (data.attendance) attendance = data.attendance; await saveTeams(); await saveResults(); for (let p of payments) await savePayment(p); for (let a of attendance) await saveAttendance(a); renderAdminPanel(); renderPitchAndMatch(); renderPastGamesPanel(); renderTopScorerPanel(); } catch(err) { alert("Invalid backup"); } }; reader.readAsText(file); }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    (async () => {
        const storedUser = localStorage.getItem("soccer_user");
        if (storedUser) {
            try {
                const u = JSON.parse(storedUser);
                if (u.role === "admin") { isAdminLoggedIn = true; currentUser = { name: "admin", role: "admin" }; }
                else { isAdminLoggedIn = false; currentUser = { name: u.name, role: "player" }; }
                await loadData();
                renderMainApp();
                return;
            } catch(e) {}
        }
        renderLoginScreen();
    })();
</script>
</body>
</html>
