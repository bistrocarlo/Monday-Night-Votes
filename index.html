<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Monday Night Soccer | Fixed Player Saving</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* (same styles as before – omitted for brevity, but you can keep your existing CSS) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; padding: 24px; color: #1e1e1e; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 { font-size: 2.4rem; font-weight: 800; color: #cc0000; }
        .tabs { display: flex; gap: 12px; justify-content: center; margin-bottom: 32px; flex-wrap: wrap; }
        .tab-btn { background: white; border: 2px solid #cc0000; padding: 10px 24px; border-radius: 60px; font-weight: 700; cursor: pointer; color: #cc0000; }
        .tab-btn.active { background: #cc0000; color: white; }
        .panel { display: none; }
        .panel.active-panel { display: block; }
        .card { background: white; border-radius: 32px; padding: 24px; margin-bottom: 28px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .card h2, .card h3 { font-weight: 700; margin-bottom: 20px; color: #cc0000; border-left: 6px solid #cc0000; padding-left: 18px; }
        label { font-weight: 600; display: block; margin-top: 16px; margin-bottom: 8px; }
        select, input, button { padding: 10px 16px; border-radius: 60px; border: 1px solid #ddd; font-size: 0.9rem; background: white; width: 100%; margin: 6px 0; }
        button { background: #cc0000; color: white; font-weight: 700; border: none; cursor: pointer; width: auto; }
        .alert { background: #ffe6e6; border-left: 5px solid #cc0000; padding: 10px 16px; border-radius: 60px; margin: 10px 0; color: #990000; }
        .goal-row { background: #f9f9f9; border-radius: 60px; padding: 8px 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .flex-btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
        footer { text-align: center; margin-top: 40px; font-size: 0.7rem; color: #6c757d; }
        @media (max-width: 700px) { .flex-btns { flex-direction: column; } button { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚽ MONDAY NIGHT SOCCER ⚽</h1>
        <p>Player registry • Voting • Payments</p>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="admin">👑 ADMIN (Manage Players)</button>
        <button class="tab-btn" data-tab="player">👕 PLAYER VIEW</button>
        <button class="tab-btn" data-tab="payment">💰 PAYMENTS</button>
    </div>

    <!-- ADMIN PANEL (Player management first) -->
    <div id="adminPanel" class="panel active-panel">
        <div class="card">
            <h2>🔧 MANAGE PLAYER REGISTRY</h2>
            <div id="playersList"></div>
            <div class="flex-btns">
                <input type="text" id="newPlayerName" placeholder="New player name"
