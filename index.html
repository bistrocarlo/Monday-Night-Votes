    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #eef2f5; font-family: 'Inter', -apple-system, sans-serif; padding: 0; min-height: 100vh; }
        .app { max-width: 500px; margin: 0 auto; background: #eef2f5; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.05); }

        .user-row button { background: #dc3545; border: none; padding: 4px 12px; border-radius: 40px; color: white; font-weight: 600; font-size: 11px; cursor: pointer; }

        .module-container.active-module { display: block; }
        .card { background: white; border-radius: 24px; padding: 18px; margin-bottom: 14px; border: 1px solid #e2e8f0; }
        .card h2 { font-size: 17px; font-weight: 700; margin-bottom: 14px; border-left: 4px solid #1a73e8; padding-left: 12px; }

        .status-text { font-size: 13px; background: rgba(255,255,255,0.2); display: inline-block; padding: 5px 14px; border-radius: 60px; margin-top: 8px; }
        .profile-item { background: #f8fafc; border-radius: 20px; padding: 14px; margin-bottom: 10px; border-left: 4px solid #1a73e8; display: flex; align-items: center; gap: 12px; }
        .profile-avatar { width: 50px; height: 50px; border-radius: 50%; background: #1a73e8; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 20px; flex-shrink: 0; }
        .profile-info { flex: 1; }
        .profile-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .profile-name { font-weight: 800; font-size: 15px; }
        .profile-details { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .profile-badge { background: white; border-radius: 40px; padding: 4px 12px; font-size: 11px; font-weight: 600; display: inline-block; }
        .edit-profile-btn { background: #475569; padding: 6px 14px; font-size: 12px; border-radius: 40px; border: none; color: white; cursor: pointer; }
        .player-avatar-small { width: 36px; height: 36px; border-radius: 50%; background: #1a73e8; display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; }

        .match-date { font-weight: 800; font-size: 14px; }
        .match-result { background: #1a73e8; color: white; padding: 4px 14px; border-radius: 40px; font-weight: 700; font-size: 14px; }
        .teams-section { padding: 16px; background: linear-gradient(145deg, #2e7d32, #1b5e20); }
        .team-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .team-box { flex: 1; background: rgba(0,0,0,0.65); border-radius: 18px; padding: 12px; }
        .team-yellow { background: #ffc107; color: #2c2c2c; font-weight: 800; text-align: center; padding: 6px; border-radius: 60px; font-size: 14px; margin-bottom: 8px; }
        .team-orange { background: #fd7e14; color: white; font-weight: 800; text-align: center; padding: 6px; border-radius: 60px; font-size: 14px; margin-bottom: 8px; }
        .player-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .player-tag { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); border-radius: 40px; padding: 4px 10px; font-size: 11px; color: white; margin: 2px; }
        .score-big { text-align: center; margin-top: 12px; font-size: 22px; font-weight: 800; background: rgba(0,0,0,0.6); border-radius: 60px; padding: 8px; color: white; }
        .goals-section { padding: 12px 16px; background: #fefce8; }
        .goals-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .goal-badge { background: white; border-radius: 40px; padding: 5px 12px; font-size: 12px; font-weight: 600; border-left: 3px solid #eab308; }
        .comments-section { padding: 12px 16px; }
        .add-comment { display: flex; gap: 8px; margin-top: 10px; }
        .add-comment input { flex: 1; padding: 12px; border-radius: 60px; border: 1.5px solid #e2e8f0; font-size: 14px; }
        .comment-item { background: #f8fafc; border-radius: 16px; padding: 10px; margin-bottom: 8px; font-size: 13px; }
        .attendee-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .attendee-tag { display: inline-flex; align-items: center; gap: 6px; background: #e2e8f0; padding: 6px 12px; border-radius: 40px; font-size: 13px; }
        .guest-tag { background: #d4edda; color: #155724; }
        .admin-team-item { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; background: #f1f5f9; border-radius: 60px; padding: 8px 16px; }
        .admin-buttons { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .admin-action-btn { background: white; border: 2px solid #1a73e8; color: #1a73e8; padding: 16px; border-radius: 60px; font-weight: 700; font-size: 16px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .admin-action-btn i { margin-right: 10px; }
        .finance-summary { background: linear-gradient(135deg, #1a73e8, #0d5bbf); color: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; text-align: center; }
        .finance-summary .amount { font-size: 32px; font-weight: 800; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th, .data-table td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .badge-paid { background: #28a745; color: white; border-radius: 40px; padding: 4px 12px; font-size: 11px; }
        .badge-owing { background: #dc3545; color: white; border-radius: 40px; padding: 4px 12px; font-size: 11px; }
        .weather-card { background: linear-gradient(135deg, #0f2027, #203a43); color: white; border-radius: 24px; padding: 20px; text-align: center; }
        .playing-list { background: #e8f0fe; border-radius: 20px; padding: 16px; margin-bottom: 14px; }
        .playing-title { font-weight: 800; font-size: 15px; margin-bottom: 10px; color: #1a73e8; }
        .guest-section { background: #f0fdf4; border-radius: 20px; padding: 16px; margin-bottom: 14px; border: 1px solid #bbf7d0; }
        .guest-title { font-weight: 800; font-size: 15px; margin-bottom: 10px; color: #15803d; }
        .this-weeks-teams { background: linear-gradient(135deg, #1a73e8, #0d5bbf); color: white; border-radius: 24px; padding: 20px; margin-bottom: 16px; text-align: center; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 32px; padding: 24px; max-width: 340px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .login-box { background: white; border-radius: 48px; padding: 40px 28px; margin: 40px 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .login-logo { width: 90px; height: 90px; background: linear-gradient(135deg, #1a73e8, #0d5bbf); border-radius: 32px; display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 8px 20px rgba(26,115,232,0.3); }
        .login-logo i { font-size: 48px; color: white; }
        .login-box h2 { font-size: 26px; font-weight: 800; margin-bottom: 8px; color: #1e293b; }
        .login-box p { font-size: 14px; color: #64748b; margin-bottom: 28px; }
        .flex-btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
        select, input { width: 100%; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 60px; margin: 8px 0; font-size: 16px; background: white; }
        button { background: #1a73e8; color: white; border: none; padding: 14px 22px; border-radius: 60px; font-weight: 700; font-size: 16px; cursor: pointer; transition: transform 0.1s; }
        button:active { transform: scale(0.97); }
        hr { margin: 20px 0; border-color: #e2e8f0; }
        @media (max-width: 450px) { .nav-module { padding: 6px 12px; font-size: 11px; } .btn-play-big, .btn-sit-big { font-size: 16px; padding: 12px 16px; } .login-logo { width: 75px; height: 75px; } .login-logo i { font-size: 38px; } }
    </style>
</head>
<body>
<div class="app" id="app"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCWlFqDJyENgrUOhiLXCjSEi4Mk_54SA1w",
        authDomain: "monday-night-soccer-hub.firebaseapp.com",
        projectId: "monday-night-soccer-hub",
        storageBucket: "monday-night-soccer-hub.firebasestorage.app",
        messagingSenderId: "634335208908",
        appId: "1:634335208908:web:dca705b65fc52de0606969"
    };
    let db = null;
    try { 
        firebase.initializeApp(firebaseConfig); 
        db = firebase.firestore(); 
        console.log("Firebase ready");
    } catch(e) { console.warn("Demo mode"); }
    
    const POSITIONS = ["Goalkeeper","Defender","Defensive Midfielder","Midfielder Centre","Midfielder Attacking","Wing Back Right","Wing Back Left","Attacking Midfielder","Striker","Winger Left","Winger Right"];
    let players = ["Alex Rowe","Ali Mekawy","Carlo","Charlie","Chris Del Monaco","Chris M","Chris S","Danny","Dante","David","Dimitri","Enzo","Farid","Faros","Frank","George B","George T","Ivan","James Zoumis","James","Joe T","Joey","Kia","Leo","Manoli","Marco","Mario","Maurice","Nector","Paul","Perri","Peter","Ralph","Rocco","Stav","Stevan","Theo","Tony EH","Vasilis"].sort();
    let playerProfiles = {};
    let teamAssignments = {};
    let matchResults = {};
    let payments = [];
    let attendance = [];
    let guests = [];
    let matchComments = {};
    let isAdminLoggedIn = false, currentUser = null;
    let allCaptainsList = [], currentCaptainIndex = 0, weeklyCaptain = "", lastRotationWeek = "";
    const teamCaptainsOrder = ["Carlo", "Charlie", "Chris Del Monaco", "Danny", "David", "Frank", "James Zoumis", "Joe T", "Leo", "Marco", "Paul", "Peter", "Rocco", "Stav", "Theo", "Ali Mekawy", "George B", "Vasilis"];
    let weatherData = { temp: "18°C", condition: "Clear", icon: "fa-sun", rainChance: 10 };
    let rulesText = "• ⏰ 8:00pm SHARP kickoff at Clifton Park\n• 💰 $5 weekly fee - Admin collects\n• 👑 Captain rotates automatically\n• ✅ RSVP is the most important action\n• 🏆 Opening balance for history\n• 🎭 Players can bring guests";
    
    const playersRef = db?.collection("config").doc("players");
    const profilesRef = db?.collection("config").doc("playerProfiles");
    const teamsRef = db?.collection("config").doc("teamAssignments");
    const resultsRef = db?.collection("config").doc("matchResults");
    const paymentsRef = db?.collection("payments");
    const attendanceRef = db?.collection("attendance");
    const guestsRef = db?.collection("guests");
    const commentsRef = db?.collection("matchComments");
    const captainRef = db?.collection("config").doc("captainRotation");
    const rulesRef = db?.collection("config").doc("rules");
    
    function getCurrentAESTDate() { const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000); return new Date(utc + (10 * 3600000)).toISOString().split('T')[0]; }
    function getCurrentGameWeek() {
        const now = new Date(); const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const aestNow = new Date(utc + (10 * 3600000));
        const day = aestNow.getDay();
        const currentMonday = new Date(aestNow);
        if (day === 1 && aestNow.getHours() >= 20) currentMonday.setDate(aestNow.getDate() + 7);
        else if (day !== 1) currentMonday.setDate(aestNow.getDate() + ((8 - day) % 7));
        currentMonday.setHours(20,0,0,0);
        return currentMonday.toISOString().split('T')[0];
    }
    function generateAllGameWeeks() {
        const year = new Date().getFullYear();
        let start = new Date(year, 0, 1);
        while (start.getDay() !== 1) start.setDate(start.getDate() + 1);
        let weeks = [], cur = new Date(start);
        let dec31 = new Date(year, 11, 31);
        let lastMonday = new Date(dec31);
        while (lastMonday.getDay() !== 1) lastMonday.setDate(lastMonday.getDate() - 1);
        let secondLast = new Date(lastMonday);
        secondLast.setDate(secondLast.getDate() - 7);
        while (cur <= secondLast) {
            weeks.push({ dateStr: cur.toISOString().split('T')[0], label: `Mon ${cur.toLocaleDateString('en-AU', { day:'numeric', month:'short' })}` });
            cur.setDate(cur.getDate() + 7);
        }
        return weeks;
    }
    const ALL_GAME_WEEKS = generateAllGameWeeks();
    const getFutureWeeks = () => ALL_GAME_WEEKS.filter(w => w.dateStr >= getCurrentAESTDate());
    const getPastWeeks = () => ALL_GAME_WEEKS.filter(w => w.dateStr < getCurrentAESTDate()).reverse();
    
    function updateEligibleCaptains() {
        const attendingPlayers = new Set();
        attendance.forEach(a => { if (a.status === 'in') attendingPlayers.add(a.player); });
        allCaptainsList = teamCaptainsOrder.filter(c => attendingPlayers.has(c));
        if (allCaptainsList.length === 0 && teamCaptainsOrder.length > 0) allCaptainsList = [teamCaptainsOrder[0]];
    }
    async function updateCaptainForCurrentWeek() {
        const currentWeek = getCurrentGameWeek();
        updateEligibleCaptains();
        if (allCaptainsList.length === 0) { weeklyCaptain = "Admin"; return; }
        if (lastRotationWeek !== currentWeek) {
            if (currentCaptainIndex === 0 && weeklyCaptain === "") weeklyCaptain = allCaptainsList[0];
            else currentCaptainIndex = (currentCaptainIndex + 1) % allCaptainsList.length;
            weeklyCaptain = allCaptainsList[currentCaptainIndex];
            lastRotationWeek = currentWeek;
            await saveCaptainRotation();
        }
    }
    async function fetchMelbourneWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-37.77&longitude=144.97&hourly=temperature_2m,precipitation_probability,weathercode&timezone=Australia/Melbourne&forecast_days=7');
            const data = await response.json();
            const nextMonday = new Date(); nextMonday.setDate(nextMonday.getDate() + ((1 + 7 - nextMonday.getDay()) % 7)); nextMonday.setHours(20,0,0,0);
            const mondayDateStr = nextMonday.toISOString().split('T')[0];
            for (let i = 0; i < data.hourly.time.length; i++) {
                const hourDate = data.hourly.time[i].split('T')[0];
                const hour = parseInt(data.hourly.time[i].split('T')[1].substring(0,2));
                if (hourDate === mondayDateStr && hour === 20) {
                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    const code = data.hourly.weathercode[i];
                    let condition = "Clear", icon = "fa-sun";
                    if (code === 0) { condition = "Clear"; icon = "fa-sun"; }
                    else if (code === 1 || code === 2) { condition = "Partly cloudy"; icon = "fa-cloud-sun"; }
                    else if (code === 3) { condition = "Overcast"; icon = "fa-cloud"; }
                    else if (code >= 51 && code <= 67) { condition = "Light rain"; icon = "fa-cloud-rain"; }
                    else if (code >= 80 && code <= 99) { condition = "Rain/storm"; icon = "fa-cloud-bolt"; }
                    weatherData = { temp: `${temp}°C`, condition, icon, rainChance: data.hourly.precipitation_probability[i] || 0 };
                    break;
                }
            }
        } catch(e) { console.warn("Weather fetch failed"); }
    }
    
    async function loadData() {
        if(!db) return;
        try {
            const pDoc = await playersRef?.get(); if(pDoc?.exists) players = pDoc.data().list.sort();
            const profileDoc = await profilesRef?.get(); if(profileDoc?.exists) playerProfiles = profileDoc.data();
            const tDoc = await teamsRef?.get(); if(tDoc?.exists) teamAssignments = tDoc.data();
            const rDoc = await resultsRef?.get(); if(rDoc?.exists) matchResults = rDoc.data();
            const paySnap = await paymentsRef?.get(); payments = []; paySnap?.forEach(d => payments.push(d.data()));
            const attSnap = await attendanceRef?.get(); attendance = []; attSnap?.forEach(d => attendance.push(d.data()));
            const guestSnap = await guestsRef?.get(); guests = []; guestSnap?.forEach(d => guests.push(d.data()));
            const commentsSnap = await commentsRef?.get();
            matchComments = {};
            commentsSnap?.forEach(doc => { const data = doc.data(); if (!matchComments[data.gameDate]) matchComments[data.gameDate] = []; matchComments[data.gameDate].push(data); });
            const captainDoc = await captainRef?.get();
            if(captainDoc?.exists) { currentCaptainIndex = captainDoc.data().index || 0; weeklyCaptain = captainDoc.data().captain || ""; lastRotationWeek = captainDoc.data().lastWeek || ""; }
            const rulesDoc = await rulesRef?.get();
            if(rulesDoc?.exists && rulesDoc.data().text) rulesText = rulesDoc.data().text;
            await updateCaptainForCurrentWeek();
            for (let player of players) {
                const gamesFromAttendance = attendance.filter(a => a.player === player && a.status === 'in').length;
                const opening = playerProfiles[player]?.openingBalanceGames || 0;
                if (playerProfiles[player]) playerProfiles[player].gamesPlayed = gamesFromAttendance + opening;
                else playerProfiles[player] = { age: '—', position: '—', yearJoined: '—', gamesPlayed: gamesFromAttendance + opening, openingBalanceGames: 0 };
            }
        } catch(e) { console.warn(e); }
    }
    async function saveProfiles() { if(db && profilesRef) await profilesRef.set(playerProfiles); }
    async function saveTeams() { if(db && teamsRef) await teamsRef.set(teamAssignments); }
    async function savePayment(p) { if(db && paymentsRef) await paymentsRef.doc(`${p.player}_${p.gameDate}`).set(p); const idx = payments.findIndex(pay => pay.player === p.player && pay.gameDate === p.gameDate); if(idx !== -1) payments[idx] = p; else payments.push(p); }
    async function saveAttendance(a) {
        if(db && attendanceRef) await attendanceRef.doc(`${a.player}_${a.gameDate}`).set(a);
        const idx = attendance.findIndex(x => x.player === a.player && x.gameDate === a.gameDate);
        if(idx !== -1) attendance[idx] = a; else attendance.push(a);
        const gamesFromAttendance = attendance.filter(att => att.player === a.player && att.status === 'in').length;
        const opening = playerProfiles[a.player]?.openingBalanceGames || 0;
        if (playerProfiles[a.player]) playerProfiles[a.player].gamesPlayed = gamesFromAttendance + opening;
        else playerProfiles[a.player] = { age: '—', position: '—', yearJoined: '—', gamesPlayed: gamesFromAttendance + opening, openingBalanceGames: 0 };
        await saveProfiles();
        await updateCaptainForCurrentWeek();
        renderHomePage();
        renderProfilesPage();
        renderScoreboardPage();
        renderThisWeeksTeamsPage();
        if(isAdminLoggedIn) renderAdminPage();
    }
    async function saveComment(gameDate, author, text) {
        const comment = { gameDate, author, text, timestamp: Date.now() };
        if(db && commentsRef) await commentsRef.add(comment);
        if (!matchComments[gameDate]) matchComments[gameDate] = [];
        matchComments[gameDate].push(comment);
        renderHistoryPage();
    }
    async function saveCaptainRotation() { if(db && captainRef) await captainRef.set({ index: currentCaptainIndex, captain: weeklyCaptain, lastWeek: lastRotationWeek }); }
    async function saveRules() { if(db && rulesRef) await rulesRef.set({ text: rulesText }); }
    async function saveGuest(g) { if(db && guestsRef) await guestsRef.doc(`${g.guestName}_${g.gameDate}`).set(g); guests.push(g); renderHomePage(); renderThisWeeksTeamsPage(); }
    
    async function addPlayer(playerName) {
        if (!playerName.trim()) return false;
        if (players.includes(playerName)) return false;
        players.push(playerName);
        players.sort();
        if (db && playersRef) await playersRef.set({ list: players });
        playerProfiles[playerName] = { age: '—', position: '—', yearJoined: '—', gamesPlayed: 0, openingBalanceGames: 0 };
        await saveProfiles();
        return true;
    }
    async function deletePlayer(playerName) {
        if (!players.includes(playerName)) return false;
        players = players.filter(p => p !== playerName);
        if (db && playersRef) await playersRef.set({ list: players });
        delete playerProfiles[playerName];
        await saveProfiles();
        return true;
    }
    
    function getInitials(name) { return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2); }
    function getAvatarColor(name) {
        const colors = ['#1a73e8', '#28a745', '#dc3545', '#fd7e14', '#6f42c1', '#20c997', '#e83e8c', '#6c757d'];
        let hash = 0;
        for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
        return colors[Math.abs(hash) % colors.length];
    }
    
    function renderProfileAvatar(name, size = 50) {
        const bgColor = getAvatarColor(name);
        const initials = getInitials(name);

    async function setAttendance(status) {

        await saveAttendance({ player: currentUser.name, gameDate: currentWeek.dateStr, status: status });

    async function addGuestForPlayer(guestName) {
        if (!currentUser) { alert("Please login first"); return; }
        const currentWeek = getFutureWeeks()[0];
        if (!currentWeek) { alert("No upcoming matches"); return; }
        if (!guestName.trim()) { alert("Please enter a guest name"); return; }

    function showEditProfileModal(playerName) {
        const existing = playerProfiles[playerName] || { age: '', position: POSITIONS[0], yearJoined: '', openingBalanceGames: 0 };
        const modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-content"><h3 style="margin-bottom:12px;">✏️ Edit Profile - ${escapeHtml(playerName)}</h3>
            <label>Name</label><input id="editName" value="${escapeHtml(playerName)}">
            <label>Age</label><input id="editAge" value="${escapeHtml(existing.age || '')}">
            <label>Position</label><select id="editPosition">${POSITIONS.map(p => `<option ${existing.position === p ? 'selected' : ''}>${p}</option>`).join('')}</select>
            <label>Year Joined</label><input id="editYear" value="${escapeHtml(existing.yearJoined || '')}">
            <label>🏆 Opening Games (history)</label><input id="editOpeningGames" type="number" value="${existing.openingBalanceGames || 0}">
            <div class="flex-btns"><button id="saveBtn">Save</button><button id="cancelBtn" class="btn-outline">Cancel</button></div></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('saveBtn').onclick = async () => {
            const newName = document.getElementById('editName').value.trim();
            const newAge = document.getElementById('editAge').value.trim();
            const newPosition = document.getElementById('editPosition').value;
            const newYear = document.getElementById('editYear').value.trim();
            const newOpening = parseInt(document.getElementById('editOpeningGames').value) || 0;
            if (!newName) { alert("Name required"); return; }
            const gamesFromAttend = attendance.filter(a => a.player === playerName && a.status === 'in').length;
            const totalGames = gamesFromAttend + newOpening;
            if (newName !== playerName) {
                if (players.includes(newName)) { alert("Name exists"); return; }
                const idx = players.indexOf(playerName);
                if (idx !== -1) players[idx] = newName; else players.push(newName);
                players.sort();
                if (db && playersRef) await playersRef.set({ list: players });
                playerProfiles[newName] = { age: newAge || '—', position: newPosition, yearJoined: newYear || '—', gamesPlayed: totalGames, openingBalanceGames: newOpening };
                delete playerProfiles[playerName];
                if (currentUser?.name === playerName) currentUser.name = newName;
            } else {
                playerProfiles[playerName] = { ...playerProfiles[playerName], age: newAge || '—', position: newPosition, yearJoined: newYear || '—', gamesPlayed: totalGames, openingBalanceGames: newOpening };
            }
            await saveProfiles();
            modalDiv.remove();
            renderProfilesPage();
            renderScoreboardPage();
            renderHomePage();
            renderThisWeeksTeamsPage();
            if(isAdminLoggedIn) renderAdminPage();
        };
        document.getElementById('cancelBtn').onclick = () => modalDiv.remove();
    }

    function renderScoreboardPage() {
        let stats = new Map();
        for(let player of players) stats.set(player, { goals: 0, appearances: 0 });
        attendance.forEach(a => { if(a.status === 'in' && stats.has(a.player)) stats.get(a.player).appearances++; });
        for(let match of Object.values(matchResults)) if(match.goals) for(let [scorer, count] of Object.entries(match.goals)) if(stats.has(scorer)) stats.get(scorer).goals += count;
        const allStats = Array.from(stats.entries()).map(([name, s]) => ({ name, goals: s.goals, appearances: s.appearances }));
        const topGoals = [...allStats].sort((a,b) => b.goals - a.goals);
        const topApps = [...allStats].sort((a,b) => {
            const aTotal = a.appearances + (playerProfiles[a.name]?.openingBalanceGames || 0);
            const bTotal = b.appearances + (playerProfiles[b.name]?.openingBalanceGames || 0);
            return bTotal - aTotal;
        });
        document.getElementById("page-scoreboard").innerHTML = `<div class="card"><h2>🏆 All-Time Leaderboard</h2>
            <div><h3>⚽ Top Goal Scorers</h3><table class="data-table">${topGoals.map((p,i)=>`<tr><td style="width:40px;"><strong>${i+1}</strong></td><td>${renderPlayerTag(p.name, 24)} ${escapeHtml(p.name)}</td><td>${p.goals} goals</td></tr>`).join('')}</tbody></table></div>
            <div style="margin-top:16px;"><h3>🏃 Most Games Played</h3><table class="data-table">${topApps.map((p,i)=>`<tr><td style="width:40px;"><strong>${i+1}</strong></td><td>${renderPlayerTag(p.name, 24)} ${escapeHtml(p.name)}</td><td>${p.appearances + (playerProfiles[p.name]?.openingBalanceGames || 0)} games</td></tr>`).join('')}</tbody></table></div>
        </div>`;
    }

    async function renderHistoryPage() {
        const past = getPastWeeks();
        if (!past.length) {

        let html = `<div class="card"><h2>📖 Match History</h2></div>`;
        for (let week of past) {
            const assignments = teamAssignments[week.dateStr] || {};
            const yellow = Object.keys(assignments).filter(p => assignments[p] === "yellow");
            const orange = Object.keys(assignments).filter(p => assignments[p] === "orange");
            const match = matchResults[week.dateStr] || { yellowScore: 0, orangeScore: 0, goals: {} };
            const goals = match.goals || {};
            const yellowGoals = [], orangeGoals = [];

            const weeklyGuests = guests.filter(g => g.gameDate === week.dateStr);
            const comments = matchComments[week.dateStr] || [];
            const safeId = week.dateStr.replace(/-/g, '');
            html += `<div class="match-card">
                <div class="match-header"><div class="match-date">${week.label}</div><div class="match-result">🟡 ${match.yellowScore} - ${match.orangeScore} 🟠</div></div>
                <div class="teams-section"><div class="team-row">
                    <div class="team-box"><div class="team-yellow">🟡 YELLOW</div><div class="player-list">${yellow.map(p=>`<div class="player-tag">${renderPlayerTag(p, 28)} ${escapeHtml(p)}</div>`).join('') || '<span class="player-tag">—</span>'}</div></div>
                    <div class="team-box"><div class="team-orange">🟠 ORANGE</div><div class="player-list">${orange.map(p=>`<div class="player-tag">${renderPlayerTag(p, 28)} ${escapeHtml(p)}</div>`).join('') || '<span class="player-tag">—</span>'}</div></div>
                </div><div class="score-big">${match.yellowScore} - ${match.orangeScore}</div></div>
                <div class="goals-section"><div class="goals-title">⚽ Goal Scorers</div><div class="goals-list">${yellowGoals.map(g=>`<div class="goal-badge">🟡 ${g.player} ×${g.count}</div>`).join('')}${orangeGoals.map(g=>`<div class="goal-badge">🟠 ${g.player} ×${g.count}</div>`).join('')}${yellowGoals.length === 0 && orangeGoals.length === 0 ? '<div class="goal-badge">No goals recorded</div>' : ''}</div></div>
                ${weeklyGuests.length > 0 ? `<div class="goals-section" style="background:#f0fdf4;"><div class="goals-title">🎭 Guests</div><div class="goals-list">${weeklyGuests.map(g=>`<div class="goal-badge" style="border-left-color:#28a745;">${escapeHtml(g.guestName)} <small>(brought by ${escapeHtml(g.addedBy)})</small></div>`).join('')}</div></div>` : ''}

        document.getElementById("page-history").innerHTML = html;

            document.getElementById("adminGuestsPanel").style.display = "none";
            document.getElementById("adminRulesPanel").style.display = "none";
            document.querySelectorAll(".markPaidBtn").forEach(btn => btn.addEventListener("click", async () => {
                await savePayment({ player: btn.dataset.player, gameDate: btn.dataset.date, amount: 5, timestamp: Date.now() });
                renderAdminPage();
            }));
        };
        
        document.getElementById("adminTeamsBtn").onclick = () => {
            if(!currentWeek) { alert("No upcoming games"); return; }
            if(!teamAssignments[currentWeek.dateStr]) teamAssignments[currentWeek.dateStr] = {};
            const renderAssignList = () => {
                let listHtml = `<div class="card"><h2>⚽ Assign Teams for ${currentWeek.label}</h2>`;
                for(let player of signedPlayers) {
                    const current = teamAssignments[currentWeek.dateStr][player] || "";
                    listHtml += `<div class="admin-team-item"><div class="player-name">${renderPlayerTag(player, 28)} <strong>${escapeHtml(player)}</strong></div>
                        <select class="admin-team-select" data-player="${escapeHtml(player)}" style="width:140px;"><option value="">— Select Team —</option><option value="yellow" ${current==="yellow"?"selected":""}>🟡 Yellow Team</option><option value="orange" ${current==="orange"?"selected":""}>🟠 Orange Team</option></select></div>`;
                }
                listHtml += `<div class="flex-btns"><button id="autoAssignTeamsBtn" class="btn-outline">🎲 Auto-Balance Teams</button><button id="saveTeamsBtn">💾 Save Team Assignments</button></div></div>`;
                document.getElementById("adminTeamsPanel").innerHTML = listHtml;
                document.querySelectorAll(".admin-team-select").forEach(sel => sel.addEventListener("change", () => { teamAssignments[currentWeek.dateStr][sel.dataset.player] = sel.value; }));
                document.getElementById("autoAssignTeamsBtn")?.addEventListener("click", () => {
                    if (signedPlayers.length === 0) return;
                    const shuffled = [...signedPlayers];
                    for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
                    const mid = Math.ceil(shuffled.length / 2);
                    shuffled.slice(0, mid).forEach(p => teamAssignments[currentWeek.dateStr][p] = "yellow");
                    shuffled.slice(mid).forEach(p => teamAssignments[currentWeek.dateStr][p] = "orange");
                    renderAssignList();
                });
                document.getElementById("saveTeamsBtn")?.addEventListener("click", async () => { await saveTeams(); alert("Teams saved!"); renderAdminPage(); renderThisWeeksTeamsPage(); renderHistoryPage(); });
            };
            renderAssignList();
            document.getElementById("adminPlayersPanel").style.display = "none";
            document.getElementById("adminFinancePanel").style.display = "none";
            document.getElementById("adminTeamsPanel").style.display = "block";
            document.getElementById("adminGuestsPanel").style.display = "none";
            document.getElementById("adminRulesPanel").style.display = "none";
        };
        
        document.getElementById("adminGuestsBtn").onclick = () => {
            let weeklyGuests = guests.filter(g => g.gameDate === currentWeek?.dateStr);
            let guestHtml = `<div class="card"><h2>🎭 Guest List for ${currentWeek?.label || "Next Monday"}</h2><div class="attendee-tags">${weeklyGuests.map(g=>`<span class="guest-tag">${escapeHtml(g.guestName)} <small>(by ${escapeHtml(g.addedBy)})</small></span>`).join('')||'<span>No guests added</span>'}</div>
                <input type="text" id="adminGuestName" placeholder="Guest name"><button id="adminAddGuestBtn">+ Add Guest</button></div>`;
            document.getElementById("adminGuestsPanel").innerHTML = guestHtml;
            document.getElementById("adminAddGuestBtn")?.addEventListener("click", async () => {
                const guestName = document.getElementById("adminGuestName").value.trim();
                if(guestName && currentWeek) {
                    await saveGuest({ guestName, gameDate: currentWeek.dateStr, addedBy: "Admin" });
                    document.getElementById("adminGuestName").value = "";
                    renderAdminPage();
                    renderHomePage();
                    renderThisWeeksTeamsPage();
                }
            });
            document.getElementById("adminPlayersPanel").style.display = "none";
            document.getElementById("adminFinancePanel").style.display = "none";
            document.getElementById("adminTeamsPanel").style.display = "none";
            document.getElementById("adminGuestsPanel").style.display = "block";
            document.getElementById("adminRulesPanel").style.display = "none";
        };
        
        document.getElementById("adminRulesBtn").onclick = () => {
            let rulesHtml = `<div class="card"><h2>📝 Edit League Rules</h2><textarea id="rulesEditor" rows="8" style="width:100%; border-radius:16px; padding:12px; border:1px solid #e2e8f0;">${escapeHtml(rulesText)}</textarea><div class="flex-btns"><button id="saveRulesBtn">💾 Save Rules</button></div></div>`;
            document.getElementById("adminRulesPanel").innerHTML = rulesHtml;
            document.getElementById("saveRulesBtn")?.addEventListener("click", async () => {
                rulesText = document.getElementById("rulesEditor").value;
                await saveRules();
                alert("Rules saved!");
                renderRulesPage();
                renderAdminPage();
            });
            document.getElementById("adminPlayersPanel").style.display = "none";
            document.getElementById("adminFinancePanel").style.display = "none";
            document.getElementById("adminTeamsPanel").style.display = "none";
            document.getElementById("adminGuestsPanel").style.display = "none";
            document.getElementById("adminRulesPanel").style.display = "block";
        };
    }
    
    function renderAllModules() {
        renderProfilesPage();
        renderScoreboardPage();
        renderThisWeeksTeamsPage();
        renderHistoryPage();
        renderWeatherPage();
        renderChatPage();
        renderRulesPage();
        renderAdminPage();
    }
    
    function initNavigation() {
        const modules = [
            { id: "home", name: "🏠 HOME" },
            { id: "profiles", name: "👤 PROFILES" },
            { id: "scoreboard", name: "🏆 STATS" },
            { id: "teamswk", name: "⚽ THIS WEEK" },
            { id: "history", name: "📖 HISTORY" },
            { id: "weather", name: "🌤️ WEATHER" },
            { id: "chat", name: "💬 CHAT" },
            { id: "rules", name: "📜 RULES" }
        ];
        if (isAdminLoggedIn) modules.push({ id: "admin", name: "⚙️ ADMIN" });
        const navBar = document.getElementById("topNavBar");
        navBar.innerHTML = modules.map(m => `<button class="nav-module" data-module="${m.id}">${m.name}</button>`).join('');
        document.querySelectorAll(".nav-module").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = btn.dataset.module;
                document.querySelectorAll(".module-container").forEach(c => c.classList.remove("active-module"));
                const target = document.getElementById(`module-${id}`);
                if(target) target.classList.add("active-module");
                document.querySelectorAll(".nav-module").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
            });
        });
        const homeBtn = document.querySelector('.nav-module[data-module="home"]');
        if(homeBtn) homeBtn.click();
    }
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    async function renderApp() {
        await loadData();
        await fetchMelbourneWeather();
        document.getElementById("app").innerHTML = `
            <div class="header"><div class="logo-icon"><i class="fas fa-futbol"></i></div><h1>MONDAY NIGHT SOCCER</h1><div class="user-row"><i class="fas fa-user-circle"></i> <strong>${currentUser.role === "admin" ? "ADMIN" : currentUser.name}</strong> <button id="logoutBtnMain">Exit</button></div></div>
            <div class="top-nav" id="topNavBar"></div>
            <div id="module-home" class="module-container"><div id="homeContainer"></div></div>
            <div id="module-profiles" class="module-container"><div id="page-profiles"></div></div>
            <div id="module-scoreboard" class="module-container"><div id="page-scoreboard"></div></div>
            <div id="module-teamswk" class="module-container"><div id="page-teamswk"></div></div>
            <div id="module-history" class="module-container"><div id="page-history"></div></div>
            <div id="module-weather" class="module-container"><div id="page-weather"></div></div>
            <div id="module-chat" class="module-container"><div id="page-chat"></div></div>
            <div id="module-rules" class="module-container"><div id="page-rules"></div></div>
            <div id="module-admin" class="module-container"><div id="page-admin"></div></div>
        `;
        document.getElementById("logoutBtnMain").onclick = logout;
        renderHomePage();
        renderAllModules();
        initNavigation();
    }
    
    async function renderLogin() {
        await loadData();
        document.getElementById("app").innerHTML = `<div class="login-box"><div class="login-logo"><i class="fas fa-futbol"></i></div><h2>Monday Night Soccer</h2><p>8pm Kickoff • Clifton Park, Brunswick</p><select id="playerSelectLogin"><option>-- Select Player --</option>${players.map(p=>`<option>${escapeHtml(p)}</option>`).join('')}</select><button id="playerLoginBtn">Enter as Player</button><hr><input type="password" id="adminPwLogin" placeholder="Admin Password"><button id="adminLoginBtn">Admin Login</button><div id="loginErr" style="color:#dc3545; margin-top:12px;"></div></div>`;
        document.getElementById("playerLoginBtn").onclick = () => { const n = document.getElementById("playerSelectLogin").value; if(n && n !== "-- Select Player --") loginAsPlayer(n); else document.getElementById("loginErr").innerText = "Select your name"; };
        document.getElementById("adminLoginBtn").onclick = () => { if(!adminLogin(document.getElementById("adminPwLogin").value)) document.getElementById("loginErr").innerText = "Wrong password (admin123)"; };
    }
    
    (async () => {
        const stored = localStorage.getItem("soccer_user");
        if(stored) {
            try { const u = JSON.parse(stored); if(u.role==="admin"){ isAdminLoggedIn=true; currentUser={name:"Admin",role:"admin"}; } else { currentUser={name:u.name,role:"player"}; } await loadData(); renderApp(); return; } catch(e){}
        }
        renderLogin();
    })();
</script>
</body>
</html>
