<body>
<div class="app" id="app"><div class="loading" style="text-align:center;padding:60px"><i class="fas fa-spinner fa-pulse"></i> Loading Monday Night Soccer...</div></div>

<script>
    // ==================== FIREBASE CONFIG ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCWlFqDJyENgrUOhiLXCjSEi4Mk_54SA1w",
        authDomain: "monday-night-soccer-hub.firebaseapp.com",
        projectId: "monday-night-soccer-hub",
        storageBucket: "monday-night-soccer-hub.firebasestorage.app",
        messagingSenderId: "634335208908",
        appId: "1:634335208908:web:dca705b65fc52de0606969"
    };
    
    let db = null, firebaseReady = false;
    try { 
        firebase.initializeApp(firebaseConfig); 
        db = firebase.firestore(); 
        firebaseReady = true; 
        console.log("🔥 Firebase connected");
    } catch(e) { console.warn("Firebase error", e); }
    
    // ==================== PLAYERS LIST ====================
    let players = ["Alex Rowe","Ali Mekawy","Carlo","Charlie","Chris Del Monaco","Chris M","Chris S","Danny","Dante","David","Dimitri","Enzo","Farid","Faros","Frank","George B","George T","Ivan","James Zoumis","James","Joe T","Joey","Kia","Leo","Manoli","Marco","Mario","Maurice","Nector","Paul","Perri","Peter","Ralph","Rocco","Stav","Stevan","Theo","Tony EH","Vasilis"].sort();
    
    // ==================== DATA STORES ====================
    let playerProfiles = {};
    let teamAssignments = {};
    let matchResults = {};
    let attendance = [];
    let guests = [];
    let matchComments = {};
    let isAdminLoggedIn = false;
    let currentUser = null;
    let chatMessages = [];
    let timerInterval = null;
    let currentHalf = 1;
    let timeLeft = 45 * 60;
    let weatherData = { temp: "18°C", condition: "Clear", icon: "fa-sun", rainChance: 10 };
    
    // ==================== HISTORICAL DATA (SEED DATA) ====================
    // This will populate Firebase with real past match history
    const HISTORICAL_MATCHES = [
        { date: "2025-03-24", label: "Mon 24 Mar", yellow: 3, orange: 2, mvp: "Carlo", goals: {"Carlo": 2, "Danny": 1}, assists: {"Mario": 1, "Frank": 1}, injuries: [] },
        { date: "2025-03-17", label: "Mon 17 Mar", yellow: 1, orange: 1, mvp: "Chris M", goals: {"Alex Rowe": 1, "Stevan": 1}, assists: {}, injuries: ["Dante (cramp)"] },
        { date: "2025-03-10", label: "Mon 10 Mar", yellow: 4, orange: 1, mvp: "Carlo", goals: {"Carlo": 3, "James": 1}, assists: {"Mario": 2, "Frank": 1}, injuries: [] },
        { date: "2025-03-03", label: "Mon 3 Mar", yellow: 2, orange: 3, mvp: "Vasilis", goals: {"Marco": 2, "Vasilis": 2, "Danny": 1}, assists: {"Paul": 1, "Peter": 1}, injuries: ["George T (ankle)"] },
        { date: "2025-02-24", label: "Mon 24 Feb", yellow: 0, orange: 0, mvp: "Rocco", goals: {}, assists: {}, injuries: [] },
        { date: "2025-02-17", label: "Mon 17 Feb", yellow: 5, orange: 2, mvp: "Carlo", goals: {"Carlo": 3, "Danny": 1, "Ali Mekawy": 1}, assists: {"Mario": 2, "Frank": 1, "Chris S": 1}, injuries: [] },
        { date: "2025-02-10", label: "Mon 10 Feb", yellow: 2, orange: 2, mvp: "Mario", goals: {"Mario": 1, "Alex Rowe": 1, "Vasilis": 2}, assists: {"Carlo": 1, "James": 1}, injuries: ["Danny (knock)"] },
        { date: "2025-02-03", label: "Mon 3 Feb", yellow: 3, orange: 0, mvp: "Frank", goals: {"Frank": 2, "Carlo": 1}, assists: {"Mario": 1, "Chris M": 1}, injuries: [] }
    ];
    
    // Team assignments for historical matches
    const HISTORICAL_TEAMS = {
        "2025-03-24": { "Carlo": "yellow", "Danny": "yellow", "Mario": "yellow", "Frank": "yellow", "Alex Rowe": "yellow", "Vasilis": "orange", "Marco": "orange", "Paul": "orange", "Peter": "orange", "Chris M": "orange" },
        "2025-03-17": { "Alex Rowe": "yellow", "Carlo": "yellow", "Chris M": "orange", "Stevan": "orange", "Danny": "yellow", "Mario": "yellow", "Frank": "yellow", "Vasilis": "orange" },
        "2025-03-10": { "Carlo": "yellow", "James": "yellow", "Mario": "yellow", "Frank": "yellow", "Vasilis": "orange", "Marco": "orange", "Danny": "orange", "Chris S": "orange" },
        "2025-02-24": { "Rocco": "yellow", "Carlo": "yellow", "Danny": "yellow", "Vasilis": "orange", "Marco": "orange", "Paul": "orange" }
    };
    
    // ==================== HELPER FUNCTIONS ====================
    function escapeHtml(s){ return String(s).replace(/[&<>]/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function getInitials(n){ return n.split(' ').map(x=>x[0]).join('').toUpperCase().substring(0,2); }
    function getAvatarColor(n){ const c=['#1a73e8','#28a745','#dc3545','#fd7e14','#6f42c1','#20c997']; let h=0; for(let i=0;i<n.length;i++) h=((h<<5)-h)+n.charCodeAt(i); return c[Math.abs(h)%c.length]; }
    function renderAvatar(n,s=50){ return `<div class="profile-avatar" style="background:${getAvatarColor(n)};width:${s}px;height:${s}px;font-size:${s/2.5}px;">${getInitials(n)}</div>`; }
    function renderMiniAvatar(n,s=28){ return `<div class="player-avatar-small" style="background:${getAvatarColor(n)};width:${s}px;height:${s}px;display:inline-flex;align-items:center;justify-content:center;">${getInitials(n)}</div>`; }
    function formatTime(s){ return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
    
    // Timer
    function playAlarm(){ try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value = 880; g.gain.value = 0.3; o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 1.5); o.stop(ctx.currentTime + 1.5); } catch(e){} }
    function updateTimerDisplay(){ let d = document.getElementById("timerDisplay"); if(d) d.textContent = formatTime(timeLeft); let hs = document.getElementById("currentHalf"); if(hs) hs.textContent = currentHalf === 1 ? "FIRST HALF" : "SECOND HALF"; }
    function timerTick(){ if(timeLeft <= 0){ if(timerInterval) clearInterval(timerInterval); playAlarm(); if(currentHalf === 1){ alert("🔔 HALF TIME! Start second half."); currentHalf = 2; timeLeft = 45 * 60; updateTimerDisplay(); startTimer(); } else { alert("🔔 FULL TIME! Match ended."); timerInterval = null; } return; } timeLeft--; updateTimerDisplay(); }
    function startTimer(){ if(timerInterval) clearInterval(timerInterval); timerInterval = setInterval(timerTick, 1000); }
    function pauseTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval = null; } }
    function resetTimer(){ pauseTimer(); currentHalf = 1; timeLeft = 45 * 60; updateTimerDisplay(); }
    
    // Date Helpers
    function getNextMondayGame() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const aestNow = new Date(utc + (11 * 3600000));
        const day = aestNow.getDay(), hour = aestNow.getHours();
        let daysUntilMonday;
        if (day === 1 && hour >= 20) daysUntilMonday = 7;
        else if (day === 1) daysUntilMonday = 0;
        else if (day === 0) daysUntilMonday = 1;
        else daysUntilMonday = (8 - day) % 7;
        const nextMonday = new Date(aestNow);
        nextMonday.setDate(aestNow.getDate() + daysUntilMonday);
        nextMonday.setHours(20, 0, 0, 0);
        return nextMonday;
    }
    function getCurrentGameWeekStr(){ return getNextMondayGame().toISOString().split('T')[0]; }
    function getCurrentGameLabel(){ const m = getNextMondayGame(); return `Mon ${m.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}`; }
    const CURRENT_GAME_STR = getCurrentGameWeekStr();
    
    function getAllParticipants(gameDate){
        const playersIn = attendance.filter(a => a.gameDate === gameDate && a.status === 'in').map(a => a.player);
        const guestsIn = guests.filter(g => g.gameDate === gameDate).map(g => ({ name: g.guestName, isGuest: true, addedBy: g.addedBy }));
        return { players: playersIn, guests: guestsIn };
    }
    
    // Weather
    async function fetchWeather(){
        try{
            const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=-37.77&longitude=144.97&hourly=temperature_2m,precipitation_probability,weathercode&timezone=Australia/Melbourne&forecast_days=7');
            const d=await r.json();
            const target=CURRENT_GAME_STR;
            for(let i=0;i<d.hourly.time.length;i++){
                const hd=d.hourly.time[i].split('T')[0];
                const hr=parseInt(d.hourly.time[i].split('T')[1].substring(0,2));
                if(hd===target && hr===20){
                    const t=Math.round(d.hourly.temperature_2m[i]);
                    const code=d.hourly.weathercode[i];
                    let cond="Clear", icon="fa-sun";
                    if(code===0){ cond="Clear"; icon="fa-sun"; }
                    else if(code===1||code===2){ cond="Partly cloudy"; icon="fa-cloud-sun"; }
                    else if(code===3){ cond="Overcast"; icon="fa-cloud"; }
                    else if(code>=51&&code<=67){ cond="Light rain"; icon="fa-cloud-rain"; }
                    else if(code>=80&&code<=99){ cond="Rain/storm"; icon="fa-cloud-bolt"; }
                    weatherData={ temp:`${t}°C`, condition:cond, icon, rainChance:d.hourly.precipitation_probability[i]||0 };
                    break;
                }
            }
        } catch(e){}
        renderWeatherPage();
    }
    
    // ==================== FIREBASE OPERATIONS ====================
    async function seedHistoricalData() {
        if (!firebaseReady || !db) return;
        console.log("Seeding historical data...");
        for (const match of HISTORICAL_MATCHES) {
            const existing = await db.collection("matchResults").doc(match.date).get();
            if (!existing.exists) {
                await db.collection("matchResults").doc(match.date).set({
                    yellowScore: match.yellow,
                    orangeScore: match.orange,
                    goals: match.goals,
                    assists: match.assists,
                    mvp: match.mvp,
                    injuries: match.injuries,
                    timestamp: Date.now()
                });
                console.log(`Seeded match: ${match.date}`);
            }
        }
        for (const [date, teams] of Object.entries(HISTORICAL_TEAMS)) {
            const existing = await db.collection("teamAssignments").doc(date).get();
            if (!existing.exists) {
                await db.collection("teamAssignments").doc(date).set(teams);
                console.log(`Seeded teams for: ${date}`);
            }
        }
    }
    
    async function loadAllData() {
        if (!firebaseReady || !db) return;
        try {
            const [profDoc, teamsSnap, resultsSnap, attSnap, guestSnap, commentsSnap] = await Promise.all([
                db.collection("config").doc("playerProfiles").get(),
                db.collection("teamAssignments").get(),
                db.collection("matchResults").get(),
                db.collection("attendance").get(),
                db.collection("guests").get(),
                db.collection("matchComments").get()
            ]);
            if(profDoc.exists) playerProfiles = profDoc.data();
            teamAssignments = {};
            teamsSnap.docs.forEach(doc => { teamAssignments[doc.id] = doc.data(); });
            matchResults = {};
            resultsSnap.docs.forEach(doc => { matchResults[doc.id] = doc.data(); });
            attendance = attSnap.docs.map(d=>d.data());
            guests = guestSnap.docs.map(d=>d.data());
            matchComments = {};
            commentsSnap.docs.forEach(doc=>{ const d=doc.data(); if(!matchComments[d.gameDate]) matchComments[d.gameDate]=[]; matchComments[d.gameDate].push(d); });
            for(let p of players) if(!playerProfiles[p]) playerProfiles[p] = { age:'—', position:'—', yearJoined:'—', gamesPlayed:0, openingBalanceGames:0 };
            console.log(`Loaded ${Object.keys(matchResults).length} matches from Firebase`);
            refreshAll();
        } catch(e){ console.error("Load error:", e); }
    }
    
    async function saveMatchResult(date,yellow,orange,goals,assists,mvp,injuries){
        matchResults[date] = { yellowScore:yellow, orangeScore:orange, goals, assists:assists||{}, mvp, injuries:injuries||[], timestamp:Date.now() };
        if(firebaseReady&&db) await db.collection("matchResults").doc(date).set(matchResults[date]);
        renderHistoryPage();
        renderScoreboardPage();
        if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function saveTeamAssignments(date,assign){
        teamAssignments[date] = assign;
        if(firebaseReady&&db) await db.collection("teamAssignments").doc(date).set(assign);
        refreshAll();
    }
    
    async function saveAttendance(a){
        if(firebaseReady&&db) await db.collection("attendance").doc(`${a.player}_${a.gameDate}`).set(a);
        const idx = attendance.findIndex(x=>x.player===a.player && x.gameDate===a.gameDate);
        if(idx!==-1) attendance[idx]=a; else attendance.push(a);
        refreshAll();
    }
    
    async function saveGuest(g){
        if(firebaseReady&&db) await db.collection("guests").doc(`${g.guestName}_${g.gameDate}`).set(g);
        guests.push(g);
        refreshAll();
    }
    
    async function saveChatMessage(msg){
        if(!currentUser || !msg.trim()) return;
        if(firebaseReady&&db) await db.collection("chatMessages").add({ name:currentUser.name, message:msg.trim(), timestamp:firebase.firestore.FieldValue.serverTimestamp() });
    }
    
    async function setAttendance(status){
        if(!currentUser){ alert("Login required"); return; }
        await saveAttendance({ player:currentUser.name, gameDate:CURRENT_GAME_STR, status:status });
    }
    
    async function addGuest(name){
        if(!currentUser){ alert("Login first"); return; }
        if(guests.some(g=>g.gameDate===CURRENT_GAME_STR && g.guestName===name.trim())){ alert("Guest exists"); return; }
        await saveGuest({ guestName:name.trim(), gameDate:CURRENT_GAME_STR, addedBy:currentUser.name });
        const inp = document.getElementById("guestNameInput");
        if(inp) inp.value="";
        alert(`Guest "${name}" added!`);
    }
    
    function refreshAll(){ renderHomePage(); renderTeamsPage(); renderHistoryPage(); renderProfilesPage(); renderScoreboardPage(); renderTimerPage(); renderChatPage(); renderWeatherPage(); renderRulesPage(); if(isAdminLoggedIn) renderAdminPage(); }
    
    // Newspaper report generator
    const pundits = [
        { name: "Ned Zelic", quote: "The transition play was breathtaking! Pure poetry on the pitch tonight." },
        { name: "Craig Foster", quote: "This is what Monday night football is all about. Passion, commitment, and that never-say-die attitude." },
        { name: "Lucy Zelic", quote: "Unbelievable drama under the lights! The crowd was electric!" },
        { name: "Mark Bosnich", quote: "The goalkeeper was a human wall tonight. Those reflex saves changed the game." },
        { name: "Tara Rushton", quote: "Clifton Park was ROCKING! You could feel the intensity from the first whistle." }
    ];
    const funFacts = ["🎲 Record attendance!", "🚀 Longest shot of the season!", "📸 The woodwork was rattled!", "🎉 Celebration of the year!", "💨 Fastest sprint recorded!"];
    
    function generateNewspaperReport(weekLabel, yellowScore, orangeScore, goals, assists, mvp, injuries) {
        const winner = yellowScore > orangeScore ? "YELLOW" : (orangeScore > yellowScore ? "ORANGE" : "DRAW");
        const winnerEmoji = yellowScore > orangeScore ? "🟡" : (orangeScore > yellowScore ? "🟠" : "🤝");
        let goalText = Object.entries(goals).map(([p,c]) => `⚽ ${p} — ${c} goal${c>1?'s':''}`).join('\n') || "⚽ No goals scored";
        let assistText = Object.entries(assists).map(([p,c]) => `🎯 ${p} — ${c} assist${c>1?'s':''}`).join('\n') || "🎯 No assists";
        let injuryText = injuries?.length ? injuries.map(i => `🔸 ${i}`).join('\n') : "🔸 Clean bill of health";
        const randomPundits = [...pundits].sort(() => 0.5 - Math.random()).slice(0, 3);
        const randomFact = funFacts[Math.floor(Math.random() * funFacts.length)];
        
        return `📰 *THE MONDAY NIGHT TELEGRAPH* 📰
📍 *CLIFTON PARK, BRUNSWICK* | ${weekLabel}
🌦️ WEATHER: ${weatherData.temp}, ${weatherData.condition}
━━━━━━━━━━━━━━━━━━━━━━━

🎙️ *MATCH REPORT*
A ${yellowScore === orangeScore ? 'tense stalemate' : 'thrilling contest'} at Clifton Park!

📊 *FINAL SCORE*
🟡 YELLOW ${yellowScore} — ${orangeScore} 🟠
🏆 WINNER: ${winnerEmoji} ${winner}

⚽ *GOAL SCORERS*
${goalText}

🎯 *ASSISTS*
${assistText}

⭐ *MAN OF THE MATCH*
🏅 ${mvp || "The Squad"}

🩺 *INJURY WATCH*
${injuryText}

━━━━━━━━━━━━━━━━━━━━━━━
🎙️ *EXPERT ANALYSIS*

🗣️ *${randomPundits[0].name}*: "${randomPundits[0].quote}"
🗣️ *${randomPundits[1].name}*: "${randomPundits[1].quote}"
🗣️ *${randomPundits[2].name}*: "${randomPundits[2].quote}"

✨ *FUN CORNER*
${randomFact}

📅 *NEXT WEEK*: Monday 8pm at Clifton Park!

#MondayNightSoccer #CliftonPark`;
    }
    
    // ==================== PAGE RENDERS ====================
    function renderTimerPage(){ const c=document.getElementById("page-timer"); if(c) c.innerHTML=`<div class="timer-container"><div class="timer-display" id="timerDisplay">45:00</div><div class="timer-controls"><button id="timerStartBtn">Start</button><button id="timerPauseBtn">Pause</button><button id="timerResetBtn">Reset</button></div><div>Half: <span id="currentHalf">FIRST HALF</span></div></div>`; updateTimerDisplay(); document.getElementById("timerStartBtn")?.addEventListener("click",startTimer); document.getElementById("timerPauseBtn")?.addEventListener("click",pauseTimer); document.getElementById("timerResetBtn")?.addEventListener("click",resetTimer); }
    
    function renderChatPage(){ const c=document.getElementById("page-chat"); if(c) c.innerHTML=`<div class="card"><h2>💬 Team Chat</h2><div id="chatMessagesList" style="height:300px;overflow-y:auto;background:#f8fafc;border-radius:20px;padding:12px;"></div><div style="display:flex;gap:8px;"><input id="chatInput" placeholder="Type message..."><button id="chatSendBtn">Send</button></div></div>`; if(firebaseReady&&db){ db.collection("chatMessages").orderBy("timestamp","asc").onSnapshot(snap=>{ const div=document.getElementById("chatMessagesList"); if(!div) return; let h=""; snap.forEach(doc=>{ const m=doc.data(); const t=m.timestamp?new Date(m.timestamp.toDate()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):""; h+=`<div class="chat-bubble"><strong>${escapeHtml(m.name)}</strong> <span style="font-size:10px;">${t}</span><br>${escapeHtml(m.message)}</div>`; }); div.innerHTML=h||"<div style='text-align:center;'>No messages</div>"; div.scrollTop=div.scrollHeight; }); } document.getElementById("chatSendBtn")?.addEventListener("click",async()=>{ const inp=document.getElementById("chatInput"); if(inp?.value.trim()){ await saveChatMessage(inp.value.trim()); inp.value=""; } }); }
    
    function renderHomePage(){ const c=document.getElementById("homeContainer"); if(!c) return; const gl=getCurrentGameLabel(); const status=attendance.find(a=>a.gameDate===CURRENT_GAME_STR && a.player===currentUser?.name)?.status; const parts=getAllParticipants(CURRENT_GAME_STR); c.innerHTML=`<div class="info-bar"><i class="fas fa-calendar-alt"></i> Next Match: ${gl} • 8pm Clifton Park</div><div class="attendance-card"><h2>${gl} • 8pm</h2><div>Clifton Park, Brunswick</div><div class="big-buttons"><button id="homePlayBtn" class="btn-play-big">✅ I'M PLAYING</button><button id="homeSitBtn" class="btn-sit-big">❌ CAN'T PLAY</button></div><div>${status==='in'?'✓ You are PLAYING':(status==='out'?'✗ You are NOT PLAYING':'Tap above')}</div></div><div class="playing-list"><div>🟢 Players (${parts.players.length})</div><div>${parts.players.map(p=>`<span class="attendee-tag">${renderMiniAvatar(p)} ${escapeHtml(p)}</span>`).join('')||'None'}</div></div><div class="guest-section"><div>🎭 Guests (${parts.guests.length})</div><div>${parts.guests.map(g=>`<span class="guest-tag">${escapeHtml(g.name)} (${escapeHtml(g.addedBy)})</span>`).join('')||'None'}</div><div><input id="guestNameInput" placeholder="Guest name"><button id="addGuestBtnPlayer" style="width:100%;margin-top:8px;">➕ Bring a Guest</button></div></div>`; document.getElementById("homePlayBtn")?.addEventListener("click",()=>setAttendance("in")); document.getElementById("homeSitBtn")?.addEventListener("click",()=>setAttendance("out")); document.getElementById("addGuestBtnPlayer")?.addEventListener("click",()=>{ const gn=document.getElementById("guestNameInput")?.value.trim(); if(gn) addGuest(gn); else alert("Enter guest name"); }); }
    
    function renderProfilesPage(){ const c=document.getElementById("page-profiles"); if(!c) return; let h=`<div class="card"><h2>👤 Player Profiles</h2>`; for(let p of players.slice(0,20)){ const prof=playerProfiles[p]||{ age:'—', position:'—', yearJoined:'—', gamesPlayed:0 }; h+=`<div class="profile-item">${renderAvatar(p,50)}<div><div>⚽ ${escapeHtml(p)}</div><div><span class="profile-badge">🎂 ${prof.age}</span><span class="profile-badge">⚽ ${prof.position}</span><span class="profile-badge">📅 ${prof.yearJoined}</span><span class="profile-badge">🏆 ${prof.gamesPlayed} games</span></div></div></div>`; } c.innerHTML=h+`<div style="text-align:center;padding:8px;">+ ${players.length-20} more players</div></div>`; }
    
    function renderScoreboardPage(){ const c=document.getElementById("page-scoreboard"); if(!c) return; let stats = {}; players.forEach(p=>stats[p]={goals:0,games:0}); Object.values(matchResults).forEach(m=>{if(m.goals) Object.entries(m.goals).forEach(([p,c]) => { if(stats[p]) stats[p].goals += c; });}); const topScorers = Object.entries(stats).sort((a,b)=>b[1].goals - a[1].goals).slice(0,10); c.innerHTML = `<div class="card"><h2>🏆 ALL-TIME TOP SCORERS</h2>${topScorers.map(([name,data],i)=>`<div class="admin-team-item"><span>${i+1}. ${renderMiniAvatar(name)} ${escapeHtml(name)}</span><span>⚽ ${data.goals}</span></div>`).join('')}</div>`; }
    
    function renderTeamsPage(){ const c=document.getElementById("page-teamswk"); if(!c) return; const parts=getAllParticipants(CURRENT_GAME_STR); const allList=[...parts.players.map(p=>({ name:p })), ...parts.guests.map(g=>({ name:g.name }))]; const assign=teamAssignments[CURRENT_GAME_STR]||{}; const yellow=allList.filter(p=>assign[p.name]==="yellow"); const orange=allList.filter(p=>assign[p.name]==="orange"); c.innerHTML=`<div class="card"><div class="team-row"><div class="team-box"><div class="team-yellow">🟡 YELLOW (${yellow.length})</div><div>${yellow.map(p=>`<div class="player-tag">${renderMiniAvatar(p.name)} ${escapeHtml(p.name)}</div>`).join('')||'—'}</div></div><div class="team-box"><div class="team-orange">🟠 ORANGE (${orange.length})</div><div>${orange.map(p=>`<div class="player-tag">${renderMiniAvatar(p.name)} ${escapeHtml(p.name)}</div>`).join('')||'—'}</div></div></div></div>`; }
    
    function renderHistoryPage(){ 
        const c = document.getElementById("page-history"); 
        if(!c) return; 
        if(Object.keys(matchResults).length === 0){ 
            c.innerHTML = `<div class="card"><h2>📖 Match History</h2><p>Loading historical matches from Firebase...</p></div>`; 
            return; 
        }
        let h = `<div class="card"><h2>📖 MATCH HISTORY (${Object.keys(matchResults).length} games)</h2></div>`;
        const sortedDates = Object.keys(matchResults).sort().reverse();
        for(let date of sortedDates.slice(0,15)){
            const m = matchResults[date];
            const dateObj = new Date(date);
            const label = `Mon ${dateObj.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}`;
            h += `<div class="match-card"><div class="match-header"><div>${label}</div><div class="match-result">🟡 ${m.yellowScore} - ${m.orangeScore} 🟠</div></div>
            <div class="goals-section"><div>⚽ ${Object.entries(m.goals||{}).map(([p,c])=>`${p}(${c})`).join(', ') || 'none'}</div>
            <div>🏆 MVP: ${m.mvp || '—'}</div>${m.injuries?.length ? `<div>🩺 Injuries: ${m.injuries.join(', ')}</div>` : ''}</div></div>`;
        }
        c.innerHTML = h;
    }
    
    function renderWeatherPage(){ const c=document.getElementById("page-weather"); if(c) c.innerHTML=`<div class="card"><h2>🌤️ BOM Forecast • ${getCurrentGameLabel()} 8pm</h2><div class="weather-card"><i class="fas ${weatherData.icon}" style="font-size:56px;"></i><h3>${weatherData.condition}</h3><h1 style="font-size:52px;">${weatherData.temp}</h1><p>🌧️ Rain chance: ${weatherData.rainChance}%</p><p>📍 Clifton Park, Brunswick</p></div></div>`; }
    function renderRulesPage(){ const c=document.getElementById("page-rules"); if(c) c.innerHTML=`<div class="card"><h2>📜 League Rules</h2><div style="white-space:pre-line">• ⏰ 8:00pm SHARP kickoff at Clifton Park\n• ✅ RSVP is mandatory\n• 🎭 Guests welcome!\n• 📝 Match reports auto-generated & saved to Firebase</div></div>`; }
    
    // ==================== ADMIN PAGE ====================
    function renderAdminPage(){
        if(!isAdminLoggedIn){ const c=document.getElementById("page-admin"); if(c) c.innerHTML=`<div class="card"><h2>🔒 Admin</h2><button id="adminLoginBtn">Admin Login</button></div>`; document.getElementById("adminLoginBtn")?.addEventListener("click",()=>{ const pw=prompt("Enter admin password:"); if(pw==="admin123"){ isAdminLoggedIn=true; renderAdminPage(); refreshAll(); } else alert("Wrong password"); }); return; }
        const gameDate=CURRENT_GAME_STR;
        const parts=getAllParticipants(gameDate);
        const allList=[...parts.players.map(p=>({ name:p })), ...parts.guests.map(g=>({ name:g.name }))];
        const currAssign=teamAssignments[gameDate]||{};
        const pastDates = Object.keys(matchResults).sort().reverse();
        
        let html = `<div class="info-bar">🔐 ADMIN MODE</div>
        <div class="card"><h2>🎭 Manage Guests</h2>${parts.guests.map(g=>`<div class="admin-team-item"><span><strong>${escapeHtml(g.name)}</strong></span><button class="remove-guest-btn" data-guest="${escapeHtml(g.name)}" data-date="${gameDate}" style="background:#dc3545;">Remove</button></div>`).join('')}<div><input id="adminGuestName" placeholder="New guest"><button id="adminAddGuestBtn">+ Add Guest</button></div></div>
        <div class="card"><h2>⚽ Assign Teams</h2>${allList.map(p=>{ const ct=currAssign[p.name] || ""; return `<div class="admin-team-item"><div>${renderMiniAvatar(p.name)} ${escapeHtml(p.name)}</div><select class="team-select" data-name="${escapeHtml(p.name)}"><option value="">— Team —</option><option value="yellow" ${ct==="yellow"?"selected":""}>🟡 Yellow</option><option value="orange" ${ct==="orange"?"selected":""}>🟠 Orange</option></select></div>`; }).join('')}<div class="flex-btns"><button id="autoBalanceBtn" class="btn-outline">🎲 Auto-Balance</button><button id="saveTeamsBtn">💾 Save Teams</button></div></div>
        <div class="card"><h2>📰 Generate Report for Past Week</h2><select id="reportWeekSelect"><option value="">-- Select a past match week --</option>${pastDates.map(date=>`<option value="${date}">${date}</option>`).join('')}</select><div id="matchReportForm" style="display:none;margin-top:12px;"><div style="display:flex;gap:12px;"><input type="number" id="reportYellowScore" placeholder="Yellow Score" style="flex:1;"><input type="number" id="reportOrangeScore" placeholder="Orange Score" style="flex:1;"></div><div><label>⚽ Goal Scorers</label><div id="goalsList"></div><button id="addGoalBtn" class="btn-outline">+ Add Goal</button></div><div><label>🎯 Assists</label><div id="assistsList"></div><button id="addAssistBtn" class="btn-outline">+ Add Assist</button></div><div><label>🏆 MVP</label><input id="mvpInput" placeholder="MVP"></div><div><label>🩺 Injuries</label><input id="injuriesInput"></div><button id="submitMatchReportBtn" style="background:#b45309;">📰 GENERATE & SAVE REPORT</button><div id="generatedReport" class="newspaper-report" style="display:none;"></div><button id="whatsappShareBtn" class="whatsapp-share" style="display:none;"><i class="fab fa-whatsapp"></i> Share to WhatsApp</button></div></div></div>`;
        
        const container=document.getElementById("page-admin"); if(container) container.innerHTML=html;
        
        let goals = [], assists = [];
        function updateFormFields(week){
            const existing = matchResults[week];
            if(existing){
                document.getElementById("reportYellowScore").value = existing.yellowScore||0;
                document.getElementById("reportOrangeScore").value = existing.orangeScore||0;
                document.getElementById("mvpInput").value = existing.mvp||'';
                document.getElementById("injuriesInput").value = (existing.injuries||[]).join(', ');
                goals = Object.entries(existing.goals||{}).map(([p,c])=>({player:p, count:c}));
                assists = Object.entries(existing.assists||{}).map(([p,c])=>({player:p, count:c}));
            } else {
                goals = []; assists = [];
            }
            renderGoals(); renderAssists();
        }
        function renderGoals(){ const div=document.getElementById("goalsList"); if(div) div.innerHTML=goals.map((g,idx)=>`<div class="stats-row"><input placeholder="Player" value="${escapeHtml(g.player)}" data-idx="${idx}" class="goal-player"><input type="number" placeholder="Goals" value="${g.count}" data-cidx="${idx}" style="width:80px;"><button onclick="window.removeGoal(${idx})" style="background:#dc3545;">✖</button></div>`).join(''); document.querySelectorAll('.goal-player').forEach(inp=>inp.addEventListener('change',(e)=>{ const idx=e.target.dataset.idx; if(goals[idx]) goals[idx].player=e.target.value; })); }
        function renderAssists(){ const div=document.getElementById("assistsList"); if(div) div.innerHTML=assists.map((a,idx)=>`<div class="stats-row"><input placeholder="Player" value="${escapeHtml(a.player)}" data-idx="${idx}" class="assist-player"><input type="number" placeholder="Assists" value="${a.count}" data-cidx="${idx}" style="width:80px;"><button onclick="window.removeAssist(${idx})" style="background:#dc3545;">✖</button></div>`).join(''); document.querySelectorAll('.assist-player').forEach(inp=>inp.addEventListener('change',(e)=>{ const idx=e.target.dataset.idx; if(assists[idx]) assists[idx].player=e.target.value; })); }
        window.removeGoal = (idx)=>{ goals.splice(idx,1); renderGoals(); };
        window.removeAssist = (idx)=>{ assists.splice(idx,1); renderAssists(); };
        
        document.getElementById("addGoalBtn")?.addEventListener("click",()=>{ goals.push({player:'',count:1}); renderGoals(); });
        document.getElementById("addAssistBtn")?.addEventListener("click",()=>{ assists.push({player:'',count:1}); renderAssists(); });
        
        const weekSelect = document.getElementById("reportWeekSelect");
        weekSelect?.addEventListener("change",(e)=>{ const week=e.target.value; if(week){ document.getElementById("matchReportForm").style.display="block"; updateFormFields(week); document.getElementById("generatedReport").style.display="none"; document.getElementById("whatsappShareBtn").style.display="none"; } });
        
        document.getElementById("submitMatchReportBtn")?.addEventListener("click",async()=>{ const week=weekSelect.value; if(!week){ alert("Select a week"); return; } const y=parseInt(document.getElementById("reportYellowScore").value)||0; const o=parseInt(document.getElementById("reportOrangeScore").value)||0; const mvp=document.getElementById("mvpInput").value; const injuries=document.getElementById("injuriesInput").value.split(',').map(i=>i.trim()).filter(i=>i); const goalObj={}; goals.forEach(g=>{ if(g.player && g.count>0) goalObj[g.player]=(goalObj[g.player]||0)+g.count; }); const assistObj={}; assists.forEach(a=>{ if(a.player && a.count>0) assistObj[a.player]=(assistObj[a.player]||0)+a.count; }); await saveMatchResult(week,y,o,goalObj,assistObj,mvp,injuries); const report=generateNewspaperReport(week,y,o,goalObj,assistObj,mvp,injuries); const preview=document.getElementById("generatedReport"); if(preview){ preview.innerHTML=report.replace(/\n/g,'<br>'); preview.style.display="block"; } const whatsappBtn=document.getElementById("whatsappShareBtn"); if(whatsappBtn){ whatsappBtn.style.display="block"; whatsappBtn.onclick=()=>window.open(`https://wa.me/?text=${encodeURIComponent(report)}`,'_blank'); } alert("Report saved!"); renderHistoryPage(); renderScoreboardPage(); });
        
        document.getElementById("adminAddGuestBtn")?.addEventListener("click",async()=>{ const inp=document.getElementById("adminGuestName"); const name=inp?.value.trim(); if(name){ await saveGuest({ guestName:name, gameDate:gameDate, addedBy:"Admin" }); inp.value=""; renderAdminPage(); } });
        document.querySelectorAll(".remove-guest-btn").forEach(btn=>btn.addEventListener("click",async()=>{ const guest=btn.dataset.guest; const date=btn.dataset.date; if(firebaseReady&&db) await db.collection("guests").doc(`${guest}_${date}`).delete(); guests = guests.filter(g=>!(g.guestName===guest && g.gameDate===date)); renderAdminPage(); }));
        document.getElementById("saveTeamsBtn")?.addEventListener("click",async()=>{ const newAssign={}; document.querySelectorAll(".team-select").forEach(sel=>{ const name=sel.dataset.name; const val=sel.value; if(val && name) newAssign[name]=val; }); await saveTeamAssignments(gameDate,newAssign); renderAdminPage(); renderTeamsPage(); });
        document.getElementById("autoBalanceBtn")?.addEventListener("click",()=>{ const playersList=allList.map(p=>p.name); const shuffled=[...playersList]; for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; } const half=Math.ceil(shuffled.length/2); const autoAssign={}; shuffled.forEach((p,idx)=>{ autoAssign[p]=idx<half?"yellow":"orange"; }); saveTeamAssignments(gameDate,autoAssign).then(()=>{ renderAdminPage(); renderTeamsPage(); }); });
        renderGoals(); renderAssists();
    }
    
    // ==================== LOGIN & INIT ====================
    function showLoginModal(){
        const modal=document.createElement('div'); modal.className='modal';
        modal.innerHTML=`<div class="modal-content"><div class="login-logo"><i class="fas fa-futbol fa-3x"></i></div><h3>Monday Night Soccer</h3><select id="loginNameSelect"><option value="">Select your name</option>${players.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}</select><button id="loginBtn">Login / Join</button><div style="margin-top:12px;"><button id="adminSwitchBtn" class="btn-outline" style="width:100%;">🔐 Admin Access</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById("loginBtn").onclick=()=>{ const sel=document.getElementById("loginNameSelect"); const name=sel?.value; if(name && players.includes(name)){ currentUser={name}; isAdminLoggedIn=false; modal.remove(); document.getElementById("userNameDisplay").innerText=name; document.getElementById("logoutBtn").style.display="inline-block"; refreshAll(); } else alert("Select your name"); };
        document.getElementById("adminSwitchBtn").onclick=()=>{ const pw=prompt("Admin password:"); if(pw==="admin123"){ isAdminLoggedIn=true; currentUser={name:"Admin"}; document.getElementById("userNameDisplay").innerText="Admin"; document.getElementById("logoutBtn").style.display="inline-block"; modal.remove(); refreshAll(); renderAdminPage(); } else alert("Wrong password"); };
    }
    function logout(){ currentUser=null; isAdminLoggedIn=false; document.getElementById("userNameDisplay").innerText="Not logged in"; document.getElementById("logoutBtn").style.display="none"; showLoginModal(); refreshAll(); }
    
    async function initApp(){
        const appDiv=document.getElementById("app");
        appDiv.innerHTML=`<div class="header"><div class="logo-icon"><i class="fas fa-futbol"></i></div><h1>MONDAY NIGHT SOCCER</h1><div class="user-row"><span id="userNameDisplay">Not logged in</span><button id="logoutBtn" style="display:none;">Logout</button></div></div><div class="top-nav"><button class="nav-module active" data-module="home">🏠 Home</button><button class="nav-module" data-module="teamswk">⚽ Teams</button><button class="nav-module" data-module="history">📖 History</button><button class="nav-module" data-module="scoreboard">🏆 Stats</button><button class="nav-module" data-module="profiles">👤 Profiles</button><button class="nav-module" data-module="timer">⏱️ Timer</button><button class="nav-module" data-module="chat">💬 Chat</button><button class="nav-module" data-module="weather">🌤️ Weather</button><button class="nav-module" data-module="rules">📜 Rules</button><button class="nav-module" data-module="admin">🔧 Admin</button></div><div id="homeContainer" class="module-container active-module"></div><div id="page-teamswk" class="module-container"></div><div id="page-history" class="module-container"></div><div id="page-scoreboard" class="module-container"></div><div id="page-profiles" class="module-container"></div><div id="page-timer" class="module-container"></div><div id="page-chat" class="module-container"></div><div id="page-weather" class="module-container"></div><div id="page-rules" class="module-container"></div><div id="page-admin" class="module-container"></div>`;
        document.querySelectorAll(".nav-module").forEach(btn=>{ btn.addEventListener("click",()=>{ document.querySelectorAll(".nav-module").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); const mod=btn.dataset.module; document.querySelectorAll(".module-container").forEach(c=>c.classList.remove("active-module")); if(mod==="home") document.getElementById("homeContainer").classList.add("active-module"); else document.getElementById(`page-${mod}`).classList.add("active-module"); if(mod==="chat") renderChatPage(); if(mod==="timer") renderTimerPage(); if(mod==="weather") renderWeatherPage(); if(mod==="rules") renderRulesPage(); }); });
        document.getElementById("logoutBtn").onclick=logout;
        if(firebaseReady) { 
            await seedHistoricalData(); 
            await loadAllData(); 
            showLoginModal(); 
            fetchWeather(); 
        } else { 
            showLoginModal(); 
            refreshAll(); 
        }
    }
    initApp();
</script>
</body>
</html>
