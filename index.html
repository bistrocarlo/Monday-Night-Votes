<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Monday Night Soccer | Full Feature App</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #eef2f5; font-family: 'Inter', -apple-system, sans-serif; }
        .app { max-width: 500px; margin: 0 auto; background: #eef2f5; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: white; padding: 14px 20px; text-align: center; border-bottom: 1px solid #e2e8f0; }
        .logo-icon { width: 56px; height: 56px; background: #1a73e8; border-radius: 24px; display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 6px; }
        .logo-icon i { font-size: 28px; color: white; }
        .header h1 { font-size: 18px; font-weight: 800; color: #1e293b; }
        .user-row { background: #f1f5f9; padding: 5px 12px; border-radius: 60px; display: inline-flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 12px; font-weight: 500; }
        .user-row button { background: #dc3545; border: none; padding: 4px 12px; border-radius: 40px; color: white; font-weight: 600; font-size: 11px; cursor: pointer; }
        .top-nav { background: white; padding: 10px 12px; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 10; }
        .nav-module { background: #f8fafc; border: none; padding: 8px 14px; border-radius: 60px; font-size: 12px; font-weight: 600; color: #475569; cursor: pointer; transition: all 0.2s; }
        .nav-module.active { background: #1a73e8; color: white; }
        .module-container { flex: 1; overflow-y: auto; padding: 16px; display: none; }
        .module-container.active-module { display: block; }
        .card { background: white; border-radius: 24px; padding: 18px; margin-bottom: 14px; border: 1px solid #e2e8f0; }
        .card h2 { font-size: 17px; font-weight: 700; margin-bottom: 14px; border-left: 4px solid #1a73e8; padding-left: 12px; }
        .attendance-card { background: linear-gradient(135deg, #1a73e8, #0d5bbf); color: white; border-radius: 28px; padding: 24px 20px; text-align: center; margin-bottom: 16px; }
        .big-buttons { display: flex; gap: 14px; justify-content: center; margin: 16px 0 12px; }
        .btn-play-big { background: #28a745; flex: 1; padding: 14px; border-radius: 60px; font-weight: 800; font-size: 17px; border: none; color: white; cursor: pointer; }
        .btn-sit-big { background: #dc3545; flex: 1; padding: 14px; border-radius: 60px; font-weight: 800; font-size: 17px; border: none; color: white; cursor: pointer; }
        .profile-item { background: #f8fafc; border-radius: 20px; padding: 14px; margin-bottom: 10px; border-left: 4px solid #1a73e8; display: flex; align-items: center; gap: 12px; }
        .profile-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 20px; flex-shrink: 0; }
        .player-avatar-small { width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; margin-right: 4px; }
        .profile-badge { background: white; border-radius: 40px; padding: 4px 12px; font-size: 11px; font-weight: 600; display: inline-block; margin-right: 6px; margin-bottom: 4px; }
        .edit-profile-btn { background: #475569; padding: 6px 14px; font-size: 12px; border-radius: 40px; border: none; color: white; cursor: pointer; }
        .match-card { background: white; border-radius: 24px; margin-bottom: 14px; border: 1px solid #e2e8f0; overflow: hidden; }
        .match-header { background: #f8fafc; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .match-date { font-weight: 800; font-size: 14px; }
        .match-result { background: #1a73e8; color: white; padding: 4px 14px; border-radius: 40px; font-weight: 700; font-size: 14px; }
        .teams-section { padding: 16px; background: linear-gradient(145deg, #2e7d32, #1b5e20); }
        .team-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .team-box { flex: 1; background: rgba(0,0,0,0.65); border-radius: 18px; padding: 12px; }
        .team-yellow { background: #ffc107; color: #2c2c2c; font-weight: 800; text-align: center; padding: 6px; border-radius: 60px; font-size: 14px; margin-bottom: 8px; }
        .team-orange { background: #fd7e14; color: white; font-weight: 800; text-align: center; padding: 6px; border-radius: 60px; font-size: 14px; margin-bottom: 8px; }
        .player-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .player-tag { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.2); border-radius: 40px; padding: 4px 10px; font-size: 11px; color: white; margin: 2px; }
        .score-big { text-align: center; margin-top: 12px; font-size: 22px; font-weight: 800; background: rgba(0,0,0,0.6); border-radius: 60px; padding: 8px; color: white; }
        .goals-section, .comments-section { padding: 12px 16px; background: #fefce8; }
        .goals-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .goal-badge { background: white; border-radius: 40px; padding: 5px 12px; font-size: 12px; font-weight: 600; border-left: 3px solid #eab308; }
        .add-comment { display: flex; gap: 8px; margin-top: 10px; }
        .add-comment input { flex: 1; padding: 12px; border-radius: 60px; border: 1.5px solid #e2e8f0; font-size: 14px; }
        .comment-item { background: #f8fafc; border-radius: 16px; padding: 10px; margin-bottom: 8px; font-size: 13px; }
        .weather-card { background: linear-gradient(135deg, #0f2027, #203a43); color: white; border-radius: 24px; padding: 20px; text-align: center; }
        .admin-team-item { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; background: #f1f5f9; border-radius: 60px; padding: 8px 16px; flex-wrap: wrap; gap: 8px; }
        .admin-action-btn { background: white; border: 2px solid #1a73e8; color: #1a73e8; padding: 12px; border-radius: 60px; font-weight: 700; font-size: 14px; text-align: center; cursor: pointer; margin-bottom: 8px; width: 100%; }
        .guest-tag { background: #d4edda; color: #155724; border-radius: 40px; padding: 6px 12px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
        .playing-list { background: #e8f0fe; border-radius: 20px; padding: 16px; margin-bottom: 14px; }
        .guest-section { background: #f0fdf4; border-radius: 20px; padding: 16px; margin-bottom: 14px; border: 1px solid #bbf7d0; }
        .attendee-tag { display: inline-flex; align-items: center; gap: 6px; background: #e2e8f0; padding: 6px 12px; border-radius: 40px; font-size: 13px; margin: 4px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th, .data-table td { padding: 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        .badge-paid { background: #28a745; color: white; border-radius: 40px; padding: 4px 12px; font-size: 11px; display: inline-block; }
        .badge-owing { background: #dc3545; color: white; border-radius: 40px; padding: 4px 12px; font-size: 11px; display: inline-block; }
        .finance-summary { background: linear-gradient(135deg, #1a73e8, #0d5bbf); color: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; text-align: center; }
        .finance-summary .amount { font-size: 32px; font-weight: 800; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 32px; padding: 24px; max-width: 340px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .login-box { background: white; border-radius: 48px; padding: 40px 28px; margin: 40px 20px; text-align: center; }
        .login-logo { width: 90px; height: 90px; background: linear-gradient(135deg, #1a73e8, #0d5bbf); border-radius: 32px; display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        select, input { width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 60px; margin: 8px 0; font-size: 16px; background: white; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 20px; border-radius: 60px; font-weight: 700; cursor: pointer; }
        .flex-btns { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; }
        .btn-outline { background: white; color: #1a73e8; border: 2px solid #1a73e8; }
        hr { margin: 16px 0; }
        .chat-message { margin-bottom: 12px; display: flex; flex-direction: column; }
        .chat-name { font-weight: 700; font-size: 12px; color: #1a73e8; margin-bottom: 4px; }
        .chat-bubble { background: #f1f5f9; padding: 10px 14px; border-radius: 18px; font-size: 14px; word-wrap: break-word; }
        .chat-time { font-size: 10px; color: #94a3b8; margin-top: 2px; }
        .loading { text-align: center; padding: 40px; color: #64748b; }
        .info-bar { background: #e8f0fe; border-radius: 16px; padding: 10px; font-size: 12px; margin-bottom: 16px; text-align: center; color: #1a73e8; font-weight: 500; }
        @media (max-width: 450px) { .nav-module { padding: 6px 10px; font-size: 10px; } }
    </style>
</head>
<body>
<div class="app" id="app"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>

<script>
    // Default player list
    const DEFAULT_PLAYERS = ["Alex Rowe","Ali Mekawy","Carlo","Charlie","Chris Del Monaco","Chris M","Chris S","Danny","Dante","David","Dimitri","Enzo","Farid","Faros","Frank","George B","George T","Ivan","James Zoumis","James","Joe T","Joey","Kia","Leo","Manoli","Marco","Mario","Maurice","Nector","Paul","Perri","Peter","Ralph","Rocco","Stav","Stevan","Theo","Tony EH","Vasilis"].sort();
    
    const firebaseConfig = {
        apiKey: "AIzaSyCWlFqDJyENgrUOhiLXCjSEi4Mk_54SA1w",
        authDomain: "monday-night-soccer-hub.firebaseapp.com",
        projectId: "monday-night-soccer-hub",
        storageBucket: "monday-night-soccer-hub.firebasestorage.app",
        messagingSenderId: "634335208908",
        appId: "1:634335208908:web:dca705b65fc52de0606969"
    };
    
    let db = null, firebaseReady = false;
    try { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); firebaseReady = true; console.log("Firebase ready"); } catch(e) { console.warn("Firebase demo mode"); }
    
    // Global state
    let players = [...DEFAULT_PLAYERS];
    let playerProfiles = {};
    let teamAssignments = {};
    let matchResults = {};
    let attendance = [];
    let guests = [];
    let payments = [];
    let matchComments = {};
    let isAdminLoggedIn = false, currentUser = null;
    let weeklyCaptain = "Carlo";
    let weatherData = { temp: "18°C", condition: "Clear", icon: "fa-sun", rainChance: 10 };
    let rulesText = "• ⏰ 8:00pm SHARP kickoff at Clifton Park\n• 💰 $5 weekly fee\n• 👑 Captain rotates\n• ✅ RSVP is mandatory\n• 🎭 Guests welcome!";
    const POSITIONS = ["Goalkeeper","Defender","Midfielder","Striker","Winger"];
    let chatUnsubscribe = null;
    const WEEKLY_FEE = 5;
    
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function getInitials(name) { return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0,2); }
    function getAvatarColor(name) {
        const colors = ['#1a73e8', '#28a745', '#dc3545', '#fd7e14', '#6f42c1', '#20c997', '#e83e8c'];
        let hash = 0;
        for(let i=0;i<name.length;i++) hash = ((hash<<5)-hash)+name.charCodeAt(i);
        return colors[Math.abs(hash)%colors.length];
    }
    function renderAvatar(name, size=50) { return `<div class="profile-avatar" style="background:${getAvatarColor(name)}; width:${size}px; height:${size}px; font-size:${size/2.5}px;">${getInitials(name)}</div>`; }
    function renderMiniAvatar(name, size=28) { return `<div class="player-avatar-small" style="background:${getAvatarColor(name)}; width:${size}px; height:${size}px; font-size:${size/2}px;">${getInitials(name)}</div>`; }
    
    // ========== AEST TIMEZONE WITH 9:30PM MONDAY CUTOFF ==========
    function getAESTNow() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        return new Date(utc + (10 * 3600000));
    }
    
    function getCurrentGameWeek() {
        const aestNow = getAESTNow();
        const day = aestNow.getDay();      // 1 = Monday
        const hour = aestNow.getHours();
        const minute = aestNow.getMinutes();
        
        // Start with today's date
        let gameMonday = new Date(aestNow);
        
        if (day !== 1) {
            // Not Monday: go back to the most recent Monday
            const daysToSubtract = (day === 0) ? 6 : (day - 1);
            gameMonday.setDate(aestNow.getDate() - daysToSubtract);
        }
        // If it's Monday AND time is 9:30pm or later, move to NEXT Monday
        if (day === 1 && (hour > 21 || (hour === 21 && minute >= 30))) {
            gameMonday.setDate(gameMonday.getDate() + 7);
        }
        gameMonday.setHours(0, 0, 0, 0);
        return gameMonday.toISOString().split('T')[0];
    }
    
    function getGameLabelFromDateStr(dateStr) {
        const d = new Date(dateStr + "T00:00:00+10:00");
        return `Mon ${d.toLocaleDateString('en-AU', {day:'numeric', month:'short'})}`;
    }
    
    function generateAllGameWeeks() {
        const year = new Date().getFullYear();
        let start = new Date(year, 0, 1);
        while(start.getDay() !== 1) start.setDate(start.getDate() + 1);
        let weeks = [], cur = new Date(start);
        let dec31 = new Date(year, 11, 31);
        let lastMonday = new Date(dec31);
        while(lastMonday.getDay() !== 1) lastMonday.setDate(lastMonday.getDate() - 1);
        let secondLast = new Date(lastMonday);
        secondLast.setDate(secondLast.getDate() - 7);
        while(cur <= secondLast) {
            weeks.push({ dateStr: cur.toISOString().split('T')[0], label: getGameLabelFromDateStr(cur.toISOString().split('T')[0]) });
            cur.setDate(cur.getDate() + 7);
        }
        return weeks;
    }
    
    const ALL_WEEKS = generateAllGameWeeks();
    const CURRENT_GAME_STR = getCurrentGameWeek();
    const getFutureWeeks = () => ALL_WEEKS.filter(w => w.dateStr >= CURRENT_GAME_STR);
    const getPastWeeks = () => ALL_WEEKS.filter(w => w.dateStr < CURRENT_GAME_STR).reverse();
    
    function getAllParticipants(gameDate) {
        const playersIn = attendance.filter(a => a.gameDate === gameDate && a.status === 'in').map(a => a.player);
        const guestsIn = guests.filter(g => g.gameDate === gameDate).map(g => ({ name: g.guestName, isGuest: true, addedBy: g.addedBy }));
        return { players: playersIn, guests: guestsIn };
    }
    
    // Weather API
    async function fetchWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-37.77&longitude=144.97&hourly=temperature_2m,precipitation_probability,weathercode&timezone=Australia/Melbourne&forecast_days=1');
            const data = await response.json();
            const nextMonday = new Date(); nextMonday.setDate(nextMonday.getDate() + ((1 + 7 - nextMonday.getDay()) % 7)); nextMonday.setHours(20,0,0,0);
            const mondayDateStr = nextMonday.toISOString().split('T')[0];
            for(let i=0;i<data.hourly.time.length;i++) {
                const hourDate = data.hourly.time[i].split('T')[0];
                const hour = parseInt(data.hourly.time[i].split('T')[1].substring(0,2));
                if(hourDate === mondayDateStr && hour === 20) {
                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    const code = data.hourly.weathercode[i];
                    let condition="Clear", icon="fa-sun";
                    if(code===0) { condition="Clear"; icon="fa-sun"; }
                    else if(code===1||code===2) { condition="Partly cloudy"; icon="fa-cloud-sun"; }
                    else if(code===3) { condition="Overcast"; icon="fa-cloud"; }
                    else if(code>=51&&code<=67) { condition="Light rain"; icon="fa-cloud-rain"; }
                    else if(code>=80&&code<=99) { condition="Rain/storm"; icon="fa-cloud-bolt"; }
                    weatherData = { temp: `${temp}°C`, condition, icon, rainChance: data.hourly.precipitation_probability[i] || 0 };
                    break;
                }
            }
        } catch(e) { console.warn("Weather fetch failed"); }
        renderWeatherPage();
    }
    
    // Firebase CRUD
    async function loadData() {
        if(!firebaseReady || !db) return;
        try {
            const [pDoc, profileDoc, tDoc, rDoc, attSnap, guestSnap, paySnap, commentsSnap, rulesDoc] = await Promise.all([
                db.collection("config").doc("players").get().catch(()=>null),
                db.collection("config").doc("playerProfiles").get().catch(()=>null),
                db.collection("config").doc("teamAssignments").get().catch(()=>null),
                db.collection("config").doc("matchResults").get().catch(()=>null),
                db.collection("attendance").get().catch(()=>({docs:[]})),
                db.collection("guests").get().catch(()=>({docs:[]})),
                db.collection("payments").get().catch(()=>({docs:[]})),
                db.collection("matchComments").get().catch(()=>({docs:[]})),
                db.collection("config").doc("rules").get().catch(()=>null)
            ]);
            if(pDoc?.exists) players = pDoc.data().list.sort();
            if(profileDoc?.exists) playerProfiles = profileDoc.data();
            if(tDoc?.exists) teamAssignments = tDoc.data();
            if(rDoc?.exists) matchResults = rDoc.data();
            attendance = attSnap.docs.map(d => d.data());
            guests = guestSnap.docs.map(d => d.data());
            payments = paySnap.docs.map(d => d.data());
            matchComments = {};
            commentsSnap.docs.forEach(doc => { const data=doc.data(); if(!matchComments[data.gameDate]) matchComments[data.gameDate]=[]; matchComments[data.gameDate].push(data); });
            if(rulesDoc?.exists && rulesDoc.data().text) rulesText = rulesDoc.data().text;
            for(let p of players) if(!playerProfiles[p]) playerProfiles[p] = { age:'—', position:'—', yearJoined:'—', gamesPlayed:0, openingBalanceGames:0 };
        } catch(e) { console.warn(e); }
    }
    
    async function saveAttendance(a) {
        if(firebaseReady && db) await db.collection("attendance").doc(`${a.player}_${a.gameDate}`).set(a);
        const idx = attendance.findIndex(x => x.player === a.player && x.gameDate === a.gameDate);
        if(idx !== -1) attendance[idx] = a; else attendance.push(a);
        const gamesFromAttendance = attendance.filter(att => att.player === a.player && att.status === 'in').length;
        const opening = playerProfiles[a.player]?.openingBalanceGames || 0;
        if(playerProfiles[a.player]) playerProfiles[a.player].gamesPlayed = gamesFromAttendance + opening;
        else playerProfiles[a.player] = { age:'—', position:'—', yearJoined:'—', gamesPlayed: gamesFromAttendance + opening, openingBalanceGames:0 };
        if(firebaseReady && db) await db.collection("config").doc("playerProfiles").set(playerProfiles);
        refreshAllDisplays();
    }
    
    async function savePayment(payment) {
        if(firebaseReady && db) await db.collection("payments").doc(`${payment.player}_${payment.gameDate}`).set(payment);
        const idx = payments.findIndex(p => p.player === payment.player && p.gameDate === payment.gameDate);
        if(idx !== -1) payments[idx] = payment; else payments.push(payment);
        if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function saveGuest(g) {
        if(firebaseReady && db) await db.collection("guests").doc(`${g.guestName}_${g.gameDate}`).set(g);
        guests.push(g);
        refreshAllDisplays();
    }
    
    async function removeGuest(guestName, gameDate) {
        if(!confirm(`Remove guest "${guestName}"?`)) return;
        if(firebaseReady && db) await db.collection("guests").doc(`${guestName}_${gameDate}`).delete();
        guests = guests.filter(g => !(g.guestName === guestName && g.gameDate === gameDate));
        if(teamAssignments[gameDate]) { delete teamAssignments[gameDate][guestName]; delete teamAssignments[gameDate][`guest_${guestName}`]; if(firebaseReady && db) await db.collection("config").doc("teamAssignments").set(teamAssignments); }
        refreshAllDisplays();
    }
    
    async function saveTeamAssignments(gameDate, assignments) {
        teamAssignments[gameDate] = assignments;
        if(firebaseReady && db) await db.collection("config").doc("teamAssignments").set(teamAssignments);
        refreshAllDisplays();
    }
    
    async function saveComment(gameDate, author, text) {
        const comment = { gameDate, author, text, timestamp: Date.now() };
        if(firebaseReady && db) await db.collection("matchComments").add(comment);
        if(!matchComments[gameDate]) matchComments[gameDate]=[];
        matchComments[gameDate].push(comment);
        renderHistoryPage();
    }
    
    async function saveMatchResult(gameDate, yellowScore, orangeScore, goals) {
        matchResults[gameDate] = { yellowScore, orangeScore, goals };
        if(firebaseReady && db) await db.collection("config").doc("matchResults").set(matchResults);
        renderHistoryPage(); renderScoreboardPage();
        if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function saveChatMessage(message) {
        if(!currentUser || !message.trim()) return;
        if(firebaseReady && db) {
            await db.collection("chatMessages").add({
                name: currentUser.name,
                message: message.trim(),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }
    }
    
    async function adminAddManualAttendance(playerName) {
        const nextWeek = getFutureWeeks()[0];
        if(!nextWeek) { alert("No upcoming game week"); return; }
        if(!players.includes(playerName)) { alert(`Player "${playerName}" not in roster.`); return; }
        const existing = attendance.find(a => a.player === playerName && a.gameDate === nextWeek.dateStr);
        if(existing && existing.status === 'in') { alert(`${playerName} is already playing`); return; }
        await saveAttendance({ player: playerName, gameDate: nextWeek.dateStr, status: 'in', manuallyAdded: true });
        alert(`${playerName} added to playing list`);
    }
    
    async function setAttendance(status) {
        if(!currentUser) { alert("Login required"); return; }
        await saveAttendance({ player: currentUser.name, gameDate: CURRENT_GAME_STR, status: status });
    }
    
    async function addGuest(guestName) {
        if(guests.some(g => g.gameDate === CURRENT_GAME_STR && g.guestName === guestName.trim())) { alert("Guest already exists"); return; }
        await saveGuest({ guestName: guestName.trim(), gameDate: CURRENT_GAME_STR, addedBy: currentUser?.name || "Admin" });
        const input = document.getElementById("guestNameInput");
        if(input) input.value = "";
    }

    function renderScoreboardPage() {
        const container = document.getElementById("page-scoreboard");
        if(!container) return;
        let stats = new Map();
        for(let player of players) stats.set(player, { goals: 0, appearances: 0 });
        attendance.forEach(a => { if(a.status === 'in' && stats.has(a.player)) stats.get(a.player).appearances++; });
        for(let match of Object.values(matchResults)) if(match.goals) for(let [scorer, count] of Object.entries(match.goals)) if(stats.has(scorer)) stats.get(scorer).goals += count;
        const allStats = Array.from(stats.entries()).map(([name, s]) => ({ name, goals: s.goals, appearances: s.appearances }));
        const topGoals = [...allStats].sort((a,b) => b.goals - a.goals).slice(0,10);
        const topApps = [...allStats].sort((a,b) => {
            const aTotal = a.appearances + (playerProfiles[a.name]?.openingBalanceGames || 0);
            const bTotal = b.appearances + (playerProfiles[b.name]?.openingBalanceGames || 0);
            return bTotal - aTotal;
        }).slice(0,10);
        container.innerHTML = `<div class="card"><h2>🏆 All-Time Leaderboard</h2>
            <div><h3>⚽ Top Goal Scorers</h3><table class="data-table">${topGoals.map((p,i)=>`<tr><td style="width:40px;"><strong>${i+1}</strong></td><td>${renderMiniAvatar(p.name,24)} ${escapeHtml(p.name)}</td><td style="font-weight:700;">${p.goals} goals</td></tr>`).join('')}</table></div>

            const shuffled = [...allList];
            for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
            const mid=Math.ceil(shuffled.length/2);
            const newAssign={};
            shuffled.slice(0,mid).forEach(p=>{newAssign[p.isGuest?`guest_${p.name}`:p.name]="yellow";});

            teamAssignments[CURRENT_GAME_STR]=newAssign;
            await saveTeamAssignments(CURRENT_GAME_STR, teamAssignments[CURRENT_GAME_STR]);
            alert("Teams saved!");
        });
        document.getElementById("pastWeekSelect")?.addEventListener("change", (e) => { const form = document.getElementById("resultForm"); if(form) form.style.display = e.target.value ? "block" : "none"; });
        document.getElementById("saveResultBtn")?.addEventListener("click", async () => {
            const weekDate = document.getElementById("pastWeekSelect").value;
            const yellow = parseInt(document.getElementById("yellowScore")?.value) || 0;
            const orange = parseInt(document.getElementById("orangeScore")?.value) || 0;
            if(weekDate) { await saveMatchResult(weekDate, yellow, orange, {}); alert("Result saved!"); renderHistoryPage(); }
        });
    }
    
    function initNavigation() {
        const modules = [{id:"home",name:"🏠 HOME"},{id:"profiles",name:"👤 PROFILES"},{id:"scoreboard",name:"🏆 STATS"},{id:"teamswk",name:"⚽ THIS WEEK"},{id:"history",name:"📖 HISTORY"},{id:"weather",name:"🌤️ WEATHER"},{id:"chat",name:"💬 CHAT"},{id:"rules",name:"📜 RULES"}];
        if(isAdminLoggedIn) modules.push({id:"admin",name:"⚙️ ADMIN"});
        const navBar = document.getElementById("topNavBar");
        if(navBar) navBar.innerHTML = modules.map(m => `<button class="nav-module" data-module="${m.id}">${m.name}</button>`).join('');
        document.querySelectorAll(".nav-module").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = btn.dataset.module;
                document.querySelectorAll(".module-container").forEach(c => c.classList.remove("active-module"));
                const target = document.getElementById(`module-${id}`);
                if(target) target.classList.add("active-module");
                document.querySelectorAll(".nav-module").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                if(id === "chat") renderChatPage();
            });
        });
        const homeBtn = document.querySelector('.nav-module[data-module="home"]');
        if(homeBtn) homeBtn.click();
    }
    
    async function renderApp() {
        await loadData();
        await fetchWeather();
        const app = document.getElementById("app");
        app.innerHTML = `
            <div class="header"><div class="logo-icon"><i class="fas fa-futbol"></i></div><h1>MONDAY NIGHT SOCCER</h1><div class="user-row"><i class="fas fa-user-circle"></i> <strong>${currentUser.role==="admin"?"ADMIN":currentUser.name}</strong> <button id="logoutBtnMain">Exit</button></div></div>
            <div class="top-nav" id="topNavBar"></div>
            <div id="module-home" class="module-container"><div id="homeContainer"></div></div>
            <div id="module-profiles" class="module-container"><div id="page-profiles"></div></div>
            <div id="module-scoreboard" class="module-container"><div id="page-scoreboard"></div></div>
            <div id="module-teamswk" class="module-container"><div id="page-teamswk"></div></div>
            <div id="module-history" class="module-container"><div id="page-history"></div></div>
            <div id="module-weather" class="module-container"><div id="page-weather"></div></div>
            <div id="module-chat" class="module-container"><div id="page-chat"></div></div>
            <div id="module-rules" class="module-container"><div id="page-rules"></div></div>
            ${isAdminLoggedIn ? `<div id="module-admin" class="module-container"><div id="page-admin"></div></div>` : ''}
        `;
        document.getElementById("logoutBtnMain").onclick = () => { if(chatUnsubscribe) chatUnsubscribe(); currentUser=null; localStorage.removeItem("soccer_user"); renderLogin(); };
        renderHomePage(); 
        renderProfilesPage(); 
        renderScoreboardPage(); 
        renderThisWeeksTeamsPage(); 
        renderHistoryPage(); 
        renderWeatherPage(); 
        renderChatPage(); 
        renderRulesPage(); 
        if(isAdminLoggedIn) renderAdminPage();
        initNavigation();
    }
    
    async function renderLogin() {
        await loadData();
        const app = document.getElementById("app");
        app.innerHTML = `<div class="login-box"><div class="login-logo"><i class="fas fa-futbol"></i></div><h2>Monday Night Soccer</h2><p>8pm Kickoff • Clifton Park</p>
            <select id="playerSelectLogin"><option value="">-- Select Player --</option>${players.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}</select>
            <button id="playerLoginBtn">Enter as Player</button><hr>
            <div style="position:relative;"><input type="password" id="adminPwLogin" placeholder="Admin Password"><i class="fas fa-eye-slash" id="togglePassword" style="position:absolute; right:20px; top:50%; transform:translateY(-50%); cursor:pointer; color:#94a3b8;"></i></div>
            <button id="adminLoginBtn">Admin Login</button></div>`;
        
        document.getElementById("playerLoginBtn").onclick = () => { 
            const select = document.getElementById("playerSelectLogin");
            const n = select?.value; 
            if(n && n !== ""){ 
                currentUser = { name: n, role: "player" }; 
                isAdminLoggedIn = false; 
                localStorage.setItem("soccer_user", JSON.stringify(currentUser)); 
                renderApp(); 
            } else {
                alert("Please select your name from the list");
            }
        };
        document.getElementById("adminLoginBtn").onclick = () => { 
            const pw = document.getElementById("adminPwLogin")?.value; 
            if(pw === "admin123"){ 
                currentUser = { name: "Admin", role: "admin" }; 
                isAdminLoggedIn = true; 
                localStorage.setItem("soccer_user", JSON.stringify(currentUser)); 
                renderApp(); 
            } else alert("Wrong password (hint: admin123)"); 
        };
        const toggleBtn = document.getElementById("togglePassword");
        const pwInput = document.getElementById("adminPwLogin");
        if(toggleBtn && pwInput) {
            toggleBtn.onclick = () => {
                const type = pwInput.type === "password" ? "text" : "password";
                pwInput.type = type;
                toggleBtn.className = type === "password" ? "fas fa-eye-slash" : "fas fa-eye";
            };
        }
    }
    
    // Start the app
    const stored = localStorage.getItem("soccer_user");
    if(stored) { 
        try { 
            const u = JSON.parse(stored); 
            if(u.role === "admin"){ 
                isAdminLoggedIn = true; 
                currentUser = { name: "Admin", role: "admin" }; 
            } else { 
                currentUser = { name: u.name, role: "player" }; 
            } 
            renderApp(); 
        } catch(e){ renderLogin(); } 
    } else { 
        renderLogin(); 
    }
</script>
</body>
</html>
