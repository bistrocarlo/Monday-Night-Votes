<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Monday Soccer – Best & Fairest (3-2-1)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #eef5ff 0%, #d9e9ff 100%);
            font-family: 'Inter', system-ui, sans-serif;
            padding: 24px 20px;
            min-height: 100vh;
            color: #1a2c3e;
        }
        .container { max-width: 1300px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 32px; }
        .header h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 2.2rem;
            background: linear-gradient(135deg, #2c7da0, #1f5068);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header h1 span {
            background: linear-gradient(135deg, #f5b042, #d48d1a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 28px;
            border: 1px solid #f0e2c0;
            box-shadow: 0 6px 14px rgba(0,0,0,0.03);
        }
        .card h2, .card h3 {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1f5068;
            border-left: 5px solid #f5b042;
            padding-left: 18px;
        }
        label {
            font-weight: 600;
            color: #2c5a74;
            display: block;
            margin-top: 16px;
            margin-bottom: 6px;
        }
        select, button {
            padding: 12px 16px;
            border-radius: 60px;
            border: 1px solid #e2d6b0;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: #fffef7;
            width: 100%;
            max-width: 100%;
        }
        button {
            background: #f5b042;
            color: #1f3b4c;
            font-weight: bold;
            border: none;
            cursor: pointer;
            width: auto;
            margin-top: 12px;
        }
        button:hover { background: #ffc46b; transform: translateY(-1px); }
        .flex-btns { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; margin-top: 16px; }
        .game-week {
            background: #fef9ef;
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .vote-status { font-size: 0.8rem; background: #e9e0cf; padding: 4px 12px; border-radius: 60px; }
        .alert {
            background: #fff3cd;
            border-left: 6px solid #f5b042;
            padding: 12px 18px;
            border-radius: 60px;
            margin: 14px 0;
        }
        .success { background: #e3f5ec; border-left-color: #2e7d5e; color: #1f5a43; }
        footer { text-align: center; margin-top: 40px; font-size: 0.75rem; color: #4b6f82; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚽ Monday Night <span>Best & Fairest</span> ⚽</h1>
        <p style="margin-top: 8px;">🏆 3 points • 🥈 2 points • 🥉 1 point</p>
    </div>

    <div class="card">
        <h2>👤 1. Select your name</h2>
        <select id="playerNameSelect"></select>
        <div id="playerMessage"></div>
    </div>

    <div class="card" id="votingCard" style="display: none;">
        <h2>🗳️ 2. Vote for each Monday</h2>
        <div id="gameWeeksList"></div>
        <div class="flex-btns">
            <button id="exportBtn">💾 Save all my votes to desktop (JSON)</button>
            <button id="importBtn">📥 Restore from saved file</button>
            <input type="file" id="importFile" accept=".json" style="display:none;">
        </div>
    </div>

    <footer>✅ Votes are auto‑saved in your browser. Use "Save to desktop" to keep a permanent backup.</footer>
</div>

<script>
    // ---------- FULL LIST OF 34 PLAYERS (from your group) ----------
    const FULL_ROSTER = [
        "James Zoumis", "Stav", "Paul", "Ali Mekawy", "Danny", "Alex Rowe", "Kiarash Piani",
        "enzo rivellese", "Stefan Бранковић", "Dimitri Superstar", "Ivan Soccer", "Leo Soccer",
        "Mario Soccer", "Vasilis Soccer", "George Theodoropoulos", "Joe Trimmers", "Theo Theophanous",
        "Christos Legend Barber", "Nector Laskaris", "Frank Marcaccio", "Manoli", "Marco Mercuri",
        "Rocco Mammoliti", "TRADELINK Perri THEOD...", "Ralph Risolli", "David Soccer", "George Babaktos",
        "Chris", "Chris Del Monaco", "Maurice Delmonte", "Peter Desensi", "Tony El Hajj", "Farid", "James"
    ];

    // Generate all Monday game weeks (Feb → second-last Monday in Dec)
    function generateGameWeeks() {
        const year = new Date().getFullYear();
        let start = new Date(year, 1, 1); // Feb 1
        while (start.getDay() !== 1) start.setDate(start.getDate() + 1);
        let dec31 = new Date(year, 11, 31);
        let lastMonday = new Date(dec31);
        while (lastMonday.getDay() !== 1) lastMonday.setDate(lastMonday.getDate() - 1);
        let secondLast = new Date(lastMonday);
        secondLast.setDate(secondLast.getDate() - 7);
        let weeks = [];
        let cur = new Date(start);
        while (cur <= secondLast) {
            weeks.push({
                dateStr: cur.toISOString().split('T')[0],
                label: `Monday ${cur.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })}`
            });
            cur.setDate(cur.getDate() + 7);
        }
        return weeks;
    }
    const GAME_WEEKS = generateGameWeeks();

    // ---------- Player data ----------
    let currentPlayer = "";
    let playerVotes = {}; // key: gameDate, value: { first, second, third }

    // Load from localStorage
    function loadPlayerData() {
        if (!currentPlayer) return;
        const key = `votes_${currentPlayer}`;
        const stored = localStorage.getItem(key);
        if (stored) {
            try {
                playerVotes = JSON.parse(stored);
            } catch(e) { playerVotes = {}; }
        } else {
            playerVotes = {};
        }
    }

    function savePlayerData() {
        if (!currentPlayer) return;
        const key = `votes_${currentPlayer}`;
        localStorage.setItem(key, JSON.stringify(playerVotes));
    }

    // Update vote for a specific game week
    function setVote(gameDate, first, second, third) {
        playerVotes[gameDate] = { first, second, third };
        savePlayerData();
        renderGameWeeks();
    }

    function getVote(gameDate) {
        return playerVotes[gameDate] || null;
    }

    // Render all game weeks with vote buttons
    function renderGameWeeks() {
        const container = document.getElementById("gameWeeksList");
        if (!currentPlayer) return;
        if (GAME_WEEKS.length === 0) {
            container.innerHTML = "<div class='alert'>No game weeks available.</div>";
            return;
        }
        let html = "";
        for (let week of GAME_WEEKS) {
            const vote = getVote(week.dateStr);
            const status = vote ? `✅ 3:${vote.first} | 2:${vote.second} | 1:${vote.third}` : "⭕ Not voted";
            html += `
                <div class="game-week">
                    <div><strong>${week.label}</strong> (${week.dateStr})<br><span class="vote-status">${status}</span></div>
                    <div>
                        <button class="vote-btn" data-date="${week.dateStr}" data-label="${week.label}">✏️ Vote / Edit</button>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;

        // Attach click handlers
        document.querySelectorAll(".vote-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const date = btn.getAttribute("data-date");
                const label = btn.getAttribute("data-label");
                openVoteModal(date, label);
            });
        });
    }

    // Open modal to select 3-2-1
    function openVoteModal(gameDate, weekLabel) {
        const existing = getVote(gameDate);
        // Build dropdown options (all players except current player)
        let options = '<option value="">-- Select --</option>';
        for (let p of FULL_ROSTER) {
            if (p !== currentPlayer) {
                options += `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`;
            }
        }

        const modal = document.createElement("div");
        modal.style.position = "fixed";
        modal.style.top = "0"; modal.style.left = "0";
        modal.style.width = "100%"; modal.style.height = "100%";
        modal.style.backgroundColor = "rgba(0,0,0,0.6)";
        modal.style.display = "flex";
        modal.style.alignItems = "center";
        modal.style.justifyContent = "center";
        modal.style.zIndex = "1000";
        modal.innerHTML = `
            <div style="background: white; border-radius: 48px; padding: 28px; max-width: 500px; width: 90%;">
                <h3 style="color:#1f5068;">${weekLabel}</h3>
                <label>🏆 3 points (Best & Fairest)</label>
                <select id="vote3">${options}</select>
                <label>🥈 2 points (Runner-up)</label>
                <select id="vote2">${options}</select>
                <label>🥉 1 point (Most consistent)</label>
                <select id="vote1">${options}</select>
                <div class="flex-btns" style="margin-top: 20px;">
                    <button id="saveVoteBtn">Save Vote</button>
                    <button id="cancelVoteBtn">Cancel</button>
                </div>
                <div id="modalError" style="color:#d9534f; margin-top:12px;"></div>
            </div>
        `;
        document.body.appendChild(modal);

        // Pre-fill if editing
        if (existing) {
            document.getElementById("vote3").value = existing.first;
            document.getElementById("vote2").value = existing.second;
            document.getElementById("vote1").value = existing.third;
        }

        const saveBtn = document.getElementById("saveVoteBtn");
        const cancelBtn = document.getElementById("cancelVoteBtn");
        saveBtn.onclick = () => {
            const first = document.getElementById("vote3").value;
            const second = document.getElementById("vote2").value;
            const third = document.getElementById("vote1").value;
            const errorDiv = document.getElementById("modalError");
            if (!first || !second || !third) {
                errorDiv.innerText = "Please select all three players.";
                return;
            }
            if (first === second || first === third || second === third) {
                errorDiv.innerText = "You must choose three different players.";
                return;
            }
            setVote(gameDate, first, second, third);
            document.body.removeChild(modal);
            showMessage(`Vote saved for ${weekLabel}`, "success");
        };
        cancelBtn.onclick = () => document.body.removeChild(modal);
    }

    // Export votes to JSON file on desktop
    function exportToFile() {
        if (!currentPlayer) { showMessage("Select your name first", "alert"); return; }
        const data = {
            playerName: currentPlayer,
            votes: playerVotes,
            exportedAt: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `${currentPlayer.replace(/\s/g, '_')}_votes.json`;
        a.click();
        URL.revokeObjectURL(url);
        showMessage("✅ Votes exported to desktop! Keep this file safe.", "success");
    }

    // Import votes from a JSON file
    function importFromFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.playerName && data.votes) {
                    if (data.playerName !== currentPlayer) {
                        if (!confirm(`This file belongs to ${data.playerName}. Load it anyway? It will replace your current votes for ${currentPlayer}.`)) return;
                    }
                    playerVotes = data.votes;
                    savePlayerData();
                    renderGameWeeks();
                    showMessage(`Loaded ${Object.keys(playerVotes).length} votes.`, "success");
                } else {
                    showMessage("Invalid file format", "alert");
                }
            } catch(err) {
                showMessage("Error parsing file", "alert");
            }
        };
        reader.readAsText(file);
    }

    function showMessage(msg, type) {
        const div = document.getElementById("playerMessage");
        div.innerHTML = `<div class="${type}">${msg}</div>`;
        setTimeout(() => { if (div.innerHTML.includes(msg)) div.innerHTML = ""; }, 3000);
    }

    // Populate player dropdown
    function populatePlayerDropdown() {
        const select = document.getElementById("playerNameSelect");
        select.innerHTML = '<option value="">-- Select your name --</option>';
        for (let name of FULL_ROSTER) {
            select.innerHTML += `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`;
        }
        select.addEventListener("change", () => {
            currentPlayer = select.value;
            if (currentPlayer) {
                loadPlayerData();
                renderGameWeeks();
                document.getElementById("votingCard").style.display = "block";
                showMessage(`Welcome ${currentPlayer}. Your votes are auto‑saved.`, "success");
            } else {
                document.getElementById("votingCard").style.display = "none";
            }
        });
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
    }

    // Event bindings
    document.getElementById("exportBtn").addEventListener("click", exportToFile);
    document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
    document.getElementById("importFile").addEventListener("change", (e) => {
        if (e.target.files.length) importFromFile(e.target.files[0]);
        e.target.value = "";
    });

    // Initialise
    populatePlayerDropdown();
</script>
</body>
</html>
