<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Monday Night Soccer – Full Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f8f9fa;
            font-family: 'Inter', sans-serif;
            padding: 20px;
            color: #1e1e1e;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 { font-size: 2.2rem; font-weight: 800; color: #cc0000; }
        .header p { color: #4a4a4a; margin-top: 6px; }
        .tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: white;
            border: 2px solid #cc0000;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 700;
            cursor: pointer;
            color: #cc0000;
        }
        .tab-btn.active {
            background: #cc0000;
            color: white;
        }
        .panel { display: none; animation: fade 0.2s; }
        .panel.active-panel { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
        }
        .card h2, .card h3 {
            font-weight: 700;
            margin-bottom: 20px;
            color: #cc0000;
            border-left: 6px solid #cc0000;
            padding-left: 18px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-top: 16px;
            margin-bottom: 8px;
        }
        select, input, button, textarea {
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
            background: white;
            width: 100%;
            margin: 6px 0;
        }
        button {
            background: #cc0000;
            color: white;
            font-weight: 700;
            border: none;
            cursor: pointer;
            width: auto;
        }
        button:hover { background: #990000; }
        .login-card {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            border-radius: 48px;
            padding: 32px;
            text-align: center;
        }
        .pitch {
            background: linear-gradient(145deg, #2e7d32, #1b5e20);
            border-radius: 40px;
            border: 4px solid white;
            padding: 16px;
            position: relative;
            box-shadow: 0 0 0 3px #cc0000;
            margin-bottom: 16px;
        }
        .pitch::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 3px;
            height: 100%;
            background: white;
            transform: translateX(-50%);
            opacity: 0.8;
        }
        .pitch::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.8;
        }
        .teams-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
            z-index: 2;
        }
        .team-box {
            flex: 1;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 16px;
            color: white;
        }
        .team-title {
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 12px;
        }
        .yellow-title { color: #ffea00; text-shadow: 0 0 4px #ffcc00; }
        .orange-title { color: #ff9800; text-shadow: 0 0 4px #ff6600; }
        .player-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 350px;
            overflow-y: auto;
        }
        .player-badge {
            background: rgba(0,0,0,0.7);
            border-radius: 60px;
            padding: 8px 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
            font-size: 0.85rem;
        }
        .match-result {
            margin-top: 20px;
            text-align: center;
            background: rgba(0,0,0,0.7);
            border-radius: 60px;
            padding: 10px;
            color: white;
            font-weight: 600;
        }
        .alert {
            background: #ffe6e6;
            border-left: 5px solid #cc0000;
            padding: 10px 16px;
            border-radius: 60px;
            margin: 12px 0;
            color: #990000;
        }
        .goal-row, .payment-row, .attendance-row, .past-game-item {
            background: #f9f9f9;
            border-radius: 60px;
            padding: 8px 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .count-box {
            background: #2c3e50;
            color: white;
            border-radius: 60px;
            padding: 10px 20px;
            text-align: center;
            display: inline-block;
            margin: 8px;
            min-width: 140px;
        }
        .count-number {
            font-size: 2rem;
            font-weight: 800;
        }
        footer { text-align: center; margin-top: 40px; font-size: 0.7rem; color: #6c757d; }
        .payment-table, .attendance-table, .topscorer-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 24px;
            overflow: hidden;
        }
        .payment-table th, .payment-table td, .attendance-table th, .attendance-table td, .topscorer-table th, .topscorer-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }
        .payment-table th, .attendance-table th, .topscorer-table th { background: #fafafa; color: #cc0000; }
        .flex-btns { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
        .attending-in { background: #2e7d5e; color: white; border: none; }
        .attending-out { background: #cc0000; color: white; border: none; }
        .rules-content { background: #fef9e6; border-radius: 28px; padding: 20px; line-height: 1.6; }
        .count-grid { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 16px; }
        @media (max-width: 700px) { .teams-row { flex-direction: column; } .pitch::before { display: none; } }
    </style>
</head>
<body>
<div class="container" id="appContainer"></div>

<script>
    // ========== FIREBASE CONFIGURATION ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCWlFqDJyENgrUOhiLXCjSEi4Mk_54SA1w",
        authDomain: "monday-night-soccer-hub.firebaseapp.com",
        projectId: "monday-night-soccer-hub",
        storageBucket: "monday-night-soccer-hub.firebasestorage.app",
        messagingSenderId: "634335208908",
        appId: "1:634335208908:web:dca705b65fc52de0606969"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ========== HARDCODED FULL PLAYER LIST (34 players, alphabetical) ==========
    const FULL_PLAYER_LIST = [
        "Alex Rowe", "Ali Mekawy", "Carlo", "Charlie", "Chris Del Monaco", "Chris M", "Chris S", "Danny", "Dante", "David", "Dimitri",
        "Enzo", "Farid", "Faros", "Frank", "George B", "George T", "Ivan", "James Zoumis", "James", "Joe T", "Joey",
        "Kia", "Leo", "Manoli", "Marco", "Mario", "Maurice", "Nector", "Paul", "Perri", "Peter", "Ralph", "Rocco",
        "Stav", "Stevan", "Theo", "Tony EH", "Vasilis"
    ].sort();

    // ---------- Helper: AEST date and week generation ----------
    function getCurrentAESTDate() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const aest = new Date(utc + (10 * 3600000));
        return aest.toISOString().split('T')[0];
    }

    function generateAllGameWeeks() {
        const year = new Date().getFullYear();
        let start = new Date(year, 1, 1);
        while (start.getDay() !== 1) start.setDate(start.getDate() + 1);
        let dec31 = new Date(year, 11, 31);
        let lastMonday = new Date(dec31);
        while (lastMonday.getDay() !== 1) lastMonday.setDate(lastMonday.getDate() - 1);
        let secondLast = new Date(lastMonday);
        secondLast.setDate(secondLast.getDate() - 7);
        let weeks = [];
        let cur = new Date(start);
        while (cur <= secondLast) {
            weeks.push({
                dateStr: cur.toISOString().split('T')[0],
                label: `Monday ${cur.toLocaleDateString('en-AU', { day:'numeric', month:'short' })}`
            });
            cur.setDate(cur.getDate() + 7);
        }
        return weeks;
    }
    const ALL_GAME_WEEKS = generateAllGameWeeks();

    function getFutureWeeks() { const today = getCurrentAESTDate(); return ALL_GAME_WEEKS.filter(w => w.dateStr >= today); }
    function getPastWeeks() { const today = getCurrentAESTDate(); return ALL_GAME_WEEKS.filter(w => w.dateStr < today); }

    let teamAssignments = {}, matchResults = {}, payments = [], attendance = [];
    let isAdminLoggedIn = false;
    let currentUser = null;

    const teamsRef = db.collection("config").doc("teamAssignments");
    const resultsRef = db.collection("config").doc("matchResults");
    const paymentsRef = db.collection("payments");
    const attendanceRef = db.collection("attendance");

    async function loadData() {
        const teamsDoc = await teamsRef.get();
        if (teamsDoc.exists) teamAssignments = teamsDoc.data();
        else teamAssignments = {};
        const resultsDoc = await resultsRef.get();
        if (resultsDoc.exists) matchResults = resultsDoc.data();
        else matchResults = {};
        const paymentsSnap = await paymentsRef.get();
        payments = []; paymentsSnap.forEach(doc => payments.push(doc.data()));
        const attendanceSnap = await attendanceRef.get();
        attendance = []; attendanceSnap.forEach(doc => attendance.push(doc.data()));
    }
    async function saveTeams() { await teamsRef.set(teamAssignments); }
    async function saveResults() { await resultsRef.set(matchResults); }
    async function savePayment(paymentObj) { await paymentsRef.doc(`${paymentObj.player}_${paymentObj.gameDate}`).set(paymentObj); }
    async function saveAttendance(attObj) { await attendanceRef.doc(`${attObj.player}_${attObj.gameDate}`).set(attObj); }

    // ---------- Authentication ----------
    async function loginAsPlayer(name) {
        currentUser = { name: name, role: "player" };
        isAdminLoggedIn = false;
        localStorage.setItem("soccer_user", JSON.stringify(currentUser));
        return true;
    }
    async function adminLogin(password) {
        if (password === "admin123") {
            currentUser = { name: "admin", role: "admin" };
            isAdminLoggedIn = true;
            localStorage.setItem("soccer_user", JSON.stringify(currentUser));
            return true;
        }
        return false;
    }
    function logout() {
        currentUser = null;
        isAdminLoggedIn = false;
        localStorage.removeItem("soccer_user");
        renderLoginScreen();
    }

    // ---------- Login Screen (player dropdown + hidden admin password) ----------
    async function renderLoginScreen() {
        const container = document.getElementById("appContainer");
        container.innerHTML = `
            <div class="login-card">
                <h2 style="color:#cc0000;">★ MONDAY NIGHT SOCCER ★</h2>
                <p style="margin: 16px 0;">Select your name (players) or login as admin</p>
                <label>👤 YOUR NAME</label>
                <select id="playerNameSelect">
                    <option value="">-- Select your name --</option>
                    ${FULL_PLAYER_LIST.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}
                </select>
                <button id="playerLoginBtn" style="margin-top:8px;">Enter as Player</button>
                <hr style="margin: 20px 0;">
                <label>🔐 ADMIN LOGIN</label>
                <input type="password" id="adminPassword" placeholder="Admin password">
                <button id="adminLoginBtn">Admin Login</button>
                <div id="loginError" class="alert" style="display:none; margin-top:16px;"></div>
                <p style="margin-top: 20px; font-size:0.7rem;">Admin password: admin123</p>
            </div>
        `;
        document.getElementById("playerLoginBtn").addEventListener("click", async () => {
            const name = document.getElementById("playerNameSelect").value;
            if (!name) {
                document.getElementById("loginError").innerText = "Please select your name";
                document.getElementById("loginError").style.display = "block";
                return;
            }
            await loginAsPlayer(name);
            await loadData();
            renderMainApp();
        });
        document.getElementById("adminLoginBtn").addEventListener("click", async () => {
            const pwd = document.getElementById("adminPassword").value;
            const ok = await adminLogin(pwd);
            if (ok) {
                await loadData();
                renderMainApp();
            } else {
                document.getElementById("loginError").innerText = "Wrong admin password";
                document.getElementById("loginError").style.display = "block";
            }
        });
    }

    // ---------- Main App (tabs include Admin only when isAdminLoggedIn true) ----------
    function renderMainApp() {
        const container = document.getElementById("appContainer");
        container.innerHTML = `
            <div class="header">
                <h1>⚽ MONDAY NIGHT SOCCER ⚽</h1>
                <p>Attendance • Add guests • Orange vs Yellow • Match results • Goal scorers • Top scorer • Past games • Funny rules</p>
            </div>
            <div class="tabs" id="tabs"></div>
            <div id="panelContainer"></div>
            <footer>⚡ Live sync via Firebase • Admin: admin123</footer>
        `;

        const tabs = [
            { id: "attendance", label: "📋 ATTENDANCE", showFor: "all" },
            { id: "pastgames", label: "📆 PAST GAMES", showFor: "all" },
            { id: "topscorer", label: "⚽ TOP SCORER", showFor: "all" },
            { id: "rules", label: "📜 RULES", showFor: "all" }
        ];
        if (isAdminLoggedIn) {
            tabs.push({ id: "admin", label: "👑 ADMIN", showFor: "admin" });
        }
        const tabsContainer = document.getElementById("tabs");
        tabsContainer.innerHTML = tabs.map(t => `<button class="tab-btn" data-tab="${t.id}">${t.label}</button>`).join('');
        const panelContainer = document.getElementById("panelContainer");
        panelContainer.innerHTML = tabs.map(t => `<div id="${t.id}Panel" class="panel"></div>`).join('');
        const firstTab = tabs[0].id;
        document.getElementById(`${firstTab}Panel`).classList.add("active-panel");
        document.querySelector(`.tab-btn[data-tab="${firstTab}"]`).classList.add("active");

        (async () => {
            await loadData();
            renderAttendancePanel();
            renderPastGamesPanel();
            renderTopScorerPanel();
            renderRulesPanel();
            if (isAdminLoggedIn) renderAdminPanel();
            document.querySelectorAll(".tab-btn").forEach(btn => {
                btn.addEventListener("click", () => {
                    const tabId = btn.getAttribute("data-tab");
                    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active-panel"));
                    document.getElementById(`${tabId}Panel`).classList.add("active-panel");
                    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    if (tabId === "attendance") renderAttendancePanel();
                    if (tabId === "pastgames") renderPastGamesPanel();
                    if (tabId === "topscorer") renderTopScorerPanel();
                    if (tabId === "admin" && isAdminLoggedIn) renderAdminPanel();
                });
            });
        })();
    }

    // ----- Attendance Panel (players) -----
    async function renderAttendancePanel() {
        const container = document.getElementById("attendancePanel");
        const futureWeeks = getFutureWeeks();
        if (futureWeeks.length === 0) {
            container.innerHTML = `<div class="card"><div class="alert">No upcoming weeks available yet (releases after 9:30pm Monday).</div></div>`;
            return;
        }
        let weekOptions = futureWeeks.map(w => `<option value="${w.dateStr}">${w.label}</option>`).join('');
        container.innerHTML = `
            <div class="card">
                <h2>📅 MARK YOUR ATTENDANCE</h2>
                <label>👤 YOUR NAME</label>
                <select id="attendancePlayerSelect"></select>
                <label>📅 GAME WEEK</label>
                <select id="attendanceWeekSelect">${weekOptions}</select>
                <div class="flex-btns">
                    <button id="attendingBtn" class="attending-in">✅ I AM ATTENDING</button>
                    <button id="notAttendingBtn" class="attending-out">❌ I AM NOT ATTENDING</button>
                    <button id="addGuestBtn" style="background:#2c3e50;">➕ ADD GUEST (for this week)</button>
                </div>
                <div id="attendanceMessage" class="alert" style="display:none;"></div>
            </div>
            <div class="card">
                <h2>📊 ATTENDANCE COUNTS (per week)</h2>
                <div id="attendanceCounts" class="count-grid"></div>
            </div>
            <div class="card">
                <h2>🏟️ THIS WEEK'S PITCH & TEAMS</h2>
                <select id="pitchWeekSelect">${weekOptions}</select>
                <div class="pitch">
                    <div class="teams-row">
                        <div class="team-box"><div class="team-title yellow-title">🟡 YELLOW TEAM</div><div class="player-list" id="yellowList"></div></div>
                        <div class="team-box"><div class="team-title orange-title">🟠 ORANGE TEAM</div><div class="player-list" id="orangeList"></div></div>
                    </div>
                    <div class="match-result" id="matchResultDisplay"></div>
                </div>
            </div>
        `;
        renderAttendancePlayerDropdown();
        document.getElementById("attendanceWeekSelect").addEventListener("change", renderAttendanceCounts);
        document.getElementById("attendingBtn").addEventListener("click", () => setAttendance("in"));
        document.getElementById("notAttendingBtn").addEventListener("click", () => setAttendance("out"));
        document.getElementById("addGuestBtn").addEventListener("click", addGuest);
        document.getElementById("pitchWeekSelect").addEventListener("change", renderPitchAndMatch);
        await renderAttendanceCounts();
        await renderPitchAndMatch();
    }
    function renderAttendancePlayerDropdown() {
        const select = document.getElementById("attendancePlayerSelect");
        select.innerHTML = '<option value="">-- Select your name --</option>' + FULL_PLAYER_LIST.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
    }
    async function renderAttendanceCounts() {
        const week = document.getElementById("attendanceWeekSelect").value;
        if (!week) return;
        const attendees = attendance.filter(a => a.gameDate === week && a.status === 'in').map(a => a.player);
        const notAttending = attendance.filter(a => a.gameDate === week && a.status === 'out').map(a => a.player);
        const container = document.getElementById("attendanceCounts");
        container.innerHTML = `
            <div class="count-box">
                <div>Attending</div>
                <div class="count-number">${attendees.length}</div>
                <div>${attendees.join(', ') || 'none'}</div>
            </div>
            <div class="count-box" style="background:#cc0000;">
                <div>Not attending</div>
                <div class="count-number">${notAttending.length}</div>
                <div>${notAttending.join(', ') || 'none'}</div>
            </div>
        `;
    }
    async function setAttendance(status) {
        const player = document.getElementById("attendancePlayerSelect").value;
        const gameDate = document.getElementById("attendanceWeekSelect").value;
        const msgDiv = document.getElementById("attendanceMessage");
        if (!player || !gameDate) {
            msgDiv.innerHTML = "Select your name and a game week"; msgDiv.style.display = "block";
            setTimeout(() => msgDiv.style.display = "none", 3000);
            return;
        }
        const existing = attendance.find(a => a.player === player && a.gameDate === gameDate);
        if (existing && existing.status === status) {
            msgDiv.innerHTML = `Already marked as ${status === 'in' ? 'attending' : 'not attending'} for this week.`;
            msgDiv.style.display = "block";
            setTimeout(() => msgDiv.style.display = "none", 3000);
            return;
        }
        await saveAttendance({ player, gameDate, status, timestamp: new Date().toISOString() });
        const index = attendance.findIndex(a => a.player === player && a.gameDate === gameDate);
        if (index !== -1) attendance[index] = { player, gameDate, status };
        else attendance.push({ player, gameDate, status });
        msgDiv.innerHTML = `✅ ${player} is ${status === 'in' ? 'attending' : 'NOT attending'} on ${gameDate}`;
        msgDiv.style.display = "block";
        setTimeout(() => msgDiv.style.display = "none", 3000);
        renderAttendanceCounts();
        if (isAdminLoggedIn) renderAdminAttendanceOverview();
    }
    async function addGuest() {
        const gameDate = document.getElementById("attendanceWeekSelect").value;
        if (!gameDate) {
            document.getElementById("attendanceMessage").innerHTML = "Select a game week first";
            document.getElementById("attendanceMessage").style.display = "block";
            setTimeout(() => document.getElementById("attendanceMessage").style.display = "none", 3000);
            return;
        }
        const guestName = prompt("Enter guest name:");
        if (!guestName) return;
        const existing = attendance.find(a => a.player === guestName && a.gameDate === gameDate);
        if (existing) {
            document.getElementById("attendanceMessage").innerHTML = "Guest already added for this week";
            document.getElementById("attendanceMessage").style.display = "block";
            setTimeout(() => document.getElementById("attendanceMessage").style.display = "none", 3000);
            return;
        }
        await saveAttendance({ player: guestName, gameDate, status: "in", timestamp: new Date().toISOString(), guest: true });
        attendance.push({ player: guestName, gameDate, status: "in" });
        renderAttendanceCounts();
        if (isAdminLoggedIn) renderAdminAttendanceOverview();
        document.getElementById("attendanceMessage").innerHTML = `Guest "${guestName}" added as attending for this week.`;
        document.getElementById("attendanceMessage").style.display = "block";
        setTimeout(() => document.getElementById("attendanceMessage").style.display = "none", 3000);
    }

    // ----- Pitch view -----
    async function renderPitchAndMatch() {
        const gameDate = document.getElementById("pitchWeekSelect").value;
        if (!gameDate) return;
        const assignments = teamAssignments[gameDate] || {};
        const yellow = [], orange = [];
        for (let [p, team] of Object.entries(assignments)) {
            if (team === "yellow") yellow.push(p);
            else if (team === "orange") orange.push(p);
        }
        yellow.sort(); orange.sort();
        const match = matchResults[gameDate] || { yellowScore: 0, orangeScore: 0, goals: {} };
        const goalsText = Object.entries(match.goals || {}).filter(([_,g]) => g>0).map(([p,g]) => `${p} (${g})`).join(", ");
        document.getElementById("yellowList").innerHTML = yellow.map(p => `<div class="player-badge">${escapeHtml(p)}</div>`).join('') || "<div class='player-badge'>—</div>";
        document.getElementById("orangeList").innerHTML = orange.map(p => `<div class="player-badge">${escapeHtml(p)}</div>`).join('') || "<div class='player-badge'>—</div>";
        document.getElementById("matchResultDisplay").innerHTML = `<strong>FINAL SCORE:</strong> 🟡 ${match.yellowScore} - ${match.orangeScore} 🟠 &nbsp;|&nbsp; ⚽ Goals: ${goalsText || "none"}`;
    }

    // ----- Past Games -----
    async function renderPastGamesPanel() {
        const container = document.getElementById("pastgamesPanel");
        const pastWeeks = getPastWeeks().reverse();
        if (pastWeeks.length === 0) {
            container.innerHTML = "<div class='card'><div class='alert'>No past games yet.</div></div>";
            return;
        }
        let html = `<div class="card"><h2>📆 PAST GAMES (TEAMS & RESULTS)</h2>`;
        for (let week of pastWeeks) {
            const assignments = teamAssignments[week.dateStr] || {};
            const yellow = Object.keys(assignments).filter(p => assignments[p] === "yellow").sort();
            const orange = Object.keys(assignments).filter(p => assignments[p] === "orange").sort();
            const match = matchResults[week.dateStr] || { yellowScore: 0, orangeScore: 0, goals: {} };
            const goalsText = Object.entries(match.goals || {}).filter(([_,g]) => g>0).map(([p,g]) => `${p} (${g})`).join(", ");
            html += `
                <div class="past-game-item" style="display:block; background:#f0f0f0; margin-bottom:12px;">
                    <strong>${week.label}</strong><br>
                    🟡 YELLOW: ${yellow.join(', ') || 'none'}<br>
                    🟠 ORANGE: ${orange.join(', ') || 'none'}<br>
                    <strong>RESULT:</strong> 🟡 ${match.yellowScore} - ${match.orangeScore} 🟠<br>
                    ⚽ GOALS: ${goalsText || "none"}
                    <hr style="margin:8px 0;">
                </div>
            `;
        }
        html += `</div>`;
        container.innerHTML = html;
    }

    // ----- Top Scorer -----
    async function renderTopScorerPanel() {
        const container = document.getElementById("topscorerPanel");
        const goals = new Map();
        for (let match of Object.values(matchResults)) {
            if (match.goals) {
                for (let [player, goalsCount] of Object.entries(match.goals)) {
                    goals.set(player, (goals.get(player) || 0) + goalsCount);
                }
            }
        }
        let sorted = Array.from(goals.entries()).map(([name, total]) => ({ name, total }));
        sorted.sort((a,b) => b.total - a.total);
        if (sorted.length === 0) {
            container.innerHTML = "<div class='card'><div class='alert'>No goals recorded yet.</div></div>";
            return;
        }
        let html = `<div class="card"><h2>⚽ TOP GOAL SCORERS (RUNNING SHEET)</h2><table class="topscorer-table"><thead><tr><th>#</th><th>Player</th><th>Total Goals</th></tr></thead><tbody>`;
        sorted.forEach((p, idx) => {
            html += `<tr><td>${idx+1}</td><td><strong>${escapeHtml(p.name)}</strong></td><td style="color:#cc0000;">${p.total}</td></tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }

    // ----- Rules -----
    function renderRulesPanel() {
        const container = document.getElementById("rulesPanel");
        container.innerHTML = `
            <div class="card">
                <h2>📜 MONDAY NIGHT SOCCER RULES</h2>
                <div class="rules-content">
                    <p>🥅 <strong>Funny rules (edit later)</strong></p>
                    <ul>
                        <li>If you hit the crossbar, you owe everyone a beer.</li>
                        <li>Own goals count as double for the other team.</li>
                        <li>Whoever arrives last must play goalkeeper for the first 10 minutes.</li>
                        <li>No shouting "mine!" – it's a booking.</li>
                        <li>Goal celebrations must include a dance move (minimum 2 seconds).</li>
                    </ul>
                </div>
            </div>
        `;
    }

    // ----- ADMIN PANEL (only visible after admin login) -----
    async function renderAdminPanel() {
        const container = document.getElementById("adminPanel");
        await loadData();
        const allWeeks = ALL_GAME_WEEKS.map(w => `<option value="${w.dateStr}">${w.label}</option>`).join('');
        container.innerHTML = `
            <div class="card"><h3>👥 MANAGE PLAYERS (hardcoded list)</h3><div id="playersList"></div>
            <div class="flex-btns"><input type="text" id="newPlayerName" placeholder="New player name" style="flex:2"><button id="addPlayerBtn" style="flex:1">➕ ADD</button><button id="resetPlayersBtn" style="background:#990000;">⟳ RESET</button></div></div>
            <div class="card"><h3>📅 TEAM ASSIGNMENT (ORANGE vs YELLOW) – ALL WEEKS</h3>
                <select id="adminWeekSelect">${allWeeks}</select>
                <div id="teamAssignmentArea"></div>
                <button id="saveTeamsBtn">💾 SAVE TEAMS</button>
            </div>
            <div class="card"><h3>⚽ MATCH RESULT & GOALS</h3>
                <select id="adminWeekSelectResult">${allWeeks}</select>
                <div id="matchResultArea"></div>
                <button id="saveResultBtn">💾 SAVE RESULT</button>
            </div>
            <div class="card"><h3>💰 PAYMENTS LEDGER (ADMIN ONLY)</h3><div id="paymentLedger"></div>
                <div style="display:flex; gap:8px; margin-top:8px;"><select id="adminPaymentPlayer" style="flex:2"><option value="">Select player</option></select><select id="adminPaymentWeek" style="flex:2"><option value="">Select week</option></select><button id="adminMarkPaidBtn">Mark Paid</button></div>
            </div>
            <div class="card"><h3>📋 ATTENDANCE OVERVIEW (all players + guests)</h3><div id="adminAttendanceOverview"></div></div>
            <div class="card"><h3>💾 BACKUP / RESTORE</h3><div class="flex-btns"><button id="exportAllBtn">📤 EXPORT DATA</button><button id="importAllBtn">📥 IMPORT BACKUP</button><input type="file" id="importFileInput" style="display:none;"></div></div>
        `;
        renderPlayersListAdmin();
        renderTeamAssignmentUI();
        renderMatchResultUI();
        renderAdminAttendanceOverview();
        renderAdminPaymentUI();
        document.getElementById("addPlayerBtn").addEventListener("click", addPlayerAdmin);
        document.getElementById("resetPlayersBtn").addEventListener("click", resetPlayersAdmin);
        document.getElementById("saveTeamsBtn").addEventListener("click", async () => { await saveTeams(); renderPitchAndMatch(); renderPastGamesPanel(); });
        document.getElementById("saveResultBtn").addEventListener("click", saveMatchResultAdmin);
        document.getElementById("adminMarkPaidBtn").addEventListener("click", adminMarkPayment);
        document.getElementById("exportAllBtn").addEventListener("click", exportAllData);
        document.getElementById("importAllBtn").addEventListener("click", () => document.getElementById("importFileInput").click());
        document.getElementById("importFileInput").addEventListener("change", e => { if(e.target.files.length) importAllData(e.target.files[0]); e.target.value=""; });
    }

    function renderPlayersListAdmin() {
        const container = document.getElementById("playersList");
        let html = `<table class="payment-table"><thead><tr><th>Player</th><th>Action</th></tr></thead><tbody>`;
        for (let p of FULL_PLAYER_LIST) {
            html += `<tr><td>${escapeHtml(p)}</td><td><button class="del-player-btn" data-player="${escapeHtml(p)}" style="background:#990000;">Delete</button></td></tr>`;
        }
        html += `</tbody></table>`;
        container.innerHTML = html;
        document.querySelectorAll(".del-player-btn").forEach(btn => btn.addEventListener("click", async () => {
            alert("Players cannot be deleted from the hardcoded list. To remove, edit the code.");
        }));
    }
    async function addPlayerAdmin() {
        alert("To add a new player, edit the FULL_PLAYER_LIST array in the code.");
    }
    async function resetPlayersAdmin() {
        alert("Player list is hardcoded and cannot be reset. Edit the code to change the list.");
    }
    async function refreshAllAdminUI() {
        await loadData();
        renderTeamAssignmentUI();
        renderMatchResultUI();
        renderAdminAttendanceOverview();
        renderAdminPaymentUI();
        renderPastGamesPanel();
        renderTopScorerPanel();
        renderPitchAndMatch();
    }
    async function renderTeamAssignmentUI() {
        const select = document.getElementById("adminWeekSelect");
        const gameDate = select.value;
        if (!gameDate) return;
        if (!teamAssignments[gameDate]) teamAssignments[gameDate] = {};
        let html = "";
        for (let p of FULL_PLAYER_LIST) {
            const current = teamAssignments[gameDate][p] || "";
            html += `<div class="goal-row"><span style="flex:1">${escapeHtml(p)}</span>
                <select class="team-select" data-player="${escapeHtml(p)}">
                    <option value="">-- Not playing --</option>
                    <option value="yellow" ${current==="yellow"?"selected":""}>🟡 Yellow</option>
                    <option value="orange" ${current==="orange"?"selected":""}>🟠 Orange</option>
                </select></div>`;
        }
        document.getElementById("teamAssignmentArea").innerHTML = html;
        document.querySelectorAll(".team-select").forEach(sel => sel.addEventListener("change", () => {
            const player = sel.getAttribute("data-player");
            const team = sel.value;
            if (team) teamAssignments[gameDate][player] = team;
            else delete teamAssignments[gameDate][player];
            saveTeams();
            renderPitchAndMatch();
            renderPastGamesPanel();
        }));
    }
    async function renderMatchResultUI() {
        const select = document.getElementById("adminWeekSelectResult");
        const gameDate = select.value;
        if (!gameDate) return;
        const match = matchResults[gameDate] || { yellowScore: 0, orangeScore: 0, goals: {} };
        let html = `<div style="display:flex; gap:12px;"><div><label>🟡 Yellow</label><input type="number" id="yellowScore" value="${match.yellowScore}" min="0"></div><div><label>🟠 Orange</label><input type="number" id="orangeScore" value="${match.orangeScore}" min="0"></div></div><h4>⚽ Goals</h4>`;
        const playersInMatch = Object.keys(teamAssignments[gameDate] || {});
        if (playersInMatch.length === 0) html += "<div class='alert'>Assign teams first</div>";
        for (let player of playersInMatch) {
            const goals = (match.goals && match.goals[player]) || 0;
            html += `<div class="goal-row"><span>${escapeHtml(player)}</span>
                <select class="goal-select" data-player="${escapeHtml(player)}">
                    ${[0,1,2,3,4,5].map(n => `<option value="${n}" ${goals===n?"selected":""}>${n} goal${n!==1?'s':''}</option>`).join('')}
                </select></div>`;
        }
        document.getElementById("matchResultArea").innerHTML = html;
        document.querySelectorAll(".goal-select").forEach(sel => sel.addEventListener("change", () => {
            const player = sel.getAttribute("data-player");
            const goals = parseInt(sel.value);
            if (!matchResults[gameDate]) matchResults[gameDate] = { goals: {} };
            matchResults[gameDate].goals[player] = goals;
            saveResults(); renderPitchAndMatch(); renderPastGamesPanel(); renderTopScorerPanel();
        }));
    }
    async function saveMatchResultAdmin() {
        const gameDate = document.getElementById("adminWeekSelectResult").value;
        const yellow = parseInt(document.getElementById("yellowScore")?.value || 0);
        const orange = parseInt(document.getElementById("orangeScore")?.value || 0);
        if (!matchResults[gameDate]) matchResults[gameDate] = { goals: {} };
        matchResults[gameDate].yellowScore = yellow;
        matchResults[gameDate].orangeScore = orange;
        await saveResults(); renderPitchAndMatch(); renderPastGamesPanel(); renderTopScorerPanel();
        showMessage("adminMessage", "Result saved");
    }
    async function renderAdminAttendanceOverview() {
        const container = document.getElementById("adminAttendanceOverview");
        const weeks = [...new Set(attendance.map(a => a.gameDate))].sort();
        let html = `<table class="attendance-table"><thead><tr><th>Game Week</th><th>Player</th><th>Status</th></tr></thead><tbody>`;
        for (let week of weeks) {
            const weekLabel = ALL_GAME_WEEKS.find(w => w.dateStr === week)?.label || week;
            const weekAttendances = attendance.filter(a => a.gameDate === week);
            for (let att of weekAttendances) {
                html += `<tr><td>${escapeHtml(weekLabel)}</td><td>${escapeHtml(att.player)}</td><td>${att.status === 'in' ? '✅ Attending' : '❌ Not attending'}</td></tr>`;
            }
        }
        if (weeks.length === 0) html += `<tr><td colspan="3">No attendance records yet.</td></tr>`;
        html += `</tbody></table>`;
        container.innerHTML = html;
    }
    async function renderAdminPaymentUI() {
        const pSel = document.getElementById("adminPaymentPlayer");
        const wSel = document.getElementById("adminPaymentWeek");
        pSel.innerHTML = '<option value="">Select player</option>' + FULL_PLAYER_LIST.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
        wSel.innerHTML = '<option value="">Select week</option>' + ALL_GAME_WEEKS.map(w => `<option value="${w.dateStr}">${w.label}</option>`).join('');
        const container = document.getElementById("paymentLedger");
        const weeks = [...new Set(payments.map(p => p.gameDate))].sort();
        let html = `<table class="payment-table"><thead><tr><th>Game Week</th><th>Players who paid</th><th>Total $</th></tr></thead><tbody>`;
        for (let week of weeks) {
            const weekLabel = ALL_GAME_WEEKS.find(w => w.dateStr === week)?.label || week;
            const paidPlayers = payments.filter(p => p.gameDate === week).map(p => p.player).sort();
            const amount = paidPlayers.length * 5;
            html += `<tr><td>${escapeHtml(weekLabel)}</td><td>${paidPlayers.join(', ') || 'none'}</td><td>$${amount}</td></tr>`;
        }
        html += `</tbody></td><div class="alert">💰 Total collected: $${payments.length * 5}</div>`;
        container.innerHTML = html;
    }
    async function adminMarkPayment() {
        const player = document.getElementById("adminPaymentPlayer").value;
        const gameDate = document.getElementById("adminPaymentWeek").value;
        if (!player || !gameDate) { alert("Select both player and week"); return; }
        const existing = payments.find(p => p.player === player && p.gameDate === gameDate);
        if (existing) { alert("Already marked paid for this week"); return; }
        await savePayment({ player, gameDate, paid: true, timestamp: new Date().toISOString() });
        payments.push({ player, gameDate, paid: true });
        renderAdminPaymentUI();
    }
    function exportAllData() {
        const data = { teamAssignments, matchResults, payments, attendance };
        const blob = new Blob([JSON.stringify(data,null,2)], {type:"application/json"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `soccer_backup_${new Date().toISOString().slice(0,19)}.json`; a.click();
    }
    function importAllData(file) {
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (data.teamAssignments) teamAssignments = data.teamAssignments;
                if (data.matchResults) matchResults = data.matchResults;
                if (data.payments) payments = data.payments;
                if (data.attendance) attendance = data.attendance;
                await saveTeams(); await saveResults();
                for (let p of payments) await savePayment(p);
                for (let a of attendance) await saveAttendance(a);
                refreshAllAdminUI();
            } catch(err) { alert("Invalid backup"); }
        };
        reader.readAsText(file);
    }
    function showMessage(elementId, msg) {
        const div = document.getElementById(elementId);
        if (div) {
            div.innerHTML = `<div class="alert">${msg}</div>`;
            div.style.display = "block";
            setTimeout(() => div.style.display = "none", 3000);
        }
    }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    // Start the app
    (async () => {
        const storedUser = localStorage.getItem("soccer_user");
        if (storedUser) {
            try {
                const u = JSON.parse(storedUser);
                if (u.role === "admin") {
                    currentUser = { name: "admin", role: "admin" };
                    isAdminLoggedIn = true;
                } else {
                    currentUser = { name: u.name, role: "player" };
                    isAdminLoggedIn = false;
                }
                await loadData();
                renderMainApp();
                return;
            } catch (e) { }
        }
        renderLoginScreen();
    })();
</script>
</body>
</html>
