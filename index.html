<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monday Soccer - Best & Fairest (Google Sheets)</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0a2f1f; margin: 0; padding: 20px; color: #e9f5e6; }
        .container { max-width: 1300px; margin: 0 auto; }
        .header h1 { text-align: center; background: linear-gradient(135deg, #f9d423, #fdaa33); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .tabs { display: flex; gap: 12px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { background: #1f543b; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; color: white; font-weight: bold; }
        .tab-btn.active { background: #f5a623; color: #1e3a2f; }
        .panel { display: none; background: #1e3a2f; border-radius: 32px; padding: 24px; }
        .panel.active-panel { display: block; }
        .card { background: #2a4b3a; border-radius: 24px; padding: 20px; margin-bottom: 20px; }
        select, input, button { padding: 12px 16px; border-radius: 60px; border: none; font-size: 1rem; margin: 6px 0; }
        button { background: #f5a623; font-weight: bold; cursor: pointer; }
        .vote-row { display: flex; flex-wrap: wrap; gap: 15px; background: #2a5e45; padding: 16px; border-radius: 28px; margin: 20px 0; }
        .vote-select { flex: 2; min-width: 180px; }
        .leaderboard-table { width: 100%; border-collapse: collapse; background: #eef3e9; color: #1a2e24; border-radius: 20px; overflow: hidden; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #c0ddb0; }
        th { background: #d6e8cd; }
        .alert { background: #facc15; color: #2d2b1f; padding: 12px; border-radius: 40px; margin: 12px 0; }
        footer { text-align: center; margin-top: 40px; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>⚽ Monday Night Soccer - Best & Fairest ⚽</h1></div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="voteTab">🗳️ Vote</button>
        <button class="tab-btn" data-tab="leaderTab">🏆 Leaderboard</button>
        <button class="tab-btn" data-tab="adminTab">🔧 Admin</button>
    </div>

    <div id="votePanel" class="panel active-panel">
        <div class="card">
            <h2>🔐 Login with your PIN</h2>
            <select id="playerSelect"></select>
            <input type="password" id="pinInput" placeholder="Your PIN">
            <button id="loginBtn">Login</button>
            <div id="loginStatus"></div>
        </div>
        <div id="votingSection" style="display:none;">
            <div class="card"><h3>📅 Game Weeks</h3><div id="gameWeeksList"></div></div>
            <div id="voteFormArea" style="display:none;">
                <div class="card">
                    <h4 id="selectedGameLabel"></h4>
                    <div class="vote-row">
                        <div class="vote-select"><label>🏆 3 pts</label><select id="firstPlaceSelect"></select></div>
                        <div class="vote-select"><label>🥈 2 pts</label><select id="secondPlaceSelect"></select></div>
                        <div class="vote-select"><label>🥉 1 pt</label><select id="thirdPlaceSelect"></select></div>
                    </div>
                    <button id="submitVoteBtn">✅ Submit Vote</button>
                    <div id="voteMessage"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="leaderPanel" class="panel">
        <div class="card">
            <h2>📊 Overall Standings</h2>
            <button id="refreshLeaderboard">⟳ Refresh</button>
            <div id="leaderboardContainer">Loading...</div>
        </div>
    </div>

    <div id="adminPanel" class="panel">
        <div class="card">
            <h2>🔐 Admin Access</h2>
            <input type="password" id="adminMasterPin" placeholder="Admin PIN">
            <button id="adminLoginBtn">Enter Admin Mode</button>
            <div id="adminAuthMsg"></div>
        </div>
        <div id="adminContent" style="display:none;">
            <button id="resetAllVotesBtn" style="background:#aa2e2e;">⚠️ Reset ALL Votes</button>
            <div id="auditLog"></div>
        </div>
    </div>
    <footer>📡 Data stored in Google Sheets • All votes are shared</footer>
</div>

<script>
    // 🔧 REPLACE WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
    const API_BASE = "YOUR_APPS_SCRIPT_URL";

    let currentPlayer = null;
    let selectedGameId = null;
    let allPlayers = [];

    async function fetchJson(url) {
        const res = await fetch(url);
        return res.json();
    }

    async function postJson(url, data) {
        const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });
        return res.json();
    }

    async function loadPlayers() {
        const data = await fetchJson(`${API_BASE}?action=getPlayers`);
        allPlayers = data;
        const select = document.getElementById("playerSelect");
        select.innerHTML = '<option value="">-- Select your name --</option>';
        data.forEach(p => {
            select.innerHTML += `<option value="${p.name}">${escapeHtml(p.name)}</option>`;
        });
    }

    async function loadGames() {
        return await fetchJson(`${API_BASE}?action=getGames`);
    }

    async function loadLeaderboard() {
        const ranking = await fetchJson(`${API_BASE}?action=getLeaderboard`);
        const container = document.getElementById("leaderboardContainer");
        let html = `<table class="leaderboard-table"><tr><th>#</th><th>Player</th><th>Points</th></tr>`;
        ranking.forEach((p, i) => {
            html += `<tr><td>${i+1}</td><td>${escapeHtml(p.name)}</td><td><strong>${p.points}</strong></td></tr>`;
        });
        html += `</table>`;
        container.innerHTML = html;
    }

    async function renderGameWeeks(voterId) {
        const games = await loadGames();
        const userVotes = await fetchJson(`${API_BASE}?action=getUserVotes&voterId=${voterId}`);
        const votedSet = new Set(userVotes.map(v => v.gameId));
        let html = `<div style="display:flex; flex-wrap:wrap; gap:12px;">`;
        games.forEach(g => {
            const voted = votedSet.has(g.gameId);
            html += `<div style="background:#2a5e45; border-radius:28px; padding:10px 18px; cursor:pointer;" 
                        onclick="selectGame('${g.gameId}', '${g.weekLabel}', ${voted})">
                        <strong>${g.weekLabel}</strong> ${voted ? '✅ Voted' : '⭕ Not voted'}
                    </div>`;
        });
        html += `</div>`;
        document.getElementById("gameWeeksList").innerHTML = html;
    }

    window.selectGame = (gameId, weekLabel, alreadyVoted) => {
        if (alreadyVoted) {
            document.getElementById("voteMessage").innerHTML = "<div class='alert'>You already voted for this match.</div>";
            document.getElementById("voteFormArea").style.display = "none";
            return;
        }
        if (!currentPlayer) { alert("Please login first"); return; }
        selectedGameId = gameId;
        document.getElementById("selectedGameLabel").innerHTML = `🗳️ Voting for: ${weekLabel}`;
        document.getElementById("voteFormArea").style.display = "block";
        let opts = `<option value="">-- Select --</option>`;
        allPlayers.forEach(p => {
            if (p.name !== currentPlayer.name)
                opts += `<option value="${p.id}">${escapeHtml(p.name)}</option>`;
        });
        document.getElementById("firstPlaceSelect").innerHTML = opts;
        document.getElementById("secondPlaceSelect").innerHTML = opts;
        document.getElementById("thirdPlaceSelect").innerHTML = opts;
    };

    async function submitVote() {
        if (!currentPlayer || !selectedGameId) { alert("Select a game week first"); return; }
        const first = document.getElementById("firstPlaceSelect").value;
        const second = document.getElementById("secondPlaceSelect").value;
        const third = document.getElementById("thirdPlaceSelect").value;
        if (!first || !second || !third) { document.getElementById("voteMessage").innerHTML = "<div class='alert'>Select all 3 players</div>"; return; }
        if (first === second || first === third || second === third) { alert("Must be three different players"); return; }
        const exists = await fetchJson(`${API_BASE}?action=checkVoteExists&gameId=${selectedGameId}&voterId=${currentPlayer.id}`);
        if (exists.exists) { alert("You already voted for this game!"); return; }
        await postJson(API_BASE, {
            action: "submitVote",
            gameId: selectedGameId,
            voterId: currentPlayer.id,
            firstPlaceId: first,
            secondPlaceId: second,
            thirdPlaceId: third
        });
        document.getElementById("voteMessage").innerHTML = "<div class='alert' style='background:#2e7d5e'>✅ Vote recorded!</div>";
        document.getElementById("voteFormArea").style.display = "none";
        await renderGameWeeks(currentPlayer.id);
        loadLeaderboard();
    }

    async function login() {
        const name = document.getElementById("playerSelect").value;
        const pin = document.getElementById("pinInput").value;
        if (!name || !pin) { document.getElementById("loginStatus").innerHTML = "Select name and enter PIN"; return; }
        const player = allPlayers.find(p => p.name === name);
        if (!player || player.pin !== pin) { document.getElementById("loginStatus").innerHTML = "❌ Invalid name or PIN"; return; }
        currentPlayer = { id: player.id, name: player.name };
        document.getElementById("loginStatus").innerHTML = `✅ Logged in as ${player.name}`;
        document.getElementById("votingSection").style.display = "block";
        await renderGameWeeks(player.id);
    }

    async function resetAllVotes() {
        if (!confirm("⚠️ Delete ALL votes? This action cannot be undone.")) return;
        alert("This feature requires manual sheet clearing. Please open your Google Sheet and clear the 'votes' sheet rows (keep headers).");
    }

    // Tab switching
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.querySelectorAll(".panel").forEach(p => p.classList.remove("active-panel"));
            document.getElementById(btn.dataset.tab === "voteTab" ? "votePanel" : btn.dataset.tab === "leaderTab" ? "leaderPanel" : "adminPanel").classList.add("active-panel");
            if (btn.dataset.tab === "leaderTab") loadLeaderboard();
        };
    });

    document.getElementById("loginBtn").onclick = login;
    document.getElementById("submitVoteBtn").onclick = submitVote;
    document.getElementById("refreshLeaderboard").onclick = loadLeaderboard;
    document.getElementById("adminLoginBtn").onclick = () => {
        if (document.getElementById("adminMasterPin").value === "admin123") {
            document.getElementById("adminContent").style.display = "block";
            document.getElementById("adminAuthMsg").innerHTML = "✅ Admin mode";
        } else {
            document.getElementById("adminAuthMsg").innerHTML = "❌ Wrong PIN";
        }
    };
    document.getElementById("resetAllVotesBtn").onclick = resetAllVotes;

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    loadPlayers();
    loadLeaderboard();
</script>
</body>
</html>
