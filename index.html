<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Monday Night Soccer | Team Hub</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{background:#eef2f5;font-family:'Inter',sans-serif;}
        .app{max-width:500px;margin:0 auto;background:#eef2f5;min-height:100vh;}
        .header{background:white;padding:14px 20px;text-align:center;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:10;}
        .logo-icon{width:56px;height:56px;background:#1a73e8;border-radius:24px;display:inline-flex;align-items:center;justify-content:center;margin:0 auto 6px;}
        .logo-icon i{font-size:28px;color:white;}
        .header h1{font-size:18px;font-weight:800;color:#1e293b;}
        .user-row{background:#f1f5f9;padding:5px 12px;border-radius:60px;display:inline-flex;align-items:center;gap:8px;margin-top:6px;font-size:12px;}
        .user-row button{background:#dc3545;border:none;padding:4px 12px;border-radius:40px;color:white;font-weight:600;font-size:11px;cursor:pointer;}
        .top-nav{background:white;padding:10px 12px;display:flex;flex-wrap:wrap;justify-content:center;gap:6px;border-bottom:1px solid #e2e8f0;position:sticky;top:70px;z-index:10;}
        .nav-module{background:#f8fafc;border:none;padding:8px 14px;border-radius:60px;font-size:12px;font-weight:600;color:#475569;cursor:pointer;transition:all 0.2s;}
        .nav-module.active{background:#1a73e8;color:white;}
        .module-container{padding:16px;display:none;}
        .module-container.active-module{display:block;}
        .card{background:white;border-radius:24px;padding:18px;margin-bottom:14px;border:1px solid #e2e8f0;box-shadow:0 1px 2px rgba(0,0,0,0.05);}
        .card h2{font-size:17px;font-weight:700;margin-bottom:14px;border-left:4px solid #1a73e8;padding-left:12px;}
        .attendance-card{background:linear-gradient(135deg,#1a73e8,#0d5bbf);color:white;border-radius:28px;padding:24px 20px;text-align:center;margin-bottom:16px;}
        .big-buttons{display:flex;gap:14px;margin:16px 0 12px;}
        .btn-play-big{background:#28a745;flex:1;padding:14px;border-radius:60px;font-weight:800;font-size:17px;border:none;color:white;cursor:pointer;}
        .btn-sit-big{background:#dc3545;flex:1;padding:14px;border-radius:60px;font-weight:800;font-size:17px;border:none;color:white;cursor:pointer;}
        .profile-item{background:#f8fafc;border-radius:20px;margin-bottom:10px;display:flex;align-items:center;gap:12px;padding:14px;}
        .profile-avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:20px;flex-shrink:0;}
        .player-avatar-small{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:white;font-weight:600;font-size:14px;margin-right:4px;}
        .profile-badge{background:white;border-radius:40px;padding:4px 12px;font-size:11px;font-weight:600;display:inline-block;margin-right:6px;margin-bottom:4px;color:#1e293b;}
        .edit-profile-btn{background:#475569;padding:6px 14px;font-size:12px;border-radius:40px;border:none;color:white;cursor:pointer;}
        .match-card{background:white;border-radius:24px;margin-bottom:14px;border:1px solid #e2e8f0;overflow:hidden;}
        .match-header{background:#f8fafc;padding:12px 16px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;}
        .match-result{background:#1a73e8;color:white;padding:4px 14px;border-radius:40px;font-weight:700;font-size:14px;}
        .teams-section{padding:16px;background:linear-gradient(145deg,#2e7d32,#1b5e20);}
        .team-row{display:flex;gap:12px;flex-wrap:wrap;}
        .team-box{flex:1;background:rgba(0,0,0,0.65);border-radius:18px;padding:12px;min-width:140px;}
        .team-yellow{background:#ffc107;color:#2c2c2c;font-weight:800;text-align:center;padding:6px;border-radius:60px;margin-bottom:8px;}
        .team-orange{background:#fd7e14;color:white;font-weight:800;text-align:center;padding:6px;border-radius:60px;margin-bottom:8px;}
        .player-list{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
        .player-tag{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.2);border-radius:40px;padding:4px 10px;font-size:11px;color:white;}
        .score-big{text-align:center;margin-top:12px;font-size:22px;font-weight:800;background:rgba(0,0,0,0.6);border-radius:60px;padding:8px;color:white;}
        .goals-section,.comments-section{padding:12px 16px;background:#fefce8;}
        .goals-list{display:flex;flex-wrap:wrap;gap:8px;}
        .goal-badge{background:white;border-radius:40px;padding:5px 12px;font-size:12px;font-weight:600;border-left:3px solid #eab308;}
        .add-comment{display:flex;gap:8px;margin-top:10px;}
        .add-comment input{flex:1;padding:12px;border-radius:60px;border:1.5px solid #e2e8f0;font-size:14px;}
        .comment-item{background:#f8fafc;border-radius:16px;padding:10px;margin-bottom:8px;font-size:13px;}
        .weather-card{background:linear-gradient(135deg,#0f2027,#203a43);color:white;border-radius:24px;padding:20px;text-align:center;}
        .admin-team-item{display:flex;justify-content:space-between;align-items:center;margin:8px 0;background:#f1f5f9;border-radius:60px;padding:8px 16px;flex-wrap:wrap;gap:8px;}
        .admin-action-btn{background:white;border:2px solid #1a73e8;color:#1a73e8;padding:12px;border-radius:60px;font-weight:700;font-size:14px;text-align:center;cursor:pointer;margin-bottom:8px;width:100%;}
        .guest-tag{background:#d4edda;color:#155724;border-radius:40px;padding:6px 12px;font-size:13px;display:inline-flex;align-items:center;gap:6px;}
        .playing-list,.guest-section{background:#e8f0fe;border-radius:20px;padding:16px;margin-bottom:14px;}
        .guest-section{background:#f0fdf4;border:1px solid #bbf7d0;}
        .attendee-tag{display:inline-flex;align-items:center;gap:6px;background:#e2e8f0;padding:6px 12px;border-radius:40px;font-size:13px;margin:4px;}
        .data-table{width:100%;border-collapse:collapse;font-size:13px;}
        .data-table th,.data-table td{padding:10px;text-align:left;border-bottom:1px solid #e2e8f0;}
        .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;}
        .modal-content{background:white;border-radius:32px;padding:24px;max-width:340px;width:90%;max-height:80vh;overflow-y:auto;}
        .login-box{background:white;border-radius:48px;padding:40px 28px;margin:40px 20px;text-align:center;}
        .login-logo{width:90px;height:90px;background:linear-gradient(135deg,#1a73e8,#0d5bbf);border-radius:32px;display:inline-flex;align-items:center;justify-content:center;margin:0 auto 20px;}
        select,input{width:100%;padding:14px;border:1.5px solid #e2e8f0;border-radius:60px;margin:8px 0;font-size:16px;background:white;}
        button{background:#1a73e8;color:white;border:none;padding:12px 20px;border-radius:60px;font-weight:700;cursor:pointer;}
        .flex-btns{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;}
        .btn-outline{background:white;color:#1a73e8;border:2px solid #1a73e8;}
        .chat-message{margin-bottom:12px;}
        .chat-bubble{background:#f1f5f9;padding:10px 14px;border-radius:18px;font-size:14px;}
        .chat-name{font-weight:700;font-size:12px;color:#1a73e8;margin-bottom:4px;}
        .info-bar{background:#e8f0fe;border-radius:16px;padding:12px;font-size:12px;margin-bottom:16px;text-align:center;color:#1a73e8;font-weight:500;}
        .timer-container{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:28px;padding:20px;text-align:center;margin-bottom:16px;}
        .timer-display{font-size:56px;font-weight:800;font-family:monospace;color:#10b981;letter-spacing:4px;background:#00000030;border-radius:20px;padding:12px;margin-bottom:16px;}
        .timer-controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
        .timer-btn{padding:10px 20px;border-radius:60px;font-weight:700;font-size:14px;border:none;cursor:pointer;}
        .timer-btn.start{background:#10b981;color:white;}
        .timer-btn.pause{background:#f59e0b;color:white;}
        .timer-btn.reset{background:#ef4444;color:white;}
        .half-status{font-size:14px;color:#94a3b8;margin-top:10px;}
        .loading{text-align:center;padding:40px;color:#64748b;}
        .whatsapp-share{background:#25D366;color:white;border:none;margin-top:8px;width:100%;}
        .stats-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap;}
        .remove-attendee-btn{background:#dc3545;border:none;color:white;border-radius:40px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;margin-left:6px;transition:0.2s;}
        .remove-attendee-btn:hover{background:#b02a37;}
        @media (max-width:450px){.team-row{flex-direction:column;}}
    </style>
</head>
<body>
<div class="app" id="app"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading Monday Night Soccer...</div></div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCWlFqDJyENgrUOhiLXCjSEi4Mk_54SA1w",
        authDomain: "monday-night-soccer-hub.firebaseapp.com",
        projectId: "monday-night-soccer-hub",
        storageBucket: "monday-night-soccer-hub.firebasestorage.app",
        messagingSenderId: "634335208908",
        appId: "1:634335208908:web:dca705b65fc52de0606969"
    };
    
    let db = null, firebaseReady = false;
    try { 
        firebase.initializeApp(firebaseConfig); 
        db = firebase.firestore(); 
        firebaseReady = true; 
        console.log("Firebase connected");
    } catch(e) { console.warn("Demo mode - using local storage", e); }
    
    let players = ["Alex Rowe","Ali Mekawy","Carlo","Charlie","Chris Del Monaco","Chris M","Chris S","Danny","Dante","David","Dimitri","Enzo","Farid","Faros","Frank","George B","George T","Ivan","James Zoumis","James","Joe T","Joey","Kia","Leo","Manoli","Marco","Mario","Maurice","Nector","Paul","Perri","Peter","Ralph","Rocco","Stav","Stevan","Theo","Tony EH","Vasilis"].sort();
    let playerProfiles = {};
    let teamAssignments = {};
    let matchResults = {};
    let attendance = [];
    let guests = [];
    let matchComments = {};
    let isAdminLoggedIn = false, currentUser = null;
    let weeklyCaptain = "Football Freedom";
    let weatherData = { temp: "18°C", condition: "Clear", icon: "fa-sun", rainChance: 10 };
    const POSITIONS = ["Goalkeeper","Defender","Midfielder","Striker","Winger"];
    let chatUnsubscribe = null;
    let timerInterval = null, currentHalf = 1, timeLeft = 45 * 60;
    
    function playAlarm() { 
        try { 
            const ctx = new (window.AudioContext || window.webkitAudioContext)(); 
            const o = ctx.createOscillator(), g = ctx.createGain(); 
            o.connect(g); g.connect(ctx.destination); 
            o.frequency.value = 880; g.gain.value = 0.3; 
            o.start(); g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 1.5); 
            o.stop(ctx.currentTime + 1.5); 
        } catch(e){ console.log("Alarm error"); } 
    }
    function formatTime(s){ return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }
    function updateTimerDisplay(){ 
        let d = document.getElementById("timerDisplay"); 
        if(d) d.textContent = formatTime(timeLeft); 
        let hs = document.getElementById("currentHalf"); 
        if(hs) hs.textContent = currentHalf === 1 ? "FIRST HALF" : "SECOND HALF"; 
    }
    function timerTick(){ 
        if(timeLeft <= 0){ 
            if(timerInterval) clearInterval(timerInterval); 
            playAlarm(); 
            if(currentHalf === 1){ 
                alert("🔔 HALF TIME! Click OK to start second half."); 
                currentHalf = 2; 
                timeLeft = 45 * 60; 
                updateTimerDisplay(); 
                startTimer();
            } else { 
                alert("🔔 FULL TIME! Match ended."); 
                timerInterval = null;
            } 
            return; 
        } 
        timeLeft--; 
        updateTimerDisplay(); 
    }
    function startTimer(){ if(timerInterval) clearInterval(timerInterval); timerInterval = setInterval(timerTick, 1000); }
    function pauseTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval = null; } }
    function resetTimer(){ pauseTimer(); currentHalf = 1; timeLeft = 45 * 60; updateTimerDisplay(); }
    
    function getNextMondayGame() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const aestNow = new Date(utc + (10 * 3600000));
        const day = aestNow.getDay(), hour = aestNow.getHours();
        let daysUntilMonday;
        if (day === 1 && hour >= 20) daysUntilMonday = 7;
        else if (day === 1) daysUntilMonday = 0;
        else if (day === 0) daysUntilMonday = 1;
        else daysUntilMonday = (8 - day) % 7;
        const nextMonday = new Date(aestNow);
        nextMonday.setDate(aestNow.getDate() + daysUntilMonday);
        nextMonday.setHours(20, 0, 0, 0);
        return nextMonday;
    }
    function getCurrentGameWeekStr(){ return getNextMondayGame().toISOString().split('T')[0]; }
    function getCurrentGameLabel(){ const m = getNextMondayGame(); return `Mon ${m.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}`; }
    function getAllGameWeeks() {
        const year = new Date().getFullYear();
        let start = new Date(year, 0, 1);
        while(start.getDay() !== 1) start.setDate(start.getDate() + 1);
        let weeks = [], cur = new Date(start);
        let dec31 = new Date(year, 11, 31);
        let lastMon = new Date(dec31);
        while(lastMon.getDay() !== 1) lastMon.setDate(lastMon.getDate() - 1);
        let secondLast = new Date(lastMon);
        secondLast.setDate(secondLast.getDate() - 7);
        while(cur <= secondLast) {
            weeks.push({ dateStr: cur.toISOString().split('T')[0], label: `Mon ${cur.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}` });
            cur.setDate(cur.getDate() + 7);
        }
        return weeks;
    }
    const ALL_WEEKS = getAllGameWeeks();
    const CURRENT_GAME_STR = getCurrentGameWeekStr();
    function getFutureWeeks(){ return ALL_WEEKS.filter(w => w.dateStr >= CURRENT_GAME_STR); }
    function getPastWeeks(){ return ALL_WEEKS.filter(w => w.dateStr < CURRENT_GAME_STR).reverse(); }
    function getAllParticipants(gameDate){
        const playersIn = attendance.filter(a => a.gameDate === gameDate && a.status === 'in').map(a => a.player);
        const guestsIn = guests.filter(g => g.gameDate === gameDate).map(g => ({ name: g.guestName, isGuest: true, addedBy: g.addedBy }));
        return { players: playersIn, guests: guestsIn };
    }
    
    function escapeHtml(s){ return String(s).replace(/[&<>]/g, m=> ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function getInitials(n){ return n.split(' ').map(x=>x[0]).join('').toUpperCase().substring(0,2); }
    function getAvatarColor(n){ const c=['#1a73e8','#28a745','#dc3545','#fd7e14','#6f42c1','#20c997']; let h=0; for(let i=0;i<n.length;i++) h=((h<<5)-h)+n.charCodeAt(i); return c[Math.abs(h)%c.length]; }
    function renderAvatar(n,s=50){ return `<div class="profile-avatar" style="background:${getAvatarColor(n)};width:${s}px;height:${s}px;font-size:${s/2.5}px;">${getInitials(n)}</div>`; }
    function renderMiniAvatar(n,s=28){ return `<div class="player-avatar-small" style="background:${getAvatarColor(n)};width:${s}px;height:${s}px;font-size:${s/2}px;">${getInitials(n)}</div>`; }
    
    // 🔥 NEW: Remove a player from attendance
    async function removeAttendee(playerName, gameDate){
        if(!isAdminLoggedIn && currentUser?.name !== playerName){
            alert("Only admin or the player can remove attendance.");
            return false;
        }
        if(!confirm(`Remove ${playerName} from playing list for ${getCurrentGameLabel()}?`)) return false;
        
        if(firebaseReady && db){
            await db.collection("attendance").doc(`${playerName}_${gameDate}`).delete();
        }
        attendance = attendance.filter(a => !(a.player === playerName && a.gameDate === gameDate));
        
        if(teamAssignments[gameDate]){
            delete teamAssignments[gameDate][playerName];
            if(firebaseReady && db) await db.collection("config").doc("teamAssignments").set(teamAssignments);
        }
        
        const gamesCount = attendance.filter(a => a.player === playerName && a.status === 'in').length;
        const opening = playerProfiles[playerName]?.openingBalanceGames || 0;
        if(playerProfiles[playerName]) {
            playerProfiles[playerName].gamesPlayed = gamesCount + opening;
            if(firebaseReady && db) await db.collection("config").doc("playerProfiles").set(playerProfiles);
        }
        
        refreshAll();
        alert(`${playerName} removed from attendance.`);
        return true;
    }
    
    async function loadData(){
        if(!firebaseReady || !db) return;
        try{
            const [pDoc,profDoc,tDoc,rDoc,attSnap,guestSnap,commentsSnap] = await Promise.all([
                db.collection("config").doc("players").get(),
                db.collection("config").doc("playerProfiles").get(),
                db.collection("config").doc("teamAssignments").get(),
                db.collection("config").doc("matchResults").get(),
                db.collection("attendance").get(),
                db.collection("guests").get(),
                db.collection("matchComments").get()
            ]);
            if(pDoc.exists) players = pDoc.data().list.sort();
            if(profDoc.exists) playerProfiles = profDoc.data();
            if(tDoc.exists) teamAssignments = tDoc.data();
            if(rDoc.exists) matchResults = rDoc.data();
            attendance = attSnap.docs.map(d=>d.data());
            guests = guestSnap.docs.map(d=>d.data());
            matchComments = {};
            commentsSnap.docs.forEach(doc=>{ const d=doc.data(); if(!matchComments[d.gameDate]) matchComments[d.gameDate]=[]; matchComments[d.gameDate].push(d); });
            for(let p of players) if(!playerProfiles[p]) playerProfiles[p] = { age:'—', position:'—', yearJoined:'—', gamesPlayed:0, openingBalanceGames:0 };
        } catch(e){ console.warn(e); }
        refreshAll();
    }
    
    async function saveAttendance(a){
        if(firebaseReady&&db) await db.collection("attendance").doc(`${a.player}_${a.gameDate}`).set(a);
        const idx = attendance.findIndex(x=>x.player===a.player && x.gameDate===a.gameDate);
        if(idx!==-1) attendance[idx]=a; else attendance.push(a);
        const games = attendance.filter(att=>att.player===a.player && att.status==='in').length;
        const opening = playerProfiles[a.player]?.openingBalanceGames || 0;
        if(playerProfiles[a.player]) playerProfiles[a.player].gamesPlayed = games + opening;
        else playerProfiles[a.player] = { age:'—', position:'—', yearJoined:'—', gamesPlayed:games+opening, openingBalanceGames:0 };
        if(firebaseReady&&db) await db.collection("config").doc("playerProfiles").set(playerProfiles);
        refreshAll();
    }
    
    async function saveGuest(g){
        if(firebaseReady&&db) await db.collection("guests").doc(`${g.guestName}_${g.gameDate}`).set(g);
        guests.push(g);
        refreshAll();
    }
    
    async function removeGuest(n,d){
        if(!confirm(`Remove guest "${n}"?`)) return;
        if(firebaseReady&&db) await db.collection("guests").doc(`${n}_${d}`).delete();
        guests = guests.filter(g=>!(g.guestName===n && g.gameDate===d));
        if(teamAssignments[d]){ delete teamAssignments[d][n]; delete teamAssignments[d][`guest_${n}`]; if(firebaseReady&&db) await db.collection("config").doc("teamAssignments").set(teamAssignments); }
        refreshAll();
    }
    
    async function saveTeamAssignments(date,assign){
        teamAssignments[date] = assign;
        if(firebaseReady&&db) await db.collection("config").doc("teamAssignments").set(teamAssignments);
        refreshAll();
    }
    
    async function saveComment(date,author,text){
        const c={ gameDate:date, author, text, timestamp:Date.now() };
        if(firebaseReady&&db) await db.collection("matchComments").add(c);
        if(!matchComments[date]) matchComments[date]=[];
        matchComments[date].push(c);
        renderHistoryPage();
    }
    
    async function saveMatchResult(date,yellow,orange,goals,assists,mvp,injuries,ownGoals){
        matchResults[date] = { yellowScore:yellow, orangeScore:orange, goals, assists:assists||{}, mvp, injuries:injuries||[], ownGoals:ownGoals||[], timestamp:Date.now() };
        if(firebaseReady&&db) await db.collection("config").doc("matchResults").set(matchResults);
        renderHistoryPage();
        renderScoreboardPage();
        if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function saveChatMessage(msg){
        if(!currentUser || !msg.trim()) return;
        if(firebaseReady&&db) await db.collection("chatMessages").add({ name:currentUser.name, message:msg.trim(), timestamp:firebase.firestore.FieldValue.serverTimestamp() });
    }
    
    async function setAttendance(status){
        if(!currentUser){ alert("Login required"); return; }
        await saveAttendance({ player:currentUser.name, gameDate:CURRENT_GAME_STR, status:status });
    }
    
    async function addGuest(name){
        if(!currentUser){ alert("Login first"); return; }
        if(guests.some(g=>g.gameDate===CURRENT_GAME_STR && g.guestName===name.trim())){ alert("Guest exists"); return; }
        await saveGuest({ guestName:name.trim(), gameDate:CURRENT_GAME_STR, addedBy:currentUser.name });
        const inp = document.getElementById("guestNameInput");
        if(inp) inp.value="";
        alert(`Guest "${name}" added!`);
    }
    
    function showEditProfile(name){
        if(!isAdminLoggedIn && currentUser?.name !== name){ alert("You can only edit your own profile"); return; }
        const ex = playerProfiles[name] || { age:'', position:POSITIONS[0], yearJoined:'', openingBalanceGames:0 };
        const modal = document.createElement('div'); modal.className='modal';
        modal.innerHTML = `<div class="modal-content"><h3>✏️ Edit ${escapeHtml(name)}</h3><label>Age</label><input id="editAge" value="${escapeHtml(ex.age||'')}"><label>Position</label><select id="editPosition">${POSITIONS.map(p=>`<option ${ex.position===p?'selected':''}>${p}</option>`).join('')}</select><label>Year Joined</label><input id="editYear" value="${escapeHtml(ex.yearJoined||'')}"><label>🏆 Opening Games (History)</label><input id="editOpeningGames" type="number" value="${ex.openingBalanceGames||0}"><div class="flex-btns"><button id="saveBtn">Save</button><button id="cancelBtn" class="btn-outline">Cancel</button></div></div>`;

    function generateSportsReport(weekLabel, yellowScore, orangeScore, goals, assists, mvp, injuries, ownGoals, yellowTeam, orangeTeam){
        const winner = yellowScore > orangeScore ? "YELLOW" : (orangeScore > yellowScore ? "ORANGE" : "DRAW");
        const winnerEmoji = yellowScore > orangeScore ? "🟡" : (orangeScore > yellowScore ? "🟠" : "🤝");
        let goalText = "";
        const allGoals = {...goals};
        if(ownGoals && ownGoals.length){ ownGoals.forEach(og => { allGoals[`⚠️ OWN GOAL (${og.player})`] = (allGoals[`⚠️ OWN GOAL (${og.player})`] || 0) + 1; }); }
        const goalEntries = Object.entries(allGoals);
        if(goalEntries.length){ goalText = goalEntries.map(([p,c]) => `⚽ ${p} - ${c} goal${c>1?'s':''}`).join('\n'); }
        else { goalText = "⚽ NO GOALS SCORED"; }
        let assistText = "";
        if(assists && Object.keys(assists).length){ assistText = Object.entries(assists).map(([a,c]) => `🎯 ${a} - ${c} assist${c>1?'s':''}`).join('\n'); }
        else { assistText = "🎯 No assists recorded"; }
        let injuryText = "";
        if(injuries && injuries.length){ injuryText = `🏥 INJURY REPORT\n${injuries.map(i => `🩺 ${i}`).join('\n')}`; }
        else { injuryText = "🏥 INJURY REPORT\n🩺 No injuries to report"; }
        const opener = `🎙️ **MONDAY NIGHT FOOTBALL - ${weekLabel}**\n\nGood evening football fans! What a night at Clifton Park! `;
        const report = `${opener}🟡 YELLOW vs 🟠 ORANGE delivered a ${yellowScore===orangeScore?'tense stalemate':Math.abs(yellowScore-orangeScore)>=3?'convincing victory':'hard-fought battle'}.\n\n📊 **FINAL SCORE**\n🟡 YELLOW ${yellowScore} - ${orangeScore} 🟠\n\n🎯 **GOAL SCORERS**\n${goalText}\n\n${assistText}\n\n🏆 **MAN OF THE MATCH**\n⭐ ${mvp || "The Referee"} ⭐\n\n${injuryText}\n\n📈 **SUMMARY**\nThe ${winnerEmoji} ${winner} side ${yellowScore===orangeScore?'shared the points':`secured the victory`}. The Clifton Park pitch witnessed moments of brilliance.\n\n📅 **NEXT WEEK**\nMonday 8pm at Clifton Park. Be there!\n\n#MondayNightSoccer #CliftonPark`;
        return report;
    }

            if(week){ form.style.display="block"; goals=[]; assists=[]; const existing=matchResults[week]; if(existing){ document.getElementById("reportYellowScore").value=existing.yellowScore||0; document.getElementById("reportOrangeScore").value=existing.orangeScore||0; if(existing.goals) goals=Object.entries(existing.goals).map(([p,c])=>({player:p,count:c})); if(existing.assists) assists=Object.entries(existing.assists).map(([p,c])=>({player:p,count:c})); document.getElementById("injuriesInput").value=existing.injuries?.join(', ')||''; const mvpSel=document.getElementById("mvpSelect"); if(mvpSel && existing.mvp) mvpSel.value=existing.mvp; } updateFormFields(week); document.getElementById("generatedReport").style.display="none"; } else { form.style.display="none"; }
        });
        
        document.getElementById("addGoalBtn")?.addEventListener("click",()=>{ const week=weekSelect.value; if(week){ goals.push({player:'',count:1}); updateFormFields(week); } });
        document.getElementById("addAssistBtn")?.addEventListener("click",()=>{ const week=weekSelect.value; if(week){ assists.push({player:'',count:1}); updateFormFields(week); } });
        document.addEventListener("click",(e)=>{ if(e.target.classList.contains("remove-goal")){ const idx=parseInt(e.target.dataset.idx); if(!isNaN(idx)){ goals.splice(idx,1); const week=weekSelect.value; if(week) updateFormFields(week); } } if(e.target.classList.contains("remove-assist")){ const idx=parseInt(e.target.dataset.idx); if(!isNaN(idx)){ assists.splice(idx,1); const week=weekSelect.value; if(week) updateFormFields(week); } } });
        document.addEventListener("change",(e)=>{ if(e.target.classList.contains("goal-select")){ const idx=parseInt(e.target.dataset.idx); if(!isNaN(idx) && goals[idx]) goals[idx].player=e.target.value; } if(e.target.classList.contains("goal-count")){ const idx=parseInt(e.target.dataset.idx); if(!isNaN(idx) && goals[idx]) goals[idx].count=parseInt(e.target.value)||1; } if(e.target.classList.contains("assist-select")){ const idx=parseInt(e.target.dataset.idx); if(!isNaN(idx) && assists[idx]) assists[idx].player=e.target.value; } if(e.target.classList.contains("assist-count")){ const idx=parseInt(e.target.dataset.idx); if(!isNaN(idx) && assists[idx]) assists[idx].count=parseInt(e.target.value)||1; } });
        
        document.getElementById("submitMatchReportBtn")?.addEventListener("click",async()=>{ const week=weekSelect.value; if(!week){ alert("Select a week"); return; } const y=parseInt(document.getElementById("reportYellowScore")?.value)||0; const o=parseInt(document.getElementById("reportOrangeScore")?.value)||0; const goalObj={}; for(let g of goals) if(g.player && g.count>0) goalObj[g.player]=(goalObj[g.player]||0)+g.count; const assistObj={}; for(let a of assists) if(a.player && a.count>0) assistObj[a.player]=(assistObj[a.player]||0)+a.count; const mvp=document.getElementById("mvpSelect")?.value||""; const injuries=document.getElementById("injuriesInput")?.value.split(',').map(i=>i.trim()).filter(i=>i)||[]; await saveMatchResult(week,y,o,goalObj,assistObj,mvp,injuries,[]); const weekLabel=ALL_WEEKS.find(w=>w.dateStr===week)?.label||week; const report=generateSportsReport(weekLabel,y,o,goalObj,assistObj,mvp,injuries,[],[]); const reportDiv=document.getElementById("generatedReport"); const reportText=document.getElementById("reportText"); if(reportDiv && reportText){ reportText.innerText=report; reportDiv.style.display="block"; document.getElementById("whatsappShareBtn")?.addEventListener("click",()=>{ const url=`https://wa.me/?text=${encodeURIComponent(report)}`; window.open(url,'_blank'); }); } });
        
        document.getElementById("manualAddBtn")?.addEventListener("click",async()=>{ const sel=document.getElementById("manualPlayerSelect"); const pn=sel?.value; if(pn && players.includes(pn)){ const exists=attendance.some(a=>a.player===pn && a.gameDate===gameDate); if(exists){ alert(`${pn} already has attendance`); return; } await saveAttendance({ player:pn, gameDate:gameDate, status:'in' }); alert(`${pn} added`); renderAdminPage(); } else alert("Select valid player"); });
        document.getElementById("adminAddGuestBtn")?.addEventListener("click",async()=>{ const inp=document.getElementById("adminGuestName"); const name=inp?.value.trim(); if(name){ await saveGuest({ guestName:name, gameDate:gameDate, addedBy:"Admin" }); inp.value=""; renderAdminPage(); } else alert("Enter guest name"); });
        document.querySelectorAll(".remove-guest-btn").forEach(btn=>btn.addEventListener("click",async()=>{ const guest=btn.dataset.guest; const date=btn.dataset.date; await removeGuest(guest,date); renderAdminPage(); }));
        document.getElementById("saveTeamsBtn")?.addEventListener("click",async()=>{ const newAssign={}; document.querySelectorAll(".team-select").forEach(sel=>{ const name=sel.dataset.name; const val=sel.value; if(val && name) newAssign[name]=val; }); await saveTeamAssignments(gameDate,newAssign); renderAdminPage(); renderTeamsPage(); });
        document.getElementById("autoBalanceBtn")?.addEventListener("click",()=>{ const playersList=allList.map(p=>p.name); const shuffled=[...playersList]; for(let i=shuffled.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; } const half=Math.ceil(shuffled.length/2); const autoAssign={}; shuffled.forEach((p,idx)=>{ autoAssign[p]=idx<half?"yellow":"orange"; }); saveTeamAssignments(gameDate,autoAssign).then(()=>{ renderAdminPage(); renderTeamsPage(); }); });
    }
    
    function showLoginModal(){
        const modal=document.createElement('div'); modal.className='modal'; let playerOptions=players.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
        modal.innerHTML=`<div class="modal-content"><div class="login-logo"><i class="fas fa-futbol fa-3x" style="color:white;"></i></div><h3>Welcome to Monday Soccer</h3><select id="loginNameSelect"><option value="">Select your name</option>${playerOptions}</select><button id="loginBtn">Login / Join</button><div style="margin-top:12px;"><button id="adminSwitchBtn" class="btn-outline" style="width:100%;">🔐 Admin Access</button></div></div>`;
        document.body.appendChild(modal);
        document.getElementById("loginBtn").onclick=()=>{ const sel=document.getElementById("loginNameSelect"); const name=sel?.value; if(name && players.includes(name)){ currentUser={name}; isAdminLoggedIn=false; modal.remove(); document.getElementById("userNameDisplay").innerText=name; document.getElementById("logoutBtn").style.display="inline-block"; refreshAll(); renderChatPage(); } else alert("Please select your name"); };
        document.getElementById("adminSwitchBtn").onclick=()=>{ const pw=prompt("Admin password:"); if(pw==="admin123"){ isAdminLoggedIn=true; currentUser={name:"Admin"}; document.getElementById("userNameDisplay").innerText="Admin"; document.getElementById("logoutBtn").style.display="inline-block"; modal.remove(); refreshAll(); renderAdminPage(); } else alert("Wrong password"); };
    }
    
    function logout(){ currentUser=null; isAdminLoggedIn=false; document.getElementById("userNameDisplay").innerText="Not logged in"; document.getElementById("logoutBtn").style.display="none"; showLoginModal(); refreshAll(); }
    
    function initApp(){
        const appDiv=document.getElementById("app");
        appDiv.innerHTML=`<div class="header"><div class="logo-icon"><i class="fas fa-futbol"></i></div><h1>MONDAY NIGHT SOCCER</h1><div class="user-row"><span id="userNameDisplay">Not logged in</span><button id="logoutBtn" style="display:none;">Logout</button></div></div><div class="top-nav"><button class="nav-module active" data-module="home">🏠 Home</button><button class="nav-module" data-module="teamswk">⚽ Teams</button><button class="nav-module" data-module="history">📖 History</button><button class="nav-module" data-module="scoreboard">🏆 Stats</button><button class="nav-module" data-module="profiles">👤 Profiles</button><button class="nav-module" data-module="timer">⏱️ Timer</button><button class="nav-module" data-module="chat">💬 Chat</button><button class="nav-module" data-module="weather">🌤️ Weather</button><button class="nav-module" data-module="rules">📜 Rules</button><button class="nav-module" data-module="admin">🔧 Admin</button></div><div id="homeContainer" class="module-container active-module"></div><div id="page-teamswk" class="module-container"></div><div id="page-history" class="module-container"></div><div id="page-scoreboard" class="module-container"></div><div id="page-profiles" class="module-container"></div><div id="page-timer" class="module-container"></div><div id="page-chat" class="module-container"></div><div id="page-weather" class="module-container"></div><div id="page-rules" class="module-container"></div><div id="page-admin" class="module-container"></div>`;
        document.querySelectorAll(".nav-module").forEach(btn=>{ btn.addEventListener("click",()=>{ document.querySelectorAll(".nav-module").forEach(b=>b.classList.remove("active")); btn.classList.add("active"); const mod=btn.dataset.module; document.querySelectorAll(".module-container").forEach(c=>c.classList.remove("active-module")); if(mod==="home") document.getElementById("homeContainer").classList.add("active-module"); else document.getElementById(`page-${mod}`).classList.add("active-module"); if(mod==="chat") renderChatPage(); if(mod==="timer") renderTimerPage(); if(mod==="weather") renderWeatherPage(); if(mod==="rules") renderRulesPage(); }); });
        document.getElementById("logoutBtn").onclick=logout;
        if(firebaseReady) loadData().then(()=>{ showLoginModal(); fetchWeather(); }); else { showLoginModal(); fetchWeather(); refreshAll(); }
    }
    
    async function fetchWeather(){
        try{
            const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=-37.77&longitude=144.97&hourly=temperature_2m,precipitation_probability,weathercode&timezone=Australia/Melbourne&forecast_days=7');
            const d=await r.json();
            const target=CURRENT_GAME_STR;
            for(let i=0;i<d.hourly.time.length;i++){
                const hd=d.hourly.time[i].split('T')[0];
                const hr=parseInt(d.hourly.time[i].split('T')[1].substring(0,2));
                if(hd===target && hr===20){
                    const t=Math.round(d.hourly.temperature_2m[i]);
                    const code=d.hourly.weathercode[i];
                    let cond="Clear", icon="fa-sun";
                    if(code===0){ cond="Clear"; icon="fa-sun"; }
                    else if(code===1||code===2){ cond="Partly cloudy"; icon="fa-cloud-sun"; }
                    else if(code===3){ cond="Overcast"; icon="fa-cloud"; }
                    else if(code>=51&&code<=67){ cond="Light rain"; icon="fa-cloud-rain"; }
                    else if(code>=80&&code<=99){ cond="Rain/storm"; icon="fa-cloud-bolt"; }
                    weatherData={ temp:`${t}°C`, condition:cond, icon, rainChance:d.hourly.precipitation_probability[i]||0 };
                    break;
                }
            }
        } catch(e){}
        renderWeatherPage();
    }
    
    initApp();
</script>
