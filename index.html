<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Collingwood FC | Monday Nights</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0a0a; font-family: 'Inter', -apple-system, sans-serif; }
        .app { max-width: 500px; margin: 0 auto; background: #0a0a0a; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* COLLINGWOOD BLACK & WHITE THEME */
        .header { background: #000000; padding: 14px 20px; text-align: center; border-bottom: 2px solid #ffffff20; }
        .logo-icon { width: 56px; height: 56px; background: #ffffff; border-radius: 24px; display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 6px; }
        .logo-icon i { font-size: 28px; color: #000000; }
        .header h1 { font-size: 18px; font-weight: 800; color: #ffffff; letter-spacing: 1px; }
        .user-row { background: #1a1a1a; padding: 5px 12px; border-radius: 60px; display: inline-flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 12px; font-weight: 500; color: #ffffff; border: 1px solid #333; }
        .user-row button { background: #333; border: none; padding: 4px 12px; border-radius: 40px; color: white; font-weight: 600; font-size: 11px; cursor: pointer; transition: 0.2s; }
        .user-row button:hover { background: #555; }
        
        .top-nav { background: #000000; padding: 10px 12px; display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 10; }
        .nav-module { background: #111; border: 1px solid #2a2a2a; padding: 8px 14px; border-radius: 60px; font-size: 12px; font-weight: 600; color: #dddddd; cursor: pointer; transition: all 0.2s; }
        .nav-module.active { background: #ffffff; color: #000000; border-color: #ffffff; }
        .module-container { flex: 1; overflow-y: auto; padding: 16px; display: none; }
        .module-container.active-module { display: block; }
        
        .card { background: #111111; border-radius: 24px; padding: 18px; margin-bottom: 14px; border: 1px solid #2a2a2a; color: #e0e0e0; }
        .card h2 { font-size: 17px; font-weight: 700; margin-bottom: 14px; border-left: 4px solid #ffffff; padding-left: 12px; color: #ffffff; }
        
        .attendance-card { background: linear-gradient(135deg, #1a1a1a, #000000); border: 1px solid #333; color: white; border-radius: 28px; padding: 24px 20px; text-align: center; margin-bottom: 16px; }
        .big-buttons { display: flex; gap: 14px; justify-content: center; margin: 16px 0 12px; }
        .btn-play-big { background: #ffffff; color: #000000; flex: 1; padding: 14px; border-radius: 60px; font-weight: 800; font-size: 17px; border: none; cursor: pointer; }
        .btn-sit-big { background: #222222; color: #ffffff; border: 1px solid #444; flex: 1; padding: 14px; border-radius: 60px; font-weight: 800; font-size: 17px; border: none; cursor: pointer; }
        
        .profile-item { background: #0d0d0d; border-radius: 20px; padding: 14px; margin-bottom: 10px; border-left: 4px solid #ffffff; display: flex; align-items: center; gap: 12px; }
        .profile-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 20px; flex-shrink: 0; }
        .player-avatar-small { width: 36px; height: 36px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; margin-right: 4px; flex-shrink: 0; }
        .profile-badge { background: #1f1f1f; color: #ddd; border-radius: 40px; padding: 4px 12px; font-size: 11px; font-weight: 600; display: inline-block; margin-right: 6px; margin-bottom: 4px; }
        .edit-profile-btn { background: #2a2a2a; padding: 6px 14px; font-size: 12px; border-radius: 40px; border: none; color: white; cursor: pointer; }
        
        .match-card { background: #0c0c0c; border-radius: 24px; margin-bottom: 14px; border: 1px solid #2a2a2a; overflow: hidden; }
        .match-header { background: #050505; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .match-date { font-weight: 800; font-size: 14px; color: #fff; }
        .match-result { background: #ffffff; color: #000000; padding: 4px 14px; border-radius: 40px; font-weight: 700; font-size: 14px; }
        .teams-section { padding: 16px; background: #000000; }
        .team-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .team-box { flex: 1; background: #111111; border-radius: 18px; padding: 12px; border: 1px solid #2c2c2c; }
        .team-black { background: #ffffff; color: #000000; font-weight: 800; text-align: center; padding: 6px; border-radius: 60px; font-size: 14px; margin-bottom: 8px; }
        .team-white { background: #222222; color: #ffffff; font-weight: 800; text-align: center; padding: 6px; border-radius: 60px; font-size: 14px; margin-bottom: 8px; border: 1px solid #444; }
        .player-list { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .player-tag { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.1); border-radius: 40px; padding: 4px 10px; font-size: 11px; color: #eee; margin: 2px; }
        .score-big { text-align: center; margin-top: 12px; font-size: 22px; font-weight: 800; background: #000000; border-radius: 60px; padding: 8px; color: white; border: 1px solid #333; }
        .goals-section, .comments-section { padding: 12px 16px; background: #080808; border-top: 1px solid #222; }
        .goals-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .goal-badge { background: #1c1c1c; border-radius: 40px; padding: 5px 12px; font-size: 12px; font-weight: 600; border-left: 3px solid #ffffff; color: #f0f0f0; }
        .add-comment { display: flex; gap: 8px; margin-top: 10px; }
        .add-comment input { flex: 1; padding: 12px; border-radius: 60px; border: 1.5px solid #2a2a2a; font-size: 14px; background: #121212; color: white; }
        .comment-item { background: #121212; border-radius: 16px; padding: 10px; margin-bottom: 8px; font-size: 13px; color: #ddd; }
        
        .weather-card { background: linear-gradient(135deg, #000000, #1a1a1a); border: 1px solid #333; color: white; border-radius: 24px; padding: 20px; text-align: center; }
        .admin-team-item { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; background: #0d0d0d; border-radius: 60px; padding: 8px 16px; flex-wrap: wrap; gap: 8px; border: 1px solid #2a2a2a; }
        .admin-action-btn { background: #1f1f1f; border: 2px solid #ffffff; color: #ffffff; padding: 12px; border-radius: 60px; font-weight: 700; font-size: 14px; text-align: center; cursor: pointer; margin-bottom: 8px; width: 100%; }
        .guest-tag { background: #222; color: #ddd; border-radius: 40px; padding: 6px 12px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
        .playing-list { background: #0a0a0a; border-radius: 20px; padding: 16px; margin-bottom: 14px; border: 1px solid #2a2a2a; }
        .guest-section { background: #0f0f0f; border-radius: 20px; padding: 16px; margin-bottom: 14px; border: 1px solid #2a2a2a; }
        .attendee-tag { display: inline-flex; align-items: center; gap: 6px; background: #1a1a1a; padding: 6px 12px; border-radius: 40px; font-size: 13px; margin: 4px; color: #eee; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; color: #ccc; }
        .data-table th, .data-table td { padding: 10px; text-align: left; border-bottom: 1px solid #2a2a2a; }
        .badge-paid { background: #ffffff; color: #000000; border-radius: 40px; padding: 4px 12px; font-size: 11px; display: inline-block; font-weight: 700; }
        .badge-owing { background: #333; color: #ff8888; border-radius: 40px; padding: 4px 12px; font-size: 11px; display: inline-block; }
        .finance-summary { background: linear-gradient(135deg, #000000, #1a1a1a); border: 1px solid #333; color: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; text-align: center; }
        .finance-summary .amount { font-size: 32px; font-weight: 800; color: #ffffff; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #111; border: 1px solid #333; border-radius: 32px; padding: 24px; max-width: 340px; width: 90%; max-height: 80vh; overflow-y: auto; color: white; }
        .login-box { background: #111111; border: 1px solid #2c2c2c; border-radius: 48px; padding: 40px 28px; margin: 40px 20px; text-align: center; color: white; }
        .login-logo { width: 90px; height: 90px; background: #ffffff; border-radius: 32px; display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 20px; color: black; }
        select, input { width: 100%; padding: 14px; border: 1.5px solid #333; border-radius: 60px; margin: 8px 0; font-size: 16px; background: #1a1a1a; color: white; }
        button { background: #ffffff; color: #000000; border: none; padding: 12px 20px; border-radius: 60px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        button:active { opacity: 0.8; }
        .btn-outline { background: transparent; color: #ffffff; border: 2px solid #ffffff; }
        hr { margin: 16px 0; border-color: #2a2a2a; }
        .chat-message { margin-bottom: 12px; display: flex; flex-direction: column; }
        .chat-name { font-weight: 700; font-size: 12px; color: #ffffff; margin-bottom: 4px; }
        .chat-bubble { background: #1a1a1a; padding: 10px 14px; border-radius: 18px; font-size: 14px; word-wrap: break-word; border: 1px solid #2c2c2c; color: #eee; }
        .chat-time { font-size: 10px; color: #777; margin-top: 2px; }
        .loading { text-align: center; padding: 40px; color: #aaa; }
        .warning-banner { background: #333; color: #ffcc00; padding: 8px; text-align: center; font-size: 12px; border-radius: 8px; margin-bottom: 10px; }
        @media (max-width: 450px) { .nav-module { padding: 6px 10px; font-size: 10px; } }
    </style>
</head>
<body>
<div class="app" id="app"><div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading Black & White Army...</div></div>

<script>
    const DEFAULT_PLAYERS = ["Alex Rowe","Ali Mekawy","Carlo","Charlie","Chris Del Monaco","Chris M","Chris S","Danny","Dante","David","Dimitri","Enzo","Farid","Faros","Frank","George B","George T","Ivan","James Zoumis","James","Joe T","Joey","Kia","Leo","Manoli","Marco","Mario","Maurice","Nector","Paul","Perri","Peter","Ralph","Rocco","Stav","Stevan","Theo","Tony EH","Vasilis"].sort();
    
    const firebaseConfig = {
        apiKey: "AIzaSyCWlFqDJyENgrUOhiLXCjSEi4Mk_54SA1w",
        authDomain: "monday-night-soccer-hub.firebaseapp.com",
        projectId: "monday-night-soccer-hub",
        storageBucket: "monday-night-soccer-hub.firebasestorage.app",
        messagingSenderId: "634335208908",
        appId: "1:634335208908:web:dca705b65fc52de0606969"
    };
    
    let db = null, firebaseReady = false;
    try { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); firebaseReady = true; console.log("Firebase ready"); } catch(e) { console.warn("Firebase demo mode"); }
    
    let players = [...DEFAULT_PLAYERS];
    let playerProfiles = {};
    let teamAssignments = {};
    let matchResults = {};
    let attendance = [];
    let guests = [];
    let payments = [];
    let matchComments = {};
    let isAdminLoggedIn = false, currentUser = null;
    let weeklyCaptain = "Carlo";
    let weatherData = { temp: "18°C", condition: "Clear", icon: "fa-sun", rainChance: 10 };
    let rulesText = "• ⏰ 8:00pm SHARP kickoff at Clifton Park\n• 💰 $5 weekly fee\n• 👑 Captain rotates\n• ✅ RSVP is mandatory\n• 🎭 Guests welcome!\n• 🖤🤍 Go Pies!";
    const POSITIONS = ["Goalkeeper","Defender","Midfielder","Striker","Winger"];
    let chatUnsubscribe = null;
    const WEEKLY_FEE = 5;
    
    // CRITICAL: Get current AEST time and determine which game week to show
    function getCurrentAESTDateTime() {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        return new Date(utc + (10 * 3600000));
    }
    
    function isAfterCutoffTime() {
        const aestNow = getCurrentAESTDateTime();
        const day = aestNow.getDay(); // 1 = Monday
        const hours = aestNow.getHours();
        const minutes = aestNow.getMinutes();
        // Cutoff is 9:30 PM Monday AEST
        if (day === 1) {
            if (hours > 21 || (hours === 21 && minutes >= 30)) return true;
            return false;
        }
        // If it's Tuesday or later, also show next week
        return day > 1;
    }
    
    function getDisplayGameWeek() {
        const aestNow = getCurrentAESTDateTime();
        const currentMonday = new Date(aestNow);
        // Find the most recent Monday
        while (currentMonday.getDay() !== 1) currentMonday.setDate(currentMonday.getDate() - 1);
        currentMonday.setHours(20, 0, 0, 0);
        
        const thisWeekDateStr = currentMonday.toISOString().split('T')[0];
        
        // Next Monday is 7 days later
        const nextMonday = new Date(currentMonday);
        nextMonday.setDate(nextMonday.getDate() + 7);
        const nextWeekDateStr = nextMonday.toISOString().split('T')[0];
        
        // Determine which week to display
        const afterCutoff = isAfterCutoffTime();
        
        if (afterCutoff) {
            // After 9:30pm Monday: show NEXT Monday's game
            return { gameDate: nextWeekDateStr, label: getWeekLabel(nextMonday), isNextWeek: true };
        } else {
            // Before 9:30pm Monday: show THIS Monday's game
            return { gameDate: thisWeekDateStr, label: getWeekLabel(currentMonday), isNextWeek: false };
        }
    }
    
    function getWeekLabel(date) {
        return `Mon ${date.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })} • 8pm`;
    }
    
    function getCurrentGameWeekDisplay() {
        return getDisplayGameWeek();
    }
    
    function generateAllGameWeeks() {
        const year = new Date().getFullYear();
        let start = new Date(year, 0, 1);
        while (start.getDay() !== 1) start.setDate(start.getDate() + 1);
        let weeks = [], cur = new Date(start);
        let dec31 = new Date(year, 11, 31);
        let lastMonday = new Date(dec31);
        while (lastMonday.getDay() !== 1) lastMonday.setDate(lastMonday.getDate() - 1);
        let secondLast = new Date(lastMonday);
        secondLast.setDate(secondLast.getDate() - 7);
        while (cur <= secondLast) {
            weeks.push({ dateStr: cur.toISOString().split('T')[0], label: `Mon ${cur.toLocaleDateString('en-AU', { day: 'numeric', month: 'short' })}` });
            cur.setDate(cur.getDate() + 7);
        }
        return weeks;
    }
    
    const ALL_WEEKS = generateAllGameWeeks();
    const getPastWeeks = () => ALL_WEEKS.filter(w => w.dateStr < getDisplayGameWeek().gameDate).reverse();
    
    function getAllParticipants(gameDate) {
        const playersIn = attendance.filter(a => a.gameDate === gameDate && a.status === 'in').map(a => a.player);
        const guestsIn = guests.filter(g => g.gameDate === gameDate).map(g => ({ name: g.guestName, isGuest: true, addedBy: g.addedBy }));
        return { players: playersIn, guests: guestsIn };
    }
    
    // Helper functions
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function getInitials(name) { return name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0,2); }
    function getAvatarColor(name) {
        const shades = ['#ffffff', '#e0e0e0', '#c0c0c0', '#a0a0a0', '#808080', '#606060'];
        let hash = 0;
        for(let i=0;i<name.length;i++) hash = ((hash<<5)-hash)+name.charCodeAt(i);
        return shades[Math.abs(hash)%shades.length];
    }
    function renderAvatar(name, size=50) {
        const bg = getAvatarColor(name);
        const textColor = (bg === '#ffffff' || bg === '#e0e0e0') ? '#000000' : '#ffffff';
        return `<div class="profile-avatar" style="background:${bg}; width:${size}px; height:${size}px; font-size:${size/2.5}px; color:${textColor};">${getInitials(name)}</div>`;
    }
    function renderMiniAvatar(name, size=28) {
        const bg = getAvatarColor(name);
        const textColor = (bg === '#ffffff' || bg === '#e0e0e0') ? '#000' : '#fff';
        return `<div class="player-avatar-small" style="background:${bg}; width:${size}px; height:${size}px; font-size:${size/2}px; color:${textColor};">${getInitials(name)}</div>`;
    }
    
    async function fetchWeather() {
        try {
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-37.77&longitude=144.97&hourly=temperature_2m,precipitation_probability,weathercode&timezone=Australia/Melbourne&forecast_days=1');
            const data = await response.json();
            const displayWeek = getDisplayGameWeek();
            const gameDate = new Date(displayWeek.gameDate);
            const dateStr = displayWeek.gameDate;
            for(let i=0;i<data.hourly.time.length;i++) {
                const hourDate = data.hourly.time[i].split('T')[0];
                const hour = parseInt(data.hourly.time[i].split('T')[1].substring(0,2));
                if(hourDate === dateStr && hour === 20) {
                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    const code = data.hourly.weathercode[i];
                    let condition="Clear", icon="fa-sun";
                    if(code===0) { condition="Clear"; icon="fa-sun"; }
                    else if(code===1||code===2) { condition="Partly cloudy"; icon="fa-cloud-sun"; }
                    else if(code===3) { condition="Overcast"; icon="fa-cloud"; }
                    else if(code>=51&&code<=67) { condition="Light rain"; icon="fa-cloud-rain"; }
                    else if(code>=80&&code<=99) { condition="Rain/storm"; icon="fa-cloud-bolt"; }
                    weatherData = { temp: `${temp}°C`, condition, icon, rainChance: data.hourly.precipitation_probability[i] || 0 };
                    break;
                }
            }
        } catch(e) { console.warn("Weather fetch failed"); }
        renderWeatherPage();
    }
    
    async function loadData() {
        if(!firebaseReady || !db) return;
        try {
            const [pDoc, profileDoc, tDoc, rDoc, attSnap, guestSnap, paySnap, commentsSnap, rulesDoc] = await Promise.all([
                db.collection("config").doc("players").get().catch(()=>null),
                db.collection("config").doc("playerProfiles").get().catch(()=>null),
                db.collection("config").doc("teamAssignments").get().catch(()=>null),
                db.collection("config").doc("matchResults").get().catch(()=>null),
                db.collection("attendance").get().catch(()=>({docs:[]})),
                db.collection("guests").get().catch(()=>({docs:[]})),
                db.collection("payments").get().catch(()=>({docs:[]})),
                db.collection("matchComments").get().catch(()=>({docs:[]})),
                db.collection("config").doc("rules").get().catch(()=>null)
            ]);
            if(pDoc?.exists) players = pDoc.data().list.sort();
            if(profileDoc?.exists) playerProfiles = profileDoc.data();
            if(tDoc?.exists) teamAssignments = tDoc.data();
            if(rDoc?.exists) matchResults = rDoc.data();
            attendance = attSnap.docs.map(d => d.data());
            guests = guestSnap.docs.map(d => d.data());
            payments = paySnap.docs.map(d => d.data());
            matchComments = {};
            commentsSnap.docs.forEach(doc => { const data=doc.data(); if(!matchComments[data.gameDate]) matchComments[data.gameDate]=[]; matchComments[data.gameDate].push(data); });
            if(rulesDoc?.exists && rulesDoc.data().text) rulesText = rulesDoc.data().text;
            for(let p of players) if(!playerProfiles[p]) playerProfiles[p] = { age:'—', position:'—', yearJoined:'—', gamesPlayed:0, openingBalanceGames:0 };
        } catch(e) { console.warn(e); }
    }
    
    async function saveAttendance(a) {
        if(firebaseReady && db) await db.collection("attendance").doc(`${a.player}_${a.gameDate}`).set(a);
        const idx = attendance.findIndex(x => x.player === a.player && x.gameDate === a.gameDate);
        if(idx !== -1) attendance[idx] = a; else attendance.push(a);
        const gamesFromAttendance = attendance.filter(att => att.player === a.player && att.status === 'in').length;
        const opening = playerProfiles[a.player]?.openingBalanceGames || 0;
        if(playerProfiles[a.player]) playerProfiles[a.player].gamesPlayed = gamesFromAttendance + opening;
        else playerProfiles[a.player] = { age:'—', position:'—', yearJoined:'—', gamesPlayed: gamesFromAttendance + opening, openingBalanceGames:0 };
        if(firebaseReady && db) await db.collection("config").doc("playerProfiles").set(playerProfiles);
        refreshAllDisplays();
    }
    
    async function savePayment(payment) {
        if(firebaseReady && db) await db.collection("payments").doc(`${payment.player}_${payment.gameDate}`).set(payment);
        const idx = payments.findIndex(p => p.player === payment.player && p.gameDate === payment.gameDate);
        if(idx !== -1) payments[idx] = payment; else payments.push(payment);
        if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function saveGuest(g) {
        if(firebaseReady && db) await db.collection("guests").doc(`${g.guestName}_${g.gameDate}`).set(g);
        guests.push(g);
        refreshAllDisplays();
    }
    
    async function removeGuest(guestName, gameDate) {
        if(!confirm(`Remove guest "${guestName}"?`)) return;
        if(firebaseReady && db) await db.collection("guests").doc(`${guestName}_${gameDate}`).delete();
        guests = guests.filter(g => !(g.guestName === guestName && g.gameDate === gameDate));
        if(teamAssignments[gameDate]) { delete teamAssignments[gameDate][guestName]; delete teamAssignments[gameDate][`guest_${guestName}`]; if(firebaseReady && db) await db.collection("config").doc("teamAssignments").set(teamAssignments); }
        refreshAllDisplays();
    }
    
    async function saveTeamAssignments(gameDate, assignments) {
        teamAssignments[gameDate] = assignments;
        if(firebaseReady && db) await db.collection("config").doc("teamAssignments").set(teamAssignments);
        refreshAllDisplays();
    }
    
    async function saveComment(gameDate, author, text) {
        const comment = { gameDate, author, text, timestamp: Date.now() };
        if(firebaseReady && db) await db.collection("matchComments").add(comment);
        if(!matchComments[gameDate]) matchComments[gameDate]=[];
        matchComments[gameDate].push(comment);
        renderHistoryPage();
    }
    
    async function saveMatchResult(gameDate, blackScore, whiteScore, goals) {
        matchResults[gameDate] = { blackScore, whiteScore, goals };
        if(firebaseReady && db) await db.collection("config").doc("matchResults").set(matchResults);
        renderHistoryPage(); renderScoreboardPage();
        if(isAdminLoggedIn) renderAdminPage();
    }
    
    async function saveChatMessage(message) {
        if(!currentUser || !message.trim()) return;
        if(firebaseReady && db) {
            await db.collection("chatMessages").add({
                name: currentUser.name,

    async function adminAddManualAttendance(playerName) {
        const displayWeek = getDisplayGameWeek();
        if(!displayWeek) { alert("No upcoming game week"); return; }
        if(!players.includes(playerName)) { alert(`Player "${playerName}" not in roster.`); return; }
        const existing = attendance.find(a => a.player === playerName && a.gameDate === displayWeek.gameDate);
        if(existing && existing.status === 'in') { alert(`${playerName} is already playing`); return; }
        await saveAttendance({ player: playerName, gameDate: displayWeek.gameDate, status: 'in', manuallyAdded: true });
        alert(`${playerName} added to playing list`);
    }
    
    async function setAttendance(status) {
        if(!currentUser) { alert("Login required"); return; }
        const displayWeek = getDisplayGameWeek();
        if(!displayWeek) return;
        await saveAttendance({ player: currentUser.name, gameDate: displayWeek.gameDate, status: status });
    }
    
    async function addGuest(guestName) {
        const displayWeek = getDisplayGameWeek();
        if(!displayWeek) return;
        if(guests.some(g => g.gameDate === displayWeek.gameDate && g.guestName === guestName.trim())) { alert("Guest already exists"); return; }
        await saveGuest({ guestName: guestName.trim(), gameDate: displayWeek.gameDate, addedBy: currentUser?.name || "Admin" });
        const input = document.getElementById("guestNameInput");
        if(input) input.value = "";
    }

        const modalDiv = document.createElement('div'); modalDiv.className = 'modal';

        document.body.appendChild(modalDiv);

            const newAge = document.getElementById('editAge').value.trim();

            playerProfiles[playerName] = { age: newAge || '—', position: newPosition, yearJoined: newYear || '—', gamesPlayed: gamesFromAttend + newOpening, openingBalanceGames: newOpening };

    function renderScoreboardPage() {
        const container = document.getElementById("page-scoreboard");
        if(!container) return;
        let stats = new Map();
        for(let player of players) stats.set(player, { goals: 0, appearances: 0 });
        attendance.forEach(a => { if(a.status === 'in' && stats.has(a.player)) stats.get(a.player).appearances++; });
        for(let match of Object.values(matchResults)) if(match.goals) for(let [scorer, count] of Object.entries(match.goals)) if(stats.has(scorer)) stats.get(scorer).goals += count;
        const allStats = Array.from(stats.entries()).map(([name, s]) => ({ name, goals: s.goals, appearances: s.appearances }));
        const topGoals = [...allStats].sort((a,b) => b.goals - a.goals).slice(0,10);
        const topApps = [...allStats].sort((a,b) => {
            const aTotal = a.appearances + (playerProfiles[a.name]?.openingBalanceGames || 0);
            const bTotal = b.appearances + (playerProfiles[b.name]?.openingBalanceGames || 0);
            return bTotal - aTotal;
        }).slice(0,10);
        container.innerHTML = `<div class="card"><h2>🏆 All-Time Leaderboard</h2>
            <div><h3>⚽ Top Goal Scorers</h3><table class="data-table"><thead><tr><th>#</th><th>Player</th><th>Goals</th></tr></thead><tbody>${topGoals.map((p,i)=>`<tr><td style="width:40px;"><strong>${i+1}</strong></td><td>${renderMiniAvatar(p.name,24)} ${escapeHtml(p.name)}</td><td style="font-weight:700;">${p.goals} goals</td></tr>`).join('')}</tbody></table></div>
            <div style="margin-top:16px;"><h3>🏃 Most Games Played</h3><table class="data-table"><thead><tr><th>#</th><th>Player</th><th>Games</th></tr></thead><tbody>${topApps.map((p,i)=>`<tr><td style="width:40px;"><strong>${i+1}</strong></td><td>${renderMiniAvatar(p.name,24)} ${escapeHtml(p.name)}</td><td style="font-weight:700;">${p.appearances + (playerProfiles[p.name]?.openingBalanceGames || 0)} games</td></tr>`).join('')}</tbody></table></div>
        </div>`;
    }

    function renderHistoryPage() {
        const container = document.getElementById("page-history");
        if(!container) return;
        const pastWeeks = getPastWeeks();
        if(pastWeeks.length===0) { container.innerHTML = `<div class="card"><h2>📖 Match History</h2><p>No past games yet. Check back after Monday!</p></div>`; return; }
        let html = `<div class="card"><h2>📖 Match History</h2></div>`;
        for(let week of pastWeeks.slice(0, 10)) {
            const assignments = teamAssignments[week.dateStr] || {};
            const black = Object.keys(assignments).filter(k=>assignments[k]==="black" && !k.startsWith("guest_"));
            const white = Object.keys(assignments).filter(k=>assignments[k]==="white" && !k.startsWith("guest_"));
            const match = matchResults[week.dateStr] || { blackScore:0, whiteScore:0, goals:{} };
            const goals = match.goals || {};
            const blackGoals=[], whiteGoals=[];
            for(let [player,count] of Object.entries(goals)) { if(black.includes(player)) blackGoals.push({player,count}); else if(white.includes(player)) whiteGoals.push({player,count}); }
            const weeklyGuests = guests.filter(g=>g.gameDate===week.dateStr);
            const comments = matchComments[week.dateStr] || [];
            const safeId = week.dateStr.replace(/-/g,'');
            html += `<div class="match-card"><div class="match-header"><div class="match-date">${week.label}</div><div class="match-result">⚫ ${match.blackScore || 0} - ${match.whiteScore || 0} ⚪</div></div>
                <div class="teams-section"><div class="team-row"><div class="team-box"><div class="team-black">⚫ BLACK</div><div class="player-list">${black.map(p=>`<div class="player-tag">${renderMiniAvatar(p,24)} ${escapeHtml(p)}</div>`).join('')||'<span class="player-tag">—</span>'}</div></div>
                <div class="team-box"><div class="team-white">⚪ WHITE</div><div class="player-list">${white.map(p=>`<div class="player-tag">${renderMiniAvatar(p,24)} ${escapeHtml(p)}</div>`).join('')||'<span class="player-tag">—</span>'}</div></div></div><div class="score-big">${match.blackScore || 0} - ${match.whiteScore || 0}</div></div>
                <div class="goals-section"><div>⚽ Goal Scorers</div><div class="goals-list">${blackGoals.map(g=>`<div class="goal-badge">⚫ ${g.player} ×${g.count}</div>`).join('')}${whiteGoals.map(g=>`<div class="goal-badge">⚪ ${g.player} ×${g.count}</div>`).join('')}${blackGoals.length===0 && whiteGoals.length===0 ? '<div class="goal-badge">No goals recorded</div>' : ''}</div></div>
                ${weeklyGuests.length ? `<div class="goals-section" style="background:#0f0f0f;"><div>🎭 Guests</div><div class="goals-list">${weeklyGuests.map(g=>`<div class="goal-badge" style="border-left-color:#ffffff;">${escapeHtml(g.guestName)} <small>(${escapeHtml(g.addedBy)})</small></div>`).join('')}</div></div>` : ''}

        }
        container.innerHTML = html;
    }

        document.getElementById("autoBalanceBtn")?.addEventListener("click", () => {
            if(allList.length===0) return;
            const shuffled = [...allList];
            for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
            const mid=Math.ceil(shuffled.length/2);
            const newAssign={};
            shuffled.slice(0,mid).forEach(p=>{newAssign[p.isGuest?`guest_${p.name}`:p.name]="black";});
            shuffled.slice(mid).forEach(p=>{newAssign[p.isGuest?`guest_${p.name}`:p.name]="white";});
            teamAssignments[displayWeek.gameDate]=newAssign;
            saveTeamAssignments(displayWeek.gameDate, teamAssignments[displayWeek.gameDate]);
            renderAdminPage(); renderThisWeeksTeamsPage();
        });
        document.getElementById("saveTeamsBtn")?.addEventListener("click", async () => {
            const selects = document.querySelectorAll(".team-select");
            const newAssign={};
            selects.forEach(sel=>{const name=sel.dataset.name, isGuest=sel.dataset.isguest==="true", team=sel.value; if(team) newAssign[isGuest?`guest_${name}`:name]=team;});
            teamAssignments[displayWeek.gameDate]=newAssign;
            await saveTeamAssignments(displayWeek.gameDate, teamAssignments[displayWeek.gameDate]);
            alert("Teams saved!");
        });
        document.getElementById("pastWeekSelect")?.addEventListener("change", (e) => { const form = document.getElementById("resultForm"); if(form) form.style.display = e.target.value ? "block" : "none"; });
        document.getElementById("saveResultBtn")?.addEventListener("click", async () => {
            const weekDate = document.getElementById("pastWeekSelect").value;
            const black = parseInt(document.getElementById("blackScore")?.value) || 0;
            const white = parseInt(document.getElementById("whiteScore")?.value) || 0;
            if(weekDate) { await saveMatchResult(weekDate, black, white, {}); alert("Result saved!"); renderHistoryPage(); }
        });
    }
    
    function initNavigation() {
        const modules = [{id:"home",name:"🏠 HOME"},{id:"profiles",name:"👤 PROFILES"},{id:"scoreboard",name:"🏆 STATS"},{id:"teamswk",name:"⚽ THIS WEEK"},{id:"history",name:"📖 HISTORY"},{id:"weather",name:"🌤️ WEATHER"},{id:"chat",name:"💬 CHAT"},{id:"rules",name:"📜 RULES"}];
        if(isAdminLoggedIn) modules.push({id:"admin",name:"⚙️ ADMIN"});
        const navBar = document.getElementById("topNavBar");
        if(navBar) navBar.innerHTML = modules.map(m => `<button class="nav-module" data-module="${m.id}">${m.name}</button>`).join('');
        document.querySelectorAll(".nav-module").forEach(btn => {
            btn.addEventListener("click", () => {
                const id = btn.dataset.module;
                document.querySelectorAll(".module-container").forEach(c => c.classList.remove("active-module"));
                const target = document.getElementById(`module-${id}`);
                if(target) target.classList.add("active-module");
                document.querySelectorAll(".nav-module").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                if(id === "chat") renderChatPage();
            });
        });
        const homeBtn = document.querySelector('.nav-module[data-module="home"]');
        if(homeBtn) homeBtn.click();
    }
    
    async function renderApp() {
        await loadData();
        await fetchWeather();
        const displayWeek = getDisplayGameWeek();
        const app = document.getElementById("app");
        app.innerHTML = `
            <div class="header"><div class="logo-icon"><i class="fas fa-futbol"></i></div><h1>COLLINGWOOD FC</h1><h1 style="font-size:12px; letter-spacing:2px;">MONDAY NIGHTS</h1><div class="user-row"><i class="fas fa-user-circle"></i> <strong>${currentUser.role==="admin"?"ADMIN":currentUser.name}</strong> <button id="logoutBtnMain">Exit</button></div></div>
            <div class="top-nav" id="topNavBar"></div>
            <div id="module-home" class="module-container"><div id="homeContainer"></div></div>
            <div id="module-profiles" class="module-container"><div id="page-profiles"></div></div>
            <div id="module-scoreboard" class="module-container"><div id="page-scoreboard"></div></div>
            <div id="module-teamswk" class="module-container"><div id="page-teamswk"></div></div>
            <div id="module-history" class="module-container"><div id="page-history"></div></div>
            <div id="module-weather" class="module-container"><div id="page-weather"></div></div>
            <div id="module-chat" class="module-container"><div id="page-chat"></div></div>
            <div id="module-rules" class="module-container"><div id="page-rules"></div></div>
            ${isAdminLoggedIn ? `<div id="module-admin" class="module-container"><div id="page-admin"></div></div>` : ''}
        `;
        document.getElementById("logoutBtnMain").onclick = () => { if(chatUnsubscribe) chatUnsubscribe(); currentUser=null; localStorage.removeItem("soccer_user"); renderLogin(); };
        renderHomePage(); 
        renderProfilesPage(); 
        renderScoreboardPage(); 
        renderThisWeeksTeamsPage(); 
        renderHistoryPage(); 
        renderWeatherPage(); 
        renderChatPage(); 
        renderRulesPage(); 
        if(isAdminLoggedIn) renderAdminPage();
        initNavigation();
    }
    
    async function renderLogin() {
        await loadData();
        const app = document.getElementById("app");
        app.innerHTML = `<div class="login-box"><div class="login-logo"><i class="fas fa-futbol"></i></div><h2>COLLINGWOOD FC</h2><p>Monday Nights • 8pm Kickoff • Clifton Park</p>
            <select id="playerSelectLogin"><option value="">-- Select Player --</option>${players.map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}</select>
            <button id="playerLoginBtn">Enter as Player</button><hr>
            <div style="position:relative;"><input type="password" id="adminPwLogin" placeholder="Admin Password"><i class="fas fa-eye-slash" id="togglePassword" style="position:absolute; right:20px; top:50%; transform:translateY(-50%); cursor:pointer; color:#94a3b8;"></i></div>
            <button id="adminLoginBtn">Admin Login</button></div>`;
        
        document.getElementById("playerLoginBtn").onclick = () => { 
            const select = document.getElementById("playerSelectLogin");
            const n = select?.value; 
            if(n && n !== ""){ 
                currentUser = { name: n, role: "player" }; 
                isAdminLoggedIn = false; 
                localStorage.setItem("soccer_user", JSON.stringify(currentUser)); 
                renderApp(); 
            } else {
                alert("Please select your name from the list");
            }
        };
        document.getElementById("adminLoginBtn").onclick = () => { 
            const pw = document.getElementById("adminPwLogin")?.value; 
            if(pw === "admin123"){ 
                currentUser = { name: "Admin", role: "admin" }; 
                isAdminLoggedIn = true; 
                localStorage.setItem("soccer_user", JSON.stringify(currentUser)); 
                renderApp(); 
            } else alert("Wrong password (hint: admin123)"); 
        };
        const toggleBtn = document.getElementById("togglePassword");
        const pwInput = document.getElementById("adminPwLogin");
        if(toggleBtn && pwInput) {
            toggleBtn.onclick = () => {
                const type = pwInput.type === "password" ? "text" : "password";
                pwInput.type = type;
                toggleBtn.className = type === "password" ? "fas fa-eye-slash" : "fas fa-eye";
            };
        }
    }
    
    const stored = localStorage.getItem("soccer_user");
    if(stored) { 
        try { 
            const u = JSON.parse(stored); 
            if(u.role === "admin"){ 
                isAdminLoggedIn = true; 
                currentUser = { name: "Admin", role: "admin" }; 
            } else { 
                currentUser = { name: u.name, role: "player" }; 
            } 
            renderApp(); 
        } catch(e){ renderLogin(); } 
    } else { 
        renderLogin(); 
    }
</script>
</body>
